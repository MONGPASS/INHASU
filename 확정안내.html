<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>예약 확정 안내 · 몽골리아 은하수</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
    background: #DBE6E2; -webkit-print-color-adjust: exact; print-color-adjust: exact; color: #152C28; }

  .doc { max-width: 430px; margin: 0 auto; padding: 18px 14px 40px; display: flex; flex-direction: column; gap: 18px; }
  .card { background: #FCFEFD; border-radius: 22px; box-shadow: 0 18px 44px rgba(6,65,58,0.14); overflow: hidden; }
  .card > .pad { padding: 22px 22px 26px; }
  .blk { break-inside: avoid; }
  .row { display: flex; align-items: center; }
  .ph { display: flex; align-items: center; justify-content: center; background: #EAF2EE;
    color: #A9BCB6; font-size: 11px; overflow: hidden; }
  .ph img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .sec-eyebrow { color:#06C4A0; font-size:11px; font-weight:800; letter-spacing:0.14em; }
  .sec-title { color:#152C28; font-size:23px; font-weight:800; letter-spacing:-0.02em; margin-top:4px; }

  @media (max-width: 460px) {
    .doc { padding: 14px 10px 32px; gap: 14px; }
    .card > .pad { padding: 18px 18px 22px; }
  }

  @page { size: 420px 760px; margin: 0; }
  @media print {
    body { background: #fff; }
    .fab { display: none !important; }
    .doc { max-width: none; margin: 0; padding: 0; gap: 0; display: block; }
    .card { border-radius: 0; box-shadow: none; break-before: page; }
    .card:first-child { break-before: auto; }
    .card > .pad { padding: 26px 26px 30px; }
  }

  .fab { position: fixed; right: 16px; bottom: 18px; z-index: 40; background: #152C28; color: #fff;
    border: none; border-radius: 26px; padding: 13px 20px; font: 800 14.5px 'Pretendard', sans-serif;
    box-shadow: 0 10px 26px rgba(6,65,58,0.32); cursor: pointer; }
</style>
</head>
<body>
<div class="doc" id="root"></div>
<button class="fab" id="fab" style="display:none" onclick="window.print()">📄 PDF 저장</button>

<script type="module">
const KAKAO = "https://pf.kakao.com/_BSLaxl";
const _token = new URLSearchParams(location.search).get("t");
const root = document.getElementById("root");
const esc = s => String(s ?? "");
const noBr = s => String(s ?? "").replace(/<br\s*\/?>/gi, " ").trim();

const R = await (async () => {
  if (!_token) return null;
  try {
    const res = await fetch("/api/my/" + encodeURIComponent(_token), { cache: "no-store" });
    const j = await res.json();
    if (j.ok) return j;
  } catch (e) {}
  return null;
})();

if (!R || !R.booking) {
  root.innerHTML = `
  <div class="card"><div class="pad" style="text-align:center;">
    <div style="font-size:46px">🕓</div>
    <h1 style="font-size:20px; margin:14px 0 8px; font-weight:800;">확정 안내 준비 중이에요</h1>
    <p style="color:#6b7c78; line-height:1.65; font-size:14px;">예약이 확정되면 이 링크에서<br>확정 일정표와 배정 정보를 확인하실 수 있어요.</p>
    <a href="내견적.html?t=${encodeURIComponent(_token || "")}" style="display:inline-block; margin-top:20px; color:#06c4a0; font-weight:800; text-decoration:none;">← 내 견적으로 돌아가기</a>
  </div></div>`;
} else {

document.getElementById("fab").style.display = "";
const BK = R.booking, A = BK.assign || {};
const paxTxt = [R.adult ? `성인 ${R.adult}` : "", R.child ? `아동 ${R.child}` : "", R.infant ? `유아 ${R.infant}` : ""].filter(Boolean).join(" · ");
const period = R.depart ? `${R.depart}${R.return_ ? " ~ " + R.return_ : ""}${R.nights ? ` (${R.nights}박 ${R.nights + 1}일)` : ""}` : "-";

const card = inner => `<div class="card"><div class="pad">${inner}</div></div>`;
const ph = (src, label, style) => src
  ? `<div class="ph" style="${style}"><img src="${src}" alt="${esc(label)}"></div>`
  : `<div class="ph" style="${style}">${esc(label) || ""}</div>`;
const LOGO = `<svg width="30" height="30" viewBox="0 0 48 48" fill="none" style="flex:none;"><rect x="1.5" y="1.5" width="45" height="45" rx="13" stroke="#0A6A5E" stroke-width="1.8"></rect><path d="M9 33 L19 18 L26 28 L32 20 L39 33 Z" fill="#0A6A5E"></path></svg>`;

/* ── 1) 확정 표지 ── */
const secCover = card(`
  <div class="blk">
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:9px;">${LOGO}
        <div style="color:#0A6A5E; font-size:11px; font-weight:800; letter-spacing:0.14em;">MONGOLIA<br>MILKY WAY</div>
      </div>
      <div style="background:#3d7ff0; color:#fff; font-size:9.5px; font-weight:800; letter-spacing:0.08em; padding:7px 13px; border-radius:20px;">BOOKING CONFIRMED</div>
    </div>
    <div style="text-align:center; margin-top:28px;">
      <div style="font-size:44px;">🎉</div>
      <div style="font-family:'Playfair Display',serif; font-size:14px; color:#06C4A0; margin-top:10px;">당신의 삶을 우러러 볼 시간</div>
      <div style="color:#152C28; font-size:30px; font-weight:800; letter-spacing:-0.03em; margin-top:8px; line-height:1.25;">${esc(R.name)}님,<br><span style="color:#06C4A0;">예약이 확정됐어요!</span></div>
    </div>
    <div style="margin-top:24px; border:1px solid #DDEBE6; border-radius:14px; overflow:hidden; font-size:12.5px;">
      ${[["여행지", esc(R.destination || "-")], ["여행 기간", esc(period)], ["인원", esc(paxTxt || "-")], ["확정일", esc(BK.confirmedAt || "-")]].map(([k, v], i) => `
        <div style="display:grid; grid-template-columns:88px 1fr; ${i ? "border-top:1px solid #EAF3EF;" : ""}">
          <div style="background:#EAF7F3; color:#0A6A5E; font-weight:700; padding:12px;">${k}</div>
          <div style="padding:12px; color:#152C28; font-weight:600;">${v}</div>
        </div>`).join("")}
    </div>
  </div>`);

/* ── 2) 배정 안내 ── */
const g = A.guide, dr = A.driver, v = A.vehicle;
const gCard = (g && g.name) ? `
  <div class="blk" style="border:1.5px solid #06C4A0; border-radius:14px; overflow:hidden; background:#F1FBF7;">
    <div style="display:flex; gap:14px; padding:16px;">
      ${g.img ? ph(g.img, g.name, "width:88px; height:88px; flex:none; border-radius:14px;") : `<div style="width:88px; height:88px; flex:none; border-radius:14px; background:#DFF3EC; display:flex; align-items:center; justify-content:center; font-size:34px;">👤</div>`}
      <div style="flex:1;">
        <div style="color:#0A6A5E; font-size:10.5px; font-weight:800; letter-spacing:0.1em;">담당 가이드</div>
        <div style="color:#152C28; font-size:19px; font-weight:800; margin-top:2px;">${esc(g.name)}</div>
        <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:7px;">
          ${g.career ? `<span style="background:#fff; color:#0A6A5E; font-size:10.5px; font-weight:700; padding:4px 10px; border-radius:12px; border:1px solid #CDEBE0;">경력 ${esc(g.career)}</span>` : ""}
          ${g.korean ? `<span style="background:#fff; color:#0A6A5E; font-size:10.5px; font-weight:700; padding:4px 10px; border-radius:12px; border:1px solid #CDEBE0;">한국어 ${esc(g.korean)}</span>` : ""}
        </div>
        ${g.desc ? `<div style="margin-top:8px; font-size:11.5px; color:#40544F; line-height:1.6;">${esc(g.desc)}</div>` : ""}
      </div>
    </div>
  </div>` : "";
const dCard = (dr && dr.name) ? `
  <div class="blk row" style="gap:12px; border:1px solid #E3F0EB; border-radius:14px; padding:14px 16px; margin-top:10px;">
    <span style="font-size:26px; flex:none;">🧑‍🔧</span>
    <div><div style="color:#0A6A5E; font-size:10.5px; font-weight:800; letter-spacing:0.1em;">담당 기사</div>
    <div style="color:#152C28; font-size:15px; font-weight:800; margin-top:2px;">${esc(dr.name)}${dr.career ? ` <span style="font-size:11px; color:#8CA39D; font-weight:600;">경력 ${esc(dr.career)}</span>` : ""}</div></div>
  </div>` : "";
const vCard = (v && v.model) ? `
  <div class="blk row" style="gap:12px; border:1px solid #E3F0EB; border-radius:14px; padding:14px 16px; margin-top:10px;">
    <span style="font-size:26px; flex:none;">🚐</span>
    <div><div style="color:#0A6A5E; font-size:10.5px; font-weight:800; letter-spacing:0.1em;">배정 차량</div>
    <div style="color:#152C28; font-size:15px; font-weight:800; margin-top:2px;">${esc(v.model)}${v.seats ? ` <span style="font-size:11px; color:#8CA39D; font-weight:600;">${esc(v.seats)}</span>` : ""}</div></div>
  </div>` : "";
const lodges = Array.isArray(A.lodges) ? A.lodges.filter(l => l.name) : [];
const lodgeList = lodges.length ? `
  <div class="blk" style="margin-top:14px;">
    <div style="color:#0A6A5E; font-size:12.5px; font-weight:800; margin-bottom:8px;">🏕 일차별 숙소</div>
    <div style="border:1px solid #E3F0EB; border-radius:12px; overflow:hidden; font-size:12px;">
      ${lodges.map((l, i) => `
      <div style="display:grid; grid-template-columns:${l.img ? "52px " : ""}58px 1fr auto; align-items:center; ${i ? "border-top:1px solid #EEF4F1;" : ""} background:${i % 2 ? "#F7FCFA" : "#fff"};">
        ${l.img ? `<div style="padding:6px 0 6px 8px;">${ph(l.img, l.name, "width:44px; height:44px; border-radius:8px;")}</div>` : ""}
        <div style="padding:11px 8px; color:#06C4A0; font-weight:800; text-align:center;">${esc(l.day)}일차</div>
        <div style="padding:11px 4px; color:#152C28; font-weight:600;">${esc(l.name)}${l.tags ? `<br><span style="font-size:10px; color:#8CA39D; font-weight:600;">${esc(l.tags)}</span>` : ""}</div>
        <div style="padding:11px 12px; color:#8CA39D; font-weight:700; font-size:11px;">${esc(l.grade || "")}</div>
      </div>`).join("")}
    </div>
  </div>` : "";
const secAssign = (gCard || dCard || vCard || lodgeList) ? card(`
  <div class="blk">
    <div class="sec-eyebrow">YOUR TEAM</div>
    <div class="sec-title">배정 안내</div>
  </div>
  <div style="margin-top:16px;">${gCard}${dCard}${vCard}</div>
  ${lodgeList}`) : "";

/* ── 3) 확정 일정표 ── */
const itemHtml = t => {
  if (String(t).startsWith("*")) return `<span style="color:#06C4A0; font-weight:600;">${esc(t)}</span>`;
  if (String(t).startsWith("(")) return `<span style="color:#8CA39D;">${esc(t)}</span>`;
  return esc(t);
};
const dayCard = (d, i) => {
  const meta = [String(d.move || "").replace(/이동\s*/, ""), String(d.dist || "").replace(/[()]/g, "").trim()].filter(Boolean).join(" · ");
  const tags = ((d.stay || {}).tags || []).length ? `<span style="background:#EAF7F3; color:#0A6A5E; font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:14px;">${d.stay.tags.join(" · ")}</span>` : "";
  return `
  <div class="blk" style="border:1px solid #E3F0EB; border-radius:14px; overflow:hidden;">
    <div class="row" style="justify-content:space-between; background:#06C4A0; padding:11px 15px;">
      <div class="row" style="gap:9px;"><span style="color:#fff; font-size:12px; font-weight:800;">${i + 1}일차</span><b style="color:#fff; font-size:14px;">${noBr(d.dest)}</b></div>
      ${meta ? `<span style="color:#EAFBF6; font-size:10.5px; white-space:nowrap;">${esc(meta)}</span>` : ""}
    </div>
    <div style="padding:13px 15px;">
      <div style="position:relative; margin:4px 0 0 6px; padding-left:22px; border-left:1.5px solid #C5E6DC; font-size:11.5px; color:#354B46;">
        ${(d.items || []).map((it, k) => `<div style="position:relative; ${k < d.items.length - 1 ? "margin-bottom:9px;" : ""} line-height:1.45;"><span style="position:absolute; left:-28.5px; top:2px; width:11px; height:11px; border-radius:50%; background:#06C4A0;"></span>${itemHtml(it)}</div>`).join("")}
      </div>
      <div style="display:flex; gap:8px; margin-top:11px; flex-wrap:wrap;">
        ${(d.stay || {}).name ? `<span style="background:#EAF7F3; color:#0A6A5E; font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:14px;">🛏 ${noBr(d.stay.name)}</span>` : ""}${tags}
      </div>
      ${(d.meals || []).length ? `<div style="margin-top:8px; font-size:10.5px; color:#8CA39D;">🍽 ${d.meals.join(" · ")}</div>` : ""}
    </div>
  </div>`;
};
const secDays = (BK.days || []).length ? card(`
  <div class="blk">
    <div class="sec-eyebrow">CONFIRMED ITINERARY</div>
    <div class="sec-title">확정 일정표</div>
    <div style="margin-top:6px; font-size:11px; color:#8CA39D;">견적 단계 일정과 다를 수 있어요 — 이 문서가 최종 확정본입니다.</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:12px; margin-top:14px;">
    ${BK.days.map(dayCard).join("")}
  </div>`) : "";

/* ── 4) 안내문 + 문의 ── */
const secNotes = card(`
  ${BK.notes ? `<div class="blk" style="background:#EAF7F3; border:1px solid #CBEADF; border-radius:14px; padding:16px 18px;">
    <div style="color:#0A6A5E; font-size:13px; font-weight:800;">📢 안내 사항</div>
    <div style="margin-top:8px; font-size:12px; color:#354B46; line-height:1.8; white-space:pre-wrap;">${esc(BK.notes)}</div>
  </div>` : ""}
  <div class="blk" style="${BK.notes ? "margin-top:14px;" : ""} text-align:center;">
    <div style="font-size:12.5px; color:#6b7c78; line-height:1.7;">일정 변경이나 궁금한 점이 있으시면<br>언제든 카카오톡으로 문의해 주세요.</div>
    <a href="${KAKAO}" target="_blank" style="display:block; margin-top:14px; padding:14px; border-radius:13px; background:#FEE500; color:#3C1E1E; font-size:15px; font-weight:800; text-decoration:none;">💬 카카오톡 문의하기</a>
    <a href="내견적.html?t=${encodeURIComponent(_token)}" style="display:inline-block; margin-top:14px; color:#06c4a0; font-weight:800; text-decoration:none; font-size:13px;">← 내 견적 화면으로</a>
  </div>`);

root.innerHTML = secCover + secAssign + secDays + secNotes;
document.title = `몽골리아 은하수_${esc(R.name)}님_예약확정안내`;
}
</script>
</body>
</html>
