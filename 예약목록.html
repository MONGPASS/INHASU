<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>예약 관리 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root { --accent:#06c4a0; --deep:#06c4a0; --soft:#eaf7f3; --ink:#1b2b28; --sub:#6b7c78; --gray:#9aa5a2; --line:#eceef1; --bg:#f6f8f9; --book:#3d7ff0; --warn:#e0913a; --red:#d96a5e; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  svg { display:block; }
  .shell { display:flex; min-height:100vh; }
  .side { width:232px; flex:0 0 232px; background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; }
  .side-brand { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .side-brand .logo { width:38px; height:38px; border-radius:11px; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .side-brand b { font-size:15px; font-weight:800; display:block; line-height:1.2; }
  .side-brand small { font-size:11.5px; color:var(--gray); font-weight:600; }
  .mi { display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; color:var(--sub); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:2px; border:none; background:none; width:100%; font-family:inherit; transition:.12s; }
  .mi:hover { background:var(--soft); color:var(--deep); }
  .mi.on { background:var(--deep); color:#fff; }
  .content { flex:1; min-width:0; width:calc(100vw - 232px); padding:26px 24px 60px; max-width:none; }
  .page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; }
  .page-head h1 { font-size:22px; font-weight:800; }
  .page-head p { color:var(--sub); font-size:13px; margin-top:5px; }
  .btn { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:10px; padding:10px 14px; font:800 13px Pretendard; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
  .btn.primary { background:var(--deep); color:#fff; border-color:var(--deep); }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px; }
  .stat { position:relative; background:#fff; border:1px solid var(--line); border-radius:16px; padding:15px 16px 13px 18px; overflow:hidden; }
  .stat::before { content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--c,#06c4a0); }
  .stat-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .stat-ico { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--cs,#eaf7f3); color:var(--c,#06c4a0); }
  .stat-ico svg { width:18px; height:18px; }
  .stat-pill { font-size:11px; font-weight:800; padding:4px 10px; border-radius:99px; background:var(--cs,#eaf7f3); color:var(--c,#06c4a0); white-space:nowrap; }
  .stat-k { color:var(--sub); font-weight:800; font-size:12.5px; }
  .stat-v { font-size:28px; font-weight:800; margin-top:5px; line-height:1; display:flex; align-items:baseline; gap:3px; }
  .stat-v .unit { font-size:13px; font-weight:800; color:var(--gray); }
  .stat-bot { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:11px; }
  .stat-sub { color:var(--gray); font-size:12px; font-weight:700; }
  .stat-act { font-size:12px; font-weight:800; color:var(--c,#06c4a0); cursor:pointer; border:none; background:none; font-family:inherit; padding:0; white-space:nowrap; }
  .stat-act:hover { text-decoration:underline; }
  .stat.c-teal  { --c:#06c4a0; --cs:#e4f6f1; }
  .stat.c-red   { --c:#d96a5e; --cs:#fbeceb; }
  .stat.c-amber { --c:#d9932f; --cs:#fbf1e2; }
  .stat.c-green { --c:#1f9d76; --cs:#e6f5ef; }
  .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .search { flex:1; min-width:300px; max-width:560px; }
  .search input { width:100%; border:1px solid var(--line); border-radius:11px; padding:11px 13px; font:600 14px Pretendard; outline:none; }
  .search input:focus { border-color:var(--accent); }
  .sortbox { display:flex; align-items:center; gap:7px; }
  .sortbox label { color:var(--sub); font-size:12.5px; font-weight:800; }
  .sortbox select, .sortbox button { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:10px; padding:10px 11px; font:800 12.5px Pretendard; cursor:pointer; }
  .sortbox select:focus { outline:none; border-color:var(--accent); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-left:auto; }
  .chip { border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:99px; padding:8px 13px; font:800 12.5px Pretendard; cursor:pointer; }
  .chip.on { background:var(--deep); border-color:var(--deep); color:#fff; }
  .bulkbar { display:flex; align-items:center; gap:8px; margin:0 0 14px; flex-wrap:wrap; }
  .bulkbar .count { color:var(--sub); font-size:12.5px; font-weight:800; margin-right:4px; }
  .bulkbtn { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:9px; padding:8px 11px; font:800 12.5px Pretendard; cursor:pointer; }
  .bulkbtn:hover:not(:disabled) { border-color:#cfd9d6; background:#fbfdfc; }
  .bulkbtn.primary { background:var(--deep); border-color:var(--deep); color:#fff; }
  .bulkbtn.danger { background:#fff5f4; border-color:#f2d1cc; color:#b84e44; }
  .bulkbtn:disabled { opacity:.45; cursor:not-allowed; }
  .rowcheck { width:16px; height:16px; accent-color:var(--deep); cursor:pointer; }
  .money-stack { display:flex; flex-direction:column; gap:6px; align-items:flex-start; min-width:0; }
  .money-stack .amount { font-weight:700; }
  .pay-sel { width:100%; min-width:96px; border:1px solid var(--line); border-radius:8px; padding:5px 6px; font:800 11.5px Pretendard; background:#fff; color:var(--ink); cursor:pointer; }
  .col-money, .col-receipt { text-align:left; }
  .col-actions { text-align:right; }
  .pay-sel[data-v="입금완료"] { background:#e8f7f2; color:#0a6a5e; border-color:#cdeee5; }
  .pay-sel[data-v="현지현금전달"], .pay-sel[data-v="현장현금전달"] { background:#fff5e9; color:#b76d14; border-color:#f5e0c4; }
  .pay-sel[data-v="미입금"], .pay-sel[data-v="미수령"] { background:#fbeceb; color:#b84e44; border-color:#f3d2ce; }
  .table-card { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; max-width:100%; }
  table { width:100%; border-collapse:collapse; }
  th { background:#fafbfc; text-align:left; color:var(--sub); font-size:12.5px; font-weight:800; padding:13px 16px; border-bottom:1px solid var(--line); white-space:nowrap; }
  td { padding:14px 16px; border-bottom:1px solid #f2f5f4; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:#fbfdfc; }
  .cust { display:flex; align-items:center; gap:11px; }
  .avatar { width:38px; height:38px; border-radius:11px; background:var(--book); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; flex:none; }
  .cust b { display:block; font-size:14px; }
  .muted { color:var(--gray); font-size:12.5px; font-weight:600; }
  .tag { display:inline-flex; align-items:center; gap:5px; border-radius:99px; padding:5px 10px; font-size:12px; font-weight:800; white-space:nowrap; border:0; font-family:inherit; }
  button.tag { cursor:pointer; }
  button.tag:hover { filter:brightness(.97); box-shadow:0 0 0 1px rgba(0,0,0,.04) inset; }
  .tag.ok { background:#e8f7f2; color:#0a6a5e; }
  .tag.warn { background:#fff5e9; color:#b76d14; }
  .tag.bad { background:#fbeceb; color:#b84e44; }
  .assign { display:flex; flex-wrap:wrap; gap:6px; }
  .actions { display:flex; gap:6px; justify-content:flex-end; flex-wrap:wrap; }
  .name-cell { display:flex; align-items:center; gap:8px; }
  .mini { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:8px; padding:7px 10px; font:800 12px Pretendard; text-decoration:none; cursor:pointer; }
  .mini.blue { border-color:#c9dafb; color:#2b5cc4; background:#f5f8ff; }
  .mini.green { border-color:var(--deep); color:#fff; background:var(--deep); }
  .empty { text-align:center; padding:70px 20px; color:var(--gray); line-height:1.6; }
  .empty b { color:var(--ink); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#123a33; color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:700; opacity:0; transition:.25s; z-index:80; pointer-events:none; }
  .toast.on { opacity:1; }

  /* ── 엑셀형 표: 가로 스크롤 + 밀도 ── */
  .table-card { overflow:auto; }
  .table-card table { min-width:1160px; table-layout:fixed; }
  .table-card th { padding:13px 12px; font-size:12px; overflow:hidden; text-overflow:ellipsis; }
  .table-card td { padding:13px 12px; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .table-card td.td-wrap { white-space:normal; overflow:visible; text-overflow:clip; }
  .table-card::-webkit-scrollbar { height:12px; }
  .table-card::-webkit-scrollbar-track { background:#f2f5f4; border-radius:999px; }
  .table-card::-webkit-scrollbar-thumb { background:#cbd8d4; border-radius:999px; border:3px solid #f2f5f4; }
  .wide-text { max-width:180px; overflow:hidden; text-overflow:ellipsis; display:inline-block; vertical-align:middle; }
  th.sortable { cursor:pointer; user-select:none; }
  th.sortable:hover { color:var(--ink); }
  .num { color:var(--gray); font-weight:800; }
  /* 인라인 편집 select (엑셀 드롭다운) */
  .sel { border:1px solid var(--line); border-radius:8px; padding:6px 6px; font:700 12px Pretendard; background:#fff; color:var(--ink); cursor:pointer; max-width:100%; }
  .sel:focus { outline:none; border-color:var(--accent); }
  .sel[data-p="계약완료"] { background:#e8f7f2; color:#0a6a5e; border-color:#cdeee5; }
  .sel[data-p="투어종료"] { background:#eef1f0; color:#5b6a66; border-color:#dfe5e3; }
  .sel[data-p="예약취소"] { background:#fbeceb; color:#b84e44; border-color:#f3d2ce; }
  .sel[data-p="계약대기"] { background:#fff5e9; color:#b76d14; border-color:#f5e0c4; }
  .doc-tags { display:flex; gap:5px; }
  .doc-stack { display:flex; align-items:center; gap:6px; max-width:220px; }
  a.tag { text-decoration:none; }
  a.tag.dim, span.tag.dim { background:#f2f5f4; color:var(--gray); }
  .contract-badge { display:inline-flex; align-items:center; justify-content:center; min-width:62px; border-radius:9px; padding:8px 10px; font-weight:900; font-size:12px; }
  .contract-badge.signed { background:#e8f7f2; color:#0a6a5e; }
  .contract-badge.unsigned { background:#fbeceb; color:#b84e44; }
  /* 배정 상태 — 진행 바 + 요약 */
  .assign-status { display:flex; flex-direction:column; gap:6px; min-width:0; }
  .assign-bar { display:flex; align-items:center; gap:9px; }
  .assign-track { flex:1; height:6px; border-radius:99px; background:#eef1f0; overflow:hidden; min-width:56px; max-width:118px; }
  .assign-track > span { display:block; height:100%; border-radius:99px; background:#e0913a; transition:width .2s; }
  .assign-track.ok > span { background:var(--accent); }
  .assign-count { font-size:11.5px; font-weight:900; color:#b76d14; white-space:nowrap; }
  .assign-count.ok { color:#0a6a5e; }
  .assign-detail { font-size:11.5px; font-weight:700; color:var(--gray); line-height:1.35; white-space:normal; }
  /* 결제 — 예약금·잔금 통합 */
  .pay-two { display:flex; flex-direction:column; gap:7px; }
  .pay-line { display:flex; align-items:center; gap:6px; }
  .pay-label { font-size:11px; font-weight:800; color:var(--gray); width:32px; flex:none; }
  .pay-line .amount { font-weight:800; font-size:12px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; }
  /* 여행 기간·지역 */
  .period { display:flex; flex-direction:column; gap:3px; }
  .period .range { font-weight:700; font-size:12px; white-space:nowrap; }
  .period .arrow { color:var(--gray); margin:0 4px; }
  .period .sub { color:var(--gray); font-size:11.5px; font-weight:700; }
  .dday { display:inline-block; margin-left:6px; font-size:10.5px; font-weight:900; color:#b76d14; background:#fff3df; border-radius:6px; padding:1px 6px; vertical-align:middle; }
  /* 고객명 + 인원 */
  .cust-name b { font-size:13px; font-weight:800; display:block; }
  .cust-name .pax { color:var(--gray); font-size:11.5px; font-weight:700; }
  /* 관리 액션 */
  .row-actions { display:flex; flex-direction:column; gap:6px; align-items:stretch; }
  .mini.wide { width:100%; text-align:center; padding:9px 8px; }
  .row-sub-actions { display:flex; gap:6px; }
  .row-sub-actions .mini { flex:1; text-align:center; padding:7px 6px; }

  /* ── 엑셀 가져오기 모달 ── */
  .modal-wrap { position:fixed; inset:0; background:rgba(15,30,26,.45); z-index:90; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:#fff; border-radius:16px; width:min(960px, 100%); max-height:86vh; display:flex; flex-direction:column; overflow:hidden; }
  .modal .mh { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--line); }
  .modal .mh h2 { font-size:16px; font-weight:800; }
  .modal .mh .x { border:none; background:none; font-size:18px; cursor:pointer; color:var(--gray); }
  .modal .mb { padding:14px 22px; overflow:auto; }
  .modal .mf { display:flex; justify-content:flex-end; gap:8px; padding:14px 22px; border-top:1px solid var(--line); }
  .modal table { width:100%; min-width:720px; border-collapse:collapse; }
  .modal th { position:sticky; top:0; }
  .modal td { padding:8px 10px; font-size:12.5px; white-space:nowrap; }
  .dup-row td { background:#fff9f2; color:var(--gray); }
  .dup-mark { color:#b76d14; font-weight:800; font-size:11.5px; }

  @media (max-width:900px){ .stats{grid-template-columns:repeat(2,1fr)} .hide-sm{display:none} }
  @media (max-width:760px){ .shell{display:block} .side{display:none} .content{width:100%;padding:20px 14px} .stats{grid-template-columns:1fr 1fr} th.hide-xs,td.hide-xs{display:none} }
</style>
</head>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const ADMIN_TOKEN = sessionStorage.getItem("leaders_admin_token") || "";
const IS_LOCAL = location.protocol === "file:" || ["localhost", "127.0.0.1"].includes(location.hostname);
let RECORDS = [], filter = "전체", query = "";
let SELECTED = new Set();
let toastT;
function toast(m){ $("toast").textContent = m; $("toast").classList.add("on"); clearTimeout(toastT); toastT = setTimeout(()=>$("toast").classList.remove("on"), 2400); }
const dateOnly = s => s ? String(s).slice(0, 10) : "";
const paxSum = r => (Number(r.adult)||0) + (Number(r.child)||0) + (Number(r.infant)||0);
const period = r => `${dateOnly(r.depart) || "?"} ~ ${dateOnly(r.return_) || "?"}${r.nights ? ` (${r.nights}박 ${Number(r.nights) + 1}일)` : ""}`;
const dDay = r => {
  if (!r.depart) return null;
  const a = new Date(dateOnly(r.depart) + "T00:00:00");
  const b = new Date(new Date().toISOString().slice(0,10) + "T00:00:00");
  return Math.ceil((a - b) / 86400000);
};
const lodges = r => (((r.booking || {}).assign || {}).lodges || []).filter(l => l && l.name);
const vehicle = r => (((r.booking || {}).assign || {}).vehicle || {});
const guide = r => (((r.booking || {}).assign || {}).guide || {});
const signed = r => !!(((r.booking || {}).contract || {}).signedAt);
const hasVehicle = r => !!(vehicle(r).model || r.vehicle);
const hasLodges = r => lodges(r).length > 0;
const isReservation = r => (r.status === "예약확정") || !!r.booking;
const assignDone = r => !!guide(r).name && hasVehicle(r) && hasLodges(r);
const reservationOrder = r => {
  const bk = r.booking || {};
  return bk.confirmedAt || r.receivedAt || r.id || "";
};
/* ── 엑셀 컬럼 파생값 ── */
const bookDate = r => dateOnly((r.booking || {}).confirmedAt || r.receivedAt);   // 예약일
const monthOf = s => { const d = dateOnly(s); return d ? `${Number(d.slice(5, 7))}월` : "-"; };
const nightsTxt = r => r.nights != null && r.nights !== "" ? (Number(r.nights) === 0 ? "당일" : `${r.nights}박${Number(r.nights) + 1}일`) : "-";
const TODAY = new Date().toISOString().slice(0, 10);
const progressAuto = r => {                                    // 진행상황 자동 판단
  const ret = dateOnly(r.return_);
  if (r.status === "보류") return "계약대기";
  if (ret && ret < TODAY) return "투어종료";
  if (signed(r)) return "계약완료";
  return "계약대기";
};
const progressOf = r => r.progress || progressAuto(r);
/* 인라인 편집 필드 옵션 */
const FIELD_OPTS = {
  joinType:   ["조인x", "조인1차", "조인2차"],
  flightIncl: ["불포함", "포함"],
  progress:   ["계약대기", "계약완료", "투어종료", "예약취소"],
  pkgTier:    ["풀패키지", "실속", "최고급"],
};
const PAY_OPTS = {
  depositStatus: ["미입금", "입금완료"],
  balanceStatus: ["미수령", "입금완료", "현지현금전달", "계좌입금", "카드결제"],
};
/* 정렬 상태 — 기본: 예약일 오름차순 (엑셀과 동일, 번호가 위→아래 증가) */
let sortKey = "book", sortDir = 1;
const SORT_VALS = {
  book: bookDate, name: r => r.name || "", depart: r => dateOnly(r.depart),
  return: r => dateOnly(r.return_), pax: paxSum, progress: progressOf, status: progressOf,
  balance: r => Number((r.finance || {}).balanceAmount || 0), month: r => dateOnly(r.depart),
};

async function load() {
  if (!ADMIN_TOKEN && !IS_LOCAL) {
    $("list").innerHTML = `<div class="empty"><b>관리자 로그인이 필요합니다.</b><br>대시보드에서 로그인한 뒤 다시 열어주세요.<br><br><a class="btn primary" href="/admin">대시보드로 이동</a></div>`;
    $("stats").innerHTML = "";
    $("chips").innerHTML = "";
    return;
  }
  try {
    if (IS_LOCAL) {
      RECORDS = JSON.parse(localStorage.getItem("leaders_requests") || "[]");
    } else {
      const res = await fetch("/api/requests", { headers:{ "x-admin-token": ADMIN_TOKEN }, cache:"no-store" });
      if (res.status === 401) throw new Error("관리자 인증이 만료됐어요. 대시보드에서 다시 로그인해 주세요.");
      const j = await res.json();
      if (!j.ok) throw new Error(j.error || "목록을 불러오지 못했어요");
      RECORDS = j.items || [];
    }
    render();
  } catch (e) {
    $("list").innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`;
  }
}

function rows() {
  const terms = query.trim().toLowerCase().split(/\s+/).filter(Boolean);
  return RECORDS.filter(isReservation).filter(r => {
    const dd = dDay(r);
    const missing = !assignDone(r);
    if (filter === "계약미서명" && signed(r)) return false;
    if (filter === "배정미완료" && !missing) return false;
    if (filter === "출발임박" && !(dd !== null && dd >= 0 && dd <= 14)) return false;
    if (!terms.length) return true;
    const f = r.finance || {};
    const c = (((r.booking || {}).contractInfo) || {});
    const fl = (((r.booking || {}).flight) || {});
    const travelers = Array.isArray(((r.booking || {}).travelers)) ? r.booking.travelers : [];
    const text = [
      r.id, r.token, r.name, r.phone, r.destination, r.tripType, r.vehicle, vehicle(r).model, guide(r).name, guide(r).phone,
      progressOf(r), signed(r) ? "서명완료 계약완료" : "미서명", r.joinType, r.pkgTier,
      bookDate(r), dateOnly(r.depart), dateOnly(r.return_), monthOf(r.depart), nightsTxt(r), String(paxSum(r) || ""),
      f.depositAmount, f.depositStatus, f.balanceAmount, f.balanceStatus, f.cashReceipt,
      c.productName, c.region, c.depositStatus, c.balanceStatus, c.cashReceipt, fl.inNo, fl.outNo, fl.inTime, fl.outTime,
      ...lodges(r).map(l => `${l.name} ${l.grade || ""}`),
      ...travelers.map(t => `${t.nameKo || ""} ${t.passportName || ""} ${t.phone || ""} ${t.passportNo || ""}`),
    ].join(" ").toLowerCase();
    return terms.every(t => text.includes(t));
  }).sort((a, b) => {
    const f = SORT_VALS[sortKey] || bookDate;
    const av = f(a), bv = f(b);
    const c = typeof av === "number" ? av - bv : String(av).localeCompare(String(bv));
    return c * sortDir;
  });
}
/* 번호: 전체 예약을 예약일 오름차순으로 세운 고정 번호 (정렬·필터와 무관하게 유지) */
function rowNumbers() {
  const map = {};
  RECORDS.filter(isReservation)
    .slice().sort((a, b) => String(bookDate(a)).localeCompare(String(bookDate(b))))
    .forEach((r, i) => { map[String(r.id)] = i + 1; });
  return map;
}
const selectedRecords = () => RECORDS.filter(r => SELECTED.has(String(r.id)));
function cleanupSelection() {
  const ids = new Set(RECORDS.filter(isReservation).map(r => String(r.id)));
  SELECTED = new Set([...SELECTED].filter(id => ids.has(id)));
}
function renderBulkbar(data) {
  const visible = data.map(r => String(r.id));
  const selected = selectedRecords();
  const allVisibleSelected = visible.length > 0 && visible.every(id => SELECTED.has(id));
  $("bulkbar").innerHTML = `
    <span class="count">선택 ${selected.length}건</span>
    <button class="bulkbtn" id="bulkVisible">${allVisibleSelected ? "현재 목록 선택 해제" : "현재 목록 전체 선택"}</button>
    <button class="bulkbtn" id="bulkClear" ${selected.length ? "" : "disabled"}>선택 해제</button>
    <button class="bulkbtn primary" id="bulkClone" ${selected.length ? "" : "disabled"}>선택 예약 복제</button>
    <button class="bulkbtn danger" id="bulkDelete" ${selected.length ? "" : "disabled"}>선택 영구 삭제</button>
  `;
  $("bulkVisible").onclick = () => {
    if (allVisibleSelected) visible.forEach(id => SELECTED.delete(id));
    else visible.forEach(id => SELECTED.add(id));
    render();
  };
  $("bulkClear").onclick = () => { SELECTED.clear(); render(); };
  $("bulkClone").onclick = cloneSelected;
  $("bulkDelete").onclick = deleteSelected;
}

function render() {
  cleanupSelection();
  const sortSel = $("sortSelect");
  const sortBtn = $("sortDirBtn");
  if (sortSel) sortSel.value = SORT_VALS[sortKey] ? sortKey : "book";
  if (sortBtn) sortBtn.textContent = sortDir > 0 ? "오름차순" : "내림차순";
  const all = RECORDS.filter(isReservation);
  const unsigned = all.filter(r => !signed(r)).length;
  const incomplete = all.filter(r => !assignDone(r)).length;
  const soon = all.filter(r => { const dd = dDay(r); return dd !== null && dd >= 0 && dd <= 14; }).length;
  const ICO = {
    clip:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 15l2 2 5-5"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    pen:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`,
    users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
    clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`,
  };
  const statDefs = [
    { c:"c-teal",  ico:ICO.clip,  pill:"전체",      k:"예약 확정",    v:all.length, sub:"전체 확정 고객",       act:"",          f:"전체" },
    { c:"c-red",   ico:ICO.pen,   pill:"조치 필요", k:"계약 미서명",  v:unsigned,   sub:"서명 요청 필요",       act:"서명 요청 →", f:"계약미서명" },
    { c:"c-amber", ico:ICO.users, pill:"조치 필요", k:"배정 미완료",  v:incomplete, sub:"가이드·차량·숙소 확인", act:"배정 확인 →", f:"배정미완료" },
    { c:"c-green", ico:ICO.clock, pill:"임박",      k:"14일 내 출발", v:soon,       sub:"출발 전 최종 점검",     act:"점검 →",     f:"출발임박" },
  ];
  $("stats").innerHTML = statDefs.map(s => `<div class="stat ${s.c}">
    <div class="stat-top"><div class="stat-ico">${s.ico}</div><span class="stat-pill">${s.pill}</span></div>
    <div class="stat-k">${s.k}</div>
    <div class="stat-v">${s.v}<span class="unit">건</span></div>
    <div class="stat-bot"><span class="stat-sub">${s.sub}</span>${s.act ? `<button class="stat-act" data-f="${s.f}">${s.act}</button>` : ""}</div>
  </div>`).join("");
  $("stats").querySelectorAll(".stat-act").forEach(b => b.onclick = () => { filter = b.dataset.f; render(); });
  const chipDefs = [["전체", all.length], ["계약미서명", unsigned], ["배정미완료", incomplete], ["출발임박", soon]];
  $("chips").innerHTML = chipDefs.map(([k, n]) => `<button class="chip ${filter===k?"on":""}" data-f="${k}">${k} ${n}</button>`).join("");
  $("chips").querySelectorAll(".chip").forEach(b => b.onclick = () => { filter = b.dataset.f; render(); });

  const data = rows();
  renderBulkbar(data);
  if (!data.length) {
    $("list").innerHTML = `<div class="empty">조건에 맞는 예약이 없습니다.</div>`;
    return;
  }
  /* 인라인 편집 select — 엑셀 드롭다운처럼 즉시 저장 */
  const selCell = (r, field) => {
    const opts = FIELD_OPTS[field];
    if (field === "progress") {
      const eff = progressOf(r);
      return `<select class="sel" data-field="progress" data-id="${esc(r.id)}" data-p="${esc(eff)}">
        <option value="" ${r.progress ? "" : "selected"}>${esc(progressAuto(r))} (자동)</option>
        ${opts.map(o => `<option value="${o}" ${r.progress === o ? "selected" : ""}>${o}</option>`).join("")}
      </select>`;
    }
    const cur = field === "pkgTier" && r[field] === "풀페키지" ? "풀패키지" : (r[field] || opts[0]);
    return `<select class="sel" data-field="${field}" data-id="${esc(r.id)}">
      ${opts.map(o => `<option value="${o}" ${cur === o ? "selected" : ""}>${o}</option>`).join("")}
    </select>`;
  };
  const contractCell = r => signed(r)
    ? `<span class="contract-badge signed">서명완료</span>`
    : `<span class="contract-badge unsigned">미서명</span>`;
  const assignCell = r => {
    const checks = [
      ["가이드", !!guide(r).name],
      ["차량", hasVehicle(r)],
      ["숙소", hasLodges(r)],
    ];
    const total = checks.length;
    const done = checks.filter(([, ok]) => ok).length;
    const allOk = done === total;
    const pct = Math.round((done / total) * 100);
    const doneLabels = checks.filter(([, ok]) => ok).map(([l]) => l);
    const pendLabels = checks.filter(([, ok]) => !ok).map(([l]) => l);
    const detail = allOk ? "가이드·차량·숙소 모두 배정"
      : `${doneLabels.length ? `${doneLabels.join("·")} 배정 · ` : ""}${pendLabels.join("·")} 대기`;
    return `<div class="assign-status">
      <div class="assign-bar">
        <div class="assign-track ${allOk ? "ok" : ""}"><span style="width:${pct}%"></span></div>
        <span class="assign-count ${allOk ? "ok" : ""}">${allOk ? "배정 완료" : `${done}/${total} 완료`}</span>
      </div>
      <div class="assign-detail">${esc(detail)}</div>
    </div>`;
  };
  const payStatus = (r, field) => {
    const f = r.finance || {};
    const c = (((r.booking || {}).contractInfo) || {});
    const ck = (((r.booking || {}).checklist) || {});
    if (field === "depositStatus") return f.depositStatus || c.depositStatus || (ck.deposit ? "입금완료" : "미입금");
    return f.balanceStatus || c.balanceStatus || (ck.balance ? "입금완료" : "미수령");
  };
  const paySelect = (r, statusField) => {
    const cur = payStatus(r, statusField);
    return `<select class="pay-sel" data-finance="${statusField}" data-id="${esc(r.id)}" data-v="${esc(cur)}">
      ${PAY_OPTS[statusField].map(o => `<option value="${o}" ${cur === o ? "selected" : ""}>${o}</option>`).join("")}
    </select>`;
  };
  const payCell = r => {
    const f = r.finance || {};
    return `<div class="pay-two">
      <div class="pay-line"><span class="pay-label">예약금</span><span class="amount">${moneyTxt(f.depositAmount)}</span>${paySelect(r, "depositStatus")}</div>
      <div class="pay-line"><span class="pay-label">잔금</span><span class="amount">${moneyTxt(f.balanceAmount)}</span>${paySelect(r, "balanceStatus")}</div>
    </div>`;
  };
  const nameCell = r => `<div class="cust-name"><b>${esc(r.name || "-")}</b><span class="pax">${paxSum(r) || 0}명</span></div>`;
  const periodCell = r => {
    const dep = dateOnly(r.depart), ret = dateOnly(r.return_);
    const dd = dDay(r);
    const ddChip = (dd !== null && dd >= 0 && dd <= 14) ? `<span class="dday">${dd === 0 ? "D-DAY" : "D-" + dd}</span>` : "";
    const nt = nightsTxt(r);
    const sub = [nt !== "-" ? nt : "", r.destination || ""].filter(Boolean).join(" · ");
    return `<div class="period">
      <div class="range">${esc(dep || "?")}<span class="arrow">→</span>${esc(ret || "?")}${ddChip}</div>
      <div class="sub">${esc(sub || "-")}</div>
    </div>`;
  };
  const actionsCell = (r, token) => `<div class="row-actions">
    <button class="mini green wide" data-open="${esc(r.id)}">배정 관리</button>
    <div class="row-sub-actions">
      ${token ? `<a class="mini" href="확정일정표.html?t=${encodeURIComponent(token)}&v=assign3" target="_blank">일정표</a>` : ""}
      ${token ? `<a class="mini" href="계약서.html?t=${encodeURIComponent(token)}" target="_blank">${signed(r) ? "계약서" : "서명 요청"}</a>` : ""}
    </div>
  </div>`;
  const arrow = k => sortKey === k ? (sortDir > 0 ? " ▲" : " ▼") : "";
  const nums = rowNumbers();
  const visibleIds = data.map(r => String(r.id));
  const allChecked = visibleIds.length > 0 && visibleIds.every(id => SELECTED.has(id));

  $("list").innerHTML = `<table>
    <colgroup>
      <col style="width:38px"><col style="width:40px"><col style="width:92px"><col style="width:120px">
      <col style="width:184px"><col style="width:76px"><col style="width:176px">
      <col style="width:196px"><col style="width:84px"><col style="width:176px">
    </colgroup>
    <thead><tr>
      <th><input class="rowcheck" type="checkbox" id="checkAllRows" ${allChecked ? "checked" : ""} title="현재 목록 전체 선택"></th>
      <th>번호</th>
      <th class="sortable" data-k="book">예약일${arrow("book")}</th>
      <th class="sortable" data-k="name">고객명${arrow("name")}</th>
      <th class="sortable" data-k="depart">여행 기간·지역${arrow("depart")}</th>
      <th>계약</th>
      <th>배정 상태</th>
      <th>결제</th>
      <th class="col-receipt">영수증</th>
      <th class="col-actions">관리</th>
    </tr></thead>
    <tbody>${data.map(r => {
      const token = r.token || "";
      const f = r.finance || {};
      return `<tr data-id="${esc(r.id)}">
        <td><input class="rowcheck row-select" type="checkbox" data-select="${esc(r.id)}" ${SELECTED.has(String(r.id)) ? "checked" : ""} title="예약 선택"></td>
        <td class="num">${nums[String(r.id)] || "-"}</td>
        <td>${esc(bookDate(r) || "-")}</td>
        <td>${nameCell(r)}</td>
        <td class="td-wrap">${periodCell(r)}</td>
        <td>${contractCell(r)}</td>
        <td class="td-wrap">${assignCell(r)}</td>
        <td class="td-wrap col-pay">${payCell(r)}</td>
        <td class="col-receipt">${esc(f.cashReceipt || "-")}</td>
        <td class="col-actions">${actionsCell(r, token)}</td>
      </tr>`;
    }).join("")}</tbody></table>`;
  $("checkAllRows").onchange = e => {
    visibleIds.forEach(id => e.target.checked ? SELECTED.add(id) : SELECTED.delete(id));
    render();
  };
  $("list").querySelectorAll("[data-select]").forEach(cb => {
    cb.onclick = e => e.stopPropagation();
    cb.onchange = () => {
      if (cb.checked) SELECTED.add(String(cb.dataset.select));
      else SELECTED.delete(String(cb.dataset.select));
      render();
    };
  });
  $("list").querySelectorAll("[data-open]").forEach(btn => btn.onclick = () => openBooking(btn.dataset.open));
  $("list").querySelectorAll("th.sortable").forEach(th => th.onclick = () => {
    const k = th.dataset.k;
    if (sortKey === k) sortDir = -sortDir; else { sortKey = k; sortDir = 1; }
    render();
  });
  $("list").querySelectorAll("select.sel").forEach(sel => {
    sel.onclick = e => e.stopPropagation();
    sel.onchange = () => saveField(sel.dataset.id, sel.dataset.field, sel.value);
  });
  $("list").querySelectorAll("select.pay-sel").forEach(sel => {
    sel.onclick = e => e.stopPropagation();
    sel.onchange = () => saveFinanceStatus(sel.dataset.id, sel.dataset.finance, sel.value);
  });
}

/* ── 인라인 필드 저장: PATCH 단일 필드 (booking과 독립 병합 — 예약관리 저장과 충돌 없음) ── */
async function saveField(id, field, value) {
  const r = RECORDS.find(x => String(x.id) === String(id));
  if (!r) return;
  const prev = r[field];
  r[field] = value;
  try {
    if (IS_LOCAL) {
      const arr = JSON.parse(localStorage.getItem("leaders_requests") || "[]");
      const t = arr.find(x => String(x.id) === String(id));
      if (t) { t[field] = value; localStorage.setItem("leaders_requests", JSON.stringify(arr)); }
    } else {
      const res = await fetch(`/api/requests/${encodeURIComponent(id)}`, {
        method: "PATCH",

let XLSX_P = null;
const loadXLSX = () => XLSX_P || (XLSX_P = new Promise((res, rej) => {
  const s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
  s.onload = () => res(window.XLSX);
  s.onerror = () => rej(new Error("엑셀 라이브러리를 불러오지 못했어요 (인터넷 연결 확인)"));
  document.head.appendChild(s);
}));
const newToken = () => [...crypto.getRandomValues(new Uint8Array(16))].map(b => b.toString(16).padStart(2, "0")).join("");
const normDate = v => {
  if (v == null || v === "") return "";
  if (typeof v === "number" && isFinite(v)) {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")}`;
  }
  if (v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth() + 1).padStart(2, "0")}-${String(v.getDate()).padStart(2, "0")}`;
  const s = String(v).trim().replace(/[.\/]/g, "-").replace(/\s+/g, "");
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  return m ? `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}` : "";
};
const isBlank = v => v == null || v === "";
const cleanCell = v => String(v ?? "").replace(/\s+/g, " ").trim();
const headerKey = v => cleanCell(v).replace(/[↵\r\n]/g, " ").replace(/\s+/g, "").replace(/[()（）]/g, "").toLowerCase();
const parseMoney = v => {
  if (v == null || v === "") return 0;
  if (typeof v === "number" && isFinite(v)) return Math.round(v);
  const n = Number(String(v).replace(/[^\d.-]/g, ""));
  return Number.isFinite(n) ? Math.round(n) : 0;
};
const moneyTxt = n => n ? `₩${Number(n).toLocaleString("ko-KR")}` : "-";
/* 엑셀 헤더 → 시스템 필드 (닉네임/MONGOL/KOREA 등 실제 시트 헤더 기준) */
const XL_HEADERS = {
  "번호": "sheetNo", "no": "sheetNo",
  "닉네임": "name", "고객명": "name", "이름": "name",
  "MONGOL": "depart", "몽골도착일": "depart", "몽골도착": "depart",

  "진행상황": "progress", "구분": "pkgTier",
  "예약일": "bookDate", "계약일": "bookDate", "계약월": "contractMonth",
  "견적서": "quoteFile", "계약서": "contractFile",
  "금액": "salesAmount", "매출액": "salesAmount", "총금액": "salesAmount", "판매금액": "salesAmount", "여행비": "salesAmount", "여행경비": "salesAmount",
  "예약금": "depositAmount", "계약금": "depositAmount",
  "잔금": "balanceAmount", "현장잔금": "balanceAmount",
  "현금영수증": "cashReceipt", "현금영수증상태": "cashReceipt",

  "2025몽골여행계약서원본": "originalContractFile",

const headerField = cell => {
  const raw = cleanCell(cell);
  return XL_HEADERS[raw] || XL_HEADERS[headerKey(raw)] || "";
};
function parseSheet(rowsArr, rowsFmt = rowsArr) {
  // 헤더 행 찾기: 알려진 컬럼명이 3개 이상 매칭되는 첫 행
  let hi = -1, cols = {};
  for (let i = 0; i < Math.min(rowsArr.length, 10); i++) {
    const c = {};
    const max = Math.max((rowsArr[i] || []).length, (rowsFmt[i] || []).length);
    for (let ci = 0; ci < max; ci++) {
      const cell = !isBlank((rowsArr[i] || [])[ci]) ? (rowsArr[i] || [])[ci] : (rowsFmt[i] || [])[ci];
      const key = headerField(cell);
      if (key && c[key] === undefined) c[key] = ci;
    }
    if (Object.keys(c).length >= 3) { hi = i; cols = c; break; }
  }
  if (hi < 0) throw new Error("헤더 행을 찾지 못했어요 — 시트에 닉네임/MONGOL/KOREA 등의 컬럼명이 필요합니다");
  // 조인여부 헤더가 없으면 값이 '조인…'인 컬럼을 자동 탐지
  if (cols.joinType === undefined) {
    for (let ci = 0; ci < 30; ci++) {
      if (Object.values(cols).includes(ci)) continue;
      const hit = rowsArr.slice(hi + 1, hi + 15).some(row => /^조인/.test(String((row || [])[ci] ?? "").trim()));
      if (hit) { cols.joinType = ci; break; }
    }
  }
  const out = [];
  for (let i = hi + 1; i < rowsArr.length; i++) {
    const row = rowsArr[i] || [];
    const rowFmt = rowsFmt[i] || [];
    const get = k => {
      if (cols[k] === undefined) return "";
      const raw = row[cols[k]];
      return !isBlank(raw) ? raw : (rowFmt[cols[k]] ?? "");
    };
    const name = String(get("name") ?? "").trim();
    if (!name) continue;
    const sched = String(get("schedule") ?? "");
    const nm = sched.match(/(\d+)\s*박/);
    const join = String(get("joinType") ?? "").trim();
    const flight = String(get("flightIncl") ?? "").trim();
    const prog = String(get("progress") ?? "").trim();
    const tier = String(get("pkgTier") ?? "").trim();
    const salesAmount = parseMoney(get("salesAmount"));
    const balanceAmount = parseMoney(get("balanceAmount"));
    const depositRaw = parseMoney(get("depositAmount"));
    const depositAmount = depositRaw || (salesAmount && balanceAmount && salesAmount >= balanceAmount ? salesAmount - balanceAmount : 0);
    out.push({
      name,
      depart: normDate(get("depart")),
      return_: normDate(get("return_")),
      adult: parseInt(get("adult"), 10) || 0,
      nights: nm ? Number(nm[1]) : (/당일/.test(sched) ? 0 : ""),
      destination: String(get("destination") ?? "").trim(),
      vehicle: String(get("vehicle") ?? "").trim(),
      bookDate: normDate(get("bookDate")),
      joinType: /조인\s*1/.test(join) ? "조인1차" : /조인\s*2/.test(join) ? "조인2차" : "조인x",
      flightIncl: (flight.includes("포함") && !flight.includes("불")) ? "포함" : "불포함",
      progress: FIELD_OPTS.progress.includes(prog) ? prog : (prog.includes("취소") ? "예약취소" : prog.includes("종료") ? "투어종료" : ""),
      pkgTier: tier.includes("풀") ? "풀패키지" : tier.includes("실속") ? "실속" : (tier.includes("최고") || tier.includes("럭셔리")) ? "최고급" : "",
      finance: {
        salesAmount,
        depositAmount,
        balanceAmount,
        cashReceipt: cleanCell(get("cashReceipt")),
      },
      sourceSheet: {
        no: cleanCell(get("sheetNo")),
        contractMonth: cleanCell(get("contractMonth")),
        travelMonth: cleanCell(get("travelMonth")),
        schedule: sched,
        quoteFile: cleanCell(get("quoteFile")),
        contractFile: cleanCell(get("contractFile")),
        originalContractFile: cleanCell(get("originalContractFile")),
        memo: cleanCell(get("sheetMemo")),
      },
    });
  }
  return out;
}
