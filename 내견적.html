<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>내 견적 확인 · 몽골리아 은하수</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root { --accent:#06c4a0; --soft:#eaf7f3; --ink:#16261f; --sub:#6b7c78; --line:#e7eaee; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Pretendard Variable", Pretendard, system-ui, "Malgun Gothic", sans-serif; color:var(--ink);
    background:radial-gradient(125% 90% at 50% -5%, #DFF6EC 0%, #EFFBF6 42%, #FFFFFF 100%); min-height:100vh;
    border-top:3px solid var(--accent); display:flex; flex-direction:column; align-items:center; padding:26px 18px 40px; }
  .brand { display:inline-flex; align-items:center; gap:8px; margin-bottom:20px; }
  .brand svg { display:block; }
  .brand b { font-size:16px; font-weight:800; letter-spacing:-.02em; }
  .brand b i { font-style:normal; color:var(--accent); }
  .card { width:100%; max-width:440px; background:#fff; border:1px solid var(--line); border-radius:20px;
    box-shadow:0 12px 40px rgba(20,50,45,.07); padding:28px 24px; text-align:center; }
  .emoji { font-size:44px; }
  h1 { font-size:21px; font-weight:800; letter-spacing:-.03em; margin:12px 0 6px; }
  .desc { font-size:14px; color:var(--sub); line-height:1.6; }
  .badge { display:inline-block; margin-top:14px; font-size:12.5px; font-weight:800; padding:6px 14px; border-radius:999px; }
  .badge.wait { background:var(--soft); color:#0a6a5e; }
  .badge.done { background:#e6f5ef; color:#0a6a5e; }
  .sum { margin-top:20px; text-align:left; background:#F7F8FA; border-radius:14px; padding:6px 16px; }
  .sum .row { display:flex; gap:14px; padding:11px 0; border-bottom:1px solid #ECEEF1; font-size:13.5px; }
  .sum .row:last-child { border-bottom:none; }
  .sum .k { color:#9AA0A6; font-weight:600; min-width:64px; }
  .sum .v { color:var(--ink); font-weight:600; margin-left:auto; text-align:right; }
  .btn { display:block; width:100%; margin-top:16px; padding:15px; border:none; border-radius:13px; font-family:inherit;
    font-size:15.5px; font-weight:800; cursor:pointer; text-decoration:none; text-align:center; }
  .btn.primary { background:var(--ink); color:#fff; }
  .btn.accent { background:var(--accent); color:#fff; }
  .btn.kakao { background:#FEE500; color:#3C1E1E; }
  .btn.ghost { background:#fff; color:var(--sub); border:1px solid var(--line); font-weight:700; }
  .steps { margin-top:18px; text-align:left; border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .step { display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line); color:#9AA0A6; font-size:13px; font-weight:700; }
  .step:last-child { border-bottom:none; }
  .step .dot { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#eef1f3; color:#9AA0A6; font-size:11px; flex:none; }
  .step.done { color:var(--ink); }
  .step.done .dot { background:var(--accent); color:#fff; }
  .notice { margin-top:16px; padding:13px 14px; border-radius:12px; background:#fff7e8; color:#8a651e; font-size:13px; line-height:1.55; }
  .hint { margin-top:14px; font-size:12px; color:#9AA0A6; line-height:1.5; }
  .change-box { display:none; margin-top:14px; padding:16px; border:1px solid var(--line); border-radius:14px; text-align:left; background:#f8fbfa; }
  .change-box.open { display:block; }
  .change-box h2 { font-size:15px; margin-bottom:10px; }
  .change-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .change-options label { display:flex; align-items:center; gap:7px; font-size:12.5px; color:#40544f; }
  .change-box textarea { width:100%; min-height:92px; margin-top:12px; padding:11px; border:1px solid var(--line); border-radius:10px; resize:vertical; font:inherit; font-size:13px; }
  .dep { margin-top:16px; text-align:left; border:1px solid #cdeee6; background:#f1faf7; border-radius:14px; padding:18px 16px; }
  .dep .amt { font-size:21px; font-weight:800; color:#0a6a5e; }
  .dep .amt small { display:block; margin-top:3px; font-size:12.5px; color:#6b7c78; font-weight:600; }
  .dep .acct { margin-top:12px; background:#fff; border:1px solid #d9eee9; border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; }
  .dep .acct .bank { font-size:12.5px; color:#6b7c78; margin-bottom:2px; }
  .dep .acct .no { font-size:15.5px; font-weight:800; letter-spacing:.01em; }
  .dep .copy { margin-left:auto; flex:none; border:1px solid var(--accent); background:#fff; color:#0a6a5e; border-radius:9px; padding:8px 12px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; }
  .dep label { display:block; margin-top:14px; font-size:12.5px; font-weight:700; color:#40544f; }
  .dep input { width:100%; margin-top:6px; padding:12px 13px; border:1px solid #d9e4e0; border-radius:10px; font:inherit; font-size:14px; }
  .dep .send { margin-top:10px; width:100%; padding:13px; border:none; border-radius:11px; background:var(--accent); color:#fff; font-size:14.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .dep .send:disabled { opacity:.6; cursor:default; }
  .dep .sent { margin-top:14px; background:#e6f5ef; border-radius:10px; padding:12px; font-size:13px; color:#0a6a5e; font-weight:700; text-align:center; }
  .dep .tip { margin-top:10px; font-size:11.5px; color:#9AA0A6; line-height:1.5; }
</style>
</head>
<body>
  <div class="brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#06c4a0" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.3 5.7L20 11l-5.7 2.3L12 19l-2.3-5.7L4 11l5.7-2.3z"></path></svg>
    <b>몽골리아 <i>은하수</i></b>
  </div>
  <div class="card" id="card">
    <div class="emoji">⏳</div>
    <h1>불러오는 중…</h1>
  </div>

<script src="booking.js"></script>
<script>
  const KAKAO = "https://pf.kakao.com/_BSLaxl";
  const IS_LOCAL = ["localhost", "127.0.0.1"].includes(location.hostname);
  const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const card = document.getElementById("card");
  const token = new URLSearchParams(location.search).get("t");

  const paxTxt = r => {
    const p = [];
    if (r.adult) p.push(`성인 ${r.adult}`);
    if (r.child) p.push(`아동 ${r.child}`);
    if (r.infant) p.push(`유아 ${r.infant}`);
    return p.join(" · ") || "-";
  };
  const periodTxt = r => {
    if (!r.depart) return "-";
    const n = r.nights ? ` (${r.nights}박 ${r.nights + 1}일)` : "";
    return `${r.depart}${r.return_ ? " ~ " + r.return_ : ""}${n}`;
  };
  const destTxt = r => (r.destination || "-") + (r.destSpots && r.destSpots.length ? ` · ${r.destSpots.join(", ")}` : "");

  // 로컬 데모 모드: localStorage 레코드를 서버 대신 갱신 (배포 전 미리보기용)
  const localPatch = fn => {
    const list = JSON.parse(localStorage.getItem("leaders_requests") || "[]");
    const item = list.find(x => x.token === token);
    if (!item) return;
    fn(item);
    localStorage.setItem("leaders_requests", JSON.stringify(list));
  };

  const sumHtml = r => `
    <div class="sum">
      <div class="row"><span class="k">여행지</span><span class="v">${esc(destTxt(r))}</span></div>
      <div class="row"><span class="k">일정</span><span class="v">${esc(periodTxt(r))}</span></div>
      <div class="row"><span class="k">인원</span><span class="v">${esc(paxTxt(r))}</span></div>
    </div>`;

  const progressHtml = r => {
    const booking = r.booking || {};
    const accepted = r.decision && r.decision.status === "accepted";
    const depositPaid = !!(booking.contractInfo && booking.contractInfo.depositStatus === "입금완료");
    const confirmed = r.status === "예약확정";
    const published = booking.publishStatus === "published";
    return `<div class="steps">
      ${[["견적 수락",accepted],["예약금 입금",depositPaid],["예약 확정",confirmed],["일정표 공개",published]].map(([label,done]) =>
        `<div class="step ${done ? "done" : ""}"><span class="dot">${done ? "✓" : ""}</span>${label}</div>`).join("")}
    </div>`;
  };

  function showError(msg) {
    card.innerHTML = `<div class="emoji">🔗</div><h1>링크를 확인해 주세요</h1>
      <div class="desc">${esc(msg)}</div>
      <a class="btn kakao" href="${KAKAO}" target="_blank">💬 카카오톡으로 문의하기</a>`;
  }

  async function load() {
    if (!token) return showError("올바른 접속 링크가 아닙니다. 담당자에게 받은 링크로 접속해 주세요.");
    let r;
    try {
      if (IS_LOCAL) {
        const item = JSON.parse(localStorage.getItem("leaders_requests") || "[]").find(x => x.token === token);
        if (!item) return showError("존재하지 않거나 만료된 링크입니다.");
        r = { ok:true, ...item };
      } else {
        const res = await fetch("/api/my/" + encodeURIComponent(token), { cache: "no-store" });
        if (res.status === 404) return showError("존재하지 않거나 만료된 링크입니다.");
        if (!res.ok) throw new Error("http " + res.status);
        r = await res.json();
        if (!r.ok) throw new Error(r.error || "error");
      }
    } catch (e) {
      return showError("일시적으로 정보를 불러오지 못했어요. 잠시 후 다시 시도해 주세요.");
    }

    const nm = r.name ? `${esc(r.name)}님, ` : "";
    if (r.booking) {
      const signed = r.booking.contract && r.booking.contract.signedAt;
      const confirmed = r.status === "예약확정";
      const published = r.booking.publishStatus === "published";
      const travelerSubmission = r.booking.travelerSubmission || {};
      const travelersDone = travelerSubmission.status === "submitted";
      const ci = r.booking.contractInfo || {};
      const depositPaid = ci.depositStatus === "입금완료";
      const depositRequested = r.booking.depositRequest && r.booking.depositRequest.status === "requested";
      const depositReport = r.booking.depositReport || {};
      const depositReported = depositReport.status === "reported";
      const contractRequested = r.booking.contractRequest && r.booking.contractRequest.status === "requested";
      const money = n => Number(n || 0) ? Number(n).toLocaleString("ko-KR") + "원" : "-";
      const title = confirmed ? "예약이 확정됐어요!" : signed ? "계약서 서명이 완료됐어요" : (depositPaid && contractRequested) ? "계약서를 확인해 주세요" : depositPaid ? "예약금 입금이 확인됐어요" : depositReported ? "입금 확인을 기다리고 있어요" : depositRequested ? "예약금 입금을 진행해 주세요" : "예약정보를 준비하고 있어요";
      const description = confirmed ? (published ? "확정일정표가 준비되었습니다." : "예약은 확정됐으며 세부 일정과 배정을 준비하고 있습니다.") : signed ? "서명이 접수되었습니다. 담당자가 확인 후 예약을 확정합니다." : (depositPaid && contractRequested) ? "예약금 확인이 완료되었습니다. 여행계약서를 확인하고 서명해 주세요." : depositPaid ? "예약금 확인이 완료되었습니다. 담당자가 계약서를 준비하고 있습니다." : depositReported ? "입금 신고가 접수되었습니다. 담당자가 확인하면 다음 단계가 열립니다." : depositRequested ? "아래 예약금과 입금 계좌를 확인해 주세요. 입금 후 '입금 완료했어요'를 눌러 주세요." : "담당자가 예약정보와 예약금 안내를 준비하고 있습니다.";
      card.innerHTML = `
        <div class="emoji">${confirmed ? "🎫" : depositRequested && !depositPaid ? "💳" : "🧾"}</div>
        <h1>${title}</h1>
        <div class="desc">${nm}${description}</div>
        <span class="badge ${confirmed ? "done" : "wait"}" ${confirmed ? 'style="background:#e8effc;color:#2b5cc4;"' : ""}>${confirmed ? "✓ 예약 확정" : "⏳ 예약 진행 중"}</span>
        ${sumHtml(r)}
        ${progressHtml(r)}
        ${depositRequested && !depositPaid ? `<div class="dep">
          <div class="amt">예약금 ${esc(money(ci.depositAmount))}<small>입금이 확인되면 예약이 진행됩니다</small></div>
          <div class="acct">
            <div><div class="bank">${esc(ci.bankName || "은행 확인 필요")} · 예금주 ${esc(ci.accountHolder || "-")}</div><div class="no">${esc(ci.accountNumber || "계좌 확인 필요")}</div></div>
            <button class="copy" id="copyAcctBtn" type="button">📋 계좌번호 복사</button>
          </div>
          ${depositReported
            ? `<div class="sent">✓ 입금 신고 완료 (입금자명 ${esc(depositReport.name || "-")})<br>담당자가 입금을 확인하고 있어요</div><div class="tip">확인이 끝나면 이 화면에서 다음 단계가 열립니다. 오래 걸리면 카카오톡으로 문의해 주세요.</div>`
            : `<label for="depositorName">입금자명</label>
               <input id="depositorName" maxlength="40" placeholder="입금하신 분 성함" value="${esc(r.name || "")}">
               <button class="send" id="depositDoneBtn" type="button">입금 완료했어요</button>
               <div class="tip">입금을 마친 뒤 눌러 주세요. 담당자가 확인하면 예약이 진행됩니다.</div>`}
        </div>` : ""}
        <a class="btn ${travelersDone ? "ghost" : "primary"}" href="${esc("여행자정보.html?t=" + encodeURIComponent(token))}">${travelersDone ? "✅ 여행자 정보 확인·수정" : "👥 여행자 정보 입력하기"}</a>
        ${signed
          ? `<a class="btn ghost" href="${esc("계약서.html?t=" + encodeURIComponent(token))}" target="_blank">📜 여행계약서 보기 (서명완료)</a>`
          : depositPaid && contractRequested ? `<a class="btn accent" href="${esc("계약서.html?t=" + encodeURIComponent(token))}" target="_blank">✍️ 여행계약서 확인·서명하기</a>` : ""}
        ${depositPaid && !signed && !contractRequested ? `<div class="notice">담당자가 계약서를 준비하고 있습니다. 서명 요청 알림을 받으면 이 화면에서 진행할 수 있습니다.</div>` : ""}
        ${published ? `<a class="btn accent" style="background:#3d7ff0;" href="${esc("확정일정표.html?t=" + encodeURIComponent(token))}" target="_blank">🎫 확정일정표 보기</a>` : confirmed ? `<div class="notice">가이드·차량·숙소 배정이 끝나면 확정일정표가 공개됩니다.</div>` : ""}
        ${r.quote ? `<a class="btn ghost" href="${esc("견적서.html?t=" + encodeURIComponent(token))}" target="_blank">📄 견적서 보기</a>` : ""}
        ${published ? `<a class="btn ghost" href="${esc("일정지도.html?t=" + encodeURIComponent(token))}" target="_blank">🗺 일정 지도 보기</a>` : ""}
        <a class="btn kakao" href="${KAKAO}" target="_blank">💬 카카오톡 상담</a>`;
      const copyBtn = document.getElementById("copyAcctBtn");
      if (copyBtn) copyBtn.onclick = async () => {
        const no = String(ci.accountNumber || "");
        try { await navigator.clipboard.writeText(no); copyBtn.textContent = "✓ 복사됐어요"; }
        catch (e) { prompt("계좌번호를 길게 눌러 복사하세요", no); }
        setTimeout(() => { copyBtn.textContent = "📋 계좌번호 복사"; }, 1800);
      };
      const depBtn = document.getElementById("depositDoneBtn");
      if (depBtn) depBtn.onclick = async () => {
        const nameInput = document.getElementById("depositorName");
        const depositor = nameInput.value.trim();
        if (!depositor) { nameInput.focus(); return alert("입금자명을 입력해 주세요."); }
        if (!confirm(`입금자명 '${depositor}'(으)로 입금 완료를 알릴까요?`)) return;
        depBtn.disabled = true; depBtn.textContent = "전송 중…";
        try {
          if (IS_LOCAL) {
            localPatch(rec => {
              rec.booking = rec.booking || {};
              rec.booking.depositReport = { status:"reported", name:depositor, reportedAt:new Date().toISOString() };
            });
          } else {
            const res = await fetch("/api/deposit/" + encodeURIComponent(token), { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ name:depositor }) });
            const j = await res.json();
            if (!j.ok) throw new Error(j.error || "전송 실패");
          }
          await load();
        } catch (e) {
          depBtn.disabled = false; depBtn.textContent = "입금 완료했어요";
          alert(e.message || "입금 신고를 보내지 못했습니다. 잠시 후 다시 시도해 주세요.");
        }
      };
    } else if (r.quote) {
      const accepted = r.decision && r.decision.status === "accepted";
      const expired = !!r.quoteExpired && !accepted;
      const expireLabel = r.quoteExpiresAt ? new Date(r.quoteExpiresAt).toLocaleDateString("ko-KR") : "";
      card.innerHTML = `
        <div class="emoji">${accepted ? "🧾" : "🎉"}</div>
        <h1>${accepted ? "예약 준비를 시작했어요" : "견적서가 도착했어요!"}</h1>
        <div class="desc">${nm}${accepted ? "견적 수락이 확인되었습니다. 담당자가 예약정보와 예약금 안내를 준비하고 있습니다." : "요청하신 맞춤 견적서를 확인하고 예약 진행 여부를 알려주세요."}</div>
        <span class="badge ${accepted ? "wait" : "done"}">${accepted ? "⏳ 예약 준비 중" : "✓ 견적 완료"}</span>
        ${sumHtml(r)}
        ${progressHtml(r)}
        ${expired ? `<div class="notice">이 견적의 유효기간이 만료되었습니다. 담당자에게 연장을 요청해 주세요.</div>` : (expireLabel ? `<div class="hint">견적 유효기간: ${esc(expireLabel)}까지</div>` : "")}
        <a class="btn accent" href="${esc("견적서.html?t=" + encodeURIComponent(token))}" target="_blank">📄 견적서 보기</a>
        ${!accepted && !expired ? `<button class="btn primary" id="acceptQuoteBtn">이 견적으로 예약 진행하기</button>` : ""}
        ${!accepted ? `<button class="btn ghost" id="changeRequestBtn">일정 변경 요청</button>
        <form class="change-box" id="changeRequestForm">
          <h2>어떤 부분을 변경하고 싶으신가요?</h2>
          <div class="change-options">${["일정","방문 장소","숙소","이동시간","여행 인원·날짜","견적금액","기타"].map(x => `<label><input type="checkbox" name="category" value="${x}">${x}</label>`).join("")}</div>
          <textarea id="changeMessage" maxlength="1500" placeholder="원하시는 변경 내용을 구체적으로 적어 주세요."></textarea>
          <button class="btn accent" type="submit" id="changeSubmitBtn">변경 요청 보내기</button>
        </form>` : ""}
        <a class="btn kakao" href="${KAKAO}" target="_blank">💬 카카오톡 상담</a>`;
      const acceptBtn = document.getElementById("acceptQuoteBtn");
      if (acceptBtn) acceptBtn.onclick = async () => {
        if (!confirm("이 견적으로 예약을 진행할까요?\n다음 화면에서 예약금 입금 계좌를 바로 안내해 드립니다.")) return;
        acceptBtn.disabled = true; acceptBtn.textContent = "처리 중…";
        try {
          if (IS_LOCAL) {
            localPatch(rec => {
              const nowIso = new Date().toISOString();
              rec.decision = { status:"accepted", acceptedAt:nowIso, source:"customer" };
              if (!rec.booking) {
                const bk = seedBookingFromQuote(rec);   // booking.js — 서버(accept API)와 동일 규칙
                if (Number(bk.contractInfo.depositAmount) > 0) {
                  bk.preparedAt = nowIso;
                  bk.depositRequest = { status:"requested", requestedAt:nowIso, source:"auto_accept" };
                  rec.booking = bk;
                }
              }
              if (!rec.status || rec.status === "신규") rec.status = "진행중";
            });
          } else {
            const res = await fetch("/api/accept/" + encodeURIComponent(token), { method:"POST" });
            const j = await res.json();
            if (!j.ok) {
              if (j.code === "quote_expired") throw new Error("견적 유효기간이 만료되었습니다. 담당자에게 연장을 요청해 주세요.");
              throw new Error(j.error || "처리 실패");
            }
          }
          await load();
        } catch (e) {
          acceptBtn.disabled = false; acceptBtn.textContent = "이 견적으로 예약 진행하기";
          alert(e.message || "예약 진행 요청을 처리하지 못했습니다. 잠시 후 다시 시도해 주세요.");
        }
      };
      const changeBtn = document.getElementById("changeRequestBtn");
      const changeForm = document.getElementById("changeRequestForm");
      if (changeBtn && changeForm) changeBtn.onclick = () => changeForm.classList.toggle("open");
      if (changeForm && new URLSearchParams(location.search).get("action") === "change") {
        const clean = new URL(location.href);
        clean.searchParams.delete("action");
        history.replaceState(null, "", clean.pathname + clean.search);
        changeForm.classList.add("open");
        setTimeout(() => changeForm.scrollIntoView({ behavior:"smooth", block:"center" }), 0);
      }
      if (changeForm) changeForm.onsubmit = async e => {
        e.preventDefault();
        const categories = [...changeForm.querySelectorAll('input[name="category"]:checked')].map(x => x.value);
        const message = document.getElementById("changeMessage").value.trim();
        if (!categories.length || !message) return alert("변경 항목과 요청 내용을 입력해 주세요.");
        const submit = document.getElementById("changeSubmitBtn");
        submit.disabled = true; submit.textContent = "전송 중…";
        try {
          const res = await fetch("/api/change/" + encodeURIComponent(token), { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ categories, message }) });
          const j = await res.json();
          if (!j.ok) throw new Error(j.error || "전송 실패");
          changeForm.innerHTML = `<h2>✓ 변경 요청이 접수되었습니다</h2><div class="desc">담당자가 내용을 확인한 후 연락드리겠습니다.</div>`;
        } catch (err) {
          submit.disabled = false; submit.textContent = "변경 요청 보내기";
          alert("변경 요청을 보내지 못했습니다. 잠시 후 다시 시도해 주세요.");
        }
      };
      if (acceptBtn && new URLSearchParams(location.search).get("action") === "accept") {
        const clean = new URL(location.href);
        clean.searchParams.delete("action");
        history.replaceState(null, "", clean.pathname + clean.search);
        setTimeout(() => acceptBtn.click(), 0);
      }
    } else {
      card.innerHTML = `
        <div class="emoji">✅</div>
        <h1>견적 요청이 접수됐어요</h1>
        <div class="desc">${nm}담당자가 확인 후 남겨주신 연락처로 연락드려요.<br>빠르게 견적서를 준비해 드릴게요.<br>견적서가 준비되면 이 화면에서 바로 확인할 수 있어요.</div>
        <span class="badge wait">⏳ ${esc(r.status || "확인 중")}</span>
        ${sumHtml(r)}
        <a class="btn kakao" href="${KAKAO}" target="_blank">💬 카카오톡으로 빠른 상담</a>
        <button class="btn ghost" onclick="location.reload()">새로고침</button>
        <div class="hint">이 링크를 저장해 두시면 언제든 진행 상황을 확인할 수 있어요.</div>`;
    }
  }
  load();
</script>
</body>
</html>
