<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>일정 관리 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="presets.js"></script>
<style>
  :root { --accent:#06c4a0; --deep:#06c4a0; --deep2:#06c4a0; --soft:#eaf7f3;
    --ink:#1b2b28; --sub:#6b7c78; --gray:#9aa5a2; --line:#eceef1; --bg:#f6f8f9; --red:#e2574c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  svg { display:block; }

  .shell { display:flex; min-height:100vh; }
  .side { width:232px; flex:0 0 232px; background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; }
  .side-brand { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .side-brand .logo { width:38px; height:38px; border-radius:11px; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .side-brand b { font-size:15px; font-weight:800; display:block; line-height:1.2; }
  .side-brand small { font-size:11.5px; color:var(--gray); font-weight:600; }
  .mi { display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; color:var(--sub); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:2px; transition:.12s; }
  .mi svg { flex:0 0 auto; }
  .mi:hover { background:var(--soft); color:var(--deep); }
  .mi.on { background:var(--deep); color:#fff; }

  .content { flex:1; min-width:0; padding:26px 34px 60px; max-width:1100px; }
  .page-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .page-head h1 { font-size:20px; font-weight:800; }
  .page-head .add { margin-left:auto; background:var(--deep); color:#fff; border:none; border-radius:10px; padding:11px 18px; font-size:13.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .lead { font-size:13px; color:var(--sub); margin-bottom:20px; }
  .lead b { color:var(--deep); }

  .clist { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  .ccard { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; cursor:pointer; transition:.12s; }
  .ccard:hover { border-color:var(--accent); box-shadow:0 6px 20px rgba(20,50,45,.05); }
  .ccard .top { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .ccard .ic { width:34px; height:34px; border-radius:10px; background:var(--soft); color:var(--deep); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .ccard h3 { font-size:15px; font-weight:800; }
  .ccard .dest { font-size:12px; color:var(--sub); margin-top:1px; }
  .ccard .preview { font-size:12px; color:var(--sub); line-height:1.7; border-top:1px dashed var(--line); padding-top:9px; }
  .ccard .preview .g { color:var(--gray); }
  .ccard .more { color:var(--accent); font-weight:700; }

  .overlay { position:fixed; inset:0; background:rgba(20,40,36,.4); z-index:40; opacity:0; pointer-events:none; transition:.2s; }
  .overlay.on { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; width:540px; max-width:96vw; height:100%; background:#fff; z-index:50; box-shadow:-10px 0 40px rgba(20,40,36,.15); transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.on { transform:translateX(0); }
  .dh { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; }
  .dh h2 { font-size:18px; font-weight:800; }
  .dh .x { margin-left:auto; border:none; background:#f2f5f4; width:32px; height:32px; border-radius:9px; font-size:18px; cursor:pointer; color:var(--sub); }
  .db { flex:1; overflow-y:auto; padding:22px 24px; }
  label.f { display:block; margin-bottom:14px; }
  label.f span { display:block; font-size:12.5px; font-weight:700; color:var(--sub); margin-bottom:6px; }
  input, textarea { width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; color:var(--ink); outline:none; background:#fff; }
  input:focus, textarea:focus { border-color:var(--accent); }
  textarea { resize:vertical; line-height:1.6; min-height:120px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .hintline { font-size:11.5px; color:var(--gray); margin:-8px 0 14px; }

  .df { padding:16px 24px; border-top:1px solid var(--line); display:flex; gap:8px; }
  .df button { padding:13px 0; border-radius:11px; font-size:14px; font-weight:800; cursor:pointer; border:none; font-family:inherit; }
  .df .save { flex:1; background:var(--deep); color:#fff; }
  .df .del { background:#fbeceb; color:var(--red); padding:13px 18px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--deep2); color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; }
  .toast.on { opacity:1; }
  @media (max-width:820px){ .side{display:none} .content{padding:20px} }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="side-brand"><span class="logo">▲</span><div><b>몽골리아 은하수</b><small>몽골리아 관리자</small></div></div>
    <nav>
      <a class="mi" href="/admin"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>대시보드</a>
      <a class="mi" href="견적만들기.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>견적서 만들기</a>
      <a class="mi" href="코스관리.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l11 0M9 12l11 0M9 18l11 0"/><circle cx="4" cy="6" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="4" cy="18" r="1.6"/></svg>코스 관리</a>
      <a class="mi on" href="일정관리.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>일정 관리</a>
      <a class="mi" href="명소관리.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>명소 관리</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-head">
      <h1>일정 관리</h1>
      <button class="add" id="addBtn">＋ 새 일정 추가</button>
    </div>
    <div class="lead">자주 쓰는 <b>하루 일정</b>을 미리 만들어 두면, <b>견적서 만들기 → 일자별 일정</b>의 각 일자에서 <b>일정 불러오기</b>로 클릭 한 번에 채워집니다.</div>
    <div class="clist" id="clist"></div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const stripBr = s => String(s||"").replace(/<br\s*\/?>/gi, " ");

let SNIPS = {};

function load() { SNIPS = JSON.parse(JSON.stringify(getSnippets())); renderList(); }
function persist() { saveSnippets(SNIPS); }

function renderList() {
  const entries = Object.entries(SNIPS);
  $("clist").innerHTML = entries.length ? entries.map(([name, s]) => {
    const items = s.items || [];
    const shown = items.slice(0, 3).map(t => `<div class="${/^\(/.test(t) ? "g" : ""}">${esc(t)}</div>`).join("");
    const more = items.length > 3 ? `<div class="more">+ ${items.length - 3}줄 더</div>` : "";
    return `<div class="ccard" data-k="${esc(name)}">
      <div class="top">
        <div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div>
        <div><h3>${esc(name)}</h3><div class="dest">${esc(stripBr(s.dest))||"목적지 미정"} · ${esc(s.move||"")} ${esc(s.dist||"")}</div></div>
      </div>
      <div class="preview">${shown}${more}</div>
    </div>`;
  }).join("")
  : `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--gray)">등록된 일정이 없습니다. 우측 상단 <b>＋ 새 일정 추가</b>로 만들어보세요.</div>`;
  $("clist").querySelectorAll(".ccard").forEach(el => el.onclick = () => openEdit(el.dataset.k));
}

function openEdit(key) {
  const isNew = key === null;
  const s = isNew ? { dest:"", move:"", dist:"", items:[], stay:{name:"",tags:[]}, meals:["","",""] }
                  : JSON.parse(JSON.stringify(SNIPS[key]));
  $("drawer").innerHTML = `
    <div class="dh"><h2>${isNew ? "새 일정 추가" : "일정 편집"}</h2><button class="x" id="closeX">✕</button></div>
    <div class="db">
      <label class="f"><span>일정 이름</span><input id="f_name" value="${esc(isNew?"":key)}" placeholder="예) 홍고린엘스 사막투어"></label>
      <div class="row2">
        <label class="f"><span>목적지</span><input id="f_dest" value="${esc(stripBr(s.dest))}" placeholder="홍고린엘스"></label>
        <label class="f"><span>이동 (시간/거리)</span><input id="f_move" value="${esc(s.move||"")} ${esc(s.dist||"")}" placeholder="이동 5시간 (250 km)"></label>
      </div>
      <label class="f"><span>세부 일정</span>
        <textarea id="f_items" placeholder="한 줄에 하나씩&#10;*로 시작하면 강조, (로 시작하면 회색">${esc((s.items||[]).join("\n"))}</textarea></label>
      <div class="hintline">한 줄에 한 항목. 줄 앞에 * → 강조(민트), ( → 회색으로 표시됩니다.</div>
      <div class="row3">
        <label class="f"><span>숙소</span><input id="f_stay" value="${esc(stripBr(s.stay?.name))}" placeholder="여행자 캠프"></label>
        <label class="f"><span>숙소 태그(쉼표)</span><input id="f_tags" value="${esc((s.stay?.tags||[]).join(", "))}" placeholder="전기 O, 샤워 O"></label>
        <label class="f"><span>식사(조·중·석)</span><input id="f_meals" value="${esc((s.meals||[]).join(", "))}" placeholder="캠프식, 현지식당, 캠프식"></label>
      </div>
    </div>
    <div class="df">
      ${isNew ? "" : `<button class="del" id="delBtn">삭제</button>`}
      <button class="save" id="saveBtn">${isNew ? "추가하기" : "저장하기"}</button>
    </div>`;

  $("drawer").classList.add("on"); $("overlay").classList.add("on");
  $("closeX").onclick = closeDrawer;

  $("saveBtn").onclick = () => {
    const name = $("f_name").value.trim();
    if (!name) { toast("일정 이름을 입력하세요"); return; }
    const moveRaw = $("f_move").value.trim();
    const mm = moveRaw.match(/^(.*?)(\(.*\))?\s*$/);
    const rec = {
      dest: $("f_dest").value.trim(),
      move: (mm[1]||"").trim(),
      dist: (mm[2]||"").trim(),
      items: $("f_items").value.split("\n").map(x=>x.trim()).filter(Boolean),
      stay: { name: $("f_stay").value.trim(), tags: $("f_tags").value.split(",").map(x=>x.trim()).filter(Boolean) },
      meals: $("f_meals").value.split(",").map(x=>x.trim()),
    };
    if (!isNew && key !== name) delete SNIPS[key];
    SNIPS[name] = rec;
    persist(); renderList(); closeDrawer();
    toast(isNew ? "일정이 추가되었습니다" : "저장되었습니다");
  };
  const delEl = $("delBtn");
  if (delEl) delEl.onclick = () => { if (!confirm(`"${key}" 일정을 삭제할까요?`)) return; delete SNIPS[key]; persist(); renderList(); closeDrawer(); toast("삭제되었습니다"); };
}
function closeDrawer(){ $("drawer").classList.remove("on"); $("overlay").classList.remove("on"); }
$("overlay").onclick = closeDrawer;
$("addBtn").onclick = () => openEdit(null);

let toastT;
function toast(m){ $("toast").textContent=m; $("toast").classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>$("toast").classList.remove("on"),1900); }

load();
</script>
</body>
</html>
