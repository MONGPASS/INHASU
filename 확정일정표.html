<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>확정 일정표 · 몽골리아 은하수</title>
<script>
/* 모바일 접속자는 모바일 전용 확정 일정표로 자동 이동 (?m=1 강제 모바일 / ?m=0 강제 PC) */
(function () {
  try {
    var p = new URLSearchParams(location.search);
    var f = p.get("m");
    var narrow = Math.min(window.innerWidth || 9999, (window.screen && screen.width) || 9999) <= 820;
    if (f === "1" || (f !== "0" && narrow)) {
      location.replace("확정일정표-모바일.html" + location.search);
    }
  } catch (e) {}
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
    background: #DBE6E2; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .hint { position: sticky; top: 0; z-index: 30; background: #06c4a0; color: #C7EFE3;
    padding: 10px 18px; font-size: 13px; text-align: center; }
  .hint b { color: #7FE6D3; }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px 20px; }
  .page { position: relative; width: 794px; height: 1123px; background: #FCFEFD; overflow: hidden;
    box-shadow: 0 24px 60px rgba(6,65,58,0.16); flex: none; }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.16em; color: #06C4A0; text-transform: uppercase; }
  .pfoot { position: absolute; bottom: 30px; left: 56px; right: 56px; display: flex; justify-content: space-between;
    font-size: 10.5px; color: #A9BCB6; letter-spacing: 0.04em; }
  .ph { display: flex; align-items: center; justify-content: center; background: #EAF2EE;
    color: #A9BCB6; font-size: 12px; overflow: hidden; }
  .ph img { width: 100%; height: 100%; object-fit: cover; }
  .logo-mark { display: inline-flex; }

  @page { size: A4; margin: 0; }

  /* 잔금 2단계(풀패키지/실속형) 라벨 */
  .bal-grid-label { font-size: 11.5px; font-weight: 800; color: #06c4a0; margin-bottom: 5px; }

  /* 모바일: 페이지 사이 여백 축소 (페이지 자체는 JS가 화면 폭에 맞게 축소) */
  @media (max-width: 820px) {
    .wrap { padding: 14px 0; gap: 14px; }
  }

  @media print {
    body { background: #fff; }
    .hint { display: none; }
    .wrap { gap: 0; padding: 0; }
    .page { box-shadow: none; page-break-after: always;
      transform: none !important; margin-bottom: 0 !important; }  /* 인쇄는 항상 원본 크기 */
    .page:last-child { page-break-after: auto; }
  }
</style>
</head>
<body>
<div class="hint" id="printHint" style="display:none">💡 <b>Ctrl + P</b> → 대상 <b>"PDF로 저장"</b> → 여백 <b>없음</b>, 배경 그래픽 <b>켜기</b>로 인쇄하면 확정 일정표 PDF가 됩니다.</div>
<div class="wrap" id="root"></div>

<script type="module">
/* 확정 일정표 출처: ?t=<token>이면 서버의 예약 확정 정보, 아니면 localStorage(편집기)/data.js 샘플 */
const _token = new URLSearchParams(location.search).get("t");
/* 인쇄 안내는 관리자용 — 기본 숨김, 고객 링크(?t=)가 아닐 때만 표시 */
if (!_token) { const _ph = document.getElementById("printHint"); if (_ph) _ph.style.display = ""; }
const Q = await (async () => {
  if (_token) {
    try {
      const res = await fetch("/api/my/" + encodeURIComponent(_token), { cache: "no-store" });
      const j = await res.json();
      if (j.ok && j.quote && j.booking) {
        const q = JSON.parse(JSON.stringify(j.quote));
        if (Array.isArray(j.booking.days) && j.booking.days.length) q.days = j.booking.days;
        q.issueDate = j.booking.confirmedAt || q.issueDate;
        q.quoteNo = q.quoteNo ? `${q.quoteNo}-CONFIRM` : "CONFIRM";
        q.booking = j.booking;
        return q;
      }
    } catch (e) {}
    return null;   // 토큰은 있지만 아직 예약 확정 정보가 없음
  }
  try { const s = JSON.parse(localStorage.getItem("leaders_quote") || "null"); if (s) return s; } catch (e) {}
  return window.QUOTE;
})();

/* 명소 사진은 항상 명소관리 최신본을 우선 반영 —
   견적 발행 뒤 명소관리에서 이미지를 바꿔도 이미 만든 견적서에 바로 나타나도록 */
if (Q && Array.isArray(Q.highlights) && Q.highlights.length) {
  try {
    const r = await fetch("/api/data/spots", { cache: "no-store" });
    const j = await r.json();
    const lib = (j && j.ok && j.data) ? j.data : null;
    if (lib) Q.highlights.forEach(h => {
      const s = h && h.name ? lib[h.name] : null;
      if (!s) return;
      if (s.img) h.img = s.img;
      if (Array.isArray(s.subImgs) && s.subImgs.some(x => x)) h.subImgs = s.subImgs;
    });
  } catch (e) { /* 서버 없음(로컬 미리보기) → 견적에 저장된 이미지 그대로 사용 */ }
}

if (!Q) {
  document.getElementById("root").innerHTML =
    `<div style="max-width:640px;margin:80px auto;padding:0 24px;text-align:center;font-family:Pretendard,sans-serif;color:#16261f">
      <div style="font-size:46px">🕓</div>
      <h1 style="font-size:22px;margin:14px 0 8px;font-weight:800">확정 일정표 준비 중이에요</h1>
      <p style="color:#6b7c78;line-height:1.65;font-size:15px">예약이 확정되면 확정 일정표를 바로 확인하실 수 있습니다.</p>
      <a href="내견적.html?t=${encodeURIComponent(_token || "")}" style="display:inline-block;margin-top:22px;color:#06c4a0;font-weight:800;text-decoration:none">← 내 견적 확인으로 돌아가기</a>
    </div>`;
} else {

const won = n => (n < 0 ? "-" : "") + Math.abs(n).toLocaleString("ko-KR") + "원";
const wonMan = n => Math.round(n / 10000).toLocaleString("ko-KR") + "만원";
const esc = s => String(s ?? "");
// 잔금 2단계 요금: economy=실속형(일반게르), full=풀패키지(고급게르). 구버전 {amount} 호환.
const balEco = b => (b.economy != null ? b.economy : (b.amount || 0));
const balFull = b => (b.full != null ? b.full : (b.amount || 0));
const B = Q.brand;

/* 디자인 자산 이미지(게르·식사·아이콘·허가증 등)는 data.js 최신본으로 보충 —
   이미 발행된 견적에 빠져 있거나 비어 있는 항목도 새 이미지가 바로 반영되도록 */
if (window.QUOTE && window.QUOTE.images) {
  const cur = Q.images || {};
  const merged = { ...window.QUOTE.images };
  for (const [k, v] of Object.entries(cur)) {
    const empty = v == null || v === "" || (Array.isArray(v) && !v.some(x => x));
    if (!empty) merged[k] = v;
  }
  Q.images = merged;
}

/* 이미지 자리표시자/사진 */
const ph = (src, label, style) => src
  ? `<div class="ph" style="${style}"><img src="${src}" alt="${esc(label)}"></div>`
  : `<div class="ph" style="${style}">${esc(label) || ""}</div>`;
// 문서·안내 이미지: 잘리지 않게 전체 표시(contain), 흰 배경
const phC = (src, label, style) => src
  ? `<div class="ph" style="${style}; background:#fff;"><img src="${src}" alt="${esc(label)}" style="object-fit:contain;"></div>`
  : `<div class="ph" style="${style}">${esc(label) || ""}</div>`;

const LOGO = `<svg width="34" height="34" viewBox="0 0 48 48" fill="none"><rect x="1.5" y="1.5" width="45" height="45" rx="13" stroke="#06c4a0" stroke-width="1.6"></rect><path d="M9 33 L19 18 L26 28 L32 20 L39 33 Z" fill="#06c4a0"></path></svg>`;
const DAY_CUBE = ["#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0"];
const itemHtml = t => {
  if (t.startsWith("*")) return `<span style="color:#06C4A0; font-weight:600;">${esc(t)}</span>`;
  if (t.startsWith("(")) return `<span style="color:#8CA39D;">${esc(t)}</span>`;
  return esc(t);
};
const imgsOf = obj => [...new Set([obj && obj.img, ...((obj && Array.isArray(obj.imgs)) ? obj.imgs : [])].filter(Boolean))];
const ASSIGN_STYLE = {
  ink: "#152C28",
  body: "#24272A",
  muted: "#4A5351",
  line: "#C9D1CE",
  accent: "#10B4C6",
  font: "'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif",
};
const AS = {
  pageTitle: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.ink}; font-size:38px; font-weight:900; letter-spacing:0; line-height:1.08;`,
  day: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.ink}; font-size:24px; font-weight:900; letter-spacing:0; line-height:1;`,
  name: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.ink}; font-size:30px; font-weight:900; letter-spacing:0; line-height:1.08;`,
  meta: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.body}; font-size:13px; font-weight:800; letter-spacing:0; line-height:1.2;`,
  body: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.body}; font-size:15px; font-weight:800; letter-spacing:0; line-height:1.45;`,
  guideName: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.ink}; font-size:52px; font-weight:900; letter-spacing:0; line-height:1;`,
  guideRole: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.body}; font-size:17px; font-weight:800; letter-spacing:0; line-height:1.2;`,
  guideBody: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.body}; font-size:18px; font-weight:800; letter-spacing:0; line-height:1.45;`,
  vehicleTitle: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.ink}; font-size:46px; font-weight:900; letter-spacing:0; line-height:1.08;`,
  vehicleName: `font-family:${ASSIGN_STYLE.font}; color:${ASSIGN_STYLE.ink}; font-size:42px; font-weight:900; letter-spacing:0; line-height:1.08;`,
};
const photoStrip = (imgs, label, h = 132) => {
  const arr = imgs.slice(0, 3);
  while (arr.length < 3) arr.push("");
  return `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px;">
    ${arr.map((src, i) => src
      ? `<div class="ph" style="height:${h}px; background:#eee; border:1px solid #fff;"><img src="${src}" alt="${esc(label)} ${i + 1}"></div>`
      : `<div class="ph" style="height:${h}px; background:#EEF3F2; color:#9AB0AA; font-family:${ASSIGN_STYLE.font}; font-size:12px; font-weight:700;">${esc(label)}</div>`).join("")}
  </div>`;
};
const bookingAssign = (Q.booking && Q.booking.assign) ? Q.booking.assign : null;

/* ══════════ 표지 ══════════ */
const pgCover = `
<div class="page">
  <div style="position:absolute; top:64px; left:72px; right:72px; display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="logo-mark">${LOGO}</span>
      <div style="color:#06C4A0; font-size:15px; font-weight:800; letter-spacing:0.16em;">${esc(B.companyEn)}</div>
    </div>
    <div style="color:#EAFBF6; font-size:11px; font-weight:700; letter-spacing:0.18em; padding:8px 16px; border-radius:22px; background:#06C4A0;">CONFIRMED ITINERARY</div>
  </div>
  <div style="position:absolute; top:200px; left:72px; right:72px;">
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:40px;">
      <div>
        <div style="font-family:'Playfair Display',serif; font-size:20px; color:#06C4A0;">${esc(B.slogan)}</div>
        <div style="color:#152C28; font-size:64px; font-weight:800; line-height:1.08; letter-spacing:-0.03em; margin-top:18px;">${esc(B.company)}<br><span style="color:#06C4A0;">확정 일정표</span></div>
      </div>
      <div style="display:flex; gap:18px; flex:none; padding-bottom:8px;">
        <div style="width:1px; background:#DCEAE5; align-self:stretch;"></div>
        <div style="display:flex; flex-direction:column; gap:15px; text-align:right;">
          <div><div style="color:#06C4A0; font-size:10.5px; font-weight:700; letter-spacing:0.12em;">발행일</div><div style="color:#152C28; font-size:14px; font-weight:700; margin-top:3px;">${esc(Q.issueDate)}</div></div>
          <div><div style="color:#06C4A0; font-size:10.5px; font-weight:700; letter-spacing:0.12em;">담당</div><div style="color:#152C28; font-size:14px; font-weight:700; margin-top:3px;">${esc(Q.manager)}</div></div>
          <div><div style="color:#06C4A0; font-size:10.5px; font-weight:700; letter-spacing:0.12em;">문서번호</div><div style="color:#152C28; font-size:14px; font-weight:700; margin-top:3px;">${esc(Q.quoteNo)}</div></div>
        </div>
      </div>
    </div>
    <div style="width:100%; height:1px; background:#DCEAE5; margin-top:34px;"></div>
    <div style="display:flex; gap:12px; margin-top:24px;">
      <div style="background:#EAF7F3; color:#06c4a0; font-size:14px; font-weight:700; padding:9px 18px; border-radius:24px;">여행지 · ${esc(Q.destination)}</div>
      <div style="background:#EAF7F3; color:#06c4a0; font-size:14px; font-weight:700; padding:9px 18px; border-radius:24px;">${esc(Q.nights)}</div>
      <div style="background:#EAF7F3; color:#06c4a0; font-size:14px; font-weight:700; padding:9px 18px; border-radius:24px;">${esc(Q.pax)}인</div>
    </div>
  </div>
  ${ph(Q.images.cover, Q.images.coverLabel, "position:absolute; bottom:150px; left:72px; width:650px; height:400px; box-shadow:0 24px 44px rgba(10,106,94,0.16); border-radius:14px;")}
  <div style="position:absolute; bottom:64px; left:72px; right:72px; display:flex; justify-content:space-between; align-items:center; color:#8CA39D; font-size:12px;">
    <div>인스타그램: ${esc(B.instagram)}</div>
    <div>카카오톡: ${esc(B.kakao)}</div>
  </div>
</div>`;

/* ══════════ 01 견적서 ══════════ */
const cell = (v, bg) => `<div style="background:${bg||'#fff'}; color:#152C28; font-weight:600; padding:13px 14px; display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.5;">${v}</div>`;
const hcell = (v, dk) => `<div style="background:${dk?'#06C4A0':'#EAF7F3'}; color:${dk?'#EAFBF6':'#06c4a0'}; font-weight:700; padding:13px 14px; display:flex; align-items:center; justify-content:center;">${v}</div>`;

const pgQuote = `
<div class="page" style="padding:52px 56px;">
  <div style="display:flex; align-items:flex-start; justify-content:space-between;">
    <div>
      <div style="font-family:'Playfair Display',serif; font-size:20px; color:#06C4A0;">${esc(B.slogan)}</div>
      <div style="color:#06C4A0; font-size:38px; font-weight:800; letter-spacing:-0.02em; margin-top:8px;">${esc(B.company)} 확정 일정표</div>
    </div>
    <span class="logo-mark">${LOGO}</span>
  </div>
  <div style="display:flex; justify-content:space-between; margin-top:14px; font-size:11.5px; color:#8CA39D; line-height:1.7;">
    <div>${esc(B.bizMn)}<br>${esc(B.bizKr)}</div>
    <div style="text-align:right;">인스타그램: ${esc(B.instagram)}<br>카카오톡: ${esc(B.kakao)}</div>
  </div>
  <div style="height:1px; background:#DCEAE5; margin:20px 0 22px;"></div>

  <div style="display:grid; grid-template-columns:120px 1fr 120px 1fr; gap:1px; background:#DDEBE6; border:1px solid #DDEBE6; border-radius:10px; overflow:hidden; font-size:12.5px;">
    ${hcell("고객명")}${cell(esc(Q.customer))}${hcell("문서번호")}${cell(esc(Q.quoteNo))}
    ${hcell("여행지")}${cell(esc(Q.destination))}${hcell("인원")}${cell(esc(Q.paxNote))}
    ${hcell("여행 기간")}${cell(esc(Q.period) + "<br>(" + esc(Q.nights) + ")")}${hcell("차량")}${cell(esc(Q.vehicle))}
    ${hcell("항공권 IN", true)}${cell(esc(Q.flight.in), "#F3FAF8")}${hcell("항공권 OUT", true)}${cell(esc(Q.flight.out), "#F3FAF8")}
    ${hcell("픽업")}${cell(esc(Q.pickup))}${hcell("드랍")}${cell(esc(Q.drop))}
    ${hcell("여행사 혜택")}${cell(esc(Q.benefits).replace(/, /g, ",<br>"))}${hcell("참여 가능 이벤트")}<div style="background:#fff; color:#152C28; font-weight:600; padding:11px 14px; font-size:11px; line-height:1.6; display:flex; flex-direction:column; justify-content:center;">${Q.events.map(e => `<div>${esc(e)}</div>`).join("")}</div>
    ${hcell("비고")}<div style="background:#fff; color:#152C28; font-weight:600; padding:13px 14px; display:flex; align-items:center; justify-content:center; grid-column:span 3;">${esc(Q.remark)}</div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1.6fr; gap:1px; background:#DDEBE6; border:1px solid #DDEBE6; border-radius:10px; overflow:hidden; margin-top:16px; font-size:12.5px;">
    <div style="background:#EAF7F3; color:#06c4a0; font-weight:700; padding:12px 14px; text-align:center;">예약금 (1인기준x인원수)</div>
    <div style="background:#EAF7F3; color:#06c4a0; font-weight:700; padding:12px 14px; text-align:center;">추가 및 할인 사항</div>
    <div style="background:#fff; color:#152C28; font-weight:800; font-size:22px; padding:20px 14px; display:flex; align-items:center; justify-content:center;">${wonMan(Q.price.deposit)}</div>
    <div style="background:#fff; padding:14px 18px; display:flex; flex-direction:column; gap:7px; justify-content:center;">
      ${Q.price.options.map(o => `<div style="display:flex; justify-content:space-between;"><span style="color:#354B46; font-weight:600;">${esc(o.label)}</span><span style="color:#8CA39D;">${esc(o.calc)}</span></div>`).join("")}
    </div>
  </div>

  ${(() => {
    const pills = (tier) => Q.price.balances.map(b => {
      const amt = tier === "economy" ? balEco(b) : balFull(b);
      return `<div style="background:#06c4a0; padding:9px 8px; text-align:center;"><div style="color:#DFF7EF; font-size:10px; font-weight:700;">${b.pax}인 잔금(1인기준)</div><div style="color:#fff; font-size:17px; font-weight:800; margin-top:4px;">${wonMan(amt)}</div></div>`;
    }).join("");
    const grid = (tier) => `<div style="display:grid; grid-template-columns:repeat(${Q.price.balances.length},1fr); gap:1px; background:#CDE8DF; border-radius:10px; overflow:hidden;">${pills(tier)}</div>`;
    return `
    <div style="margin-top:14px;">
      <div>
        <div class="bal-grid-label">🏕 풀패키지 (4성급호텔+고급게르) · 인원별 잔금</div>
        ${grid("full")}
      </div>
      <div style="margin-top:10px;">
        <div class="bal-grid-label">⛺ 실속형 (3성급호텔+일반게르) · 인원별 잔금</div>
        ${grid("economy")}
      </div>
    </div>`;
  })()}

  <div style="margin-top:20px; font-size:11px; color:#8CA39D; line-height:1.7;">
    견적서 내 금액은 모두 1인 기준 견적입니다. 해당 견적은 ${esc(Q.price.validUntil)}까지 유효합니다.
    <div style="display:flex; gap:18px; margin-top:10px; flex-wrap:wrap; color:#40544F;">
      <span><b style="color:#06c4a0;">[결제]</b> ${esc(Q.price.payment)} <span style="color:#8CA39D;">${esc(Q.price.paymentNote)}</span></span>
      <span><b style="color:#06c4a0;">[입금]</b> ${esc(B.account)}</span>

/* 일정이 한 장(A4)을 넘치면 실제 행 높이를 측정해 넘치는 행부터 다음 장으로 자동 분할.
   행마다 항목 수가 달라 높이가 제각각이므로 "N일씩 자르기" 대신 측정 기반으로 처리한다. */
function paginateSchedule() {
  const root = document.getElementById("root");
  const page = root.querySelector(".page[data-sched-page]");
  if (!page) return;
  const grid = page.querySelector("[data-sched-grid]");
  const notesEl = page.querySelector("[data-sched-notes]");
  const foot = page.querySelector(".pfoot");
  if (!grid || !foot) return;

  const NCOL = 5, GAP = 1, SAFE = 14;
  const cells = Array.from(grid.children);
  const headCells = cells.slice(0, NCOL);
  const bodyCells = cells.slice(NCOL);
  const rowCount = bodyCells.length / NCOL;
  if (rowCount <= 1) return; // 나눌 것이 없거나 한 행뿐이면 그대로

  // 그리드 셀은 기본 stretch → 한 행의 어느 셀이든 높이가 같지만 안전하게 최댓값 사용
  const cellH = c => c.offsetHeight;
  const headH = Math.max(...headCells.map(cellH));
  const rowH = [];
  for (let r = 0; r < rowCount; r++) {
    let h = 0;
    for (let c = 0; c < NCOL; c++) h = Math.max(h, cellH(bodyCells[r * NCOL + c]));
    rowH.push(h);
  }

  const avail = foot.offsetTop - grid.offsetTop;      // 표 상단 → 푸터 상단까지의 실제 가용 높이
  const perPage = avail - SAFE - 2 /*그리드 상·하 테두리*/ - headH; // 본문 행이 쓸 수 있는 높이
  const notes = (Q.scheduleNotes || []).filter(Boolean);
  const notesReserve = notes.length ? (notesEl.offsetHeight + 20 /*margin-top*/) : 0;

  // 전부 한 장에 들어가면 손대지 않음
  let total = 0;
  for (let r = 0; r < rowCount; r++) total += rowH[r] + GAP;
  if (total + notesReserve <= perPage) return;

  // 그리디 패킹: 넘치기 직전까지 채우고 다음 장으로. 마지막 행에는 유의사항 공간을 예약.
  const chunks = [];
  let cur = [], used = 0;
  for (let r = 0; r < rowCount; r++) {
    const need = rowH[r] + GAP + (r === rowCount - 1 ? notesReserve : 0);
    if (cur.length && used + need > perPage) { chunks.push(cur); cur = []; used = 0; }
    cur.push(r); used += rowH[r] + GAP;
  }
  if (cur.length) chunks.push(cur);
  if (chunks.length <= 1) return;

  let html = "";
  for (const ch of chunks) {
    const startIdx = ch[0];
    const days = Q.days.slice(startIdx, ch[ch.length - 1] + 1);
    html += schedPage(days, startIdx, ch.includes(rowCount - 1));
  }
  page.insertAdjacentHTML("beforebegin", html);
  page.remove();
}

    <div style="${AS.vehicleName} margin-top:24px;">${esc(vehicleName)}</div>
    ${v.seats ? `<div style="margin-top:2px; ${AS.meta}">${esc(v.seats)}</div>` : ""}
    <div style="margin-top:12px; ${AS.guideBody} max-width:650px;">${esc(v.desc || "몽골 장거리 이동에 적합한 차량으로 일정과 인원에 맞춰 배정됩니다.")}</div>
    <div class="pfoot"><span>${esc(B.companyFull)} 확정 일정표 · 차량 정보</span><span>13</span></div>
  </div>`;
})() : "";

/* ── 렌더 ──
   ※ 견적 단계에선 안전정보/위험고지/약관(pgSafety·pgRisk·pgTerms) 제외 — 계약 단계에서 별도 안내 */
document.getElementById("root").innerHTML =
  pgCover + pgQuote + pgBookingAssign + pgInclusions + pgSchedule + pgSpots + pgLodge + pgTeam + pgMeals + pgInsurance + pgArrival + pgCert;
/* 페이지 번호 자동 재부여 — 일정·명소 페이지가 늘어나도 번호가 이어지도록 (표지는 푸터 없음) */
const renumberPages = () => document.querySelectorAll("#root .page .pfoot > span:last-child").forEach((el, i) => {
  el.textContent = String(i + 1).padStart(2, "0");
});
renumberPages(); // 폰트 로드 전 임시 번호
/* 일정이 길어 한 장을 넘치면 자동으로 다음 장으로 분할. 웹폰트 로드 후 측정해야 행 높이가 정확 */
const finalizeSchedule = () => { paginateSchedule(); renumberPages(); fitPages(); };
if (document.fonts && document.fonts.ready) document.fonts.ready.then(finalizeSchedule);
else finalizeSchedule();
document.title = `${B.company}_${Q.customer}님_확정일정표_${Q.quoteNo}`;
}

/* ── 모바일: A4(794px) 페이지를 화면 폭에 맞게 축소 ──
   페이지는 인쇄 규격 그대로 두고 transform으로만 줄이므로 PDF 저장에 영향 없음 */
function fitPages() {
  const scale = Math.min(1, document.documentElement.clientWidth / 794);
  document.querySelectorAll("#root .page").forEach(p => {
    if (scale < 1) {
      p.style.transform = `scale(${scale})`;
      p.style.transformOrigin = "top center";
      // 축소된 만큼 아래 빈 공간 제거 (레이아웃 높이는 원본 기준이므로)
      p.style.marginBottom = `-${Math.round(1123 * (1 - scale))}px`;
    } else {
      p.style.transform = ""; p.style.marginBottom = "";
    }
  });
}
window.addEventListener("resize", fitPages);
fitPages();
</script>
</body>
</html>
