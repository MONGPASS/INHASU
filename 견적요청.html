<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #E9EEF3; font-family: Pretendard, system-ui, -apple-system, sans-serif; color:#17243A; }

  .promo::after { content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(8,77,157,.15),transparent 45%,rgba(4,39,32,.22)); pointer-events:none; }

  .promo-brand { display:flex; align-items:center; min-height:84px; }

  .promo-icon { width:54px; height:54px; display:grid; place-items:center; border-radius:16px; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.48); color:#fff; font-size:14px; font-weight:800; letter-spacing:.08em; box-shadow:0 6px 18px rgba(0,0,0,.08); backdrop-filter:blur(6px); }
  .promo-item b { display:block; font-size:15px; }
  .promo-item span { display:block; font-size:11.5px; opacity:.76; margin-top:5px; }
  .promo-help { position:absolute; left:34px; right:34px; bottom:30px; z-index:2; display:flex; align-items:center; gap:12px; padding:14px; border-radius:16px; background:rgba(255,255,255,.91); color:#253746; text-decoration:none; backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.74); box-shadow:0 12px 30px rgba(0,0,0,.16); transition:transform .18s ease,background .18s ease; }
  .promo-help:hover { transform:translateY(-2px); background:#fff; }
  .help-badge { width:42px; height:42px; flex:none; display:block; border-radius:12px; object-fit:cover; box-shadow:0 4px 12px rgba(0,0,0,.1); }
  .promo-help strong { display:block; font-size:12.5px; letter-spacing:-.015em; }
  .promo-help small { display:block; color:#7C8B95; margin-top:4px; font-size:10.5px; }
  .promo-help i { margin-left:auto; width:30px; height:30px; display:grid; place-items:center; border-radius:50%; background:#0CB99B; color:#fff; font-style:normal; font-size:18px; line-height:1; }
  .workspace { min-width:0; padding:28px 38px 30px; display:flex; flex-direction:column; }
  .topbar { display:none; }
  .topbar .mark {
    width: 26px; height: 26px; border-radius: 8px; background: var(--accent-deep);
    color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 12px;
  }

  .card { width:100%; max-width:900px; margin:0 auto; background:#fff; border-radius:24px; box-shadow:0 12px 36px rgba(34,65,91,.09); border:1px solid #E7EDF2; display:flex; flex-direction:column; min-height:650px; overflow:hidden; }

    color: #454A50; font-size: 20px; line-height: 1; cursor: pointer;

  .card-body { flex:1; overflow-y:auto; padding:34px 34px 12px; display:flex; flex-direction:column; }

  .step-head { text-align:center; margin-bottom:30px; }

  .step-3d-icon { width:108px; height:108px; display:block; object-fit:contain; transform-origin:50% 62%; filter:drop-shadow(0 10px 10px rgba(17,65,62,.17)); animation:stepIconFloat 3.2s ease-in-out infinite; will-change:transform; }

    0%,100% { transform:translateY(1px) rotate(-1.5deg) scale(.98); }

  .step-title { font-size:28px; font-weight:800; color:#17243A; letter-spacing:-.035em; text-wrap:balance; }
  .step-sub { font-size: 15px; color: #9AA0A6; margin-top: 7px; }

  .counter-row { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border:1px solid #E5EBEF; border-radius:14px; margin-bottom:10px; background:#fff; box-shadow:0 3px 10px rgba(40,70,92,.025); }
  .counter-label { display:flex; align-items:center; gap:16px; }
  .counter-icon { width:48px; height:48px; display:grid; place-items:center; flex:none; border-radius:50%; background:var(--accent-soft); color:var(--accent); font-size:22px; }
  .counter-row .lbl { font-size: 17px; font-weight: 600; color: #1B1D1F; }

  .counter-ctrl { display:flex; align-items:center; gap:17px; min-width:190px; justify-content:flex-end; border:1px solid #E8EDF1; border-radius:99px; padding:7px 10px; }
  .counter-ctrl .val { min-width: 22px; text-align: center; font-size: 19px; font-weight: 700; color: #1B1D1F; }
  .cbtn {
    width:32px; height:32px; border-radius:50%; border:1.5px solid #DCE5E8; background:#fff;
    color: var(--accent); font-size: 20px; line-height: 1; padding: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-family: inherit;
  }
  .cbtn:disabled { border-color: #EBEEF1; color: #CDD3DA; cursor: default; }
  .unit { color:#9AA5AE; font-size:12px; }
  .tip-box { display:flex; gap:9px; align-items:flex-start; margin-top:14px; padding:14px 16px; border-radius:12px; background:linear-gradient(90deg,#F2FBF9,#EAF8F6); color:#768B88; font-size:12px; line-height:1.55; }
  .tip-box b { color:var(--accent); }

  .field-lbl { font-size: 14px; font-weight: 600; color: #454A50; margin-bottom: 8px; display: block; }
  .txt-input, .date-input, textarea.txt-area {
    width: 100%; padding: 15px 16px; border: 1.5px solid #E1E4E8; border-radius: 12px;
    font-size: 15px; color: #1B1D1F; font-family: inherit; outline: none; background: #fff;
  }
  .txt-input:focus, .date-input:focus, textarea.txt-area:focus { border-color: var(--accent); }
  textarea.txt-area { min-height: 150px; line-height: 1.6; resize: vertical; }
  .date-grid { display: flex; gap: 14px; }
  .date-grid > label { flex: 1; }
  .nights { margin-top: 16px; text-align: center; font-size: 15px; font-weight: 700; }

  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .chip {
    padding: 17px 14px; border-radius: 14px; background: #F4F5F7; border: 1.5px solid transparent;
    color: #4A4F55; font-size: 15px; font-weight: 500; cursor: pointer; text-align: center;
    line-height: 1.2; transition: all .15s ease; user-select: none; font-family: inherit; width: 100%;
  }
  .chip.sel { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 700; }

  /* 투어 지역 카드 */
  .dest-card { text-align: left; position: relative; padding: 15px 16px; background: #fff; border-color: #E7EAEE; }
  .dest-card .badge-pill {
    position: absolute; top: 12px; right: 12px; font-size: 11px; font-weight: 700;
    background: var(--accent-soft); color: var(--accent); border-radius: 99px; padding: 3px 9px;
  }
  .dest-card .dc-name { font-size: 15px; font-weight: 700; color: #1B1D1F; margin-bottom: 4px; padding-right: 58px; }
  .dest-card .dc-tag { font-size: 12.5px; font-weight: 400; color: #6B7178; line-height: 1.5; }
  .dest-card.sel { background: var(--accent-soft); }
  .dest-card.sel .dc-name { color: var(--accent); }
  .dest-card.sel .badge-pill { background: var(--accent); color: #fff; }
  .dest-unsure { margin-top: 10px; border: 1.5px dashed #C9CFD6; background: #FAFBFC; }
  .dest-unsure .dc-name { font-size: 14px; color: #6B7178; margin: 0; padding: 0; }
  .dest-unsure.sel .dc-name { color: var(--accent); }

  /* 투어 카테고리 세로 목록(아코디언) */
  .dest-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .dest-unsure { margin-top: 10px; }

  /* 선택한 카테고리 바로 아래 펼쳐지는 지역 패널 */
  .region-panel { margin-top: -4px; background: var(--accent-soft); border-radius: 14px; padding: 14px 14px 16px; }
  .region-panel .rp-lbl { font-size: 13.5px; font-weight: 700; color: #1B1D1F; margin-bottom: 12px; }
  .region-panel .rp-lbl span { font-weight: 500; color: #9AA0A6; font-size: 12px; }
  .region-panel .rp-circles { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 16px 6px; justify-items: center; }
  .region-chip {
    background: none; border: none; padding: 0; cursor: pointer; font-family: inherit;
    width: 100%; display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  .region-chip .rc-img {
    width: 64px; height: 64px; border-radius: 50%; position: relative;
    background: linear-gradient(135deg, #EADFD3, #cbb9a6); background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center; font-size: 28px; line-height: 1;
    border: 2.5px solid transparent; box-shadow: 0 2px 8px rgba(20,40,34,.1); transition: all .15s ease;
  }
  .region-chip.on .rc-img { border-color: var(--accent); box-shadow: 0 0 0 2px #fff, 0 3px 12px rgba(6,196,160,.45); }
  .region-chip .rc-check {
    position: absolute; right: -3px; bottom: -3px; width: 21px; height: 21px; border-radius: 50%;
    background: var(--accent); color: #fff; border: 2px solid #fff; font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .region-chip .rc-name { font-size: 12px; font-weight: 700; color: #4A4F55; text-align: center; letter-spacing: -.02em; line-height: 1.25; }
  .region-chip.on .rc-name { color: var(--accent); }
  .region-chip:active .rc-img { transform: scale(.94); }
  .region-desc { margin-top: 11px; padding-top: 10px; border-top: 1px solid rgba(6,196,160,.18); font-size: 12.5px; color: #6B7178; line-height: 1.55; }
  .region-desc b { color: #1B1D1F; }

  .group-lbl { font-size: 14px; font-weight: 700; color: #1B1D1F; margin: 2px 0 10px; }
  .group-lbl.mt { margin-top: 24px; }
  .choice-help { margin-top: 9px; color: #7B838B; font-size: 12.5px; line-height: 1.55; }
  .advice-box { margin-top: 14px; padding: 12px 14px; border-radius: 12px; background: #F5FBF9; border: 1px solid #D8EEE7; color: #35615A; font-size: 13px; line-height: 1.55; }
  .advice-box.warn { background: #FFF8ED; border-color: #F0D7A8; color: #8B641C; }
  .selection-summary { margin-top: 12px; padding: 10px 13px; border-radius: 10px; background: #fff; border: 1px solid rgba(6,196,160,.24); color: #0A6A5E; font-size: 12.5px; font-weight: 700; line-height: 1.5; }
  .unsure-card { width: 100%; display: flex; align-items: center; gap: 11px; margin-top: 12px; padding: 14px 15px; border: 1.5px dashed #C9CFD6; border-radius: 14px; background: #FAFBFC; color: #626A72; text-align: left; font-family: inherit; cursor: pointer; }
  .unsure-card::before { content: "?"; display: grid; place-items: center; width: 26px; height: 26px; flex: 0 0 26px; border-radius: 50%; background: #ECEFF2; color: #69727B; font-size: 13px; font-weight: 800; }
  .unsure-card b { display: block; color: #454B51; font-size: 13.5px; }
  .unsure-card span { display: block; margin-top: 2px; color: #92999F; font-size: 11.5px; }
  .unsure-card.selected { border-style: solid; border-color: var(--accent); background: var(--accent-soft); }
  .unsure-card.selected::before { content: "✓"; background: var(--accent); color: #fff; }

  .file-lbl {
    display: flex; align-items: center; gap: 11px; padding: 15px 16px;
    border: 1.5px dashed #C7D0D9; border-radius: 12px; cursor: pointer; color: #6B7078; font-size: 14px;
  }
  .agree-row { display: flex; gap: 12px; align-items: flex-start; cursor: pointer; padding: 16px; background: #F7F8FA; border: 0; border-radius: 12px; width: 100%; font-family: inherit; text-align: left; }
  .agree-box {
    width: 22px; height: 22px; flex-shrink: 0; border-radius: 6px; background: #fff;

    display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .agree-box.on { background: var(--accent); border-color: var(--accent); }
  .agree-txt { font-size: 14px; color: #454A50; line-height: 1.5; }
  .agree-txt small { color: #9AA0A6; font-size: 13px; }

  .card-foot { padding:16px 34px 24px; }
  .primary-btn {
    width:100%; padding:17px; border-radius:12px; background:#CBD2DA; color:#fff;
    font-size: 17px; font-weight: 700; border: none; cursor: not-allowed;
    font-family: inherit; transition: background .15s ease;
  }
  .primary-btn.ok { background:linear-gradient(90deg,#08BE9D,#08C7A5); cursor:pointer; box-shadow:0 8px 20px rgba(6,196,160,.18); }
  .primary-btn:disabled { background: #CBD2DA; cursor: not-allowed; }
  .ghost-btn {
    display: block; width: 100%; padding: 17px; border-radius: 14px; background: #F4F5F7; color: #454A50;
    font-size: 16px; font-weight: 700; border: none; cursor: pointer; font-family: inherit;
    text-align: center; text-decoration: none; box-sizing: border-box;
  }

  .done-badge {
    width: 76px; height: 76px; border-radius: 50%; background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center; font-size: 38px;
    margin: 0 auto 16px; animation: scaleIn .4s cubic-bezier(.2,.9,.3,1.2);
  }
  .summary { background: #F7F8FA; border-radius: 16px; padding: 8px 18px; }
  .summary .row { display: flex; gap: 16px; padding: 13px 0; border-bottom: 1px solid #ECEEF1; }
  .summary .row:last-child { border-bottom: none; }
  .summary .k { font-size: 14px; color: #9AA0A6; font-weight: 600; min-width: 82px; }
  .summary .v { font-size: 14px; color: #1B1D1F; font-weight: 600; text-align: right; margin-left: auto; }
  .copy-link { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: #9AA0A6; cursor: pointer; text-decoration: underline; }
  .mylink-box { margin-top: 16px; background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 32%, #fff); border-radius: 14px; padding: 14px 16px; text-align: left; }
  .mylink-h { font-size: 14px; font-weight: 800; color: #1B1D1F; }
  .mylink-sub { font-size: 12px; color: #6B7178; margin: 4px 0 10px; line-height: 1.5; }
  .mylink-url { font-size: 12px; color: #1B1D1F; background: #fff; border-radius: 8px; padding: 9px 11px; word-break: break-all; border: 1px solid #E7EAEE; }
  .mylink-btn { margin-top: 9px; width: 100%; padding: 11px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-family: inherit; font-size: 13.5px; font-weight: 800; cursor: pointer; }
  .done-status { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin:16px 0; }
  .done-step { position:relative; text-align:center; color:#9AA0A6; font-size:10.5px; line-height:1.35; padding-top:28px; }
  .done-step::before { content:""; position:absolute; top:5px; left:50%; width:16px; height:16px; margin-left:-8px; border-radius:50%; background:#DDE2E7; z-index:1; }

  .done-step.on { color:#0A6A5E; font-weight:800; }

  .done-primary { display:block; width:100%; padding:16px; border-radius:14px; background:var(--accent); color:#fff; text-align:center; text-decoration:none; font-size:16px; font-weight:800; margin-bottom:10px; }
  .done-brief { background:#F7F8FA; border-radius:14px; padding:6px 16px; margin-top:14px; }

  .done-brief .row:last-child { border-bottom:0; }
  .done-brief .k { color:#939AA1; font-weight:700; }
  .done-brief .v { color:#25292D; font-weight:700; margin-left:auto; text-align:right; }
  .done-details { margin-top:10px; }
  .done-details summary { color:#80878E; font-size:12.5px; text-align:center; cursor:pointer; padding:8px; }
  .private-note { color:#798580; font-size:11px; line-height:1.5; margin-top:8px; }

  .kakao-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 16px; border-radius: 14px; background: #FEE500; color: #191919;
    font-size: 16px; font-weight: 800; border: none; cursor: pointer; font-family: inherit;
    text-decoration: none; margin-bottom: 10px;
  }

    background: #FDF0EE; border: 1.5px solid #F3D6D1; border-radius: 12px;

  .err-box a { color: #B5504A; font-weight: 700; }

  /* ── 모바일 (인스타 유입 대응) ── */
  @media (max-width: 920px) {
    .wrap { padding:0; align-items:flex-start; }
    .app-shell { display:block; min-height:100vh; border-radius:0; }

/* 로컬 데모 환경(파일 열기·미리보기)인지 판별 — 이때는 서버 없이 브라우저 저장으로 완료 처리 */
const IS_LOCAL = location.protocol === "file:" ||
  ["localhost", "127.0.0.1"].includes(location.hostname);

/* 제출 처리 — 서버 저장이 확인된 경우에만 성공을 반환합니다.
   (실패 시 완료 화면을 띄우지 않아 문의 유실을 막습니다) */
async function onSubmitRequest(data) {
  const record = {
    ...data,
    receivedAt: new Date().toISOString(),
    status: "신규",
    memo: "",
  };
  // 화면 진행용 내부 필드는 저장하지 않음
  ["step", "done", "submitting", "submitError", "fileState"].forEach(k => delete record[k]);
  // 스팸 방어: honeypot 값 포함 (사람은 빈 값, 봇은 채움 → 서버가 무시)
  record.website = document.getElementById("hp_website")?.value || "";

  // 로컬 데모: 이 브라우저에 저장하고 성공 처리 (관리자 페이지 로컬 모드가 읽음)
  if (IS_LOCAL) {
    try {
      const key = "leaders_requests";
      const token = crypto.randomUUID ? crypto.randomUUID().replace(/-/g, "") : String(Date.now());
      record.id = Date.now() + "_local";
      record.token = token;
      const list = JSON.parse(localStorage.getItem(key) || "[]");
      list.unshift(record);
      localStorage.setItem(key, JSON.stringify(list));
      return { ok: true, local: true, token };
    } catch (e) {
      return { ok: false, error: String(e) };
    }
  }

  // 실서버: 응답을 확인한 경우에만 성공
  try {
    const res = await fetch(CONFIG.endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(record),
    });
    const payload = await res.json().catch(() => null);
    if (res.ok && payload && payload.ok) return { ok: true, token: payload.token || "" };
    if (res.status === 429) return { ok: false, error: "짧은 시간에 여러 번 제출됐어요. 1분 뒤에 다시 시도해 주세요." };
    if (res.status === 400) return { ok: false, error: "입력 내용을 다시 확인해 주세요." };
    return { ok: false, error: "server " + res.status };
  } catch (e) {
    return { ok: false, error: String(e) };
  }
}

try {
  const draft = JSON.parse(sessionStorage.getItem("leaders_draft") || "null");
  if (draft && typeof draft === "object") {
    Object.assign(S, draft, { done: false, submitting: false, submitError: "" });

/* ═════════════ 로직 ═════════════ */
const nights = () => {
  if (!S.depart || !S.return_) return null;
  const d1 = new Date(S.depart), d2 = new Date(S.return_);
  if (isNaN(d1) || isNaN(d2)) return null;
  return Math.round((d2 - d1) / 86400000);
};

/* 날짜 제한용: 오늘, 그리고 특정 날짜 +N일 (YYYY-MM-DD) */
const fmtDate = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
const todayStr = () => fmtDate(new Date());
const plusDays = (ymd, n) => { const d = new Date(ymd); d.setDate(d.getDate() + n); return fmtDate(d); };
const totalPax = () => Number(S.adult || 0) + Number(S.child || 0) + Number(S.infant || 0);
const vehicleCapacity = value => {
  if (!value || value === "상관없음") return Infinity;
  const m = String(value).match(/\((\d+)인\)/);
  return m ? Number(m[1]) : Infinity;
};
const vehicleIssue = () => vehicleCapacity(S.vehicle) < totalPax()
  ? `${totalPax()}명은 ${S.vehicle}에 탑승할 수 없어요. 더 큰 차량이나 상관없음을 선택해 주세요.`
  : "";
const recommendedVehicle = () => {
  const p = totalPax();
  if (p <= 4) return "랜드크루저(4인)";
  if (p <= 6) return "푸르공·스타렉스·델리카(6인)";
  return "대형 버스(25인)";
};
const routeAdvice = () => {
  if (!S.destination || S.destination === CONFIG.destUnsure) return null;
  const base = S.destination.includes("중앙") ? 3 : S.destination.includes("트레킹") ? 3 : 5;
  const recommended = Math.max(base, (S.destSpots || []).length + 1);
  const n = nights();
  return { recommended, short: n !== null && n < recommended };
};
function canProceed() {
  switch (S.step) {
    case 1: return S.adult >= 1;   // 성인 최소 1명 (아동·유아만 예약 불가)
    case 2: { const n = nights(); return n !== null && n > 0; }
    case 3: return !!S.tripType;
    case 4: return !!S.destination;
    case 5: return !!S.cityStay && !!S.gerStay && !!S.vehicle && !vehicleIssue();
    case 6: return S.flightIssued === "아니요, 아직이에요" || (S.flightIssued && !!S.flightIn && !!S.flightOut);
    case 7: return S.name.trim().length > 0 && /^[0-9]{9,11}$/.test(S.phone) && /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(S.email);
    case 8: return S.agree;
    default: return true;
  }
}

const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

/* datetime-local 값("2026-08-06T04:30") → 견적서 표기("08/06 - 04:30") */
const fmtFlight = v => {
  if (!v) return "";
  const d = new Date(v);
  if (isNaN(d)) return v;
  return `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")} - ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
};
const flightYes = () => S.flightIssued.startsWith("예");

const chips = (list, sel, key, cols) => `
  <div class="${cols}">
    ${list.map(l => `<button type="button" class="chip ${l === sel ? "sel" : ""}" data-key="${key}" data-val="${esc(l)}" aria-pressed="${l === sel}">${esc(l)}</button>`).join("")}
  </div>`;

function summaryRows() {
  const n = nights();
  return [
    ["여행 인원", `성인 ${S.adult} · 아동 ${S.child} · 유아 ${S.infant}`],
    ["여행 일정", `${S.depart} ~ ${S.return_}${n > 0 ? ` (${n}박 ${n + 1}일)` : ""}`],
    ["여행 타입", S.tripType],
    ...(S.travelStyles.length ? [["여행 취향", S.travelStyles.join(", ")]] : []),
    ["희망 투어", S.destination],
    ...(S.destSpots && S.destSpots.length ? [["관심 지역", S.destSpots.join(", ")]] : []),
    ["시내 숙소", S.cityStay],
    ["투어지역 게르", S.gerStay],
    ["차량", S.vehicle],
    ["항공권", flightYes() ? `도착 ${fmtFlight(S.flightIn)} · 출발 ${fmtFlight(S.flightOut)}` : "미발행 (미정)"],
    ["신청자", S.name || "-"],
    ...(S.kakaoId ? [["카카오톡 ID", S.kakaoId]] : []),
  ];
}

/* ═════════════ 렌더 ═════════════ */
function render() {
  if (!S.done) saveDraft();   // 상태가 바뀔 때마다 임시저장 (새로고침 복원용)
  const head = document.getElementById("cardHead");
  const body = document.getElementById("cardBody");
  const foot = document.getElementById("cardFoot");

  if (S.done) {
    const myUrl = S.token ? location.origin + "/" + encodeURI("내견적.html") + "?t=" + S.token : "";
    const phoneMasked = String(S.phone || "").replace(/^(\d{3})(\d+)(\d{4})$/, (_, a, b, c) => `${a}-${"*".repeat(Math.min(4, b.length))}-${c}`);
    const n = nights();
    head.innerHTML = "";
    body.innerHTML = `
      <div class="step-anim" style="padding-top:6px">
        <div class="step-head" style="margin-bottom:20px">
          <div class="done-badge">✓</div>
          <h1 class="step-title">견적 요청이 접수됐어요</h1>
          <div class="step-sub" style="line-height:1.6">담당자가 확인 후 영업시간 기준 24시간 이내 연락드릴게요.</div>
        </div>
        <div class="done-status" aria-label="견적 진행 단계">
          <div class="done-step on">요청<br>접수</div><div class="done-step">견적<br>작성 중</div><div class="done-step">견적<br>도착</div><div class="done-step">예약<br>진행</div>
        </div>
        ${S.token ? `
        <div class="mylink-box">
          <div class="mylink-h">회원가입 없이 전용 링크로 확인</div>
          <div class="mylink-sub">진행 상황과 완성된 견적서가 이 링크에 표시됩니다. 잃어버리지 않도록 보관해 주세요.</div>
          <div class="mylink-url" id="myUrl">${esc(myUrl)}</div>
          <button class="mylink-btn" id="copyMyLink">확인 링크 복사</button>
          <div class="private-note">이 링크를 가진 사람은 견적 내용을 볼 수 있으니 다른 사람에게 공유하지 마세요.</div>
        </div>` : ""}
        <div class="done-brief">
          <div class="row"><span class="k">여행</span><span class="v">${esc(n > 0 ? `${n}박 ${n + 1}일` : "일정 확인 중")} · ${esc(totalPax())}명</span></div>
          <div class="row"><span class="k">희망 투어</span><span class="v">${esc(S.destination || "추천 요청")}</span></div>
          <div class="row"><span class="k">연락처</span><span class="v">${esc(phoneMasked || "-")}</span></div>
        </div>
        <details class="done-details"><summary>요청 내용 자세히 보기</summary><div class="summary">${summaryRows().map(([k, v]) => `<div class="row"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`).join("")}</div></details>
        <span class="copy-link" id="copyBtn">카카오톡 상담용 요청 내용 복사</span>
      </div>`;
    foot.innerHTML = `
      ${myUrl ? `<a class="done-primary" href="${esc(myUrl)}">내 견적 진행상황 보기</a>` : ""}
      ${CONFIG.kakao ? `<a class="kakao-btn" href="${esc(CONFIG.kakao)}" target="_blank">카카오톡으로 추가 요청 보내기</a>` : ""}
      ${CONFIG.productUrl ? `<a class="ghost-btn" href="${esc(CONFIG.productUrl)}" target="_blank" rel="noopener">상품 둘러보기</a>` : `<button class="ghost-btn" id="restartBtn">새 견적 요청하기</button>`}`;
    const restartBtn = document.getElementById("restartBtn");
    if (restartBtn) restartBtn.onclick = () => {
      S.done = false; S.step = 1; S.submitError = "";
      try { sessionStorage.removeItem("leaders_draft"); } catch (e) {}
      render();
    };
    document.getElementById("copyBtn").onclick = () => {
      const txt = `[몽골 맞춤 견적 요청]\n` + summaryRows().map(([k, v]) => `${k}: ${v}`).join("\n")
        + `\n연락처: ${S.phone}\n이메일: ${S.email}` + (S.request ? `\n요청사항: ${S.request}` : "");
      navigator.clipboard.writeText(txt).then(() => alert("복사되었습니다!"));
    };
    const myLinkBtn = document.getElementById("copyMyLink");
    if (myLinkBtn) myLinkBtn.onclick = () => {
      navigator.clipboard.writeText(document.getElementById("myUrl").textContent).then(() => {
        myLinkBtn.textContent = "✓ 복사됨"; setTimeout(() => myLinkBtn.textContent = "링크 복사", 1500);
      });
    };
    return;
  }

  const m = META[S.step];

  head.innerHTML = `
    <div class="head-row">
      ${S.step > 1 ? `<button class="back-btn" id="backBtn" type="button" aria-label="이전 단계">‹</button>` : ""}
      <span class="prog-txt" aria-live="polite">${S.step} / 8</span>
    </div>
    <div class="prog-track" role="progressbar" aria-label="견적 요청 진행률" aria-valuemin="1" aria-valuemax="8" aria-valuenow="${S.step}"><div class="prog-fill" style="width:${S.step / 8 * 100}%"></div></div>`;
  if (S.step > 1) document.getElementById("backBtn").onclick = () => { S.step--; render(); };

  let inner = "";
  if (S.step === 1) {
    const rows = [
      ["adult", "♙", "성인", "만 12세 이상", S.adult],
      ["child", "☻", "아동", "만 2세~11세", S.child],
      ["infant", "♙", "유아", "만 2세 미만", S.infant],
    ];
    inner = rows.map(([k, icon, l, sub, v]) => `
      <div class="counter-row">
        <div class="counter-label"><span class="counter-icon">${icon}</span><div><div class="lbl">${l}</div><div class="sub">${sub}</div></div></div>
        <div class="counter-ctrl">
          <button class="cbtn" data-cnt="${k}" data-d="-1" aria-label="${l} 1명 줄이기" ${v === 0 ? "disabled" : ""}>−</button>
          <div class="val">${v}</div>
          <span class="unit">명</span>
          <button class="cbtn" data-cnt="${k}" data-d="1" aria-label="${l} 1명 늘리기">+</button>
        </div>
      </div>`).join("") + `<div class="tip-box"><b>♧ TIP</b><span>정확한 인원 정보는 맞춤 견적 제공에 도움이 됩니다.</span></div>`;
  } else if (S.step === 2) {
    const n = nights();
    const nTxt = n !== null && n > 0 ? `총 ${n}박 ${n + 1}일` : (n !== null && n <= 0 ? "귀국일은 입국일 이후로 선택해 주세요." : "");
    inner = `
      <div class="date-grid">
        <label style="flex:1"><span class="field-lbl">몽골 입국일</span>
          <input type="date" class="date-input" id="depart" value="${S.depart}" min="${todayStr()}"></label>
        <label style="flex:1"><span class="field-lbl">귀국일</span>
          <input type="date" class="date-input" id="return_" value="${S.return_}" min="${S.depart ? plusDays(S.depart, 1) : todayStr()}"></label>
      </div>
      <div class="nights" style="color:${n !== null && n <= 0 ? "#E0574B" : "var(--accent)"}">${nTxt}</div>`;
  } else if (S.step === 3) {
    inner = `
      <div class="group-lbl">누구와 떠나시나요?</div>
      ${chips(CONFIG.types, S.tripType, "tripType", "grid3")}
      <div class="group-lbl mt">어떤 경험을 원하시나요? <span style="font-weight:500;color:#9AA0A6;font-size:12px">· 선택사항, 복수 가능</span></div>
      <div class="grid3">${CONFIG.styles.map(v => {
        const on = S.travelStyles.includes(v);
        return `<button type="button" class="chip ${on ? "sel" : ""}" data-style="${esc(v)}" aria-pressed="${on}">${esc(v)}</button>`;
      }).join("")}</div>`;
  } else if (S.step === 4) {
    const panelHtml = (c) => {
      const f = c.regions.find(r => r.name === spotFocus) || c.regions[0];
      return `
      <div class="region-panel">
        <div class="rp-lbl">가보고 싶은 곳을 골라주세요 <span>· 선택사항, 복수 가능</span></div>
        <div class="rp-circles">
          ${c.regions.map(r => {
            const on = S.destSpots.includes(r.name);
            return `<button type="button" class="region-chip ${on ? "on" : ""}" data-spot="${esc(r.name)}" aria-pressed="${on}">
              <span class="rc-img"${r.img ? ` style="background-image:url('${esc(r.img)}')"` : ""}>${r.img ? "" : (r.emoji || "📍")}${on ? `<span class="rc-check">✓</span>` : ""}</span>
              <span class="rc-name">${esc(r.name)}</span>
            </button>`;
          }).join("")}
        </div>
        ${f ? `<div class="region-desc"><b>${esc(f.name)}</b> — ${esc(f.desc)}</div>` : ""}
        ${S.destSpots.length ? `<div class="selection-summary">선택 ${S.destSpots.length}곳 · ${esc(S.destSpots.join(" · "))}</div>` : ""}
      </div>`;
    };
    inner = `
      <div class="dest-list">
        ${CONFIG.destCats.map(d => {
          const sel = d.name === S.destination;
          return `
          <button type="button" class="chip dest-card ${sel ? "sel" : ""}" data-key="destination" data-val="${esc(d.name)}" aria-pressed="${sel}">
            ${d.badge ? `<span class="badge-pill">${esc(d.badge)}</span>` : ""}
            <div class="dc-name">${esc(d.name)}</div>
            <div class="dc-tag">${esc(d.tagline)}</div>
          </button>
          ${sel ? panelHtml(d) : ""}`;
        }).join("")}
      </div>
      <button type="button" class="unsure-card ${S.destination === CONFIG.destUnsure ? "selected" : ""}" data-unsure="1">
        <span><b>${S.destination === CONFIG.destUnsure ? "여행사 추천으로 선택됨" : "지역 선택을 여행사에 맡기기"}</b><span>상담 후 일정과 취향에 맞는 지역을 제안해 드려요.</span></span>
      </button>
      ${(() => { const a = routeAdvice(); return a ? `<div class="advice-box ${a.short ? "warn" : ""}">${a.short ? `현재 ${nights()}박 일정에는 선택한 지역이 많을 수 있어요.` : "선택한 지역을 여유 있게 둘러볼 수 있는 일정입니다."} 권장 일정은 약 ${a.recommended}박 이상이며, 최종 이동 동선은 담당자가 조정합니다.</div>` : ""; })()}`;
  } else if (S.step === 5) {
    const issue = vehicleIssue();
    inner = `
      <div class="group-lbl">시내(울란바토르) 숙소</div>${chips(CONFIG.cityStays, S.cityStay, "cityStay", "grid2")}
      <div class="choice-help">호텔 등급은 객실 상태와 조식·부대시설 수준을 기준으로 선택해 주세요.</div>
      <div class="group-lbl mt">투어지역 게르 등급 <span style="font-weight:500;color:#9AA0A6;font-size:12px">· 시내 외 지역은 게르만 가능해요</span></div>${chips(CONFIG.gerStays, S.gerStay, "gerStay", "grid3")}
      <div class="choice-help">고급 게르는 전용 또는 개선된 편의시설을 우선 배정하며, 지역별 실제 시설은 견적서에서 확인할 수 있어요.</div>
      <div class="group-lbl mt">차량</div>${chips(CONFIG.vehicles, S.vehicle, "vehicle", "grid3")}
      <div class="advice-box ${issue ? "warn" : ""}">${issue || `${totalPax()}명 기준 추천: ${recommendedVehicle()}. 짐의 양과 도로 상황에 따라 담당자가 최종 차량을 조정합니다.`}</div>`;
  } else if (S.step === 6) {
    inner = `
      ${chips(["예, 발행했어요", "아니요, 아직이에요"], S.flightIssued, "flightIssued", "grid2")}
      ${flightYes() ? `
        <div style="display:flex;flex-direction:column;gap:18px;margin-top:22px">
          <label><span class="field-lbl">✈️ 몽골 도착 일시 (IN)</span>
            <input class="txt-input" type="datetime-local" id="flightIn" value="${esc(S.flightIn)}"></label>
          <label><span class="field-lbl">✈️ 몽골 출발 일시 (OUT)</span>
            <input class="txt-input" type="datetime-local" id="flightOut" value="${esc(S.flightOut)}"></label>
        </div>` : ""}
      ${S.flightIssued && !flightYes() ? `<div style="margin-top:18px;font-size:13px;color:#9AA0A6;line-height:1.6">괜찮아요! 견적서에는 <b>미정</b>으로 표시되고, 발권 후 알려주시면 일정에 반영해 드려요.</div>` : ""}`;
  } else if (S.step === 7) {
    inner = `
      <div style="display:flex;flex-direction:column;gap:18px">
        <label><span class="field-lbl">신청자 이름</span>
          <input class="txt-input" id="name" value="${esc(S.name)}" placeholder="예) 홍길동" autocomplete="name" maxlength="40"></label>
        <label><span class="field-lbl">휴대폰 번호</span>
          <input class="txt-input" id="phone" type="tel" inputmode="numeric" value="${esc(S.phone)}" placeholder="본인 휴대폰 번호 ('-' 제외)" autocomplete="tel" maxlength="11"></label>
        <label><span class="field-lbl">이메일</span>
          <input class="txt-input" id="email" type="email" value="${esc(S.email)}" placeholder="견적서를 받으실 이메일 주소" autocomplete="email" maxlength="120"></label>
        <label><span class="field-lbl">카카오톡 ID <span style="font-weight:500;color:#9AA0A6">(선택 — 카톡 상담을 원하시면)</span></span>
          <input class="txt-input" id="kakaoId" value="${esc(S.kakaoId)}" placeholder="카카오톡 ID"></label>
      </div>`;
  } else if (S.step === 8) {
    // 파일 상태별 표시
    let fileCls = "", fileTxt = "항공권 또는 준비된 일정표가 있으면 첨부해 주세요 (선택 · 10MB 이하)";
    if (S.fileState === "uploading") { fileTxt = `⏳ "${S.fileName}" 업로드 중…`; }
    else if (S.fileState === "done" || S.fileState === "local") { fileCls = "up-done"; fileTxt = `✓ "${S.fileName}" 첨부 완료 (변경하려면 클릭)`; }
    else if (S.fileState === "error") { fileCls = "up-err"; fileTxt = "⚠ 업로드에 실패했어요 — 다시 선택하거나, 파일 없이 제출 후 카톡으로 보내주세요"; }

    inner = `
      ${S.submitError ? `<div class="err-box"><b>앗, 접수 전송에 실패했어요.</b><br>
        ${/[가-힣]/.test(S.submitError) ? esc(S.submitError) : "인터넷 연결을 확인하고 아래 버튼으로 다시 시도해 주세요."}<br>
        ${CONFIG.kakao ? `계속 안 되면 <a href="${esc(CONFIG.kakao)}" target="_blank">카카오톡 채널</a>로 문의 부탁드려요.` : ""}</div>` : ""}
      <div style="display:flex;flex-direction:column;gap:18px">
        <label><span class="field-lbl">요청사항</span>
          <textarea class="txt-area" id="request" placeholder="예) 승마 체험과 별 관측을 꼭 넣고 싶어요.&#10;아이와 함께라 이동시간이 짧았으면 합니다.">${esc(S.request)}</textarea></label>
        <label class="file-lbl ${fileCls}">
          <span style="font-size:16px">📎</span>
          <span>${esc(fileTxt)}</span>
          <input type="file" id="file" accept=".pdf,.jpg,.jpeg,.png,.webp,.heic,.gif" style="display:none">
        </label>
        <button type="button" class="agree-row" id="agreeRow" aria-pressed="${S.agree}">
          <div class="agree-box ${S.agree ? "on" : ""}">✓</div>
          <div class="agree-txt">개인정보 수집 및 이용에 동의합니다.<br><small>이름·연락처·이메일은 견적 상담 목적으로만 사용됩니다.</small></div>
        </button>
      </div>`;
  }

  body.innerHTML = `
    <div class="step-anim">
      <div class="step-head">
        <div class="badge">${m.icon}</div>
        <h1 class="step-title">${m.title}</h1>
        <div class="step-sub">${m.sub}</div>
      </div>
      ${inner}
    </div>`;

  foot.innerHTML = `<button class="primary-btn" id="nextBtn" type="button">${S.step < 8 ? "다음 단계로  ›" : "견적 요청하기"}</button>`;
  syncPrimary();

  /* ── 이벤트 연결 ── */
  document.getElementById("nextBtn").onclick = async () => {
    if (S.submitting || !canProceed()) return;
    if (S.step < 8) { S.step++; render(); return; }

    // 최종 제출
    if (S.fileState === "uploading") { alert("파일 업로드가 끝날 때까지 잠시만 기다려주세요."); return; }
    S.submitting = true; S.submitError = "";
    const btn = document.getElementById("nextBtn");
    btn.textContent = "접수 중…"; btn.classList.remove("ok");

    const result = await onSubmitRequest({
      ...S, nights: nights(),
      // 항공권: 발행한 경우에만 "MM/DD - HH:mm" 형식으로 저장, 미발행이면 빈 값(견적서에 "미정")
      flightIn: flightYes() ? fmtFlight(S.flightIn) : "",
      flightOut: flightYes() ? fmtFlight(S.flightOut) : "",
    });
    S.submitting = false;
    if (result.ok) {
      S.done = true; S.token = result.token || "";
      try { sessionStorage.removeItem("leaders_draft"); } catch (e) {}
    } else {
      S.submitError = result.error || "전송 실패";
    }
    render();
  };
  body.querySelectorAll("[data-cnt]").forEach(b => b.onclick = () => {
    const k = b.dataset.cnt, d = +b.dataset.d;
    S[k] = Math.max(0, S[k] + d); render();
  });
  body.querySelectorAll(".chip").forEach(c => c.onclick = () => {
    if (c.dataset.style) return;
    if (c.dataset.key === "destination" && S.destination !== c.dataset.val) { S.destSpots = []; spotFocus = ""; }
    S[c.dataset.key] = c.dataset.val; render();
  });
  body.querySelectorAll("[data-unsure]").forEach(c => c.onclick = () => {
    S.destination = CONFIG.destUnsure; S.destSpots = []; spotFocus = ""; render();
  });
  body.querySelectorAll("[data-style]").forEach(c => c.onclick = () => {
    const value = c.dataset.style, i = S.travelStyles.indexOf(value);
    if (i >= 0) S.travelStyles.splice(i, 1); else S.travelStyles.push(value);
    render();
  });
  body.querySelectorAll(".region-chip").forEach(c => c.onclick = () => {
    const name = c.dataset.spot, i = S.destSpots.indexOf(name);
    if (i >= 0) S.destSpots.splice(i, 1); else S.destSpots.push(name);
    spotFocus = name; render();
  });
  ["depart", "return_", "flightIn", "flightOut"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.onchange = () => {
      S[id] = el.value;
      // 입국일을 귀국일 이후로 바꾸면 귀국일 초기화
      if (id === "depart" && S.return_ && S.depart && S.return_ <= S.depart) S.return_ = "";
      render();
    };
  });
  ["name", "phone", "email", "kakaoId", "request"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.oninput = () => {
      S[id] = id === "phone" ? el.value.replace(/[^0-9]/g, "") : el.value;
      if (id === "phone") el.value = S.phone;
      saveDraft();
      syncPrimary();
    };
  });

  /* 파일 선택 즉시 R2 업로드 (로컬 데모에선 이름만 기록) */
  const file = document.getElementById("file");
  if (file) file.onchange = async () => {
    const f = file.files[0];
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { alert("파일은 10MB 이하만 첨부할 수 있어요."); return; }
    S.fileName = f.name;
    if (IS_LOCAL) { S.fileState = "local"; S.fileKey = ""; render(); return; }
    S.fileState = "uploading"; S.fileKey = ""; render();
    try {
      const fd = new FormData();
      fd.append("file", f);
      const res = await fetch("/api/upload", { method: "POST", body: fd });
      const j = await res.json().catch(() => null);
      if (res.ok && j && j.ok) { S.fileKey = j.key; S.fileState = "done"; }
      else { S.fileState = "error"; }
    } catch (e) { S.fileState = "error"; }
    render();
  };
  const agree = document.getElementById("agreeRow");
  if (agree) agree.onclick = () => { S.agree = !S.agree; render(); };
}

function syncPrimary() {
  const btn = document.getElementById("nextBtn");
  if (btn) {
    const enabled = canProceed();
    btn.classList.toggle("ok", enabled);
    btn.disabled = !enabled;
  }
}

render();
</script>
</body>
</html>
