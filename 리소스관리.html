<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>리소스 관리 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="presets.js"></script>
<style>
  :root { --accent:#06c4a0; --deep:#06c4a0; --soft:#eaf7f3; --ink:#1b2b28; --sub:#6b7c78; --gray:#9aa5a2;
    --line:#eceef1; --bg:#f6f8f9; --red:#e2574c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  svg { display:block; }

  .shell { display:flex; min-height:100vh; }
  .side { width:232px; flex:0 0 232px; background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; }
  .side-brand { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .side-brand .logo { width:38px; height:38px; border-radius:11px; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .side-brand b { font-size:15px; font-weight:800; display:block; line-height:1.2; }
  .side-brand small { font-size:11.5px; color:var(--gray); font-weight:600; }
  .mi { display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; color:var(--sub); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:2px; border:none; background:none; width:100%; font-family:inherit; transition:.12s; }
  .mi:hover { background:var(--soft); color:var(--deep); }
  .mi.on { background:var(--deep); color:#fff; }

  .content { flex:1; min-width:0; padding:26px 34px 60px; max-width:1240px; }
  .page-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .page-head h1 { font-size:20px; font-weight:800; }
  .page-head .add { margin-left:auto; background:var(--deep); color:#fff; border:none; border-radius:10px; padding:11px 18px; font-size:13.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .lead { font-size:13px; color:var(--sub); margin-bottom:16px; }
  .lead b { color:var(--deep); }

  .tabs { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  .tab { border:1.5px solid var(--line); background:#fff; color:var(--sub); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:7px; transition:.12s; }
  .tab:hover { border-color:var(--accent); color:var(--deep); }
  .tab.on { background:var(--deep); border-color:var(--deep); color:#fff; }
  .tab .cnt { font-size:11px; font-weight:800; opacity:.85; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; }
  .res-card { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; cursor:pointer; transition:.12s; }
  .res-card:hover { border-color:var(--accent); box-shadow:0 8px 24px rgba(20,50,45,.06); }
  .thumb { height:150px; background:#eef2f1; display:flex; align-items:center; justify-content:center; color:#b3bebb; font-size:13px; position:relative; }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb .noimg { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .thumb .badge { position:absolute; top:10px; left:10px; background:rgba(255,255,255,.92); color:var(--deep); border-radius:7px; padding:3px 9px; font-size:11px; font-weight:800; }
  .res-card .body { padding:14px 16px; }
  .res-card .sub { font-size:11.5px; font-weight:800; color:var(--accent); }
  .res-card h3 { font-size:16px; font-weight:800; margin:2px 0 5px; }
  .res-card p { font-size:12.5px; color:var(--sub); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  .overlay { position:fixed; inset:0; background:rgba(20,40,36,.4); z-index:40; opacity:0; pointer-events:none; transition:.2s; }
  .overlay.on { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; width:520px; max-width:96vw; height:100%; background:#fff; z-index:50; box-shadow:-10px 0 40px rgba(20,40,36,.15); transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.on { transform:translateX(0); }
  .dh { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; }
  .dh h2 { font-size:18px; font-weight:800; }
  .dh .x { margin-left:auto; border:none; background:#f2f5f4; width:32px; height:32px; border-radius:9px; font-size:18px; cursor:pointer; color:var(--sub); }
  .db { flex:1; overflow-y:auto; padding:22px 24px; }
  label.f { display:block; margin-bottom:16px; }
  label.f span { display:block; font-size:12.5px; font-weight:700; color:var(--sub); margin-bottom:6px; }
  input, textarea, select { width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; color:var(--ink); outline:none; background:#fff; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); }
  textarea { resize:vertical; line-height:1.65; min-height:90px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .up-main { border:1.5px dashed #c7d0cd; border-radius:14px; height:180px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; position:relative; background:#fafcfb; color:var(--gray); text-align:center; }
  .up-main img { width:100%; height:100%; object-fit:cover; }
  .up-main .ph { display:flex; flex-direction:column; gap:8px; align-items:center; font-size:13px; }
  .up-main .change { position:absolute; right:8px; bottom:8px; background:rgba(0,0,0,.55); color:#fff; font-size:11px; padding:4px 10px; border-radius:7px; }
  .hintline { font-size:11.5px; color:var(--gray); margin-top:6px; }

  .df { padding:16px 24px; border-top:1px solid var(--line); display:flex; gap:8px; }
  .df button { padding:13px 0; border-radius:11px; font-size:14px; font-weight:800; cursor:pointer; border:none; font-family:inherit; }
  .df .save { flex:1; background:var(--deep); color:#fff; }
  .df .del { background:#fbeceb; color:var(--red); padding:13px 18px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--deep); color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; }
  .toast.on { opacity:1; }
  @media (max-width:820px){ .side{display:none} .content{padding:20px} }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="side-brand">
      <span class="logo">▲</span>
      <div><b>몽골리아 은하수</b><small>몽골리아 관리자</small></div>
    </div>
    <nav>
      <a class="mi" href="/admin">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        대시보드
      </a>
      <a class="mi" href="견적만들기.html">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        견적서 만들기
      </a>
      <a class="mi" href="코스관리.html">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l11 0M9 12l11 0M9 18l11 0"/><circle cx="4" cy="6" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="4" cy="18" r="1.6"/></svg>
        코스 관리
      </a>
      <a class="mi" href="일정관리.html">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        일정 관리
      </a>
      <a class="mi" href="명소관리.html">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        명소 관리
      </a>
      <a class="mi on" href="리소스관리.html">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        리소스 관리
      </a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-head">
      <h1>리소스 관리</h1>
      <button class="add" id="addBtn">＋ 새 리소스 추가</button>
    </div>
    <div class="lead">여기서 등록한 <b>가이드·숙소·차량</b>이 <b>예약관리 배정</b>에서 자동완성되고, 사진·소개가 <b>고객 확정안내</b>에 그대로 반영됩니다.</div>
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

const IS_LOCAL = location.protocol === "file:" || ["localhost", "127.0.0.1"].includes(location.hostname);
const ADMIN_TOKEN = sessionStorage.getItem("leaders_admin_token") || "";

/* ── 리소스 종류 정의 ── */
const TYPES = {
  guides: {
    label: "가이드", icon: "👤", one: "가이드",
    sub: r => [r.career && `경력 ${r.career}`, r.korean && `한국어 ${r.korean}`].filter(Boolean).join(" · "),
    get: () => window.getGuides(), save: o => window.saveGuides(o),
  },
  lodges: {
    label: "숙소", icon: "🏕", one: "숙소(캠프장·호텔)",
    sub: r => [r.region, r.grade].filter(Boolean).join(" · "),
    get: () => window.getLodges(), save: o => window.saveLodges(o),
  },
  vehicles: {
    label: "차량", icon: "🚐", one: "차량",
    sub: r => [r.seats, r.plate].filter(Boolean).join(" · "),
    get: () => window.getVehicles(), save: o => window.saveVehicles(o),
  },
};
let activeType = "guides";
let LIB = {};        // 현재 탭의 라이브러리 (작업 사본)
let editKey = null;

let toastT;
function toast(m){ $("toast").textContent = m; $("toast").classList.add("on"); clearTimeout(toastT); toastT = setTimeout(()=>$("toast").classList.remove("on"), 2600); }

function load() {
  LIB = JSON.parse(JSON.stringify(TYPES[activeType].get()));
  renderTabs(); renderGrid();
}
function persist() { return TYPES[activeType].save(LIB); }

/* ── 탭 ── */
function renderTabs() {
  $("tabs").innerHTML = Object.entries(TYPES).map(([k, t]) => {
    const n = Object.keys(TYPES[k].get()).length;
    return `<button class="tab ${activeType===k?"on":""}" data-t="${k}">${t.icon} ${t.label} <span class="cnt">${n}</span></button>`;
  }).join("");
  $("tabs").querySelectorAll(".tab").forEach(el => el.onclick = () => { activeType = el.dataset.t; load(); });
  $("addBtn").textContent = `＋ 새 ${TYPES[activeType].one} 추가`;
}

/* ── 카드 그리드 ── */
function renderGrid() {
  const T = TYPES[activeType];
  $("grid").innerHTML = Object.entries(LIB).map(([name, r]) => `
    <div class="res-card" data-k="${esc(name)}">
      <div class="thumb">
        ${r.img ? `<img src="${r.img}" alt="${esc(name)}">` : `<div class="noimg"><span style="font-size:30px">${T.icon}</span><span>이미지 없음</span></div>`}
        ${T.sub(r) ? `<span class="badge">${esc(T.sub(r))}</span>` : ""}
      </div>
      <div class="body">
        <div class="sub">${T.icon} ${T.label}</div>
        <h3>${esc(name)}</h3>
        <p>${esc(r.desc || "설명을 추가하세요")}</p>
      </div>
    </div>`).join("")
  || `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--gray)">등록된 ${T.one}이(가) 없습니다. 우측 상단 <b>＋ 새 ${T.one} 추가</b>로 만들어보세요.</div>`;
  $("grid").querySelectorAll(".res-card").forEach(el => el.onclick = () => openEdit(el.dataset.k));
}

/* ── 이미지: 리사이즈 → WebP → (실서버)R2 업로드 / (로컬)base64 ── */
function fileToImage(file, maxW, quality) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        c.toBlob(async (blob) => {
          if (!blob) return rej(new Error("이미지 변환 실패"));
          if (IS_LOCAL) {
            const r2 = new FileReader();
            r2.onload = () => res(r2.result); r2.onerror = rej; r2.readAsDataURL(blob);
            return;
          }
          if (!ADMIN_TOKEN) return rej(new Error("관리자 로그인이 필요합니다. 관리자 페이지에서 로그인 후 이용해 주세요."));
          try {
            const fd = new FormData();
            fd.append("file", blob, "resource.webp");
            const up = await fetch("/api/upload?folder=images", { method: "POST", body: fd, headers: { "x-admin-token": ADMIN_TOKEN } });
            const j = await up.json().catch(() => ({}));
            if (up.status === 401) throw new Error("관리자 인증이 만료됐어요. 관리자 페이지에서 다시 로그인해 주세요.");
            if (!j.ok || !j.url) throw new Error(j.error || "업로드 실패");
            res(j.url);
          } catch (e) { rej(e); }
        }, "image/webp", quality);
      };
      img.onerror = () => rej(new Error("이미지를 읽을 수 없어요"));
      img.src = fr.result;
    };
    fr.onerror = rej; fr.readAsDataURL(file);
  });
}

/* ── 편집 드로어 ── */
function fieldRows(type, r) {
  if (type === "guides") return `
    <div class="row2">
      <label class="f"><span>경력 (예: 7년)</span><input id="f_career" value="${esc(r.career||"")}"></label>
      <label class="f"><span>한국어 수준 (예: 상급)</span><input id="f_korean" value="${esc(r.korean||"")}"></label>
    </div>
    <label class="f"><span>연락처 (내부용 — 고객에게 안 보임)</span><input id="f_phone" value="${esc(r.phone||"")}"></label>
    <label class="f"><span>한 줄 소개 (고객 확정안내에 노출)</span><textarea id="f_desc" rows="3">${esc(r.desc||"")}</textarea></label>`;
  if (type === "lodges") return `
    <div class="row2">
      <label class="f"><span>지역 (예: 홍고린엘스)</span><input id="f_region" value="${esc(r.region||"")}"></label>
      <label class="f"><span>등급</span><select id="f_grade">
        ${["","일반게르","고급게르","호텔"].map(g => `<option value="${g}" ${r.grade===g?"selected":""}>${g||"선택"}</option>`).join("")}
      </select></label>
    </div>
    <label class="f"><span>시설 태그 (쉼표 — 예: 전기 O, 샤워 O, 와이파이 O)</span><input id="f_tags" value="${esc(r.tags||"")}"></label>
    <label class="f"><span>소개 (선택)</span><textarea id="f_desc" rows="3">${esc(r.desc||"")}</textarea></label>`;
  return `
    <div class="row2">
      <label class="f"><span>인승 (예: 9인승)</span><input id="f_seats" value="${esc(r.seats||"")}"></label>
      <label class="f"><span>차량번호 (내부용)</span><input id="f_plate" value="${esc(r.plate||"")}"></label>
    </div>
    <label class="f"><span>메모 (선택)</span><textarea id="f_desc" rows="3">${esc(r.desc||"")}</textarea></label>`;
}
function readFields(type, r) {
  const v = id => $(id) ? $(id).value.trim() : "";
  if (type === "guides") { r.career=v("f_career"); r.korean=v("f_korean"); r.phone=v("f_phone"); r.desc=v("f_desc"); }
  else if (type === "lodges") { r.region=v("f_region"); r.grade=v("f_grade"); r.tags=v("f_tags"); r.desc=v("f_desc"); }
  else { r.seats=v("f_seats"); r.plate=v("f_plate"); r.desc=v("f_desc"); }
  return r;
}

function openEdit(key) {
  editKey = key;
  const T = TYPES[activeType];
  const isNew = key === null;
  const r = isNew ? { img:"" } : JSON.parse(JSON.stringify(LIB[key]));
  let draftImg = r.img || "";

  $("drawer").innerHTML = `
    <div class="dh"><h2>${isNew ? `새 ${T.one} 추가` : `${T.one} 수정`}</h2><button class="x" id="dX">✕</button></div>
    <div class="db">
      <label class="f"><span>이름 ${activeType==="vehicles" ? "(예: 하이스 1호)" : ""}</span><input id="f_name" value="${esc(key||"")}" placeholder="${activeType==="guides"?"바트카":activeType==="lodges"?"고비 오아시스 캠프":"하이스 1호"}"></label>
      <label class="f"><span>대표 사진 ${activeType==="guides" ? "(고객 확정안내에 노출)" : ""}</span></label>
      <div class="up-main" id="upMain">
        ${draftImg ? `<img src="${draftImg}"><span class="change">사진 변경</span>` : `<div class="ph"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M4 18l5-5 3 3 4-4 4 4"/></svg><span>사진 업로드 (클릭)</span></div>`}
      </div>
      <input type="file" id="fileMain" accept="image/*" style="display:none">
      <div class="hintline">사진은 자동으로 줄여서(WebP) 서버에 저장돼요.</div>
      <div style="height:14px"></div>
      ${fieldRows(activeType, r)}
    </div>
    <div class="df">
      ${isNew ? "" : `<button class="del" id="dDel">삭제</button>`}
      <button class="save" id="dSave">저장</button>
    </div>`;
  $("drawer").classList.add("on"); $("overlay").classList.add("on");
  $("dX").onclick = closeDrawer;

  $("upMain").onclick = () => $("fileMain").click();
  $("fileMain").onchange = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    $("upMain").innerHTML = `<div class="ph">업로드 중…</div>`;
    try {
      draftImg = await fileToImage(f, 1200, 0.82);
      $("upMain").innerHTML = `<img src="${draftImg}"><span class="change">사진 변경</span>`;
    } catch (err) {
      toast("⚠ " + err.message);
      $("upMain").innerHTML = draftImg ? `<img src="${draftImg}"><span class="change">사진 변경</span>` : `<div class="ph">사진 업로드 (클릭)</div>`;
    }
  };

  $("dSave").onclick = async () => {
    const name = $("f_name").value.trim();
    if (!name) return toast("이름을 입력해 주세요");
    if ((isNew || name !== editKey) && LIB[name]) return toast("이미 같은 이름이 있어요");
    const rec = readFields(activeType, { img: draftImg });
    if (!isNew && name !== editKey) delete LIB[editKey];
    LIB[name] = rec;
    const res = await persist();
    renderTabs(); renderGrid(); closeDrawer();
    toast(res.ok ? `✓ "${name}" 저장 완료 (서버 반영)` : res.local ? `"${name}" 저장 — 이 브라우저에만 저장됨` : "⚠ 저장 실패: " + (res.error || ""));
  };

  const del = $("dDel");
  if (del) del.onclick = async () => {
    if (!confirm(`"${editKey}"을(를) 삭제할까요?`)) return;
    delete LIB[editKey];
    const res = await persist();
    renderTabs(); renderGrid(); closeDrawer();
    toast(res.ok ? "삭제됐어요 (서버 반영)" : "삭제됨 — 이 브라우저에만 반영");
  };
}
function closeDrawer(){ $("drawer").classList.remove("on"); $("overlay").classList.remove("on"); }
$("overlay").onclick = closeDrawer;
$("addBtn").onclick = () => openEdit(null);

/* ── 시작: 서버 라이브러리 동기화 후 렌더 ── */
(async () => { try { await window.cloudReady; } catch (e) {} load(); })();
</script>
</body>
</html>
