<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>몽골리아 은하수 · 몽골 단독 프라이빗 투어</title>
<!-- 카톡·인스타 링크 공유 미리보기 -->
<meta property="og:title" content="몽골에서만 만나는 특별한 순간 | 몽골리아 은하수">
<meta property="og:description" content="사막의 은하수, 유목민 게르, 대초원 승마까지 — 몇 가지 질문에 답하면 현지 전문가가 당신만의 일정과 견적을 설계해 드려요.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://milkway-mongolia.pages.dev">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root {
    --accent: #06c4a0; --deep: #06c4a0; --ink: #16261f; --gray5: #6b7c78; --gray4: #9aa8a3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard Variable", Pretendard, system-ui, "Malgun Gothic", sans-serif;
    color: var(--ink);
    background: radial-gradient(125% 90% at 50% -5%, #DFF6EC 0%, #EFFBF6 42%, #FFFFFF 100%);
    border-top: 3px solid var(--accent);
    min-height: 100%;
  }
  .wrap {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 26px 20px 34px; overflow-x: hidden;
  }

  /* ── 브랜드 ── */
  .brand { display: flex; flex-direction: column; align-items: center; gap: 9px; text-align: center; }
  .brand .tagchip {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 13px; border-radius: 999px;
    background: rgba(255,255,255,.72); border: 1px solid color-mix(in srgb, var(--accent) 22%, #fff);
    font-size: 11.5px; font-weight: 800; letter-spacing: .08em; color: var(--accent);
  }
  .brand .logo { display: inline-flex; align-items: center; gap: 9px; }
  .brand .logo b { font-size: 27px; font-weight: 800; letter-spacing: -.04em; color: var(--ink); }
  .brand .logo b i { font-style: normal; color: var(--accent); }
  .brand .sub { font-size: 13.5px; font-weight: 600; letter-spacing: -.01em; color: var(--gray5); }

  /* ── 캐러셀 ── */
  .carousel { position: relative; width: 100%; max-width: 640px; height: 384px; margin: 8px 0 2px; perspective: 1400px; }
  .card {
    position: absolute; left: 50%; top: 30px; width: 240px; height: 320px; margin-left: -120px;
    border-radius: 22px; overflow: hidden; cursor: pointer; background: #10201b;
    transition: transform .55s cubic-bezier(.4,.1,.2,1), opacity .55s ease;
    box-shadow: 0 20px 44px rgba(20,40,34,.28);
  }
  .card .bgblur { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(20px) brightness(.55); transform: scale(1.15); }
  .card .bg { position: absolute; inset: 0; background-size: contain; background-repeat: no-repeat; background-position: center; }
  .card .shade { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,18,30,0) 38%, rgba(20,18,30,.82) 100%); }
  .card .cap { position: absolute; left: 0; right: 0; bottom: 0; padding: 0 20px 22px; text-align: center; }
  .card .cap .cat { font-size: 13px; font-weight: 800; letter-spacing: -.01em; }
  .card .cap .ttl { margin-top: 5px; font-size: 21px; font-weight: 800; letter-spacing: -.03em; color: #fff; line-height: 1.25; }

  /* ── dots ── */
  .dots { display: flex; align-items: center; justify-content: center; gap: 7px; margin: 18px 0 6px; }
  .dots button { height: 7px; width: 7px; border-radius: 999px; border: none; background: #cfe3dc; cursor: pointer; padding: 0; transition: all .3s; }
  .dots button.on { width: 22px; background: var(--accent); }

  /* ── 카피 + CTA ── */
  .copy { text-align: center; max-width: 540px; margin-top: 6px; }
  .copy .kick { font-size: 13.5px; font-weight: 800; letter-spacing: .04em; color: var(--accent); }
  .copy h1 { margin-top: 9px; font-size: 30px; font-weight: 800; letter-spacing: -.035em; line-height: 1.22; color: var(--ink); }
  .copy p { margin: 12px auto 0; max-width: 520px; font-size: 15px; line-height: 1.6; color: var(--gray5); letter-spacing: -.01em; }
  .cta {
    margin-top: 26px; height: 58px; padding: 0 40px; border: none; border-radius: 15px;
    background: var(--ink); color: #fff; font-family: inherit; font-size: 17px; font-weight: 800; letter-spacing: -.02em;
    cursor: pointer; display: inline-flex; align-items: center; gap: 10px; text-decoration: none;
    box-shadow: 0 10px 26px rgba(20,40,34,.24); transition: transform .12s, background .14s;
  }
  .cta:hover { background: #0a1512; }
  .cta:active { transform: scale(.98); }

  .foot { margin-top: 22px; font-size: 12px; color: var(--gray4); text-align: center; line-height: 1.6; }
  .foot a { color: var(--gray5); font-weight: 700; text-decoration: none; }

  /* 인트로 애니메이션 */
  @keyframes cineUp { 0% { opacity: 0; transform: translateY(26px); filter: blur(8px); } 100% { opacity: 1; transform: none; filter: blur(0); } }
  .kick { animation: cineUp .9s ease .1s both; }
  .copy h1 { animation: cineUp 1.05s cubic-bezier(.2,.7,.2,1) .3s both; }
  .copy p { animation: cineUp 1s ease .6s both; }
  .cta { animation: cineUp .9s cubic-bezier(.2,.7,.2,1) .9s both; }

  @media (max-width: 520px) {
    .carousel { height: 350px; }
    .card { width: 216px; height: 292px; margin-left: -108px; }
    .card .cap .ttl { font-size: 19px; }
    .copy h1 { font-size: 25px; }
    .copy p { font-size: 14px; }
    .cta { height: 56px; width: 100%; max-width: 340px; justify-content: center; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <span class="tagchip">몽골 단독 프라이빗 투어</span>
    <span class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#06c4a0" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.3 5.7L20 11l-5.7 2.3L12 19l-2.3-5.7L4 11l5.7-2.3z"></path></svg>
      <b>Milky<i>Way</i></b>
    </span>
    <span class="sub">몽골리아 은하수 현지 전문 여행사</span>
  </div>

  <div class="carousel" id="carousel"></div>

  <div class="dots" id="dots"></div>

  <div class="copy">
    <div class="kick">ONLY IN MONGOLIA</div>
    <h1>몽골에서만 만나는<br>특별한 순간</h1>
    <p>사막의 은하수, 유목민 게르, 대초원 승마까지 — 몇 가지 질문에 답하면 현지 전문가가 당신만의 일정과 견적을 설계해 드려요.</p>
    <a class="cta" id="startBtn" href="#">
      견적 요청 시작하기
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
    </a>
  </div>

  <div class="foot">
    몽골리아 은하수 현지 여행사 · <a href="https://pf.kakao.com/_BSLaxl" target="_blank" rel="noopener">카카오톡 상담</a><br>
    당신의 삶을 우러러 볼 시간
  </div>

</div>

<script>
  document.getElementById("startBtn").href = encodeURI("견적요청.html");

  const SLIDES = [
    { cat: "은하수", title: "사막 위 은하수 캠프", emoji: "🌌", bg: "linear-gradient(160deg,#1b2a4d,#0c1220)", cat_col: "#8fd6ff" },
    { cat: "게르",   title: "유목민 게르 스테이", emoji: "⛺", bg: "linear-gradient(160deg,#5a4326,#2e2013)", cat_col: "#ffd79a" },
    { cat: "승마",   title: "초원 승마 트레킹",   emoji: "🐎", bg: "linear-gradient(160deg,#2f6b4a,#123524)", cat_col: "#9bf0c9" },
    { cat: "사막",   title: "낙타 사파리",       emoji: "🐫", bg: "linear-gradient(160deg,#b98a4e,#6b4a24)", cat_col: "#ffe6b8" },
    { cat: "식사",   title: "허르헉 화덕 요리",   emoji: "🍖", bg: "linear-gradient(160deg,#7a3a2c,#3f1c15)", cat_col: "#ffc0ad" },
    { cat: "온천",   title: "쳉헤르 노천 온천",   emoji: "♨️", bg: "linear-gradient(160deg,#2f5f6b,#123037)", cat_col: "#a6e8f0" },
    { cat: "축제",   title: "나담 축제",         emoji: "🏹", bg: "linear-gradient(160deg,#6b2f4a,#341524)", cat_col: "#f0a6c8" },
  ];

  const N = SLIDES.length;
  let active = 0, timer = null;
  const carousel = document.getElementById("carousel");
  const dotsBox = document.getElementById("dots");

  carousel.innerHTML = SLIDES.map((s, i) => `
    <div class="card" data-i="${i}">
      <div class="bgblur" style="background-image:url('img/home/${i + 1}.webp')"></div>
      <div class="bg" style="background-image:url('img/home/${i + 1}.webp')"></div>
      <div class="shade"></div>
      <div class="cap">
        <div class="cat" style="color:${s.cat_col}">${s.cat}</div>
        <div class="ttl">${s.title}</div>
      </div>
    </div>`).join("");

  dotsBox.innerHTML = SLIDES.map((_, i) => `<button data-i="${i}" aria-label="슬라이드 ${i + 1}"></button>`).join("");

  const cards = [...carousel.querySelectorAll(".card")];
  const dots = [...dotsBox.querySelectorAll("button")];

  function layout() {
    cards.forEach((card, i) => {
      let off = i - active;
      if (off > N / 2) off -= N;
      if (off < -N / 2) off += N;
      const a = Math.abs(off);
      let tx, scale, opacity, z, rot;
      if (off === 0) { tx = 0; scale = 1; opacity = 1; z = 30; rot = 0; }
      else if (a === 1) { tx = off * 158; scale = .82; opacity = .58; z = 20; rot = off * -18; }
      else if (a === 2) { tx = off * 232; scale = .66; opacity = .22; z = 10; rot = off * -22; }
      else { tx = off * 260; scale = .6; opacity = 0; z = 0; rot = 0; }
      card.style.transform = `translateX(${tx}px) scale(${scale}) rotateY(${rot}deg)`;
      card.style.opacity = opacity;
      card.style.zIndex = z;
      card.style.pointerEvents = opacity > .2 ? "auto" : "none";
    });
    dots.forEach((d, i) => d.classList.toggle("on", i === active));
  }

  function go(i) { active = (i + N) % N; layout(); }
  function restart() { clearInterval(timer); timer = setInterval(() => go(active + 1), 3600); }

  cards.forEach(c => c.onclick = () => { go(+c.dataset.i); restart(); });
  dots.forEach(d => d.onclick = () => { go(+d.dataset.i); restart(); });

  layout();
  restart();
</script>
</body>
</html>
