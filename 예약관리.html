<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>예약관리 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="booking.js"></script>
<style>
  :root { --accent:#06c4a0; --book:#06c4a0; --deep:#037a64; --ink:#0f2e27; --sub:#5a716b; --muted:#8aa39c; --line:#eaf0ee; --soft:#f1f9f7; --bookSoft:#dcf4ee; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:#f6faf9; color:var(--ink); padding-bottom:90px; }

  header { position:sticky; top:0; z-index:20; background:#fff; border-bottom:1px solid var(--line);
    padding:14px 28px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:18px; font-weight:800; letter-spacing:-0.02em; }
  header h1 b { color:var(--accent); }
  .who { font-size:13px; color:var(--sub); font-weight:600; }
  .who b { color:var(--ink); }
  .hd-acts { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }
  .hd-group { display:flex; align-items:center; gap:7px; padding-left:10px; border-left:1px solid var(--line); }
  .hd-label { color:var(--sub); font-size:10.5px; font-weight:800; white-space:nowrap; }
  .hbtn { border:1px solid #e2ebe8; background:#fff; border-radius:10px; padding:9px 14px;
    font:650 13px Pretendard; cursor:pointer; color:#4a615b; text-decoration:none; transition:.14s; }
  .hbtn:hover { border-color:#c9ded8; background:#f8fbfa; color:var(--deep); }
  .hbtn.blue { background:var(--book); border-color:var(--book); color:#fff; }
  .hbtn.danger { color:#c75b52; }

  main { max-width:960px; margin:0 auto; padding:24px 20px; display:flex; flex-direction:column; gap:20px; }
  section.card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:22px 26px; box-shadow:0 4px 14px rgba(15,46,39,.04); }
  .sec-h { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .sec-h h2 { font-size:15.5px; font-weight:800; display:flex; align-items:center; gap:8px; }
  .sec-h h2 .n { min-width:24px; height:24px; padding:0 9px; border-radius:7px; background:var(--accent); color:#fff; font-size:11px;
    display:inline-flex; align-items:center; justify-content:center; }

  /* 예약 업무 진행 단계 */
  .workflow-card { padding:0 !important; overflow:hidden; border-color:var(--line) !important; box-shadow:0 4px 14px rgba(15,46,39,.04); }
  .workflow-head { padding:20px 22px 17px; display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; }
  .workflow-eyebrow { display:inline-flex; color:#fff; background:var(--accent); border-radius:6px; padding:4px 9px; font-size:11px; font-weight:800; margin-bottom:7px; }
  .workflow-head h2 { font-size:19px; letter-spacing:-.025em; }
  .workflow-count { padding:6px 11px; border-radius:999px; background:var(--bookSoft); color:#04836b; font-size:12px; font-weight:800; }
  .workflow-steps { display:grid; grid-template-columns:repeat(5,1fr); padding:0 22px 20px; }
  .workflow-step { position:relative; min-width:0; text-align:center; color:#9aa8a4; }
  .workflow-step::before { content:""; position:absolute; top:17px; left:-50%; width:100%; height:2px; background:#e6ecea; z-index:0; }
  .workflow-step:first-child::before { display:none; }
  .workflow-step.done::before, .workflow-step.current::before { background:#75dac6; }
  .workflow-dot { position:relative; z-index:1; width:34px; height:34px; margin:0 auto 8px; border:2px solid #e0e7e5; border-radius:50%;
    display:flex; align-items:center; justify-content:center; background:#fff; font-size:12px; font-weight:900; }
  .workflow-step.done { color:#08745f; }
  .workflow-step.done .workflow-dot { border-color:var(--accent); background:var(--accent); color:#fff; }
  .workflow-step.current { color:var(--deep); }
  .workflow-step.current .workflow-dot { border-color:var(--accent); background:var(--accent); color:#fff; box-shadow:0 0 0 5px var(--bookSoft); }
  .workflow-label { display:block; font-size:11.5px; line-height:1.35; font-weight:850; white-space:nowrap; }
  .workflow-state { display:block; margin-top:3px; font-size:10px; font-weight:700; color:var(--sub); white-space:nowrap; }
  .next-task { margin:0 22px 22px; border-radius:13px; padding:16px 17px; background:#edfbf7;
    border:1px solid #d9eee9; display:flex; align-items:center; gap:14px; }
  .next-task-icon { width:44px; height:44px; border-radius:12px; background:#dcf4ee; color:var(--deep); display:flex; align-items:center; justify-content:center;
    flex:none; font-size:21px; box-shadow:none; }
  .next-task-copy { flex:1; min-width:0; }
  .next-task-copy small { display:block; color:#04836b; font-size:11px; font-weight:900; margin-bottom:4px; }
  .next-task-copy b { display:block; font-size:15px; line-height:1.35; }
  .next-task-copy p { margin-top:4px; color:#5a8f82; font-size:12px; line-height:1.45; }
  .next-task button { flex:none; border:0; border-radius:10px; padding:11px 16px; background:var(--accent); color:#fff; font:800 13px Pretendard; cursor:pointer; box-shadow:0 6px 14px rgba(6,196,160,.25); }
  .next-task.waiting { background:#fff9ef; border-color:#f0dac0; }
  .next-task.waiting .next-task-icon, .next-task.waiting small { color:#a46219; }
  .next-task.complete { background:#f1fbf7; border-color:#bfe6d9; }
  .next-task.complete .next-task-icon, .next-task.complete small { color:#08745f; }
  .sec-h .tip { font-size:12px; color:var(--sub); }

  label.f { display:flex; flex-direction:column; gap:5px; font-size:12px; font-weight:700; color:var(--sub); }
  label.f input, label.f select, label.f textarea { font:600 13.5px Pretendard; color:var(--ink);
    border:1px solid #e2ebe8; border-radius:9px; padding:9px 11px; background:#fff; width:100%; outline:none; transition:.14s; }
  label.f input:focus, label.f select:focus, label.f textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(6,196,160,.1); }
  label.f textarea { resize:vertical; min-height:64px; line-height:1.6; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .grid4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; }
  @media (max-width:640px){ .grid3,.grid4 { grid-template-columns:1fr 1fr; } }

  /* 일정 카드 */
  .day { border:1px solid var(--line); border-radius:13px; overflow:hidden; margin-bottom:12px; }
  .day-h { display:flex; align-items:center; gap:10px; background:var(--soft); padding:10px 14px; }
  .day-h .dn { background:var(--accent); color:#fff; font-size:12px; font-weight:800; padding:4px 11px; border-radius:8px; flex:none; }
  .day-h input { flex:1; border:none; background:transparent; font:800 14.5px Pretendard; color:var(--ink); min-width:80px; }
  .day-h .del { border:none; background:transparent; color:#c66; cursor:pointer; font-size:15px; padding:4px; }
  .day-b { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }

  .subtt { font-size:12.5px; font-weight:800; color:#213a34; margin-bottom:8px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .pick { font:700 12px Pretendard; color:#04836b; background:#edf5f2;
    border:1px solid #d9eee9; border-radius:9px; padding:7px 10px; cursor:pointer; max-width:220px; }
  .assign-box { border:1px solid #e7f1ee; border-radius:14px; padding:16px; background:#fcfefd; }
  .assign-box + .assign-box { margin-top:12px; }
  .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .sum-card { border:1px solid var(--line); border-radius:14px; background:#fff; padding:14px; min-height:86px; }
  .sum-card .k { color:var(--sub); font-size:11.5px; font-weight:800; }
  .sum-card .v { margin-top:8px; color:var(--ink); font-size:20px; font-weight:900; line-height:1.15; }
  .sum-card .s { margin-top:6px; color:var(--sub); font-size:12px; font-weight:700; line-height:1.45; }
  .sum-card.ok { background:#e4f7f2; border-color:#c9ede3; }
  .sum-card.warn { background:#f1f9f7; border-color:#d9eee9; }
  .miss { margin-top:12px; display:flex; gap:7px; flex-wrap:wrap; }
  .miss span { background:#dcf4ee; border:1px solid #c9ede3; color:#037a64; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:800; }
  .preview { margin-top:12px; border:1px solid #dce8e4; background:#f8fbfa; border-radius:12px; padding:12px; display:flex; gap:12px; align-items:center; min-height:78px; }
  .preview .thumb { width:58px; height:58px; border-radius:12px; background:#edf5f2; color:var(--deep); display:flex; align-items:center; justify-content:center; flex:none; overflow:hidden; font-weight:900; }
  .preview .thumb img { width:100%; height:100%; object-fit:cover; }
  .preview b { display:block; font-size:14px; }
  .preview p { margin-top:4px; color:var(--sub); font-size:12.5px; line-height:1.45; font-weight:600; }
  .quick-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .edit-panel { margin-top:10px; border:1px solid var(--line); border-radius:12px; background:#fff; overflow:hidden; }
  .edit-panel summary { cursor:pointer; padding:10px 12px; color:#04836b; font-size:12.5px; font-weight:900; list-style:none; }
  .edit-panel summary::-webkit-details-marker { display:none; }
  .edit-panel summary::after { content:"열기"; float:right; color:var(--sub); font-weight:800; }
  .edit-panel[open] summary::after { content:"닫기"; }
  .edit-body { padding:0 12px 12px; }

  .lodge-row { border:1px solid #e7f1ee; border-radius:14px; padding:16px; margin-bottom:12px; background:#fcfefd; }
  .lodge-fields { display:grid; grid-template-columns:64px 1fr 130px; gap:8px; align-items:end; }
  .del-lodge { border:none; background:#fff1f0; color:#c75b52; border-radius:9px; padding:7px 11px; cursor:pointer; font-weight:900; flex:none; }

  .chk { display:flex; align-items:center; gap:9px; font-size:13.5px; font-weight:600; padding:9px 0;
    border-bottom:1px dashed var(--line); cursor:pointer; }
  .chk:last-of-type { border-bottom:none; }
  .chk input { width:17px; height:17px; accent-color:var(--accent); }

  .addbtn { border:1.5px dashed #c9ded8; background:#fff; color:#04836b; border-radius:10px;
    padding:10px; font:700 13px Pretendard; cursor:pointer; width:100%; }

  /* 하단 저장 바 */
  .savebar { position:fixed; left:0; right:0; bottom:0; z-index:30; background:rgba(255,255,255,.97); border-top:1px solid var(--line);
    padding:10px 18px; display:flex; align-items:center; gap:16px; justify-content:center; box-shadow:0 -8px 28px rgba(22,38,31,.06); backdrop-filter:blur(10px); }
  .save-context { width:220px; line-height:1.35; }
  .save-context small { display:block; color:#04836b; font-size:10.5px; font-weight:900; }
  .save-context b { display:block; margin-top:2px; font-size:12px; }
  .save-actions { display:flex; align-items:center; gap:9px; }
  .savebar .opt { display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:var(--sub); cursor:pointer; }
  .savebar .opt input { accent-color:var(--book); width:16px; height:16px; }
  #saveBtn { background:var(--accent); color:#fff; border:none; border-radius:11px; padding:13px 34px;
    font:800 15px Pretendard; cursor:pointer; box-shadow:0 6px 14px rgba(6,196,160,.3); }
  #saveBtn.secondary { background:#fff; color:#04836b; border:1px solid #d9eee9; box-shadow:none; }
  .savebar .barbtn { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:11px; padding:12px 15px; font:800 13px Pretendard; cursor:pointer; text-decoration:none; }
  .savebar .barbtn.primary { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 6px 14px rgba(6,196,160,.25); }
  .savebar .barbtn:disabled { opacity:.48; cursor:not-allowed; box-shadow:none; }
  .savebar .barbtn.danger { color:#c75b52; }
  .bar-more { position:relative; }
  .bar-more summary { width:42px; height:42px; display:flex; align-items:center; justify-content:center; border:1px solid var(--line); border-radius:11px; cursor:pointer; font-size:19px; list-style:none; }
  .bar-more summary::-webkit-details-marker { display:none; }
  .bar-more-menu { position:absolute; right:0; bottom:52px; width:150px; padding:8px; background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 12px 30px rgba(22,38,31,.15); }
  .bar-more-menu .barbtn { width:100%; }
  #bookingInfoSection, #assignmentSection { scroll-margin-top:82px; }
  .focus-pulse { animation:focusPulse 1.15s ease; }
  @keyframes focusPulse { 0%,100% { box-shadow:none; } 45% { box-shadow:0 0 0 5px rgba(6,196,160,.16); } }

  #toast { position:fixed; bottom:86px; left:50%; transform:translateX(-50%) translateY(16px);
    background:var(--ink); color:#fff; font-size:13.5px; font-weight:700; padding:11px 20px; border-radius:12px;
    opacity:0; pointer-events:none; transition:.25s; z-index:40; }
  #toast.on { opacity:1; transform:translateX(-50%); }

  /* 브라우저 기본 confirm 대신 사용하는 예약관리 공통 확인창 */
  .confirm-layer { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    padding:20px; background:rgba(17,35,45,.46); backdrop-filter:blur(3px); opacity:0; visibility:hidden; transition:.18s; }
  .confirm-layer.on { opacity:1; visibility:visible; }
  .confirm-card { width:min(420px,100%); padding:28px; border:1px solid rgba(255,255,255,.75); border-radius:22px;
    background:#fff; box-shadow:0 24px 70px rgba(17,35,45,.24); text-align:center; transform:translateY(10px) scale(.98); transition:.18s; }
  .confirm-layer.on .confirm-card { transform:none; }
  .confirm-icon { width:52px; height:52px; margin:0 auto 16px; border-radius:16px; display:flex; align-items:center;
    justify-content:center; background:#dcf4ee; color:var(--deep); font-size:24px; font-weight:900; }
  .confirm-card.danger .confirm-icon { background:#fff0ee; color:#c75b52; }
  .confirm-title { margin:0; color:var(--ink); font-size:20px; line-height:1.35; letter-spacing:-.02em; }
  .confirm-message { margin:10px 0 24px; color:var(--sub); font-size:14px; line-height:1.65; white-space:pre-line; word-break:keep-all; }
  .confirm-actions { display:grid; grid-template-columns:1fr 1.35fr; gap:10px; }
  .confirm-actions button { min-height:46px; border-radius:12px; font:800 14px Pretendard; cursor:pointer; }
  .confirm-cancel { border:1px solid var(--line); background:#fff; color:var(--sub); }
  .confirm-ok { border:0; background:var(--accent); color:#fff; box-shadow:0 6px 14px rgba(6,196,160,.25); }
  .confirm-card.danger .confirm-ok { background:#c75b52; box-shadow:0 8px 20px rgba(199,91,82,.22); }
  .confirm-actions button:focus-visible { outline:3px solid rgba(6,196,160,.22); outline-offset:2px; }

  .empty { text-align:center; padding:60px 20px; color:var(--sub); }
  .empty h2 { font-size:19px; color:var(--ink); margin-bottom:8px; }

  /* 일정 불러오기 (코스관리 스니펫) — 견적만들기와 동일 */
  .snip-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .snip-sel { width:auto; min-width:180px; padding:8px 12px; border:1.5px solid var(--accent); border-radius:9px; background:var(--soft); color:var(--accent); font:700 12.5px Pretendard; cursor:pointer; }
  .snip-hint { font-size:11px; color:var(--sub); }
  /* 대표 명소 선택기 — 견적만들기와 동일 */
  .spot-cat { margin-top:16px; }
  .spot-cat:first-child { margin-top:0; }
  .spot-cat-head { display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:800; color:var(--accent); margin-bottom:9px; }
  .spot-cat-head .ln { flex:1; height:1px; background:var(--line); }
  .spot-cat-head .cc { font-size:11px; font-weight:700; color:var(--sub); }
  .spot-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:9px; }
  .spot-chk { display:flex; align-items:center; gap:9px; border:1.5px solid var(--line); border-radius:11px; padding:11px 13px; cursor:pointer; transition:.12s; }
  .spot-chk:hover { border-color:var(--accent); }
  .spot-chk.on { border-color:var(--accent); background:var(--soft); }
  .spot-chk .box { width:20px; height:20px; border-radius:6px; border:1.5px solid #c7d0cd; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; }
  .spot-chk.on .box { background:var(--accent); border-color:var(--accent); }
  .spot-chk b { font-size:13.5px; }
  .spot-chk small { display:block; font-size:11px; color:var(--sub); }
  .spot-order { margin-left:auto; font-size:11px; font-weight:800; color:var(--accent); }
  @media (max-width:760px){
    header { padding:12px 14px; }
    main { padding:14px 10px; }
    section.card { padding:16px; }
    .summary { grid-template-columns:1fr 1fr; }
    .lodge-fields { grid-template-columns:56px 1fr; }
    .lodge-fields label:nth-of-type(3) { grid-column:1 / -1; }
    .hd-group { width:100%; padding:8px 0 0; border-left:0; border-top:1px solid var(--line); overflow-x:auto; }
    .workflow-steps { overflow-x:auto; grid-template-columns:repeat(5,100px); padding-bottom:18px; }
    .next-task { align-items:flex-start; flex-wrap:wrap; }
    .next-task button { width:100%; }
    .savebar { justify-content:stretch; gap:8px; padding:9px 10px; }
    .save-context { display:none; }
    .save-actions { flex:1; min-width:0; }
    #saveBtn, .savebar .barbtn:not(.danger) { flex:1; text-align:center; padding-left:8px; padding-right:8px; }
    .savebar .barbtn[style*="display: none"] { display:none !important; }
    .confirm-card { padding:24px 20px 20px; border-radius:18px; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 예약관리 <b id="hName"></b></h1>
  <span class="who" id="hMeta"></span>
  <span class="hd-acts">
    <a class="hbtn" href="예약목록.html">← 예약 목록</a>
    <span class="hd-group"><span class="hd-label">고객 화면·공유</span>
      <a class="hbtn" id="confirmLink" href="#" target="_blank">🎫 확정일정표</a>
      <a class="hbtn" id="contractLink" href="#">📜 여행계약서</a>
      <button class="hbtn" id="copyLinkBtn">🔗 링크 복사</button>
    </span>
  </span>
</header>

<main id="main"></main>

<div class="savebar" id="savebar" style="display:none">
  <span class="save-context"><small id="bottomStep">현재 단계</small><b id="bottomTask">예약정보를 확인해 주세요</b></span>
  <input type="checkbox" id="setStatus" hidden>
  <input type="checkbox" id="publishSchedule" hidden>
  <span class="save-actions">
    <button class="barbtn" id="depositRequestBtn">💳 예약금 안내</button>
    <button class="barbtn" id="contractRequestBtn">✍ 계약서 요청</button>
    <button class="barbtn" id="confirmBookingBtn">✓ 예약 확정</button>
    <button class="barbtn" id="publishBtn">🎫 일정표 공개</button>
    <button id="saveBtn">💾 임시 저장</button>
    <details class="bar-more"><summary title="기타 작업">⋯</summary><div class="bar-more-menu"><button class="barbtn danger" id="undoBtn">↩ 되돌리기</button></div></details>
  </span>
</div>
<div id="toast"></div>
<div class="confirm-layer" id="confirmLayer" aria-hidden="true">
  <div class="confirm-card" id="confirmCard" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
    <div class="confirm-icon" id="confirmIcon" aria-hidden="true">?</div>
    <h2 class="confirm-title" id="confirmTitle">확인해 주세요</h2>
    <p class="confirm-message" id="confirmMessage"></p>
    <div class="confirm-actions">
      <button type="button" class="confirm-cancel" id="confirmCancel">취소</button>
      <button type="button" class="confirm-ok" id="confirmOk">확인</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const noBr = s => String(s ?? "").replace(/<br\s*\/?>/gi, " ").trim();
let toastT;
const toast = m => { $("toast").textContent = m; $("toast").classList.add("on"); clearTimeout(toastT); toastT = setTimeout(()=>$("toast").classList.remove("on"), 2400); };
let confirmDone = null;
function askConfirm({ title="확인해 주세요", message="", confirmText="확인", cancelText="취소", icon="?", tone="primary" } = {}) {
  if (confirmDone) confirmDone(false);
  const layer = $("confirmLayer"), card = $("confirmCard");
  $("confirmTitle").textContent = title;
  $("confirmMessage").textContent = message;
  $("confirmIcon").textContent = icon;
  $("confirmOk").textContent = confirmText;
  $("confirmCancel").textContent = cancelText;
  card.classList.toggle("danger", tone === "danger");
  layer.classList.add("on"); layer.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  return new Promise(resolve => {
    const finish = answer => {
      if (confirmDone !== finish) return;
      confirmDone = null;
      layer.classList.remove("on"); layer.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      document.removeEventListener("keydown", onKey);
      resolve(answer);
    };
    const onKey = e => { if (e.key === "Escape") finish(false); };
    confirmDone = finish;
    $("confirmCancel").onclick = () => finish(false);
    $("confirmOk").onclick = () => finish(true);
    layer.onclick = e => { if (e.target === layer) finish(false); };
    document.addEventListener("keydown", onKey);
    requestAnimationFrame(() => $("confirmOk").focus());
  });
}
const moneyTxt = n => Number(n || 0) ? `₩${Number(n).toLocaleString("ko-KR")}` : "-";
const infoCell = (k, v) => `<div class="sum-card"><div class="k">${esc(k)}</div><div class="v" style="font-size:15px;line-height:1.35;word-break:break-word;">${esc(v || "-")}</div></div>`;

/* ── 진입 정보 (대시보드에서 전달) ── */
let PRE = null;
try { PRE = JSON.parse(localStorage.getItem("leaders_booking_prefill") || "null"); } catch (e) {}
const ADMIN_TOKEN = (PRE && PRE.adminToken) || sessionStorage.getItem("leaders_admin_token") || "";
if (ADMIN_TOKEN) sessionStorage.setItem("leaders_admin_token", ADMIN_TOKEN);

/* 진입 분기는 스크립트 맨 아래에서 실행 (함수·상태 선언 이후) */

/* ══════════ 편집 상태 ══════════ */
let BK = null;   // booking 편집본
let SAVED_BK_JSON = "";

/* booking 표준 틀·정규화·견적 승계 로직은 booking.js에서 공유
   (blankBooking / normBooking / daysFromQuote / seedBookingFromQuote) — admin 확정 트리거와 동일본 사용 */

function init() {
  BK = PRE.booking ? normBooking(PRE.booking) : seedBookingFromQuote(PRE);
  if (PRE.booking && PRE.booking.publishStatus == null && PRE.status === "예약확정") {
    BK.publishStatus = "published";   // 공개 상태 필드 도입 전 확정 예약 호환
  }
  const qm = quoteMoney(PRE);
  BK.contractInfo = {
    ...BK.contractInfo,
    productName: BK.contractInfo.productName || PRE.destination || "",
    region: BK.contractInfo.region || PRE.destination || "",
    totalAmount: BK.contractInfo.totalAmount || qm.totalAmount,
    depositAmount: BK.contractInfo.depositAmount || qm.depositAmount,
    depositStatus: BK.contractInfo.depositStatus || (BK.checklist.deposit ? "입금완료" : "미입금"),
    balanceAmount: BK.contractInfo.balanceAmount || qm.balanceAmount,
    balanceStatus: BK.contractInfo.balanceStatus || (BK.checklist.balance ? "입금완료" : "미수령"),
    cashReceipt: BK.contractInfo.cashReceipt || "",
    bankName: BK.contractInfo.bankName || DEFAULT_DEPOSIT_ACCOUNT.bankName,
    accountNumber: BK.contractInfo.accountNumber || DEFAULT_DEPOSIT_ACCOUNT.accountNumber,
    accountHolder: BK.contractInfo.accountHolder || DEFAULT_DEPOSIT_ACCOUNT.accountHolder,
  };
  BK.flight = {
    ...BK.flight,
    inDate: BK.flight.inDate || PRE.depart || "",
    outDate: BK.flight.outDate || PRE.return_ || "",
  };
  // 대표 명소: booking에 없으면 발행된 견적의 명소를 초기값으로 (선택기에 미리 체크됨)
  if (!BK.highlights.length && PRE.quote && Array.isArray(PRE.quote.highlights)) {
    BK.highlights = JSON.parse(JSON.stringify(PRE.quote.highlights));
  }
  SAVED_BK_JSON = JSON.stringify(BK);
  const paxTot = (PRE.adult||0)+(PRE.child||0)+(PRE.infant||0);
  $("hName").textContent = PRE.name || "-";
  $("hMeta").textContent = `${PRE.destination || "-"} · ${PRE.depart || "?"} ~ ${PRE.return_ || "?"} · ${paxTot}명 · 현재상태 [${PRE.status}]`;
  $("confirmLink").href = PRE.token ? "확정일정표.html?t=" + encodeURIComponent(PRE.token) : "#";
  $("contractLink").href = PRE.token ? "계약서.html?t=" + encodeURIComponent(PRE.token) + "&adminId=" + encodeURIComponent(PRE.id) + "&return=manage" : "#";
  $("undoBtn").onclick = resetToSaved;
  $("copyLinkBtn").onclick = () => {
    copyCustomerLink();
  };
  $("setStatus").checked = false;
  $("publishSchedule").checked = BK.publishStatus === "published";
  $("savebar").style.display = "";
  render();
  /* 미저장 감지 기준(SAVED_BK_JSON)은 pullForm 정규형으로 — 원시 데이터와 폼 수집형의
     구조 차이(숙소 이미지 자동첨부·계약 체크 자동화 등)가 dirty로 오탐되지 않게 */
  pullForm(); SAVED_BK_JSON = JSON.stringify(BK);
  loadLibs().then(() => { pullForm(); SAVED_BK_JSON = JSON.stringify(BK); });   // 라이브러리 폴백 반영 후 재스냅샷
}

function copyCustomerLink() {
  if (!PRE.token) return toast("고객 토큰이 없는 요청이에요");
  const link = location.origin + "/" + encodeURI("내견적.html") + "?t=" + PRE.token;
  navigator.clipboard.writeText(link).then(()=>toast("고객 링크 복사 — 카톡으로 보내세요")).catch(()=>toast("복사 실패"));
}

async function resetToSaved() {
  if (!SAVED_BK_JSON) return toast("되돌릴 저장본이 없어요");
  if (!await askConfirm({ title:"변경 내용을 되돌릴까요?", message:"저장하지 않은 변경은 사라지고 마지막 저장 상태로 돌아갑니다.", confirmText:"되돌리기", icon:"↩", tone:"danger" })) return;
  BK = normBooking(JSON.parse(SAVED_BK_JSON));
  $("publishSchedule").checked = BK.publishStatus === "published";
  render();
  toast("마지막 저장 상태로 되돌렸어요");
}

function assignStats() {
  const a = BK.assign || {};
  const days = BK.days || [];
  const guideOk = !!(a.guide && a.guide.name);
  const vehicleOk = !!(a.vehicle && a.vehicle.model);
  const lodgeCount = (a.lodges || []).filter(l => l && l.name).length;
  /* 필요 숙소 수: 일정표에서 숙소가 지정된 일수 기준 (마지막 날은 보통 귀국이라 숙소 없음).
     일정표에 숙소가 하나도 지정 안 됐으면 (일수 - 1) 폴백 */
  const stayDays = days.filter(d => { const n = noBr((d.stay || {}).name); return n && n !== "숙소미포함"; }).length;
  const maxNights = Math.max(days.length - 1, 0);
  const lodgeNeeded = days.length ? Math.min(stayDays || maxNights, maxNights) : 0;
  const signed = !!(BK.contract && BK.contract.signedAt);
  const checklistDone = Object.values(BK.checklist || {}).filter(Boolean).length;
  const missing = [];
  const accepted = !!(PRE.decision && PRE.decision.status === "accepted") || PRE.status === "예약확정";
  if (!accepted) missing.push("고객 수락 미확인");
  if (!days.length) missing.push("확정 일정 없음");
  if (!guideOk) missing.push("가이드 미배정");
  if (!vehicleOk) missing.push("차량 미배정");
  if (lodgeNeeded && lodgeCount < lodgeNeeded) missing.push(`숙소 ${lodgeNeeded - lodgeCount}일 미배정`);
  if (!signed) missing.push("계약 미서명");
  if (!BK.contractInfo || BK.contractInfo.depositStatus !== "입금완료") missing.push("예약금 미입금");
  return { guideOk, vehicleOk, lodgeCount, lodgeNeeded, signed, checklistDone, missing };
}

function workflowUi() {
  const ci = BK.contractInfo || {};
  const st = assignStats();
  const accepted = !!(PRE.decision && PRE.decision.status === "accepted") || PRE.status === "예약확정";
  const prepared = !!BK.preparedAt;
  const depositSent = !!(BK.depositRequest && BK.depositRequest.status === "requested");
  const depositReported = !!(BK.depositReport && BK.depositReport.status === "reported");
  const paid = ci.depositStatus === "입금완료";
  const contractSent = !!(BK.contractRequest && BK.contractRequest.status === "requested");
  const signed = !!(BK.contract && BK.contract.signedAt);
  const confirmed = PRE.status === "예약확정";
  const published = BK.publishStatus === "published";
  const operationsReady = !!BK.days.length && st.guideOk && st.vehicleOk && (!st.lodgeNeeded || st.lodgeCount >= st.lodgeNeeded);
  /* 예약정보 준비는 고객 수락 시 자동 승계되므로 단계로 보여주지 않습니다.
     (견적에 예약금이 없어 자동 준비가 안 된 경우에만 아래 task가 예약정보 작성을 안내) */
  const steps = [
    { label:"고객 수락", done:accepted, detail:accepted ? "완료" : "대기" },
    { label:"예약금", done:paid, detail:paid ? "입금완료" : (depositReported ? "신고됨·확인 필요" : depositSent ? "입금 대기" : "안내 전") },
    { label:"계약서", done:signed, detail:signed ? "서명완료" : (contractSent ? "서명 대기" : "요청 전") },
    { label:"예약 확정", done:confirmed, detail:confirmed ? "완료" : "확정 전" },
    { label:"일정표", done:published, detail:published ? "공개됨" : (operationsReady ? "공개 준비" : "배정 필요") },
  ];
  let active = published ? 5 : !accepted ? 1 : !paid ? 2 : !signed ? 3 : !confirmed ? 4 : 5;
  let task;
  if (!accepted) task = { icon:"⏳", title:"고객의 예약 진행 의사를 기다리고 있습니다", desc:"고객이 카톡·전화로 예약 진행 의사를 밝히면 견적 문의 화면에서 ‘예약 진행 기록’을 눌러 주세요.", action:"none", button:"", tone:"waiting" };
  else if (!prepared) task = { icon:"📝", title:"예약 기본정보를 작성해 주세요", desc:"여행자·항공·금액 정보를 확인하고 먼저 내부 저장해 주세요.", action:"bookingInfo", button:"예약정보 작성하기", tone:"" };
  else if (!paid && !depositSent) task = { icon:"💳", title:"고객에게 예약금 안내를 표시해 주세요", desc:"저장된 예약금과 계좌정보를 확인한 뒤 고객 페이지에 입금 안내를 표시합니다.", action:"deposit", button:"예약금 안내 표시하기", tone:"" };
  else if (!paid && depositReported) task = { icon:"💳", title:`입금 신고를 확인해 주세요 (입금자명 ${(BK.depositReport && BK.depositReport.name) || "-"})`, desc:"고객이 입금 완료를 알렸습니다. 계좌에서 입금을 확인한 뒤 누르면 입금완료로 저장되고 계약서 서명·여행자 정보 요청이 고객 페이지에 표시됩니다.", action:"confirmDeposit", button:"입금 확인 완료 (자동 진행)", tone:"" };
  else if (!paid) task = { icon:"💳", title:"예약금 입금을 확인해 주세요", desc:"고객 화면에 입금 안내가 표시되었습니다. 고객이 카톡으로 입금을 알리면 계좌 확인 후 아래 버튼을 눌러 주세요 — 입금완료 저장과 계약서·여행자 정보 요청이 한 번에 진행됩니다.", action:"confirmDeposit", button:"입금 확인 완료 (자동 진행)", tone:"waiting" };
  else if (!signed && !contractSent) task = { icon:"✍", title:"고객에게 계약서 서명을 요청해 주세요", desc:"예약금 입금이 확인되어 계약서 요청을 보낼 수 있습니다.", action:"contract", button:"계약서 요청 보내기", tone:"" };
  else if (!signed) task = { icon:"⏳", title:"고객의 계약서 서명을 기다리고 있습니다", desc:"서명 요청이 발송되었습니다. 필요하면 계약서 요청을 다시 보낼 수 있습니다.", action:"contract", button:"계약서 요청 재전송", tone:"waiting" };
  else if (!confirmed) task = { icon:"✓", title:"예약을 최종 확정해 주세요", desc:"예약금 입금과 계약서 서명이 모두 확인되었습니다.", action:"confirm", button:"예약 확정하기", tone:"" };
  else if (!published && !operationsReady) {
    const opsMissing = st.missing.filter(m => !["고객 수락 미확인", "계약 미서명", "예약금 미입금"].includes(m));
    task = { icon:"🧭", title:"확정 일정과 배정 정보를 완성해 주세요", desc:`현재 누락: ${opsMissing.join(" · ") || "운영 배정 확인"}. 입력 후 ‘배정정보 저장’을 눌러야 일정표 공개 버튼이 열립니다.`, action:"assign", button:"누락 배정 입력하기", tone:"waiting" };
  }
  else if (!published) task = { icon:"🎫", title:"고객에게 확정 일정표를 공개해 주세요", desc:"운영 배정이 완료되어 최종 일정표를 공개할 수 있습니다.", action:"publish", button:"일정표 공개하기", tone:"" };
  else task = { icon:"✓", title:"예약 절차가 모두 완료되었습니다", desc:"고객이 확정 일정표를 확인할 수 있습니다. 변경 사항은 저장 후 다시 확인해 주세요.", action:"openSchedule", button:"고객 일정표 보기", tone:"complete" };
  return { steps, active, task, accepted, prepared, depositSent, paid, contractSent, signed, confirmed, published, operationsReady };
}

function summaryHtml() {
  const st = assignStats();
  const wf = workflowUi();
  const days = BK.days.length;
  const lodgeTotal = st.lodgeNeeded || st.lodgeCount;
  const ci = BK.contractInfo || {};
  const depositRequested = BK.depositRequest && BK.depositRequest.status === "requested";
  const depositPaid = ci.depositStatus === "입금완료";
  const contractRequested = BK.contractRequest && BK.contractRequest.status === "requested";
  return `<section class="card workflow-card">
    <div class="workflow-head"><div><div class="workflow-eyebrow">예약 진행 순서</div><h2>지금 해야 할 작업을 순서대로 진행하세요</h2></div><span class="workflow-count">${wf.published ? "모든 단계 완료" : `${wf.active}/${wf.steps.length}단계 진행 중`}</span></div>
    <div class="workflow-steps">
      ${wf.steps.map((step, i) => `<div class="workflow-step ${step.done ? "done" : (i + 1 === wf.active ? "current" : "locked")}">
        <span class="workflow-dot">${step.done ? "✓" : i + 1}</span><span class="workflow-label">${esc(step.label)}</span><span class="workflow-state">${esc(step.detail)}</span>
      </div>`).join("")}
    </div>
    <div class="next-task ${wf.task.tone}"><span class="next-task-icon">${wf.task.icon}</span><div class="next-task-copy"><small>${wf.published ? "진행 완료" : "지금 할 일"}</small><b>${esc(wf.task.title)}</b><p>${esc(wf.task.desc)}</p></div>${wf.task.button ? `<button type="button" id="nextActionBtn" data-action="${wf.task.action}">${esc(wf.task.button)}</button>` : ""}</div>
  </section>
  <section class="card">
    <div class="sec-h">
      <h2><span class="n">현황</span>운영 준비 상태</h2>
      <span class="tip">출발 전 누락 항목을 먼저 확인하세요</span>
    </div>
    <div class="summary">
      <div class="sum-card ${days ? "ok" : "warn"}"><div class="k">확정 일정</div><div class="v">${days}일</div><div class="s">${days ? "일정표 편집 가능" : "견적 일정 불러오기 필요"}</div></div>
      <div class="sum-card ${st.guideOk && st.vehicleOk ? "ok" : "warn"}"><div class="k">가이드·차량</div><div class="v">${st.guideOk && st.vehicleOk ? "완료" : "확인 필요"}</div><div class="s">가이드 ${st.guideOk ? "완료" : "미정"} · 차량 ${st.vehicleOk ? "완료" : "미정"}</div></div>
      <div class="sum-card ${lodgeTotal && st.lodgeCount >= lodgeTotal ? "ok" : "warn"}"><div class="k">일자별 숙소</div><div class="v">${st.lodgeCount}/${lodgeTotal || 0}</div><div class="s">${lodgeTotal ? "숙박 일수 기준 (귀국일 제외)" : "일정 등록 후 확인"}</div></div>
      <div class="sum-card ${depositPaid ? "ok" : "warn"}"><div class="k">예약금·계약</div><div class="v">${depositPaid ? (st.signed ? "서명완료" : (contractRequested ? "서명 대기" : "입금확인")) : (depositRequested ? "입금 대기" : "안내 전")}</div><div class="s">${moneyTxt(ci.depositAmount)} · 체크 ${st.checklistDone}/5</div></div>
    </div>
    ${st.missing.length ? `<div class="miss">${st.missing.map(x => `<span>${esc(x)}</span>`).join("")}</div>` : `<div class="miss"><span style="background:#f1fbf7;border-color:#bfe6d9;color:#0a6a5e;">필수 항목 완료</span></div>`}
  </section>`;
}

function previewHtml(type, rec) {
  rec = rec || {};
  if (type === "guide" && rec.name && LIBS.guides[rec.name]) {
    const lib = LIBS.guides[rec.name];
    rec = {
      ...rec,
      img: rec.img || lib.img || "",
      desc: rec.desc || lib.desc || "",
      nameEn: rec.nameEn || lib.nameEn || "",
      role: rec.role || lib.role || "",
    };
  }
  if (type === "vehicle" && rec.model && LIBS.vehicles[rec.model]) {
    const lib = LIBS.vehicles[rec.model];
    rec = {
      ...rec,
      img: rec.img || lib.img || "",
      imgs: (Array.isArray(rec.imgs) && rec.imgs.length) ? rec.imgs : (Array.isArray(lib.imgs) ? lib.imgs : []),
      desc: rec.desc || lib.desc || "",
    };
  }
  const name = rec && (rec.name || rec.model);
  const img = rec && rec.img;
  const imgs = rec && Array.isArray(rec.imgs) ? rec.imgs.length : (img ? 1 : 0);
  const title = name || (type === "guide" ? "가이드 미선택" : "차량 미선택");
  const sub = type === "guide"
    ? [rec.nameEn, rec.role, rec.desc].filter(Boolean).join(" · ")
    : [rec.seats, rec.desc, imgs ? `이미지 ${imgs}장` : ""].filter(Boolean).join(" · ");
  const icon = type === "guide" ? "👤" : "🚐";
  return `<div class="preview" id="${type}Preview">
    <div class="thumb">${img ? `<img src="${esc(img)}" alt="${esc(title)}">` : icon}</div>
    <div><b>${esc(title)}</b><p>${esc(sub || "리소스를 선택하면 고객에게 보일 정보와 이미지 상태가 표시됩니다.")}</p></div>
  </div>`;
}
function lodgePreviewHtml(l, i) {
  const lib = LIBS.lodges[l.name] || {};
  const rec = { ...lib, ...l };
  const img = rec.img || (Array.isArray(rec.imgs) ? rec.imgs[0] : "");
  const imgs = Array.isArray(rec.imgs) ? rec.imgs.length : (img ? 1 : 0);
  const title = rec.name ? `DAY${rec.day || i + 1} · ${rec.name}` : "숙소 미선택";
  const sub = [rec.grade, rec.region, rec.desc || rec.tags, imgs ? `이미지 ${imgs}장` : ""].filter(Boolean).join(" · ");
  return `<div class="preview" id="lodgePreview${i}">
    <div class="thumb">${img ? `<img src="${esc(img)}" alt="${esc(title)}">` : "🏕"}</div>
    <div><b>${esc(title)}</b><p>${esc(sub || "리소스를 선택하면 고객에게 보일 정보와 이미지 상태가 표시됩니다.")}</p></div>
  </div>`;
}

        ${paid ? `<a class="hbtn" href="계약서.html?t=${encodeURIComponent(PRE.token || "")}&adminId=${encodeURIComponent(PRE.id)}&return=manage">📜 계약서 미리보기</a>` : ""}

    <div class="grid2" style="margin-top:14px;">

      <label class="f"><span>내부 메모 (고객에게 안 보임)</span><textarea id="bk_memo" rows="3">${esc(BK.adminMemo)}</textarea></label>

/* ══════════ 폼 → BK 동기화 ══════════ */
function pullForm() {
  // 일정
  document.querySelectorAll(".day").forEach((el, i) => {
    const d = BK.days[i]; if (!d) return;
    const v = k => el.querySelector(`[data-k="${k}"]`)?.value ?? "";
    d.dest = v("dest"); d.move = v("move"); d.dist = v("dist");
    d.items = v("items").split("\n").map(s => s.trim()).filter(Boolean);
    d.stay = { name: v("stayName"), tags: v("stayTags").split(",").map(s => s.trim()).filter(Boolean) };
    d.meals = v("meals").split(",").map(s => s.trim()).filter(Boolean);
    d.d = i + 1;
  });
  // 배정
  const g = id => $(id) ? $(id).value.trim() : "";
  BK.assign.guide = { name:g("g_name"), nameEn:g("g_nameEn"), role:g("g_role"),
                      phone:g("g_phone"), qr:g("g_qr"), img:g("g_img"), desc:g("g_desc") };
  BK.assign.vehicle = { model:g("v_model"), seats:g("v_seats"), plate:g("v_plate"), img:"", imgs:[], desc:"" };
  BK.assign.lodges = [...document.querySelectorAll(".lodge-row")].map(el => {
    const name = el.querySelector('[data-lk="name"]').value.trim();
    const lib = LIBS.lodges[name] || {};   // 라이브러리에 있으면 사진·태그를 고객 확정안내에 함께 노출
    const descCustom = (el.querySelector('[data-lk="desc"]') || {}).value?.trim() || "";
    return {
      day: Number(el.querySelector('[data-lk="day"]').value) || 0,
      name,
      grade: el.querySelector('[data-lk="grade"]').value,
      img: lib.img || "", imgs: Array.isArray(lib.imgs) ? lib.imgs : (lib.img ? [lib.img] : []), tags: lib.tags || "",
      descCustom, desc: descCustom || lib.desc || "",   // 관리자가 입력하면 우선, 비우면 리소스 설명
    };
  }).filter(l => l.name);
  // 차량 사진도 라이브러리에서 자동 첨부 · 특징은 관리자 입력 우선
  const vlib = LIBS.vehicles[BK.assign.vehicle.model] || {};
  if (vlib.img) BK.assign.vehicle.img = vlib.img;
  BK.assign.vehicle.imgs = Array.isArray(vlib.imgs) ? vlib.imgs : (vlib.img ? [vlib.img] : []);
  BK.assign.vehicle.desc = g("v_desc") || vlib.desc || "";
  BK.travelers = [...document.querySelectorAll(".traveler-row")].map(el => ({
    type: (el.querySelector('[data-tk="type"]') || {}).value || "성인",
    nameKo: (el.querySelector('[data-tk="nameKo"]') || {}).value?.trim() || "",
    passportName: (el.querySelector('[data-tk="passportName"]') || {}).value?.trim() || "",
    birth: (el.querySelector('[data-tk="birth"]') || {}).value?.trim() || "",
    phone: (el.querySelector('[data-tk="phone"]') || {}).value?.trim() || "",
    gender: (el.querySelector('[data-tk="gender"]') || {}).value || "",
    passportNo: (el.querySelector('[data-tk="passportNo"]') || {}).value?.trim() || "",
  })).filter(t => t.nameKo || t.passportName || t.phone || t.passportNo);
  BK.flight = { inDate:g("fl_inDate"), inTime:g("fl_inTime"), inNo:g("fl_inNo"),
                outDate:g("fl_outDate"), outTime:g("fl_outTime"), outNo:g("fl_outNo") };
  BK.contractInfo = {
    productName:g("ci_productName"), region:g("ci_region"), cashReceipt:g("ci_cashReceipt"), bankName:g("ci_bankName"), accountNumber:g("ci_accountNumber"), accountHolder:g("ci_accountHolder"), note:$("ci_note") ? $("ci_note").value : "",
    totalAmount:Number(g("ci_totalAmount")) || 0, depositAmount:Number(g("ci_depositAmount")) || 0, depositStatus:g("ci_depositStatus") || "미입금",
    balanceAmount:Number(g("ci_balanceAmount")) || 0, balanceStatus:g("ci_balanceStatus") || "미수령",
  };
  // 체크리스트·메모
  BK.checklist = { deposit:$("c_deposit").checked, balance:$("c_balance").checked, flight:$("c_flight").checked,
                   insurance:$("c_insurance").checked, contract:$("c_contract").checked };
  BK.checklist.deposit = BK.contractInfo.depositStatus === "입금완료";
  BK.checklist.balance = ["입금완료", "현지현금전달", "현장현금전달"].includes(BK.contractInfo.balanceStatus);
  BK.notes = $("bk_notes").value; BK.adminMemo = $("bk_memo").value;
  BK.publishStatus = $("publishSchedule").checked ? "published" : "draft";
}

function bindEvents() {
  const nextAction = $("nextActionBtn");
  if (nextAction) nextAction.onclick = () => runWorkflowAction(nextAction.dataset.action);
  if ($("pullQuote")) $("pullQuote").onclick = async () => {
    if (!PRE.quote) return toast("발행된 견적이 없어요 — 먼저 견적서를 만들어 주세요");
    if (BK.days.length && !await askConfirm({ title:"견적 일정으로 교체할까요?", message:"현재 작성한 확정 일정은 견적서의 일정으로 바뀝니다.", confirmText:"일정 교체하기", icon:"📋" })) return;
    pullForm(); BK.days = daysFromQuote(PRE.quote); render(); toast("견적 일정을 가져왔어요 — 수정 후 저장하세요");
  };
  $("addDay").onclick = () => { pullForm(); BK.days.push({ d:BK.days.length+1, dest:"", move:"", dist:"", items:[], stay:{name:"",tags:[]}, meals:[] }); render(); };
  document.querySelectorAll(".day .del").forEach(b => b.onclick = () => {
    pullForm(); BK.days.splice(Number(b.dataset.del), 1); render();
  });
  /* 일정 불러오기 — 코스관리 스니펫을 이 일차에 그대로 채움 (견적만들기와 동일 로직) */
  document.querySelectorAll(".snip-sel").forEach(sel => sel.onchange = () => {
    const s = SNIPPETS[sel.value]; if (!s) return;
    const i = Number(sel.dataset.i);
    pullForm();
    const dNum = BK.days[i] ? BK.days[i].d : i + 1;
    BK.days[i] = { d:dNum, dest:s.dest||"", move:s.move||"", dist:s.dist||"",
      items:[...(s.items||[])], stay:{ name:(s.stay&&s.stay.name)||"", tags:[...((s.stay&&s.stay.tags)||[])] }, meals:[...(s.meals||[])] };
    render(); toast(`"${sel.value}" 일정을 불러왔어요`);
  });
  $("addLodge").onclick = () => { pullForm(); BK.assign.lodges.push({ day:BK.assign.lodges.length+1, name:"", grade:"" }); render(); };
  document.querySelectorAll("[data-del-lodge]").forEach(b => b.onclick = () => {
    pullForm(); BK.assign.lodges.splice(Number(b.dataset.delLodge), 1); render();
  });
  $("addTraveler").onclick = () => { pullForm(); BK.travelers.push({ type:"성인", nameKo:"", passportName:"", birth:"", phone:"", gender:"", passportNo:"" }); render(); };
  document.querySelectorAll("[data-del-traveler]").forEach(b => b.onclick = () => {
    pullForm(); BK.travelers.splice(Number(b.dataset.delTraveler), 1); render();
  });
  const lf = $("lodgeFromDays");
  if (lf) lf.onclick = () => {
    pullForm();
    BK.assign.lodges = BK.days.map((d, i) => ({ day:i+1, name:noBr((d.stay||{}).name), grade:"" })).filter(l => l.name && l.name !== "숙소미포함");
    render(); toast("일정표 숙소를 배정 목록으로 복사했어요");
  };
  $("saveBtn").onclick = () => save();
  $("depositRequestBtn").onclick = () => sendStageRequest("deposit");
  $("contractRequestBtn").onclick = () => sendStageRequest("contract");
  $("confirmBookingBtn").onclick = async () => {
    if (!await askConfirm({ title:"예약을 확정할까요?", message:"예약금 입금과 계약서 서명을 확인한 뒤 고객에게 예약 확정 알림을 보냅니다.", confirmText:"예약 확정하기", icon:"✓" })) return;
    $("setStatus").checked = true;
    await save({ action:"confirm" });
    $("setStatus").checked = false;
    updateActionBar();
  };
  $("publishBtn").onclick = async () => {
    if (!await askConfirm({ title:"확정 일정표를 공개할까요?", message:"가이드·차량·숙소 배정을 포함한 최종 일정표가 고객에게 공개됩니다.", confirmText:"일정표 공개하기", icon:"🎫" })) return;
    $("publishSchedule").checked = true;
    const ok = await save({ action:"publish" });
    if (!ok) { $("publishSchedule").checked = false; BK.publishStatus = "draft"; }
    updateActionBar();
  };
  const rtb = $("requestTravelers");
  if (rtb) rtb.onclick = async () => {
    if (!PRE.token) return toast("고객 링크가 없는 요청이에요");
    if (!await askConfirm({ title:"여행자 정보 입력을 요청할까요?", message:"현재 예약정보를 먼저 저장한 뒤 고객 페이지에 입력 안내를 표시합니다.", confirmText:"입력 요청 보내기", icon:"👥" })) return;
    const saved = await save();
    if (!saved) return;
    rtb.disabled = true; rtb.textContent = "발송 중…";
    try {
      const res = await fetch(`/api/requests/${encodeURIComponent(PRE.id)}`, {
        method:"PATCH", headers:{ "Content-Type":"application/json", "x-admin-token":ADMIN_TOKEN },
        body:JSON.stringify({ notifyTravelers:true }),
      });
      const j = await res.json();
      if (!res.ok || !j.ok) throw new Error(j.error || "요청 발송 실패");
      BK.travelerSubmission = j.travelerSubmission || BK.travelerSubmission;
      PRE.booking = BK; SAVED_BK_JSON = JSON.stringify(BK);
      localStorage.setItem("leaders_booking_prefill", JSON.stringify(PRE));
      render(); toast("✓ 고객에게 여행자 정보 입력 요청을 보냈어요");
    } catch (e) {
      rtb.disabled = false; rtb.textContent = "📨 고객에게 입력 요청";
      toast("⚠ " + e.message);
    }
  };
  const ccb = $("copyContractBtn");
  if (ccb) ccb.onclick = () => {
    if (!PRE.token) return toast("고객 토큰이 없는 요청이에요");
    const link = location.origin + "/" + encodeURI("계약서.html") + "?t=" + PRE.token;
    navigator.clipboard.writeText(link).then(()=>toast("계약서 링크 복사 — 카톡으로 보내세요")).catch(()=>toast("복사 실패"));
  };
  const rsb = $("resetSignBtn");
  if (rsb) rsb.onclick = async () => {
    if (!await askConfirm({ title:"서명을 초기화할까요?", message:"기존 서명 기록이 삭제되며 고객이 계약서에 다시 서명해야 합니다.", confirmText:"서명 초기화", icon:"↺", tone:"danger" })) return;
    $("c_contract").checked = false;   // save()의 pullForm이 체크박스를 읽으므로 DOM 먼저 해제
    BK.contract = null;                // pullForm은 contract를 건드리지 않음 → null 유지된 채 저장
    await save({ resetContract: true });   // 서버의 서명 보존 로직에 명시적 초기화임을 알림
    render();
  };
  fillDatalists();   // 리렌더 시 datalist·자동채움 다시 연결
  fillSnipSelects(); // 일정 불러오기 옵션 채움
  renderSpots();     // 대표 명소 선택기 렌더
  bindAutofill();
  updateActionBar();
}

function focusWorkflowSection(sectionId, fieldId) {
  const section = $(sectionId);
  if (!section) return;
  section.scrollIntoView({ behavior:"smooth", block:"start" });
  section.classList.remove("focus-pulse");
  requestAnimationFrame(() => section.classList.add("focus-pulse"));
  if (fieldId && $(fieldId)) setTimeout(() => $(fieldId).focus(), 450);
}

function runWorkflowAction(action) {
  if (action === "bookingInfo") return focusWorkflowSection("bookingInfoSection", "ci_productName");
  if (action === "deposit") return $("depositRequestBtn").click();
  if (action === "confirmDeposit") return confirmDepositFlow();
  if (action === "payment") return focusWorkflowSection("bookingInfoSection", "ci_depositStatus");
  if (action === "contract") return $("contractRequestBtn").click();
  if (action === "confirm") return $("confirmBookingBtn").click();
  if (action === "assign") return focusWorkflowSection("assignmentSection", "g_pick");
  if (action === "publish") return $("publishBtn").click();
  if (action === "openSchedule" && PRE.token) window.open("확정일정표.html?t=" + encodeURIComponent(PRE.token), "_blank");
}

function updateActionBar() {
  const ci = BK.contractInfo || {};
  const paid = ci.depositStatus === "입금완료";
  const signed = !!(BK.contract && BK.contract.signedAt);
  const confirmed = PRE.status === "예약확정";
  const published = BK.publishStatus === "published";
  const depositSent = BK.depositRequest && BK.depositRequest.status === "requested";
  const contractSent = BK.contractRequest && BK.contractRequest.status === "requested";
  const wf = workflowUi();
  $("depositRequestBtn").textContent = paid ? "✓ 예약금 확인" : (depositSent ? "💳 예약금 안내 재전송" : "💳 예약금 안내 보내기");
  $("depositRequestBtn").disabled = paid;
  $("contractRequestBtn").textContent = signed ? "✓ 계약 서명완료" : (contractSent ? "✍ 계약서 요청 재전송" : "✍ 계약서 요청 보내기");
  $("contractRequestBtn").disabled = !paid || signed;
  $("confirmBookingBtn").textContent = confirmed ? "✓ 예약 확정됨" : "✓ 예약 확정하기";
  $("confirmBookingBtn").disabled = confirmed || !paid || !signed;
  $("publishBtn").textContent = published ? "✓ 일정표 공개됨" : "🎫 일정표 공개하기";
  $("publishBtn").disabled = published || !confirmed;
  const stageButtons = {
    deposit: $("depositRequestBtn"), contract: $("contractRequestBtn"),
    confirm: $("confirmBookingBtn"), publish: $("publishBtn"),
  };
  Object.entries(stageButtons).forEach(([action, btn]) => {
    const show = wf.task.action === action;
    btn.style.display = show ? "" : "none";
    btn.classList.toggle("primary", show);
  });
  $("bottomStep").textContent = wf.published ? "예약 절차 완료" : `${wf.active}/${wf.steps.length}단계 · ${wf.steps[wf.active - 1].label}`;
  $("bottomTask").textContent = wf.task.title;
  const hasStageAction = ["deposit", "contract", "confirm", "publish"].includes(wf.task.action);
  $("saveBtn").classList.toggle("secondary", hasStageAction);
  $("saveBtn").textContent = wf.task.action === "payment" ? "💾 입금 상태 저장" : wf.task.action === "assign" ? "💾 배정정보 저장" : wf.task.action === "bookingInfo" ? "💾 예약정보 저장" : "💾 임시 저장";
}

async function sendStageRequest(kind) {
  pullForm();
  if (kind === "deposit") {
    const ci = BK.contractInfo || {};
    if (!(Number(ci.depositAmount) > 0) || !ci.bankName || !ci.accountNumber || !ci.accountHolder)
      return toast("⚠ 예약금·은행·계좌번호·예금주를 모두 입력해 주세요");
  }
  if (kind === "contract" && BK.contractInfo.depositStatus !== "입금완료")
    return toast("⚠ 예약금 입금 확인 후 계약서 요청이 가능합니다");
  const label = kind === "deposit" ? "예약금 입금 안내" : "계약서 서명 요청";
  if (!await askConfirm({ title:`${label}를 진행할까요?`, message:"현재 입력한 예약정보를 저장한 뒤 고객 페이지에 해당 단계를 표시합니다.", confirmText:`${label} 진행`, icon:kind === "deposit" ? "💳" : "✍" })) return;
  const saved = await save({ quiet:true });
  if (!saved) return;
  const btn = kind === "deposit" ? $("depositRequestBtn") : $("contractRequestBtn");
  btn.disabled = true; btn.textContent = "발송 중…";
  try {
    const res = await fetch(`/api/requests/${encodeURIComponent(PRE.id)}`, {
      method:"PATCH", headers:{ "Content-Type":"application/json", "x-admin-token":ADMIN_TOKEN },
      body:JSON.stringify(kind === "deposit" ? { notifyDeposit:true } : { notifyContract:true }),
    });
    const j = await res.json();
    if (!res.ok || !j.ok) throw new Error(j.error || "발송 실패");
    if (j.depositRequest) BK.depositRequest = j.depositRequest;
    if (j.contractRequest) BK.contractRequest = j.contractRequest;
    PRE.booking = BK; SAVED_BK_JSON = JSON.stringify(BK);
    localStorage.setItem("leaders_booking_prefill", JSON.stringify(PRE));
    render(); toast(`✓ ${label} 단계가 고객 페이지에 표시됩니다`);
  } catch (e) {
    updateActionBar(); toast("⚠ " + e.message);
  }
}

/* 입금 확인 원클릭 — 입금완료 저장 + 계약서 서명·여행자 정보 요청 자동 발송 */
async function confirmDepositFlow() {
  pullForm();
  const who = (BK.depositReport && BK.depositReport.name) ? ` (입금자명 ${BK.depositReport.name})` : "";
  if (!await askConfirm({ title:"입금을 확인했나요?", message:`예약금이 입금완료로 저장되고${who ? who + "," : ""} 고객에게 계약서 서명과 여행자 정보 입력 요청이 함께 발송됩니다.`, confirmText:"입금 확인·자동 발송", icon:"💳" })) return;
  BK.contractInfo.depositStatus = "입금완료";
  BK.checklist = { ...(BK.checklist || {}), deposit:true };
  const saved = await save({ quiet:true });
  if (!saved) { render(); return; }
  try {
    const res = await fetch(`/api/requests/${encodeURIComponent(PRE.id)}`, {
      method:"PATCH", headers:{ "Content-Type":"application/json", "x-admin-token":ADMIN_TOKEN },
      body:JSON.stringify({ confirmDeposit:true }),
    });
    const j = await res.json();
    if (!res.ok || !j.ok) throw new Error(j.error || "처리 실패");
    if (j.contractRequest) BK.contractRequest = j.contractRequest;
    if (j.travelerSubmission) BK.travelerSubmission = j.travelerSubmission;
    PRE.booking = BK; SAVED_BK_JSON = JSON.stringify(BK);
    localStorage.setItem("leaders_booking_prefill", JSON.stringify(PRE));
    render(); toast("✓ 입금완료 처리 — 계약서 서명·여행자 정보 요청이 고객 페이지에 표시됩니다");
  } catch (e) {
    render(); toast("⚠ " + e.message);
  }
}

/* ══════════ 리소스 라이브러리 (리소스관리·코스관리·명소관리에서 등록한 데이터) ══════════ */
let LIBS = { guides: {}, lodges: {}, vehicles: {} };
let SNIPPETS = {}, SNIP_CATS = [], SPOTS = {}, SPOT_CATS = [];   // 코스관리(일정)·명소관리
async function loadLibs() {
  await Promise.all(Object.keys(LIBS).map(async key => {
    try {
      const r = await fetch("/api/data/" + key, { cache: "no-store" });
      const j = await r.json();
      if (j.ok && j.data) LIBS[key] = j.data;
    } catch (e) {}
  }));
  // 코스관리 스니펫 · 명소관리 명소 (일정 불러오기 / 대표 명소 기능용)
  const fetchData = async key => { try { const r = await fetch("/api/data/" + key, { cache:"no-store" }); const j = await r.json(); return (j.ok && j.data) ? j.data : null; } catch (e) { return null; } };
  const [sn, sc, sp, pc] = await Promise.all([fetchData("snippets"), fetchData("snippet_cats"), fetchData("spots"), fetchData("spot_cats")]);
  if (sn) SNIPPETS = sn;
  if (Array.isArray(sc)) SNIP_CATS = sc;
  if (sp) SPOTS = sp;
  if (Array.isArray(pc)) SPOT_CATS = pc;
  fillDatalists();
  fillSnipSelects();
  renderSpots();
  updateResourcePreview("guide", BK.assign.guide);
  updateResourcePreview("vehicle", BK.assign.vehicle);
  document.querySelectorAll(".lodge-row").forEach(updateLodgePreview);
}

/* 일정 불러오기 드롭다운 옵션 — 코스관리 스니펫을 cat별 optgroup으로 (견적만들기와 동일) */
function fillSnipSelects() {
  const byCat = {};
  Object.entries(SNIPPETS).forEach(([name, s]) => { const c = (s && s.cat ? String(s.cat).trim() : "") || "기타"; (byCat[c] = byCat[c] || []).push(name); });
  const ordered = [...SNIP_CATS.filter(c => byCat[c]), ...Object.keys(byCat).filter(c => !SNIP_CATS.includes(c) && c !== "기타")];
  if (byCat["기타"]) ordered.push("기타");
  const opts = ordered.map(c => `<optgroup label="${esc(c)}">${byCat[c].map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("")}</optgroup>`).join("");
  document.querySelectorAll(".snip-sel").forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = `<option value="">📋 일정 불러오기…</option>` + opts;
    sel.value = cur;
  });
}

/* 대표 명소 선택기 — 명소관리 명소를 지역(카테고리)별로, BK.highlights 토글 (견적만들기와 동일) */
function renderSpots() {
  const box = $("spotGroups"); if (!box) return;
  const sel = (BK.highlights || []).map(h => h && h.name).filter(Boolean);
  const catOf = s => (s && s.region ? String(s.region).trim() : "");
  const chip = (name, s) => {
    const idx = sel.indexOf(name), on = idx >= 0;
    return `<div class="spot-chk ${on ? "on" : ""}" data-s="${esc(name)}">
      <div class="box">${on ? "✓" : ""}</div>
      <div><b>${esc(name)}</b><small>${esc(s.short || "")}</small></div>
      ${on ? `<span class="spot-order">${idx + 1}</span>` : ""}
    </div>`;
  };
  const order = Array.isArray(SPOT_CATS) ? SPOT_CATS.slice() : [];
  Object.values(SPOTS).forEach(s => { const c = catOf(s); if (c && !order.includes(c)) order.push(c); });
  const groups = [...order.map(c => [c, c]), ["", "미분류"]];
  let html = "";
  groups.forEach(([cat, label]) => {
    const items = Object.entries(SPOTS).filter(([, s]) => catOf(s) === cat);
    if (!items.length) return;
    const cnt = items.filter(([n]) => sel.includes(n)).length;
    html += `<div class="spot-cat"><div class="spot-cat-head">${esc(label)}<span class="ln"></span><span class="cc">${cnt ? `${cnt}개 선택 · ` : ""}${items.length}곳</span></div>
      <div class="spot-grid">${items.map(([n, s]) => chip(n, s)).join("")}</div></div>`;
  });
  box.innerHTML = html || `<div style="font-size:12.5px;color:var(--sub)">등록된 명소가 없습니다. 명소 관리에서 추가하세요.</div>`;
  box.querySelectorAll(".spot-chk").forEach(el => el.onclick = () => {
    const name = el.dataset.s, i = sel.indexOf(name);
    if (i >= 0) BK.highlights.splice(i, 1);
    else {
      const s = SPOTS[name] || {};
      BK.highlights.push({ nameMn: s.nameMn || "", name, desc: s.desc || "", img: s.img || "", subImgs: (s.subImgs && s.subImgs.length ? s.subImgs : ["", "", "", ""]) });
    }
    renderSpots();
  });
}
function fillDatalists() {
  const fill = (key, listId) => { const el = $(listId); if (el) el.innerHTML = Object.keys(LIBS[key]).map(n => `<option value="${esc(n)}">`).join(""); };
  fill("guides", "guideList"); fill("lodges", "lodgeList"); fill("vehicles", "vehicleList");
  // 선택형 불러오기 드롭다운 — 리소스관리에 등록된 이름 목록
  const pick = (key, pickId) => {
    const el = $(pickId); if (!el) return;
    const assigned = key === "guides" ? (BK.assign.guide.name || "") : (BK.assign.vehicle.model || "");
    const names = Object.keys(LIBS[key]);
    el.innerHTML = `<option value="">${assigned ? "📥 다른 리소스로 변경…" : "📥 리소스에서 선택…"}</option>` +
      Object.keys(LIBS[key]).map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("");
    el.value = names.includes(assigned) ? assigned : "";
    if (!names.length) el.innerHTML = `<option value="">리소스관리에 등록된 항목 없음</option>`;
  };
  pick("guides", "g_pick"); pick("vehicles", "v_pick");
  // 일차별 숙소 — 행마다 같은 드롭다운 (현재 배정된 숙소가 선택된 상태로)
  document.querySelectorAll(".lodge-pick").forEach(el => {
    const row = el.closest(".lodge-row");
    const assigned = row?.querySelector('[data-lk="name"]')?.value.trim() || "";
    const names = Object.keys(LIBS.lodges);
    if (!names.length) { el.innerHTML = `<option value="">리소스관리에 등록된 항목 없음</option>`; return; }
    el.innerHTML = `<option value="">${assigned ? "📥 다른 리소스로 변경…" : "📥 리소스에서 선택…"}</option>` +
      names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("");
    el.value = names.includes(assigned) ? assigned : "";
  });
}
/* 라이브러리 레코드 → 폼 필드 채움 */
function applyGuide(name) {
  const r = LIBS.guides[name]; if (!r) return false;
  $("g_name").value = name;
  $("g_nameEn").value = r.nameEn || ""; $("g_role").value = r.role || "";
  $("g_phone").value = r.phone || ""; $("g_qr").value = r.qr || "";
  $("g_img").value = r.img || ""; $("g_desc").value = r.desc || "";
  updateResourcePreview("guide", { name, ...r });
  toast(`가이드 "${name}" 정보를 불러왔어요`); return true;
}
function applyVehicle(name) {
  const r = LIBS.vehicles[name]; if (!r) return false;
  $("v_model").value = name;
  $("v_seats").value = r.seats || ""; $("v_plate").value = r.plate || "";
  updateResourcePreview("vehicle", { model:name, ...r });
  toast(`차량 "${name}" 정보를 불러왔어요`); return true;
}
function updateResourcePreview(type, rec) {
  const old = $(type + "Preview");
  if (!old) return;
  old.outerHTML = previewHtml(type, rec);
}
/* 드롭다운 선택·이름 직접 입력 모두 자동 채움 */
function bindAutofill() {
  const on = (id, fn) => { const el = $(id); if (el) el.addEventListener("change", () => fn(el)); };
  on("g_pick", el => { if (el.value) applyGuide(el.value); });
  on("v_pick", el => { if (el.value) applyVehicle(el.value); });
  document.querySelectorAll(".lodge-pick").forEach(sel => sel.addEventListener("change", () => {
    if (!sel.value) return;
    const row = sel.closest(".lodge-row");
    const inp = row?.querySelector('[data-lk="name"]');
    if (!inp) return;
    inp.value = sel.value;
    const lib = LIBS.lodges[sel.value] || {};
    const gsel = row.querySelector('[data-lk="grade"]');
    if (lib.grade && gsel) gsel.value = lib.grade;
    updateLodgePreview(row);
    toast(`숙소 "${sel.value}" 정보를 불러왔어요`);
  }));
  on("g_name", el => applyGuide(el.value.trim()));
  on("v_model", el => applyVehicle(el.value.trim()));
  document.querySelectorAll('.lodge-row [data-lk="name"]').forEach(inp => {
    inp.addEventListener("input", () => updateLodgePreview(inp.closest(".lodge-row")));
    inp.addEventListener("change", () => {
    const r = LIBS.lodges[inp.value.trim()];
    const sel = inp.closest(".lodge-row").querySelector('[data-lk="grade"]');
    if (r && r.grade && sel) sel.value = r.grade;
    updateLodgePreview(inp.closest(".lodge-row"));
    });
  });
  document.querySelectorAll('.lodge-row [data-lk="day"], .lodge-row [data-lk="grade"]').forEach(inp => inp.addEventListener("input", () => {
    updateLodgePreview(inp.closest(".lodge-row"));
  }));
  ["g_name","g_nameEn","g_role","g_img","g_desc"].forEach(id => {
    const el = $(id); if (el) el.addEventListener("input", () => updateResourcePreview("guide", {
      name:$("g_name").value, nameEn:$("g_nameEn").value, role:$("g_role").value, img:$("g_img").value, desc:$("g_desc").value
    }));
  });
  ["v_model","v_seats","v_desc"].forEach(id => {
    const el = $(id); if (el) el.addEventListener("input", () => updateResourcePreview("vehicle", {
      model:$("v_model").value, seats:$("v_seats").value, desc:$("v_desc").value
    }));
  });
}

function updateLodgePreview(row) {
  if (!row) return;
  const i = Number(row.dataset.li) || 0;
  const name = row.querySelector('[data-lk="name"]')?.value.trim() || "";
  const day = Number(row.querySelector('[data-lk="day"]')?.value) || i + 1;
  const grade = row.querySelector('[data-lk="grade"]')?.value || "";
  const old = $("lodgePreview" + i);
  if (!old) return;
  old.outerHTML = lodgePreviewHtml({ day, name, grade }, i);
}

/* ══════════ 저장 ══════════ */
async function save(opts = {}) {
  pullForm();
  /* 예약확정은 고객 수락·계약 서명·예약금 입금이 모두 필요 */
  if ($("setStatus").checked) {
    const accepted = !!(PRE.decision && PRE.decision.status === "accepted") || PRE.status === "예약확정";
    const confirmationMissing = [];
    if (!accepted) confirmationMissing.push("고객 수락");
    if (!(BK.contract && BK.contract.signedAt)) confirmationMissing.push("계약 서명");
    if (BK.contractInfo.depositStatus !== "입금완료") confirmationMissing.push("예약금 입금");
    if (confirmationMissing.length) return toast("⚠ 예약확정 전 확인: " + confirmationMissing.join(", "));
    if (!BK.confirmedAt) BK.confirmedAt = new Date().toISOString().slice(0, 10);
  }
  const savedBooking = SAVED_BK_JSON ? JSON.parse(SAVED_BK_JSON) : {};
  if (BK.publishStatus === "published" && savedBooking.publishStatus !== "published") {
    const effectiveConfirmed = PRE.status === "예약확정" || $("setStatus").checked;
    const opsMissing = assignStats().missing.filter(m => !["고객 수락 미확인", "계약 미서명", "예약금 미입금"].includes(m));
    if (!effectiveConfirmed) return toast("⚠ 예약확정 후 고객 일정표를 공개할 수 있어요");
    if (opsMissing.length) return toast("⚠ 일정표 공개 전 확인: " + opsMissing.join(", "));
  }
  BK.autoSeeded = false;   // 예약관리에서 직접 저장 = 수동 관리 시작 (확정 해제 시 자동삭제 대상에서 제외)
  const patch = { booking: BK };
  /* 대표 고객명·여행 기간·인원을 booking과 함께 저장 */
  if (PRE.name) patch.name = PRE.name;
  if (PRE.depart) patch.depart = PRE.depart;
  if (PRE.return_) patch.return_ = PRE.return_;
  patch.adult = PRE.adult || 0; patch.child = PRE.child || 0; patch.infant = PRE.infant || 0;
  if (opts.resetContract) patch.resetContract = true;   // 서버의 서명 보존을 명시적으로 해제
  if ($("setStatus").checked) patch.status = "예약확정";
  $("saveBtn").disabled = true; $("saveBtn").textContent = "저장 중…";
  try {
    const res = await fetch(`/api/requests/${encodeURIComponent(PRE.id)}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "x-admin-token": ADMIN_TOKEN },
      body: JSON.stringify(patch),
    });
    if (res.status === 401) throw new Error("관리자 인증이 만료됐어요 — 대시보드에서 다시 열어주세요");
    const j = await res.json();
    if (!j.ok) throw new Error(j.error || "서버 오류");
    PRE.status = j.status || patch.status || PRE.status;
    if (PRE.status === "예약확정") $("setStatus").checked = false;
    if (!BK.preparedAt) BK.preparedAt = j.preparedAt || new Date().toISOString();
    PRE.booking = BK;
    SAVED_BK_JSON = JSON.stringify(BK);
    localStorage.setItem("leaders_booking_prefill", JSON.stringify(PRE));
    const paxTot = (PRE.adult||0)+(PRE.child||0)+(PRE.infant||0);
    $("hMeta").textContent = `${PRE.destination || "-"} · ${PRE.depart || "?"} ~ ${PRE.return_ || "?"} · ${paxTot}명 · 현재상태 [${PRE.status}]`;
    render();
    if (!opts.quiet) {
      if (opts.action === "confirm") toast("✓ 예약이 확정되고 고객에게 안내됐어요");
      else if (opts.action === "publish") toast("✓ 확정 일정표를 고객에게 공개했어요");
      else toast("✓ 예약정보를 내부 저장했습니다 — 고객에게는 아직 발송되지 않았어요");
    }
    return true;
  } catch (e) {
    toast("⚠ " + e.message);
    return false;
  } finally {
    $("saveBtn").disabled = false; $("saveBtn").textContent = "💾 예약정보 저장";
    updateActionBar();
  }
}

/* ── 진입 ── */
if (!PRE || !PRE.id) {
  $("main").innerHTML = `<div class="empty"><h2>열 예약이 없어요</h2>
    통합 대시보드에서 고객을 선택한 뒤 <b>📋 예약관리</b> 버튼으로 열어주세요.<br><br>
    <a class="hbtn" href="/admin">← 대시보드로</a></div>`;
} else {
  init();
  /* 미저장 변경이 있으면 탭 닫기/이동 전에 경고 */
  window.addEventListener("beforeunload", e => {
    if (!BK) return;
    try { pullForm(); } catch (_) { return; }
    if (JSON.stringify(BK) !== SAVED_BK_JSON) { e.preventDefault(); e.returnValue = ""; }
  });
}
</script>
