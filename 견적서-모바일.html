<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>맞춤 견적서 · 몽골리아 은하수</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
    background: #DBE6E2; -webkit-print-color-adjust: exact; print-color-adjust: exact; color: #152C28; }

  /* 상단 안내/도구 바 */
  .topbar { position: sticky; top: 0; z-index: 30; background: #06c4a0; color: #EAFBF6;
    display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 14px; font-size: 12.5px; }
  .topbar .tb-links { display: flex; gap: 8px; }
  .topbar a, .topbar button { font: inherit; color: #06413A; background: #EAFBF6; border: none; border-radius: 18px;
    padding: 6px 12px; font-weight: 800; cursor: pointer; text-decoration: none; white-space: nowrap; }
  .topbar .tb-pc { background: rgba(255,255,255,0.18); color: #EAFBF6; }

  /* 문서 컨테이너 — 화면에선 폰 카드 스택, 인쇄에선 페이지 */
  .doc { max-width: 430px; margin: 0 auto; padding: 18px 14px 40px; display: flex; flex-direction: column; gap: 18px; }
  .card { background: #FCFEFD; border-radius: 22px; box-shadow: 0 18px 44px rgba(6,65,58,0.14);
    overflow: hidden; }
  .card > .pad { padding: 22px 22px 26px; }

  /* 잘림 방지용 원자 블록 */
  .blk { break-inside: avoid; }

  .row { display: flex; align-items: center; }
  .ph { display: flex; align-items: center; justify-content: center; background: #EAF2EE;
    color: #A9BCB6; font-size: 11px; overflow: hidden; }
  .ph img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ph.contain { background: #fff; }
  .ph.contain img { object-fit: contain; }
  .logo-mark { display: inline-flex; flex: none; }

  .print-only { display: none; }

  @media (max-width: 460px) {
    .doc { padding: 14px 10px 32px; gap: 14px; }
    .card > .pad { padding: 18px 18px 22px; }
  }

  /* ── 인쇄(PDF) ── 각 섹션을 새 페이지에서 시작, 블록은 절대 잘리지 않게 ── */
  @page { size: 420px 760px; margin: 0; }
  @media print {
    body { background: #fff; }
    .topbar, .fab, .customer-nav, .customer-actions, .web-only { display: none !important; }
    .print-only { display: block; }
    .doc { max-width: none; margin: 0; padding: 0; gap: 0; display: block; }
    .card { border-radius: 0; box-shadow: none; break-before: page; }
    .card:first-child { break-before: auto; }
    .card > .pad { padding: 26px 26px 30px; }
  }

  /* 플로팅 PDF 저장 버튼 */
  .fab { position: fixed; right: 16px; bottom: 18px; z-index: 40; background: #152C28; color: #fff;
    border: none; border-radius: 26px; padding: 13px 20px; font: 800 14.5px 'Pretendard', sans-serif;
    box-shadow: 0 10px 26px rgba(6,65,58,0.32); cursor: pointer; }
  .customer-nav { position:sticky; top:0; z-index:45; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 12px; background:rgba(21,44,40,.97); color:#fff; }
  .customer-nav a { color:#fff; text-decoration:none; font-size:12.5px; font-weight:800; }
  .customer-nav .next { background:#06c4a0; padding:8px 12px; border-radius:999px; }
  .customer-actions { text-align:center; padding:28px 20px 24px; border:1px solid #cbeadf; background:linear-gradient(145deg,#f8fffc 0%,#eaf7f3 100%); }
  .customer-actions .eyebrow { color:#06a889; font-size:10px; font-weight:900; letter-spacing:.16em; }
  .customer-actions h2 { font-size:20px; margin:7px 0; letter-spacing:-.03em; }
  .customer-actions p { color:#60736e; font-size:12.5px; line-height:1.65; }
  .customer-actions a { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:10px; padding:14px; border-radius:12px; text-decoration:none; font-size:14px; font-weight:800; }
  .customer-actions .accept { margin-top:18px; background:#06c4a0; color:#fff; box-shadow:0 8px 20px rgba(6,196,160,.2); }
  .customer-actions .change { background:#fff; border:1px solid #9ddfce; color:#087664; }
  .customer-actions .consult { display:inline-flex; margin-top:17px; padding:0; color:#60736e; font-size:12px; text-decoration:underline; text-underline-offset:3px; }
  .schedule-map-link { display:flex; align-items:center; justify-content:center; gap:7px; margin-top:12px; padding:12px; border-radius:12px; background:#152c28; color:#fff; text-decoration:none; font-size:13px; font-weight:800; }
</style>
</head>
<body>
<nav class="customer-nav" id="customerNav" style="display:none"><a id="customerBackTop" href="#">← 내 견적</a><span style="font-size:12px;font-weight:700;opacity:.8">맞춤 견적서</span><a class="next" href="https://pf.kakao.com/_BSLaxl" target="_blank" rel="noopener">💬 예약 문의</a></nav>
<div class="topbar" id="topbar" style="display:none">
  <span id="tbHint">💡 저장 버튼으로 모바일 PDF를 받으세요</span>
  <span class="tb-links">
    <a class="tb-pc" id="pcLink" href="#">💻 PC 버전</a>
    <button id="tbSave">📄 PDF 저장</button>
  </span>
</div>

<div class="doc" id="root"></div>
<button class="fab" id="fab" style="display:none" onclick="window.print()">📄 PDF 저장</button>

<script type="module">
/* ── 견적 출처: ?t=<token>이면 서버(고객 매직링크), 아니면 localStorage(편집기)/data.js 샘플 ── */
const params = new URLSearchParams(location.search);
const _token = params.get("t");
const mapHref = "일정지도.html" + (_token ? "?t=" + encodeURIComponent(_token) : "");
if (_token) {
  document.getElementById("customerBackTop").href = "내견적.html?t=" + encodeURIComponent(_token);
}

/* PC 버전 링크(같은 파라미터 유지, 강제 PC = m=0) */
(() => {
  const p = new URLSearchParams(location.search); p.set("m", "0");
  const el = document.getElementById("pcLink");
  if (el) el.href = "견적서.html?" + p.toString();
})();

const Q = await (async () => {
  if (_token) {
    try {
      const res = await fetch("/api/my/" + encodeURIComponent(_token), { cache: "no-store" });
      const j = await res.json();
      if (j.ok && j.quote) return j.quote;
    } catch (e) {}
    return null;   // 토큰은 있지만 아직 견적 미발행
  }
  try { const s = JSON.parse(localStorage.getItem("leaders_quote") || "null"); if (s) return s; } catch (e) {}
  return window.QUOTE;
})();

/* 명소 사진은 항상 명소관리 최신본을 우선 반영 */
if (Q && Array.isArray(Q.highlights) && Q.highlights.length) {
  try {
    const r = await fetch("/api/data/spots", { cache: "no-store" });
    const j = await r.json();
    const lib = (j && j.ok && j.data) ? j.data : null;
    if (lib) Q.highlights.forEach(h => {
      const s = h && h.name ? lib[h.name] : null;
      if (!s) return;
      if (s.img) h.img = s.img;
      if (Array.isArray(s.subImgs) && s.subImgs.some(x => x)) h.subImgs = s.subImgs;
    });
  } catch (e) {}
}

const root = document.getElementById("root");

/* 토큰만 있고 아직 미발행 */
if (!Q) {
  root.innerHTML =
    `<div class="card"><div class="pad" style="text-align:center;">
      <div style="font-size:46px">🕓</div>
      <h1 style="font-size:21px;margin:14px 0 8px;font-weight:800">견적서 준비 중이에요</h1>
      <p style="color:#6b7c78;line-height:1.65;font-size:14.5px">담당자가 맞춤 견적서를 작성하고 있어요.<br>완료되면 이 링크에서 바로 확인하실 수 있습니다.</p>
      <a href="내견적.html?t=${encodeURIComponent(_token || "")}" style="display:inline-block;margin-top:20px;color:#06c4a0;font-weight:800;text-decoration:none">← 내 견적 확인으로 돌아가기</a>
    </div>`;
} else {
if (_token) document.getElementById("customerNav").style.display = "flex";

/* 편집기/샘플(고객 링크 아님)일 때만 상단 도구바 표시 */
if (!_token) { document.getElementById("topbar").style.display = ""; }
document.getElementById("fab").style.display = "";
document.getElementById("tbSave")?.addEventListener("click", () => window.print());

const won = n => (n < 0 ? "-" : "") + Math.abs(n).toLocaleString("ko-KR") + "원";
const wonMan = n => Math.round(n / 10000).toLocaleString("ko-KR") + "만원";
const esc = s => String(s ?? "");
const noBr = s => String(s ?? "").replace(/<br\s*\/?>/gi, " ");
const balEco = b => (b.economy != null ? b.economy : (b.amount || 0));
const balFull = b => (b.full != null ? b.full : (b.amount || 0));
const B = Q.brand;

/* 디자인 자산 이미지(게르·식사·아이콘·허가증 등)는 data.js 최신본으로 보충 */
if (window.QUOTE && window.QUOTE.images) {
  const cur = Q.images || {};
  const merged = { ...window.QUOTE.images };
  for (const [k, v] of Object.entries(cur)) {
    const empty = v == null || v === "" || (Array.isArray(v) && !v.some(x => x));
    if (!empty) merged[k] = v;
  }
  Q.images = merged;
}
const IMG = Q.images || {};
const arr = IMG.arrival || {};

/* 이미지 헬퍼 */
const ph = (src, label, style) => src
  ? `<div class="ph" style="${style}"><img src="${src}" alt="${esc(label)}"></div>`
  : `<div class="ph" style="${style}">${esc(label) || ""}</div>`;
const phC = (src, label, style) => src
  ? `<div class="ph contain" style="${style}"><img src="${src}" alt="${esc(label)}"></div>`
  : `<div class="ph" style="${style}">${esc(label) || ""}</div>`;

const itemHtml = t => {
  if (t.startsWith("*")) return `<span style="color:#06C4A0; font-weight:600;">${esc(t)}</span>`;
  if (t.startsWith("(")) return `<span style="color:#8CA39D;">${esc(t)}</span>`;
  return esc(t);
};

const LOGO = (sz = 30) => `<svg width="${sz}" height="${sz}" viewBox="0 0 48 48" fill="none" class="logo-mark"><rect x="1.5" y="1.5" width="45" height="45" rx="13" stroke="#0A6A5E" stroke-width="1.8"></rect><path d="M9 33 L19 18 L26 28 L32 20 L39 33 Z" fill="#0A6A5E"></path></svg>`;

const card = (inner) => `<div class="card"><div class="pad">${inner}</div></div>`;

/* ══════════ 1) 표지 ══════════ */
const secCover = card(`
  <div class="blk">
    <div class="row" style="justify-content:space-between;">
      <div class="row" style="gap:9px;">${LOGO(30)}
        <div style="color:#0A6A5E; font-size:11px; font-weight:800; letter-spacing:0.14em;">MONGOLIA<br>MILKY WAY</div>
      </div>
      <div style="background:#06C4A0; color:#fff; font-size:9.5px; font-weight:800; letter-spacing:0.08em; padding:7px 13px; border-radius:20px;">CUSTOM ESTIMATE</div>
    </div>
    <div style="margin-top:36px;">
      <div style="font-family:'Playfair Display',serif; font-size:15px; color:#06C4A0;">${esc(B.slogan)}</div>
      <div style="color:#152C28; font-size:36px; font-weight:800; line-height:1.12; letter-spacing:-0.03em; margin-top:12px;">${esc(B.company)}<br><span style="color:#06C4A0;">맞춤 견적서</span></div>
    </div>
    <div style="display:flex; gap:10px; margin-top:22px;">
      <div style="flex:1; background:#F1F7F5; border-radius:10px; padding:11px 12px;"><div style="color:#06C4A0; font-size:9.5px; font-weight:700; letter-spacing:0.1em;">발행일</div><div style="color:#152C28; font-size:13px; font-weight:800; margin-top:3px;">${esc(Q.issueDate)}</div></div>
      <div style="flex:1; background:#F1F7F5; border-radius:10px; padding:11px 12px;"><div style="color:#06C4A0; font-size:9.5px; font-weight:700; letter-spacing:0.1em;">담당</div><div style="color:#152C28; font-size:13px; font-weight:800; margin-top:3px;">${esc(Q.manager)}</div></div>
      <div style="flex:1.3; background:#F1F7F5; border-radius:10px; padding:11px 12px;"><div style="color:#06C4A0; font-size:9.5px; font-weight:700; letter-spacing:0.1em;">문서번호</div><div style="color:#152C28; font-size:13px; font-weight:800; margin-top:3px;">${esc(Q.quoteNo)}</div></div>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;">
      <div style="background:#EAF7F3; color:#0A6A5E; font-size:12px; font-weight:700; padding:8px 14px; border-radius:22px;">여행지 · ${esc(Q.destination)}</div>
      <div style="background:#EAF7F3; color:#0A6A5E; font-size:12px; font-weight:700; padding:8px 14px; border-radius:22px;">${esc(Q.nights)}</div>
      <div style="background:#EAF7F3; color:#0A6A5E; font-size:12px; font-weight:700; padding:8px 14px; border-radius:22px;">${esc(Q.pax)}인</div>
    </div>
  </div>
  ${ph(IMG.cover, IMG.coverLabel, "width:100%; height:250px; border-radius:16px; margin-top:18px; box-shadow:0 16px 34px rgba(10,106,94,0.16);")}
  <div class="row blk" style="justify-content:space-between; margin-top:16px; color:#8CA39D; font-size:11px;">
    <div>${esc(B.instagram)}</div><div>카카오톡: ${esc(B.kakao)}</div>
  </div>`);

/* ══════════ 2) 견적서 ══════════ */
const infoRow = (k, v, kb) => `<div style="display:grid; grid-template-columns:82px 1fr; border-bottom:1px solid #EAF3EF;"><div style="background:#EAF7F3; color:#0A6A5E; font-weight:700; padding:11px 12px;">${k}</div><div style="padding:11px 12px; color:#152C28; font-weight:600; line-height:1.5;">${v}</div></div>`;
const balCard = (bg, sub, title, tier) => `
  <div class="blk" style="background:${bg}; border-radius:12px; padding:14px 16px;">
    <div style="color:#EAFBF6; font-size:11px; font-weight:700;">${title}</div>
    <div style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">
      ${Q.price.balances.map(b => `<div class="row" style="justify-content:space-between;"><span style="color:${sub}; font-size:12px;">${b.pax}인 잔금(1인기준)</span><span style="color:#fff; font-size:19px; font-weight:800;">${wonMan(tier === "full" ? balFull(b) : balEco(b))}</span></div>`).join("")}
    </div>
  </div>`;

const secQuote = card(`
  <div class="blk">
    <div class="row" style="justify-content:space-between; align-items:flex-start;">
      <div>
        <div style="font-family:'Playfair Display',serif; font-size:12px; color:#06C4A0;">${esc(B.slogan)}</div>
        <div style="color:#06C4A0; font-size:22px; font-weight:800; letter-spacing:-0.02em; margin-top:4px; line-height:1.2;">${esc(B.company)}<br>맞춤견적서</div>
      </div>${LOGO(30)}
    </div>
    <div style="margin-top:10px; font-size:9.5px; color:#8CA39D; line-height:1.6;">${esc(B.bizMn)}<br>${esc(B.bizKr)}</div>
    <div style="height:1px; background:#DCEAE5; margin:14px 0;"></div>
  </div>
  <div class="blk" style="border:1px solid #DDEBE6; border-radius:12px; overflow:hidden; font-size:12px;">
    ${infoRow("고객명", esc(Q.customer))}
    ${infoRow("문서번호", esc(Q.quoteNo))}
    ${infoRow("여행지", esc(Q.destination))}
    ${infoRow("인원", esc(Q.paxNote))}
    ${infoRow("여행 기간", esc(Q.period) + " (" + esc(Q.nights) + ")")}
    ${infoRow("차량", esc(Q.vehicle))}
    <div style="display:grid; grid-template-columns:1fr 1fr;">
      <div style="display:grid; grid-template-columns:auto 1fr; border-right:1px solid #EAF3EF;"><div style="background:#06C4A0; color:#EAFBF6; font-weight:700; padding:11px 10px; font-size:10.5px;">항공 IN</div><div style="background:#F3FAF8; padding:11px 8px; color:#152C28; font-weight:600; text-align:center;">${esc(Q.flight.in)}</div></div>
      <div style="display:grid; grid-template-columns:auto 1fr;"><div style="background:#06C4A0; color:#EAFBF6; font-weight:700; padding:11px 10px; font-size:10.5px;">항공 OUT</div><div style="background:#F3FAF8; padding:11px 8px; color:#152C28; font-weight:600; text-align:center;">${esc(Q.flight.out)}</div></div>
    </div>
    ${infoRow("픽업", esc(Q.pickup))}
    <div style="display:grid; grid-template-columns:82px 1fr;"><div style="background:#EAF7F3; color:#0A6A5E; font-weight:700; padding:11px 12px;">드랍</div><div style="padding:11px 12px; color:#152C28; font-weight:600; line-height:1.5;">${esc(Q.drop)}</div></div>
  </div>
  <div class="blk" style="margin-top:12px; background:#F5FBF9; border:1px solid #E3F0EB; border-radius:12px; padding:13px 15px;">
    <div style="color:#0A6A5E; font-size:12px; font-weight:800;">여행사 혜택</div>
    <div style="margin-top:6px; font-size:11px; color:#40544F; line-height:1.7;">${esc(Q.benefits)}</div>
  </div>
  <div class="blk" style="margin-top:10px; background:#FFF8F5; border:1px solid #F3E0D8; border-radius:12px; padding:13px 15px;">
    <div style="color:#C9604B; font-size:12px; font-weight:800;">참여 가능 이벤트</div>
    <div style="margin-top:6px; font-size:10.5px; color:#5C4B47; line-height:1.75;">${(Q.events || []).map(e => esc(e)).join("<br>")}</div>
  </div>
  <div class="blk" style="margin-top:12px; row; display:flex; gap:10px; align-items:center; background:#EAF7F3; border-radius:12px; padding:14px 16px;">
    <div style="color:#0A6A5E; font-size:12px; font-weight:800; flex:none;">예약금<br><span style="font-weight:600; color:#8CA39D; font-size:10px;">1인기준×인원수</span></div>
    <div style="flex:1; text-align:right; color:#152C28; font-size:24px; font-weight:800;">${wonMan(Q.price.deposit)}</div>
  </div>
  ${(Q.price.options && Q.price.options.length) ? `<div class="blk" style="margin-top:10px; background:#F7F9F8; border:1px solid #E7EDEB; border-radius:12px; padding:12px 15px;">
    <div style="color:#0A6A5E; font-size:11.5px; font-weight:800;">추가 및 할인 사항</div>
    <div style="margin-top:7px; display:flex; flex-direction:column; gap:5px; font-size:11px;">
      ${Q.price.options.map(o => `<div class="row" style="justify-content:space-between; gap:10px;"><span style="color:#354B46; font-weight:600;">${esc(o.label)}</span><span style="color:#8CA39D; white-space:nowrap;">${esc(o.calc)}</span></div>`).join("")}
    </div></div>` : ""}
  <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
    ${balCard("#06C4A0", "#EAFBF6", "🏨 풀패키지 · 4성급호텔+고급게르", "full")}
    ${balCard("#0A6A5E", "#CDEDE4", "⛺ 실속형 · 3성급호텔+일반게르", "economy")}
  </div>
  <div class="blk" style="margin-top:14px; font-size:10px; color:#8CA39D; line-height:1.7;">견적서 내 금액은 모두 1인 기준이며, 해당 견적은 ${esc(Q.price.validUntil)}까지 유효합니다.<br><b style="color:#0A6A5E;">[결제]</b> ${esc(Q.price.payment)} <span style="color:#B0C2BC;">${esc(Q.price.paymentNote)}</span><br><b style="color:#0A6A5E;">[입금]</b> ${esc(B.account)}${Q.remark && Q.remark !== "-" ? `<br><b style="color:#0A6A5E;">[비고]</b> ${esc(Q.remark)}` : ""}</div>`);

/* ══════════ 3) 일정표 ══════════ */
const dayCard = (d) => {
  const distTxt = String(d.dist || "").replace(/[()]/g, "").trim();
  const moveTxt = String(d.move || "").replace(/이동\s*/, "");
  const meta = [moveTxt, distTxt].filter(Boolean).join(" · ");
  const stayTags = (d.stay.tags && d.stay.tags.length) ? `<span style="background:#EAF7F3; color:#0A6A5E; font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:14px;">${d.stay.tags.join(" · ")}</span>` : "";
  return `
