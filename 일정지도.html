<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>일정 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="presets.js"></script>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root {
    --ink: #1b3531; --deep: #06c4a0; --teal: #06c4a0; --teal-dk: #06c4a0;
    --mint: #eaf7f3; --mint2: #f5fbf9; --line: #e2edea; --gray: #97a5a1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: "Pretendard Variable", Pretendard, "Malgun Gothic", sans-serif; color: var(--ink); }
  #app { display: flex; height: 100%; }

  /* ── 왼쪽 패널 ── */
  aside {
    width: 390px; flex: 0 0 390px; height: 100%; overflow-y: auto;
    border-right: 1px solid var(--line); background: #fff;
  }
  .side-head { padding: 20px 22px 16px; border-bottom: 1px solid var(--line); }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 9px; background: var(--deep); color: #fff;
    display: inline-flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .brand b { letter-spacing: .16em; font-size: 12.5px; color: var(--deep); }
  .side-head .cap { font-size: 12px; color: var(--gray); margin-bottom: 3px; }
  .side-head h1 { font-size: 21px; font-weight: 800; }
  .side-head .period { font-size: 13px; color: var(--gray); margin-top: 4px; }
  .tags { display: flex; gap: 6px; margin-top: 12px; }
  .tag { background: var(--mint); border-radius: 99px; padding: 5px 12px; font-size: 12px; font-weight: 700; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 14px 22px; border-bottom: 1px solid var(--line); }
  .btn {
    display: block; text-align: center; text-decoration: none; border-radius: 10px;
    padding: 11px 0; font-size: 13.5px; font-weight: 800; cursor: pointer; border: none;
  }
  .btn.primary { background: var(--deep); color: #fff; }
  .btn.ghost { background: var(--mint); color: var(--deep); }

  .daybar { padding: 12px 22px 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  .daychip {
    border: 1.5px solid var(--line); background: #fff; color: var(--gray);
    border-radius: 99px; padding: 6px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  .daychip.on { background: var(--deep); border-color: var(--deep); color: #fff; }

  .daylist { padding: 6px 14px 30px; }
  .dayhead { font-size: 13px; font-weight: 800; color: var(--deep); padding: 14px 8px 6px; }
  .spot-item {
    display: grid; grid-template-columns: 30px 1fr; gap: 12px; align-items: flex-start;
    padding: 11px 10px; border-radius: 12px; cursor: pointer;
  }
  .spot-item:hover { background: var(--mint2); }
  .spot-item.active { background: var(--mint); }
  .num {
    width: 26px; height: 26px; border-radius: 50%; color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12.5px; font-weight: 800; margin-top: 1px;
  }
  .spot-item b { font-size: 14px; display: block; }
  .spot-item .sub { font-size: 12px; color: var(--gray); margin-top: 2px; line-height: 1.55; }
  .move-line { font-size: 11px; color: var(--gray); padding: 0 10px 0 52px; }

  /* ── 지도 ── */
  main { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  .marker-pin {
    width: 28px; height: 28px; border-radius: 50%; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font: 800 13px/1 Pretendard, sans-serif;
    border: 2.5px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  .leaflet-popup-content { font-family: Pretendard, sans-serif; font-size: 13px; }
  .leaflet-popup-content b { color: var(--deep); }

  @media (max-width: 760px) {
    #app { flex-direction: column-reverse; }
    aside { width: 100%; flex: 1; }
    main { flex: 0 0 45%; }
  }
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="side-head">
      <div class="brand"><span class="mark">▲</span><b id="brandName"></b></div>
      <div class="cap" id="customerCap"></div>
      <h1 id="tripTitle"></h1>
      <div class="period" id="tripPeriod"></div>
      <div class="tags" id="tripTags"></div>
    </div>
    <div class="actions">
      <a class="btn primary" id="quoteLink" href="견적서.html" target="_blank">📄 견적서 전체 보기</a>
      <a class="btn ghost" href="https://pf.kakao.com/_BSLaxl" target="_blank">💬 카톡 문의</a>
    </div>
    <div class="daybar" id="daybar"></div>
    <div class="daylist" id="daylist"></div>
  </aside>
  <main><div id="map"></div></main>
</div>

<script type="module">
/* 견적 출처: ?t=<token>이면 서버(고객 매직링크), 아니면 localStorage(편집기)/data.js 샘플 */
const _token = new URLSearchParams(location.search).get("t");
const Q = await (async () => {
  if (_token) {
    try {
      const res = await fetch("/api/my/" + encodeURIComponent(_token), { cache: "no-store" });
      const j = await res.json();
      if (j.ok && j.quote) return j.quote;
    } catch (e) {}
    return null;   // 토큰은 있지만 아직 견적 미발행 또는 잘못된 링크
  }
  try {
    const saved = JSON.parse(localStorage.getItem("leaders_quote") || "null");
    if (saved) return saved;
  } catch (e) {}
  return window.QUOTE;
})();

if (!Q) {
  document.body.innerHTML =
    `<div style="max-width:640px;margin:80px auto;padding:0 24px;text-align:center;font-family:Pretendard,sans-serif;color:#16261f">
      <div style="font-size:46px">🗺</div>
      <h1 style="font-size:22px;margin:14px 0 8px;font-weight:800">일정 지도를 준비 중이에요</h1>
      <p style="color:#6b7c78;line-height:1.65;font-size:15px">견적서가 발행되면 이 링크에서 일정 지도를 볼 수 있어요.</p>
      <a href="내견적.html?t=${encodeURIComponent(_token || "")}" style="display:inline-block;margin-top:22px;color:#06c4a0;font-weight:800;text-decoration:none">← 내 견적 확인으로 돌아가기</a>
    </div>`;
  throw new Error("quote not ready");
}

/* 견적서 링크에 토큰 전달 (고객이 지도→견적서로 이동해도 자기 견적을 보도록) */
if (_token) document.getElementById("quoteLink").href = "견적서.html?t=" + encodeURIComponent(_token);

/* ─────────────────────────────────────────────
   장소 사전 — presets.js의 명소 라이브러리에서 좌표를 가져옵니다.
   (울란바토르만 별도 추가. 나머지는 presets.js에서 관리)
   ───────────────────────────────────────────── */
const SPOTS = { "울란바토르": { lat: 47.8864, lng: 106.9057, desc: "몽골의 수도" } };
const _lib = (window.getSpots ? getSpots() : (window.PRESETS ? PRESETS.spots : {}));
for (const [name, s] of Object.entries(_lib)) {
  if (s && s.lat != null) SPOTS[name] = { lat: s.lat, lng: s.lng, desc: s.short || s.desc, img: s.img || "" };
}
// 견적서에 담긴 명소 사진도 이름으로 병합 (다른 기기에서 열어도 사진이 보이도록)
(Q.highlights || []).forEach(h => {
  if (h && h.name && SPOTS[h.name] && h.img && !SPOTS[h.name].img) SPOTS[h.name].img = h.img;
});

/* 명소 라이브러리에 없지만 일정에 자주 쓰이는 고정 지점 + 이름 별칭 (좌표 자동 연결용) */
const EXTRA_SPOTS = {
  "칭기스칸국제공항": { lat: 47.6478, lng: 106.8206, desc: "칭기스칸 국제공항" },
  "칭기즈칸국제공항": { lat: 47.6478, lng: 106.8206, desc: "칭기스칸 국제공항" },
  "어기호수":        { lat: 47.7667, lng: 102.7167, desc: "어기 호수(Ögii)" },
  "우기호수":        { lat: 47.7667, lng: 102.7167, desc: "어기 호수(Ögii)" },
  "미니사막":        { lat: 47.3500, lng: 103.6700, desc: "미니 고비(엘승타사르하이)" },
  "미니고비":        { lat: 47.3500, lng: 103.6700, desc: "미니 고비(엘승타사르하이)" },
  "엘슨타사르해":    { lat: 47.3500, lng: 103.6700, desc: "엘승타사르하이" },
  "하르허링":        { lat: 47.1970, lng: 102.8230, desc: "하르허링(카라코룸)" },
  "쳉헤르온천":      { lat: 47.3175, lng: 101.6503, desc: "쳉헤르 온천" },
  "호스타이국립공원": { lat: 47.7500, lng: 105.9000, desc: "호스타이 국립공원" },
  "오르혼폭포":      { lat: 46.7900, lng: 101.9600, desc: "오르혼 폭포" },
  "오르혼계곡":      { lat: 46.7900, lng: 101.9600, desc: "오르혼 계곡" },
  "무릉":           { lat: 49.6342, lng: 100.1625, desc: "무릉(Mörön)" },
  "하트갈":         { lat: 50.4400, lng: 100.1600, desc: "하트갈(홉스굴 남단)" },
  "아마르바야스갈란트": { lat: 49.4833, lng: 105.0833, desc: "아마르바야스갈란트 사원" },
};

/* 이름 매칭: 정확일치 → 별칭 → 부분일치. 공백·구두점·대소문자 무시 */
const _norm = s => (s || "").normalize("NFC").replace(/[\s·・.,()]/g, "").toLowerCase();
const _spotNorm = {}, _extraNorm = {};
for (const [k, v] of Object.entries(SPOTS)) _spotNorm[_norm(k)] = { ...v };
for (const [k, v] of Object.entries(EXTRA_SPOTS)) _extraNorm[_norm(k)] = v;
function resolveSpot(raw) {
  const k = _norm(raw);
  if (!k) return null;
  if (_spotNorm[k]) return _spotNorm[k];    // 명소 라이브러리 정확 일치
  if (_extraNorm[k]) return _extraNorm[k];  // 내장 고정지점/별칭 정확 일치
  for (const [nk, v] of Object.entries(_spotNorm))  if (nk.length >= 2 && (k.includes(nk) || nk.includes(k))) return v;  // 부분 일치(라이브러리 우선)
  for (const [nk, v] of Object.entries(_extraNorm)) if (nk.length >= 2 && (k.includes(nk) || nk.includes(k))) return v;
  return null;
}

const DAY_COLORS = ["#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0", "#06c4a0"];

/* ── 헤더 채우기 ── */
document.getElementById("brandName").textContent = Q.brand.companyEn;
document.getElementById("customerCap").textContent = `${Q.customer}님 맞춤 여행 · ${Q.quoteNo}`;
document.getElementById("tripTitle").textContent = `몽골 ${Q.destination} ${Q.nights}`;
document.getElementById("tripPeriod").textContent = Q.periodShort;
document.getElementById("tripTags").innerHTML =
  [`여행지 · ${Q.destination}`, Q.nights, `${Q.pax}인`].map(t => `<span class="tag">${t}</span>`).join("");
document.title = `${Q.customer}님 일정 지도 · ${Q.brand.company}`;

/* ── 일정 → 스팟 목록 변환 ── */
let seq = 0;
const stops = [];             // {n, day, name, spot, move}
Q.days.forEach((d, di) => {
  const names = d.dest.split(/<br\s*\/?>/i).map(s => s.trim()).filter(Boolean);
  names.forEach(name => {
    const spot = resolveSpot(name);
    stops.push({ n: ++seq, day: d.d, di, name, spot, move: d.move + " " + d.dist });
  });
});

/* ── 지도 ── */
const map = L.map("map", { zoomControl: true });
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© OpenStreetMap contributors',
}).addTo(map);

const markers = {};
const latlngs = [];
stops.forEach(s => {
  if (!s.spot) return;
  const ll = [s.spot.lat, s.spot.lng];
  latlngs.push(ll);
  const icon = L.divIcon({
    className: "", iconSize: [28, 28], iconAnchor: [14, 14],
    html: `<div class="marker-pin" style="background:${DAY_COLORS[s.di % DAY_COLORS.length]}">${s.n}</div>`,
  });
  const popImg = s.spot.img ? `<img src="${s.spot.img}" alt="${s.name}" style="width:100%;height:104px;object-fit:cover;border-radius:9px;margin-bottom:7px;display:block">` : "";
  markers[s.n] = L.marker(ll, { icon }).addTo(map)
    .bindPopup(`${popImg}<b>${s.n}. ${s.name}</b><br>${s.day}일차 · ${s.spot.desc || ""}`, { minWidth: s.spot.img ? 190 : 100 });
});

if (latlngs.length) {
  L.polyline(latlngs, { color: "#06c4a0", weight: 3, dashArray: "7 7", opacity: .85 }).addTo(map);
  map.fitBounds(latlngs, { padding: [60, 60] });
} else {
  map.setView([46.8, 103.8], 5);
}

/* ── 왼쪽 리스트 ── */
const daybar = document.getElementById("daybar");
const daylist = document.getElementById("daylist");

Q.days.forEach((d, di) => {
  const chip = document.createElement("button");
  chip.className = "daychip" + (di === 0 ? " on" : "");
  chip.textContent = `day${d.d}`;
  chip.onclick = () => {
    document.querySelectorAll(".daychip").forEach(c => c.classList.remove("on"));
    chip.classList.add("on");
    const first = stops.find(s => s.di === di && s.spot);
    if (first) focusStop(first.n, true);
    document.getElementById(`dayhead-${di}`).scrollIntoView({ behavior: "smooth", block: "start" });
  };
  daybar.appendChild(chip);

  const head = document.createElement("div");
  head.className = "dayhead"; head.id = `dayhead-${di}`;
  head.textContent = `${d.d}일차`;
  daylist.appendChild(head);

  const dayStops = stops.filter(s => s.di === di);
  dayStops.forEach(s => {
    const el = document.createElement("div");
    el.className = "spot-item"; el.id = `stop-${s.n}`;
    const thumb = (s.spot && s.spot.img) ? `<img src="${s.spot.img}" alt="${s.name}" style="width:42px;height:42px;border-radius:9px;object-fit:cover;flex:none">` : "";
    el.innerHTML = `
      <span class="num" style="background:${DAY_COLORS[di % DAY_COLORS.length]}">${s.n}</span>
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        ${thumb}
        <div style="min-width:0"><b>${s.name}</b><div class="sub">${s.spot ? (s.spot.desc || "") : "좌표 미등록 (SPOTS에 추가하세요)"}</div></div>
      </div>`;
    el.onclick = () => focusStop(s.n);
    daylist.appendChild(el);
  });
  const mv = document.createElement("div");
  mv.className = "move-line";
  mv.textContent = `↓ ${d.move} ${d.dist}`;
  daylist.appendChild(mv);
});

function focusStop(n, soft = false) {
  document.querySelectorAll(".spot-item").forEach(e => e.classList.remove("active"));
  const el = document.getElementById(`stop-${n}`);
  if (el) { el.classList.add("active"); if (!soft) el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
  const s = stops.find(x => x.n === n);
  if (s && s.spot && markers[n]) {
    map.flyTo([s.spot.lat, s.spot.lng], 9, { duration: .8 });
    markers[n].openPopup();
  }
}
</script>
</body>
</html>
