<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>일정 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="presets.js"></script>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  :root {
    --ink: #1b3531; --deep: #06c4a0; --teal: #06c4a0; --teal-dk: #06c4a0;
    --mint: #eaf7f3; --mint2: #f5fbf9; --line: #e2edea; --gray: #97a5a1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: "Pretendard Variable", Pretendard, "Malgun Gothic", sans-serif; color: var(--ink); }
  #app { display: flex; height: 100%; }

  /* ── 왼쪽 패널 ── */
  aside {
    width: 390px; flex: 0 0 390px; height: 100%; overflow-y: auto;
    border-right: 1px solid var(--line); background: #fff;
  }
  .side-head { padding: 20px 22px 16px; border-bottom: 1px solid var(--line); }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 9px; background: var(--deep); color: #fff;
    display: inline-flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .brand b { letter-spacing: .16em; font-size: 12.5px; color: var(--deep); }
  .side-head .cap { font-size: 12px; color: var(--gray); margin-bottom: 3px; }
  .side-head h1 { font-size: 21px; font-weight: 800; }
  .side-head .period { font-size: 13px; color: var(--gray); margin-top: 4px; }
  .tags { display: flex; gap: 6px; margin-top: 12px; }
  .tag { background: var(--mint); border-radius: 99px; padding: 5px 12px; font-size: 12px; font-weight: 700; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 14px 22px; border-bottom: 1px solid var(--line); }
  .btn {
    display: block; text-align: center; text-decoration: none; border-radius: 10px;
    padding: 11px 0; font-size: 13.5px; font-weight: 800; cursor: pointer; border: none;
  }
  .btn.primary { background: var(--deep); color: #fff; }
  .btn.ghost { background: var(--mint); color: var(--deep); }

  .daybar { padding: 12px 22px 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  .daychip {
    border: 1.5px solid var(--line); background: #fff; color: var(--gray);
    border-radius: 99px; padding: 6px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  .daychip.on { background: var(--day-color, var(--deep)); border-color: var(--day-color, var(--deep)); color: #fff; }

  .daylist { padding: 6px 14px 30px; }
  .dayhead { font-size: 13px; font-weight: 800; color: var(--deep); padding: 14px 8px 6px; }
  .spot-item {
    display: grid; grid-template-columns: 30px 1fr; gap: 12px; align-items: flex-start;
    padding: 11px 10px; border-radius: 12px; cursor: pointer;
  }
  .spot-item:hover { background: var(--mint2); }
  .spot-item.active { background: var(--mint); }
  .num {
    width: 26px; height: 26px; border-radius: 50%; color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12.5px; font-weight: 800; margin-top: 1px;
  }
  .spot-item b { font-size: 14px; display: block; }
  .spot-item .sub { font-size: 12px; color: var(--gray); margin-top: 2px; line-height: 1.55; }
  .move-line { font-size: 11px; color: var(--gray); padding: 0 10px 0 52px; }

  /* ── 지도 ── */
  main { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  .view-switch {
    position:absolute; z-index:1150; top:18px; right:18px; display:flex; gap:4px; padding:4px;
    border:1px solid rgba(123,91,71,.14); border-radius:13px; background:rgba(255,255,255,.92);
    box-shadow:0 8px 26px rgba(62,47,37,.12); backdrop-filter:blur(10px);
  }
  .view-switch button { border:0; background:transparent; color:#7c6d63; border-radius:9px; padding:9px 13px; font:750 12px Pretendard,sans-serif; cursor:pointer; }
  .view-switch button.on { background:#7b5b47; color:#fff; box-shadow:0 4px 10px rgba(123,91,71,.22); }

  /* 여행 안내형 지도 — 고객이 처음 보는 기본 화면 */
  .guide-view { position:absolute; inset:0; z-index:1100; overflow:auto; padding:26px; background:#f3f1ed; transition:.22s; }
  .guide-view.off { opacity:0; visibility:hidden; pointer-events:none; }
  .guide-poster { min-height:100%; max-width:980px; margin:0 auto; position:relative; overflow:hidden; border-radius:26px;
    background:#fffdf9; border:1px solid #eee7dd; box-shadow:0 18px 60px rgba(77,59,46,.13); }
  .guide-title { position:relative; z-index:2; text-align:center; padding:34px 32px 4px; }
  .guide-kicker { color:#a38a78; font-size:11px; font-weight:850; letter-spacing:.16em; }
  .guide-title h2 { margin-top:8px; color:#765744; font-size:clamp(31px,4vw,52px); line-height:.98; font-weight:950; letter-spacing:-.055em; }
  .guide-title h2 span { display:block; color:#262626; font-size:.78em; margin-top:8px; }
  .guide-dests { max-width:760px; margin:17px auto 0; color:#3b3734; font-size:clamp(13px,1.65vw,20px); line-height:1.45; font-weight:800; word-break:keep-all; }
  .route-wrap { position:relative; min-height:470px; padding:0 18px; }
  #routeGraphic { display:block; width:100%; height:auto; min-height:430px; }
  .guide-foot { position:relative; z-index:2; margin:0 34px 28px; padding:18px 20px; border-radius:15px; background:rgba(255,255,255,.82); border:1px solid #eee6da; color:#62564e; }
  .guide-foot b { display:block; color:#765744; font-size:13px; margin-bottom:7px; }
  .guide-foot ul { list-style:none; display:grid; gap:5px; font-size:12px; line-height:1.5; }
  .guide-foot li::before { content:"·"; margin-right:7px; color:#b28667; font-weight:900; }
  .guide-mini { position:absolute; left:18px; top:18px; z-index:2; display:flex; align-items:center; gap:7px; color:#8b786a; font-size:11px; font-weight:800; }
  .guide-mini i { width:25px; height:25px; border-radius:8px; background:#7b5b47; color:#fff; display:flex; align-items:center; justify-content:center; font-style:normal; font-size:10px; }
  .map-note {
    position: absolute; z-index: 500; left: 16px; bottom: 16px; max-width: 420px;
    background: rgba(255,255,255,.94); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; color: #586B67; font-size: 11.5px; line-height: 1.5;
    box-shadow: 0 5px 18px rgba(22,53,49,.12); pointer-events: none;
  }
  .map-fallback { height:100%; display:flex; align-items:center; justify-content:center; padding:30px; background:#F5F8F7; text-align:center; color:#5B6D69; line-height:1.7; }
  .route-alert { margin:8px 8px 2px; padding:10px 12px; border-radius:9px; background:#FFF8ED; border:1px solid #F0D8AA; color:#8A651D; font-size:11.5px; line-height:1.5; }
  .marker-pin {
    width: 28px; height: 28px; border-radius: 50%; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font: 800 13px/1 Pretendard, sans-serif;
    border: 2.5px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  .leaflet-popup-content { font-family: Pretendard, sans-serif; font-size: 13px; }
  .leaflet-popup-content b { color: var(--deep); }

  @media (max-width: 760px) {
    #app { flex-direction: column-reverse; }
    aside { width: 100%; flex: 1; }
    main { flex: 0 0 68%; min-height:540px; }
    .map-note { left:10px; right:10px; bottom:10px; max-width:none; font-size:10.5px; }
    .guide-view { padding:10px; }
    .guide-poster { border-radius:18px; }
    .guide-title { padding:58px 15px 0; }
    .guide-title h2 { font-size:31px; }
    .guide-dests { font-size:12px; margin-top:12px; padding:0 5px; }
    .route-wrap { min-height:330px; padding:0; }
    #routeGraphic { min-height:320px; }
    .guide-foot { margin:0 14px 16px; padding:14px; }
    .guide-foot li { font-size:10.5px; }
    .view-switch { top:12px; right:12px; }
    .view-switch button { padding:8px 10px; font-size:11px; }
  }
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="side-head">
      <div class="brand"><span class="mark">▲</span><b id="brandName"></b></div>
      <div class="cap" id="customerCap"></div>
      <h1 id="tripTitle"></h1>
      <div class="period" id="tripPeriod"></div>
      <div class="tags" id="tripTags"></div>
    </div>
    <div class="actions">
      <a class="btn primary" id="quoteLink" href="견적서.html#schedule">← 견적서 일정으로 돌아가기</a>
      <a class="btn ghost" href="https://pf.kakao.com/_BSLaxl" target="_blank">💬 카톡 문의</a>
    </div>
    <div class="daybar" id="daybar"></div>
    <div class="daylist" id="daylist"></div>
  </aside>
  <main>
    <div id="map"></div>
    <div class="guide-view" id="guideView">
      <article class="guide-poster">
        <div class="guide-mini"><i>▲</i><span id="guideBrand"></span></div>
        <header class="guide-title">
          <div class="guide-kicker">CUSTOM MONGOLIA JOURNEY</div>
          <h2 id="guideTitle"></h2>
          <div class="guide-dests" id="guideDests"></div>
        </header>
        <div class="route-wrap"><svg id="routeGraphic" viewBox="0 0 900 500" role="img" aria-label="여행 방문 순서 안내 지도"></svg></div>
        <footer class="guide-foot">
          <b>여행 전 확인해 주세요</b>
          <ul>
            <li>표시된 이동시간은 일정 이해를 돕기 위한 예상 시간입니다.</li>
            <li>현지 도로·날씨·항공편 상황에 따라 이동 순서와 시간이 조정될 수 있습니다.</li>
            <li>정확한 도로 위치가 필요하면 오른쪽 위 ‘실제 지도’를 눌러 확인하세요.</li>
          </ul>
        </footer>
      </article>
    </div>
    <div class="view-switch" aria-label="지도 보기 방식">
      <button type="button" class="on" id="guideModeBtn">여행 안내</button>
      <button type="button" id="realModeBtn">실제 지도</button>
    </div>
    <div class="map-note">연결선은 방문 순서를 나타내는 안내선입니다. 실제 도로와 주행 경로·시간은 현지 상황에 따라 달라질 수 있습니다.</div>
  </main>
</div>

<script type="module">
/* 견적 출처: ?t=<token>이면 서버(고객 매직링크), 아니면 localStorage(편집기)/data.js 샘플 */
const _token = new URLSearchParams(location.search).get("t");
const Q = await (async () => {
  if (_token) {
    try {
      const res = await fetch("/api/my/" + encodeURIComponent(_token), { cache: "no-store" });
      const j = await res.json();
      if (j.ok && j.quote) return j.quote;
    } catch (e) {}
    return null;   // 토큰은 있지만 아직 견적 미발행 또는 잘못된 링크
  }
  try {
    const saved = JSON.parse(localStorage.getItem("leaders_quote") || "null");
    if (saved) return saved;
  } catch (e) {}
  return window.QUOTE;
})();

if (!Q) {
  document.body.innerHTML =
    `<div style="max-width:640px;margin:80px auto;padding:0 24px;text-align:center;font-family:Pretendard,sans-serif;color:#16261f">
      <div style="font-size:46px">🗺</div>
      <h1 style="font-size:22px;margin:14px 0 8px;font-weight:800">일정 지도를 준비 중이에요</h1>
      <p style="color:#6b7c78;line-height:1.65;font-size:15px">견적서가 발행되면 이 링크에서 일정 지도를 볼 수 있어요.</p>
      <a href="내견적.html?t=${encodeURIComponent(_token || "")}" style="display:inline-block;margin-top:22px;color:#06c4a0;font-weight:800;text-decoration:none">← 내 견적 확인으로 돌아가기</a>
    </div>`;
  throw new Error("quote not ready");
}

/* 견적서 링크에 토큰 전달 (고객이 지도→견적서로 이동해도 자기 견적을 보도록) */
if (_token) document.getElementById("quoteLink").href = "견적서.html?t=" + encodeURIComponent(_token) + "#schedule";

/* ─────────────────────────────────────────────
   장소 사전 — presets.js의 명소 라이브러리에서 좌표를 가져옵니다.
   (울란바토르만 별도 추가. 나머지는 presets.js에서 관리)
   ───────────────────────────────────────────── */
const SPOTS = { "울란바토르": { lat: 47.8864, lng: 106.9057, desc: "몽골의 수도" } };
const _lib = (window.getSpots ? getSpots() : (window.PRESETS ? PRESETS.spots : {}));
for (const [name, s] of Object.entries(_lib)) {
  if (s && s.lat != null) SPOTS[name] = { lat: s.lat, lng: s.lng, desc: s.short || s.desc, img: s.img || "" };
}
// 견적서에 담긴 명소 사진도 이름으로 병합 (다른 기기에서 열어도 사진이 보이도록)
(Q.highlights || []).forEach(h => {
  if (h && h.name && SPOTS[h.name] && h.img && !SPOTS[h.name].img) SPOTS[h.name].img = h.img;
});

/* 명소 라이브러리에 없지만 일정에 자주 쓰이는 고정 지점 + 이름 별칭 (좌표 자동 연결용) */
const EXTRA_SPOTS = {
  "칭기스칸국제공항": { lat: 47.6478, lng: 106.8206, desc: "칭기스칸 국제공항" },
  "칭기즈칸국제공항": { lat: 47.6478, lng: 106.8206, desc: "칭기스칸 국제공항" },
  "어기호수":        { lat: 47.7667, lng: 102.7167, desc: "어기 호수(Ögii)" },
  "우기호수":        { lat: 47.7667, lng: 102.7167, desc: "어기 호수(Ögii)" },
  "미니사막":        { lat: 47.3500, lng: 103.6700, desc: "미니 고비(엘승타사르하이)" },
  "미니고비":        { lat: 47.3500, lng: 103.6700, desc: "미니 고비(엘승타사르하이)" },
  "엘슨타사르해":    { lat: 47.3500, lng: 103.6700, desc: "엘승타사르하이" },
  "하르허링":        { lat: 47.1970, lng: 102.8230, desc: "하르허링(카라코룸)" },
  "쳉헤르온천":      { lat: 47.3175, lng: 101.6503, desc: "쳉헤르 온천" },
  "호스타이국립공원": { lat: 47.7500, lng: 105.9000, desc: "호스타이 국립공원" },
  "오르혼폭포":      { lat: 46.7900, lng: 101.9600, desc: "오르혼 폭포" },
  "오르혼계곡":      { lat: 46.7900, lng: 101.9600, desc: "오르혼 계곡" },
  "무릉":           { lat: 49.6342, lng: 100.1625, desc: "무릉(Mörön)" },
  "하트갈":         { lat: 50.4400, lng: 100.1600, desc: "하트갈(홉스굴 남단)" },
  "아마르바야스갈란트": { lat: 49.4833, lng: 105.0833, desc: "아마르바야스갈란트 사원" },
};

/* 이름 매칭: 정확일치 → 별칭 → 부분일치. 공백·구두점·대소문자 무시 */
const _norm = s => (s || "").normalize("NFC").replace(/[\s·・.,()]/g, "").toLowerCase();
const _spotNorm = {}, _extraNorm = {};
for (const [k, v] of Object.entries(SPOTS)) _spotNorm[_norm(k)] = { ...v };
for (const [k, v] of Object.entries(EXTRA_SPOTS)) _extraNorm[_norm(k)] = v;
function resolveSpot(raw) {
  const k = _norm(raw);
  if (!k) return null;
  if (_spotNorm[k]) return _spotNorm[k];    // 명소 라이브러리 정확 일치
  if (_extraNorm[k]) return _extraNorm[k];  // 내장 고정지점/별칭 정확 일치
  for (const [nk, v] of Object.entries(_spotNorm))  if (nk.length >= 2 && (k.includes(nk) || nk.includes(k))) return v;  // 부분 일치(라이브러리 우선)
  for (const [nk, v] of Object.entries(_extraNorm)) if (nk.length >= 2 && (k.includes(nk) || nk.includes(k))) return v;
  return null;
}

const DAY_COLORS = ["#06A889", "#3578C9", "#D4932F", "#D65F50", "#7B61B5", "#2F8B9B", "#8A6A3D"];

/* ── 헤더 채우기 ── */
document.getElementById("brandName").textContent = Q.brand.companyEn;
document.getElementById("customerCap").textContent = `${Q.customer}님 맞춤 여행 · ${Q.quoteNo}`;
document.getElementById("tripTitle").textContent = `몽골 ${Q.destination} ${Q.nights}`;
document.getElementById("tripPeriod").textContent = Q.periodShort;
document.getElementById("tripTags").innerHTML =
  [`여행지 · ${Q.destination}`, Q.nights, `${Q.pax}인`].map(t => `<span class="tag">${t}</span>`).join("");
document.title = `${Q.customer}님 일정 지도 · ${Q.brand.company}`;

/* ── 일정 → 스팟 목록 변환 ── */
let seq = 0;
const stops = [];             // {n, day, name, spot, move}
Q.days.forEach((d, di) => {
  const names = d.dest.split(/<br\s*\/?>/i).map(s => s.trim()).filter(Boolean);
  names.forEach(name => {
    const spot = resolveSpot(name);
    stops.push({ n: ++seq, day: d.d, di, name, spot, move: d.move + " " + d.dist });
  });
});

/* ── 여행 안내형 지도 ──
   실제 좌표가 있으면 지리적 방향을 반영하고, 좌표가 없는 장소도 일정 순서에 맞춰 배치합니다. */
const svgEsc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const guideBrand = document.getElementById("guideBrand");
guideBrand.textContent = Q.brand.companyEn || Q.brand.company || "MONGOLIA MILKY WAY";
document.getElementById("guideTitle").innerHTML = `${svgEsc(`몽골 ${Q.destination}`)}<span>${svgEsc(Q.nights)}</span>`;
const destNames = [...new Set(stops.map(s => s.name).filter(Boolean))];
document.getElementById("guideDests").textContent = destNames.join(" / ");

function guidePoints(items) {
  const located = items.filter(s => s.spot);
  const lngs = located.map(s => s.spot.lng), lats = located.map(s => s.spot.lat);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs), minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const usableGeo = located.length >= 2 && isFinite(minLng) && ((maxLng - minLng) > .15 || (maxLat - minLat) > .15);
  const seen = [];
  return items.map((s, i) => {
    let x, y;
    if (usableGeo && s.spot) {
      x = 145 + ((s.spot.lng - minLng) / Math.max(maxLng - minLng, .1)) * 610;
      y = 145 + ((maxLat - s.spot.lat) / Math.max(maxLat - minLat, .1)) * 230;
    } else {
      const angle = (-18 + i * (310 / Math.max(items.length - 1, 1))) * Math.PI / 180;
      x = 450 + Math.cos(angle) * 280;
      y = 270 + Math.sin(angle) * 125;
    }
    const near = seen.filter(p => Math.hypot(p.x - x, p.y - y) < 46).length;
    if (near) { x += near * 34; y += (i % 2 ? 1 : -1) * near * 30; }
    x = Math.max(105, Math.min(795, x)); y = Math.max(125, Math.min(405, y));
    const p = { ...s, x, y }; seen.push(p); return p;
  });
}

function shortMove(text) {
  const clean = String(text || "").replace(/\s+/g, " ").trim();
  if (!clean) return "이동";
  const time = clean.match(/(?:약\s*)?\d+(?:\s*[~-]\s*\d+)?\s*(?:시간|분)(?:\s*\d+\s*분)?/);
  return time ? `약 ${time[0].replace(/^약\s*/, "")}` : clean.slice(0, 12);
}

let focusStopOnMap = () => {};
function renderGuideMap() {
  const svg = document.getElementById("routeGraphic");
  const points = guidePoints(stops);
  const bg = `
    <defs>
      <marker id="routeArrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9" fill="none" stroke="#c9a77f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
      <filter id="nodeShadow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#7b5b47" flood-opacity=".2"/></filter>
    </defs>
    <path d="M58 205 C84 170 96 112 153 108 C192 54 265 76 304 102 C354 86 421 92 452 122 C510 86 574 99 613 129 C671 109 735 142 767 177 C812 179 846 213 830 253 C854 294 815 335 787 352 C774 402 706 425 660 410 C614 446 548 429 511 411 C456 439 388 427 354 401 C302 434 244 415 211 389 C162 410 106 374 100 335 C60 317 47 264 67 234 Z" fill="#fcfaf6" stroke="#eee7dd" stroke-width="2"/>
    <g fill="none" stroke="#eee8de" stroke-width="1.7" opacity=".85">
      <path d="M145 112 C172 176 136 228 169 283 C189 319 165 362 186 390"/><path d="M275 91 C289 145 260 191 287 237 C318 289 278 341 301 412"/>
      <path d="M421 99 C406 151 437 194 415 242 C394 291 425 348 407 422"/><path d="M560 108 C545 158 578 206 552 251 C523 304 556 358 537 421"/>
      <path d="M690 129 C664 179 704 221 681 269 C654 324 686 366 659 411"/><path d="M75 235 C181 222 253 253 349 232 C448 210 533 237 620 221 C708 204 770 234 834 222"/>
      <path d="M93 325 C174 303 265 331 344 311 C436 288 521 320 607 301 C688 283 752 314 809 295"/>
    </g>`;
  const segments = points.slice(1).map((p, i) => {
    const a = points[i], bend = (i % 2 ? -1 : 1) * 22;
    const mx = (a.x + p.x) / 2, my = (a.y + p.y) / 2;
    const len = Math.max(Math.hypot(p.x - a.x, p.y - a.y), 1);
    const cx = mx - ((p.y - a.y) / len) * bend, cy = my + ((p.x - a.x) / len) * bend;
    const lx = (a.x + 2 * cx + p.x) / 4, ly = (a.y + 2 * cy + p.y) / 4 - 10;
    return `<path d="M ${a.x} ${a.y} Q ${cx} ${cy} ${p.x} ${p.y}" fill="none" stroke="#ead0ad" stroke-width="5" stroke-linecap="round" marker-end="url(#routeArrow)"/>
      <text x="${lx}" y="${ly}" text-anchor="middle" fill="#a99b90" font-size="11" font-weight="650">${svgEsc(shortMove(p.move))}</text>`;
  }).join("");
  const nodes = points.map((p, i) => {
    const placeRight = p.x < 490;
    const labelX = p.x + (placeRight ? 28 : -28), anchor = placeRight ? "start" : "end";
    const labelY = p.y + (i % 2 ? 6 : 25);
    const dayText = `${p.day}일차`;
    return `<g class="guide-node" tabindex="0" role="button" aria-label="${svgEsc(`${p.n}. ${p.name}`)}" data-stop="${p.n}" style="cursor:pointer">
      <circle cx="${p.x}" cy="${p.y}" r="18" fill="#7b5b47" stroke="#fffdf9" stroke-width="3" filter="url(#nodeShadow)"/>
      <text x="${p.x}" y="${p.y + 5}" text-anchor="middle" fill="#fff" font-size="14" font-weight="850">${p.n}</text>
      <text x="${labelX}" y="${labelY}" text-anchor="${anchor}" fill="#805f4b" font-size="15" font-weight="850">${svgEsc(p.name)}</text>
      <text x="${labelX}" y="${labelY + 16}" text-anchor="${anchor}" fill="#b09d90" font-size="10.5" font-weight="650">${dayText}</text>
    </g>`;
  }).join("");
  svg.innerHTML = bg + segments + nodes;
  svg.querySelectorAll(".guide-node").forEach(node => {
    const open = () => { setMapMode("real"); setTimeout(() => focusStopOnMap(Number(node.dataset.stop)), 260); };
    node.addEventListener("click", open);
    node.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") open(); });
  });
}
renderGuideMap();

let leafletMap = null;
function setMapMode(mode) {
  const guide = mode !== "real";
  document.getElementById("guideView").classList.toggle("off", !guide);
  document.getElementById("guideModeBtn").classList.toggle("on", guide);
  document.getElementById("realModeBtn").classList.toggle("on", !guide);
  if (!guide && leafletMap) setTimeout(() => leafletMap.invalidateSize(), 240);
}
document.getElementById("guideModeBtn").onclick = () => setMapMode("guide");
document.getElementById("realModeBtn").onclick = () => setMapMode("real");

/* ── 지도 ── */
function initMap() {
const map = leafletMap = L.map("map", { zoomControl: true });
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© OpenStreetMap contributors',
}).addTo(map);

const markers = {};
const latlngs = [];
const locatedStops = [];
stops.forEach(s => {
  if (!s.spot) return;
  const ll = [s.spot.lat, s.spot.lng];
  latlngs.push(ll);
  locatedStops.push(s);
  const icon = L.divIcon({
    className: "", iconSize: [28, 28], iconAnchor: [14, 14],
    html: `<div class="marker-pin" style="background:${DAY_COLORS[s.di % DAY_COLORS.length]}">${s.n}</div>`,
  });
  const popImg = s.spot.img ? `<img src="${s.spot.img}" alt="${s.name}" style="width:100%;height:104px;object-fit:cover;border-radius:9px;margin-bottom:7px;display:block">` : "";
  markers[s.n] = L.marker(ll, { icon }).addTo(map)
    .bindPopup(`${popImg}<b>${s.n}. ${s.name}</b><br>${s.day}일차 · ${s.spot.desc || ""}<br><span style="color:#71817d;font-size:11px">${s.move || ""}</span>`, { minWidth: s.spot.img ? 190 : 140 });
});

if (latlngs.length) {
  for (let i = 1; i < locatedStops.length; i++) {
    const prev = locatedStops[i - 1], cur = locatedStops[i];
    L.polyline([[prev.spot.lat, prev.spot.lng], [cur.spot.lat, cur.spot.lng]], {
      color: DAY_COLORS[cur.di % DAY_COLORS.length], weight: 3, dashArray: "7 7", opacity: .88,
    }).addTo(map);
  }
  map.fitBounds(latlngs, { padding: [60, 60] });
} else {
  map.setView([46.8, 103.8], 5);
}

/* ── 왼쪽 리스트 ── */
const daybar = document.getElementById("daybar");
const daylist = document.getElementById("daylist");
const missingCount = stops.filter(s => !s.spot).length;
if (missingCount) daylist.insertAdjacentHTML("beforeend", `<div class="route-alert">세부 장소 ${missingCount}곳은 위치 확인 후 지도에 추가됩니다. 일정표의 방문 순서는 그대로 확인할 수 있습니다.</div>`);

Q.days.forEach((d, di) => {
  const chip = document.createElement("button");
  chip.className = "daychip" + (di === 0 ? " on" : "");
  chip.style.setProperty("--day-color", DAY_COLORS[di % DAY_COLORS.length]);
  chip.style.borderColor = DAY_COLORS[di % DAY_COLORS.length];
  if (di !== 0) chip.style.color = DAY_COLORS[di % DAY_COLORS.length];
  chip.textContent = `day${d.d}`;
  chip.onclick = () => {
    document.querySelectorAll(".daychip").forEach(c => { c.classList.remove("on"); c.style.color = c.style.getPropertyValue("--day-color"); });
    chip.classList.add("on");
    chip.style.color = "#fff";
    const first = stops.find(s => s.di === di && s.spot);
    if (first) focusStop(first.n, true);
    document.getElementById(`dayhead-${di}`).scrollIntoView({ behavior: "smooth", block: "start" });
  };
  daybar.appendChild(chip);

  const head = document.createElement("div");
  head.className = "dayhead"; head.id = `dayhead-${di}`;
  head.textContent = `${d.d}일차`;
  daylist.appendChild(head);

  const dayStops = stops.filter(s => s.di === di);
  dayStops.forEach(s => {
    const el = document.createElement("div");
    el.className = "spot-item"; el.id = `stop-${s.n}`;
    const thumb = (s.spot && s.spot.img) ? `<img src="${s.spot.img}" alt="${s.name}" style="width:42px;height:42px;border-radius:9px;object-fit:cover;flex:none">` : "";
    el.innerHTML = `
      <span class="num" style="background:${DAY_COLORS[di % DAY_COLORS.length]}">${s.n}</span>
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        ${thumb}
        <div style="min-width:0"><b>${s.name}</b><div class="sub">${s.spot ? (s.spot.desc || "") : "세부 위치 확인 중"}</div></div>
      </div>`;
    el.onclick = () => focusStop(s.n);
    daylist.appendChild(el);
  });
  const mv = document.createElement("div");
  mv.className = "move-line";
  mv.textContent = `↓ ${d.move} ${d.dist}`;
  daylist.appendChild(mv);
});

function focusStop(n, soft = false) {
  document.querySelectorAll(".spot-item").forEach(e => e.classList.remove("active"));
  const el = document.getElementById(`stop-${n}`);
  if (el) { el.classList.add("active"); if (!soft) el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
  const s = stops.find(x => x.n === n);
  if (s && s.spot && markers[n]) {
    map.flyTo([s.spot.lat, s.spot.lng], 9, { duration: .8 });
    markers[n].openPopup();
  }
}
focusStopOnMap = focusStop;
}

if (window.L) {
  initMap();
} else {
  document.querySelector("main").innerHTML = `<div class="map-fallback"><div><b style="display:block;color:#1B3531;font-size:17px;margin-bottom:6px">지도를 불러오지 못했어요</b>네트워크 연결을 확인한 뒤 새로고침해 주세요.<br>왼쪽 일정표는 그대로 확인할 수 있습니다.</div></div>`;
}
</script>
</body>
</html>
