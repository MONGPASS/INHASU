<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06c4a0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="은하수 관리자">
<link rel="apple-touch-icon" href="img/app/apple-touch-icon.png">
<title>명소 관리 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="presets.js"></script>
<style>
  :root { --accent:#06c4a0; --deep:#06c4a0; --deep2:#06c4a0; --soft:#eaf7f3;
    --ink:#1b2b28; --sub:#6b7c78; --gray:#9aa5a2; --line:#eceef1; --bg:#f6f8f9; --red:#e2574c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  svg { display:block; }

  .shell { display:flex; min-height:100vh; }
  .side { width:232px; flex:0 0 232px; background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; }
  .side-brand { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .side-brand .logo { width:38px; height:38px; border-radius:11px; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .side-brand b { font-size:15px; font-weight:800; display:block; line-height:1.2; }
  .side-brand small { font-size:11.5px; color:var(--gray); font-weight:600; }
  .menu-label { font-size:11px; font-weight:800; color:#b3bdba; letter-spacing:.05em; padding:16px 10px 7px; }
  .mi { display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; color:var(--sub); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:2px; border:none; background:none; width:100%; font-family:inherit; transition:.12s; }
  .mi svg { flex:0 0 auto; }
  .mi:hover { background:var(--soft); color:var(--deep); }
  .mi.on { background:var(--deep); color:#fff; }
  .side-foot { margin-top:auto; padding-top:12px; border-top:1px solid var(--line); }

  .content { flex:1; min-width:0; padding:26px 34px 60px; max-width:1240px; }
  .page-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .page-head h1 { font-size:20px; font-weight:800; }
  .page-head .add { margin-left:auto; background:var(--deep); color:#fff; border:none; border-radius:10px; padding:11px 18px; font-size:13.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .lead { font-size:13px; color:var(--sub); margin-bottom:16px; }
  .lead b { color:var(--deep); }

  .tabs { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  .tab { border:1.5px solid var(--line); background:#fff; color:var(--sub); border-radius:999px; padding:8px 15px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:7px; transition:.12s; }
  .tab:hover { border-color:var(--accent); color:var(--deep); }
  .tab.on { background:var(--deep); border-color:var(--deep); color:#fff; }
  .tab .cnt { font-size:11px; font-weight:800; opacity:.85; }
  .tab.addcat { color:var(--deep); border-style:dashed; border-color:var(--accent); }
  .tab .edit { display:inline-flex; margin-left:2px; opacity:.75; }
  .tab .edit:hover { opacity:1; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; }
  .spot-card { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; cursor:pointer; transition:.12s; }
  .spot-card:hover { border-color:var(--accent); box-shadow:0 8px 24px rgba(20,50,45,.06); }
  .thumb { height:150px; background:#eef2f1; display:flex; align-items:center; justify-content:center; color:#b3bebb; font-size:13px; position:relative; }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb .noimg { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .thumb .region { position:absolute; top:10px; left:10px; background:rgba(255,255,255,.92); color:var(--deep); border-radius:7px; padding:3px 9px; font-size:11px; font-weight:800; }
  .spot-card .body { padding:14px 16px; }
  .spot-card .mn { font-size:11.5px; font-weight:800; color:var(--accent); }
  .spot-card h3 { font-size:16px; font-weight:800; margin:2px 0 5px; }
  .spot-card p { font-size:12.5px; color:var(--sub); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  /* 드로어 */
  .overlay { position:fixed; inset:0; background:rgba(20,40,36,.4); z-index:40; opacity:0; pointer-events:none; transition:.2s; }
  .overlay.on { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; width:520px; max-width:96vw; height:100%; background:#fff; z-index:50; box-shadow:-10px 0 40px rgba(20,40,36,.15); transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.on { transform:translateX(0); }
  .dh { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; }
  .dh h2 { font-size:18px; font-weight:800; }
  .dh .x { margin-left:auto; border:none; background:#f2f5f4; width:32px; height:32px; border-radius:9px; font-size:18px; cursor:pointer; color:var(--sub); }
  .db { flex:1; overflow-y:auto; padding:22px 24px; }
  label.f { display:block; margin-bottom:16px; }
  label.f span { display:block; font-size:12.5px; font-weight:700; color:var(--sub); margin-bottom:6px; }
  input, textarea, select { width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; color:var(--ink); outline:none; background:#fff; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); }
  textarea { resize:vertical; line-height:1.65; min-height:110px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .geo-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12.5px; font-weight:700; color:var(--sub); margin-bottom:8px; }
  .geo-btn { margin-left:auto; border:1.5px solid var(--accent); background:var(--soft); color:var(--deep); border-radius:9px; padding:7px 12px; font-size:12.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .geo-btn:disabled { opacity:.55; cursor:default; }
  .geo-msg { font-size:12px; margin-top:7px; line-height:1.5; min-height:2px; }
  .geo-msg.ok { color:var(--deep); font-weight:700; }
  .geo-msg.err { color:var(--red); font-weight:700; }

  /* 이미지 업로드 */
  .up-main { border:1.5px dashed #c7d0cd; border-radius:14px; height:180px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; position:relative; background:#fafcfb; color:var(--gray); text-align:center; }
  .up-main img { width:100%; height:100%; object-fit:cover; }
  .up-main .ph { display:flex; flex-direction:column; gap:8px; align-items:center; font-size:13px; }
  .up-main .change { position:absolute; right:8px; bottom:8px; background:rgba(0,0,0,.55); color:#fff; font-size:11px; padding:4px 10px; border-radius:7px; }
  .up-subs { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
  .up-sub { border:1.5px dashed #c7d0cd; border-radius:10px; height:64px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; background:#fafcfb; color:#b3bebb; font-size:20px; position:relative; }
  .up-sub img { width:100%; height:100%; object-fit:cover; }
  .up-sub .del { position:absolute; top:2px; right:2px; background:rgba(0,0,0,.5); color:#fff; width:16px; height:16px; border-radius:50%; font-size:11px; line-height:16px; text-align:center; }
  .hintline { font-size:11.5px; color:var(--gray); margin-top:6px; }

  .df { padding:16px 24px; border-top:1px solid var(--line); display:flex; gap:8px; }
  .df button { padding:13px 0; border-radius:11px; font-size:14px; font-weight:800; cursor:pointer; border:none; font-family:inherit; }
  .df .save { flex:1; background:var(--deep); color:#fff; }
  .df .del { background:#fbeceb; color:var(--red); padding:13px 18px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--deep2); color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; }
  .toast.on { opacity:1; }
  .storage { position:fixed; left:246px; bottom:12px; font-size:11.5px; color:var(--gray); background:#fff; border:1px solid var(--line); border-radius:8px; padding:6px 11px; z-index:5; }
  @media (max-width:820px){ .side{display:none} .content{padding:20px} .storage{left:12px} }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="side-brand">
      <span class="logo">▲</span>
      <div><b>몽골리아 은하수</b><small>몽골리아 관리자</small></div>
    </div>
    <nav>
      <a class="mi" href="/admin">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        대시보드
      </a>
      <a class="mi" href="/admin">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>

      <a class="mi" href="코스관리.html">

        일정 관리
      </a>
      <a class="mi on" href="명소관리.html">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        명소 관리
      </a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-head">
      <h1>명소 관리</h1>
      <button class="add" id="geoAllBtn" style="background:var(--soft);color:var(--deep)">📍 좌표 일괄 채우기</button>
      <button class="add" id="addBtn">＋ 새 명소 추가</button>
    </div>
    <div class="lead">여기서 추가·수정한 명소가 <b>견적서 대표 명소 페이지</b>와 <b>지도</b>, <b>견적서 만들기</b>에 그대로 반영됩니다. <b>카테고리(지역)</b> 탭으로 여행지별로 명소를 관리할 수 있습니다.</div>
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>
<div class="storage" id="storageTag"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

/* 로컬 데모(서버 없음)면 base64로 폴백, 실서버면 R2에 WebP 업로드 */
const IS_LOCAL = location.protocol === "file:" || ["localhost", "127.0.0.1"].includes(location.hostname);
const ADMIN_TOKEN = localStorage.getItem("leaders_admin_token") || sessionStorage.getItem("leaders_admin_token") || "";

/* ── 좌표 자동 조회(지오코딩) ── 서버(/api/geocode)가 Nominatim을 호출 ── */
async function geocode(query, altQuery) {
  const token = localStorage.getItem("leaders_admin_token") || sessionStorage.getItem("leaders_admin_token") || ADMIN_TOKEN;
  const tries = [query, altQuery, altQuery ? altQuery + " Mongolia" : ""].filter((v, i, a) => v && a.indexOf(v) === i);
  for (const q of tries) {
    try {
      const res = await fetch("/api/geocode?token=" + encodeURIComponent(token) + "&q=" + encodeURIComponent(q));
      if (res.status === 401) { toast("관리자 로그인이 필요합니다"); return null; }
      const j = await res.json().catch(() => ({}));
      if (j.ok && j.lat != null) return j;
    } catch (e) {}
  }
  return null;
}
function setGeoMsg(msg, cls) { const el = $("geoMsg"); if (el) { el.textContent = msg; el.className = "geo-msg " + (cls || ""); } }

let SPOTS = {};   // 작업 중인 명소 라이브러리
let editKey = null;
let CATS = [];            // 카테고리(지역/여행지) 목록 (순서 보존)
let activeCat = "__all";  // 현재 탭: "__all"(전체) | "__none"(미분류) | 카테고리명
const UNCAT = "미분류";

function load() {
  SPOTS = JSON.parse(JSON.stringify(getSpots()));  // 깊은 복사
  CATS = getSpotCats().slice();
  // 명소에 들어있는 지역 중 목록에 없는 것이 있으면 자동 편입
  Object.values(SPOTS).forEach(s => {
    const c = (s.region || "").trim();
    if (c && !CATS.includes(c)) CATS.push(c);
  });
  if (activeCat !== "__all" && activeCat !== "__none" && !CATS.includes(activeCat)) activeCat = "__all";
  renderTabs(); renderGrid();
}
// 서버(D1)에 영구 저장. localStorage에도 쓰고, 서버 반영 결과를 반환합니다.
function persist() {
  updateStorage();
  saveSpotCats(CATS);
  return saveSpots(SPOTS);   // {ok:true}=서버저장 / {local:true}=로컬만 / {ok:false}=실패
}

/* ── 카테고리 탭 ── */
function catOf(s){ return (s && s.region ? String(s.region).trim() : ""); }
function countIn(cat){ return Object.values(SPOTS).filter(s => catOf(s) === cat).length; }

function renderTabs() {
  const total = Object.keys(SPOTS).length;
  const noneCnt = Object.values(SPOTS).filter(s => !catOf(s)).length;
  let html = `<button class="tab ${activeCat==="__all"?"on":""}" data-cat="__all">전체 <span class="cnt">${total}</span></button>`;
  CATS.forEach(c => {
    const on = activeCat === c;
    html += `<button class="tab ${on?"on":""}" data-cat="${esc(c)}">${esc(c)} <span class="cnt">${countIn(c)}</span>`
      + (on ? `<span class="edit" data-act="ren" title="이름 변경">✎</span><span class="edit" data-act="del" title="삭제">🗑</span>` : ``)
      + `</button>`;
  });
  if (noneCnt) html += `<button class="tab ${activeCat==="__none"?"on":""}" data-cat="__none">${UNCAT} <span class="cnt">${noneCnt}</span></button>`;
  html += `<button class="tab addcat" id="addCatBtn">＋ 카테고리</button>`;
  $("tabs").innerHTML = html;

  $("tabs").querySelectorAll(".tab[data-cat]").forEach(el => {
    el.onclick = (e) => {
      const act = e.target.closest(".edit")?.dataset.act;
      if (act === "ren") { renameCat(el.dataset.cat); return; }
      if (act === "del") { deleteCat(el.dataset.cat); return; }
      activeCat = el.dataset.cat; renderTabs(); renderGrid();
    };
  });
  $("addCatBtn").onclick = addCat;
}

function addCat() {
  const name = (prompt("새 카테고리(지역/여행지) 이름을 입력하세요") || "").trim();
  if (!name) return;
  if (name === UNCAT) { toast(`"${UNCAT}"은(는) 사용할 수 없는 이름입니다`); return; }
  if (CATS.includes(name)) { toast("이미 있는 카테고리입니다"); activeCat = name; renderTabs(); renderGrid(); return; }
  CATS.push(name); saveSpotCats(CATS); activeCat = name; renderTabs(); renderGrid();
  toast(`"${name}" 카테고리가 추가되었습니다`);
}
function renameCat(cat) {
  const name = (prompt("카테고리 이름 변경", cat) || "").trim();
  if (!name || name === cat) return;
  if (name === UNCAT || CATS.includes(name)) { toast("사용할 수 없거나 이미 있는 이름입니다"); return; }
  CATS = CATS.map(c => c === cat ? name : c);
  Object.values(SPOTS).forEach(s => { if (catOf(s) === cat) s.region = name; });
  if (activeCat === cat) activeCat = name;
  persist(); renderTabs(); renderGrid(); toast("이름이 변경되었습니다");
}
function deleteCat(cat) {
  const n = countIn(cat);
  if (!confirm(`"${cat}" 카테고리를 삭제할까요?` + (n ? `\n이 카테고리의 명소 ${n}개는 "${UNCAT}"으로 이동합니다. (명소는 삭제되지 않습니다)` : ""))) return;
  CATS = CATS.filter(c => c !== cat);
  Object.values(SPOTS).forEach(s => { if (catOf(s) === cat) s.region = ""; });
  if (activeCat === cat) activeCat = "__all";
  persist(); renderTabs(); renderGrid(); toast("카테고리가 삭제되었습니다");
}

/* ── 카드 그리드 ── */
function renderGrid() {
  let entries = Object.entries(SPOTS);
  if (activeCat === "__none") entries = entries.filter(([,s]) => !catOf(s));
  else if (activeCat !== "__all") entries = entries.filter(([,s]) => catOf(s) === activeCat);
  $("grid").innerHTML = entries.map(([name, s]) => `
    <div class="spot-card" data-k="${esc(name)}">
      <div class="thumb">
        ${s.img ? `<img src="${s.img}" alt="${esc(name)}">` : `<div class="noimg"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M4 18l5-5 3 3 4-4 4 4"/></svg><span>이미지 없음</span></div>`}
        ${s.region ? `<span class="region">${esc(s.region)}</span>` : ""}
      </div>
      <div class="body">
        <div class="mn">${esc(s.nameMn || "")}</div>
        <h3>${esc(name)}</h3>
        <p>${esc(s.short || s.desc || "설명을 추가하세요")}</p>
      </div>
    </div>`).join("")
  || `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--gray)">${
      activeCat === "__all"
        ? `등록된 명소가 없습니다. 우측 상단 <b>＋ 새 명소 추가</b>로 만들어보세요.`
        : `이 카테고리에 명소가 없습니다. <b>＋ 새 명소 추가</b> 시 카테고리에서 선택해 넣어보세요.`
    }</div>`;
  $("grid").querySelectorAll(".spot-card").forEach(el => el.onclick = () => openEdit(el.dataset.k));
  updateStorage();
}

/* ── 이미지 처리: 리사이즈 → WebP → (실서버)R2 업로드 후 URL / (로컬)base64 ── */
function fileToImage(file, maxW, quality) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        c.toBlob(async (blob) => {
          if (!blob) return rej(new Error("이미지 변환 실패"));
          if (IS_LOCAL) {   // 로컬 데모: 서버가 없어 base64로만 미리보기
            const r2 = new FileReader();
            r2.onload = () => res(r2.result); r2.onerror = rej; r2.readAsDataURL(blob);
            return;
          }
          if (!ADMIN_TOKEN) return rej(new Error("관리자 로그인이 필요합니다. 관리자 페이지에서 로그인 후 이용해 주세요."));
          try {
            const fd = new FormData();
            fd.append("file", blob, "spot.webp");
            const up = await fetch("/api/upload?folder=images", { method: "POST", body: fd, headers: { "x-admin-token": ADMIN_TOKEN } });
            const j = await up.json().catch(() => ({}));
            if (up.status === 401) throw new Error("관리자 인증이 만료됐어요. 관리자 페이지에서 다시 로그인해 주세요.");
            if (!j.ok || !j.url) throw new Error(j.error || "업로드 실패");
            res(j.url);   // R2 공개 URL
          } catch (e) { rej(e); }
        }, "image/webp", quality);
      };
      img.onerror = () => rej(new Error("이미지를 읽을 수 없어요"));
      img.src = fr.result;
    };
    fr.onerror = rej; fr.readAsDataURL(file);
  });
}

/* ── 편집 드로어 ── */
function catOptions(sel) {
  const opts = CATS.map(c => `<option value="${esc(c)}" ${c===sel?"selected":""}>${esc(c)}</option>`).join("");
  return `<option value="" ${!sel?"selected":""}>${UNCAT} (지역 미지정)</option>${opts}<option value="__new">＋ 새 카테고리 추가…</option>`;
}

function openEdit(key) {
  editKey = key;
  const isNew = key === null;
  const defCat = (isNew && activeCat !== "__all" && activeCat !== "__none") ? activeCat : "";
  const s = isNew ? { nameMn:"", region:defCat, short:"", desc:"", lat:"", lng:"", img:"", subImgs:["","","",""] }
                  : JSON.parse(JSON.stringify(SPOTS[key]));
  s.subImgs = s.subImgs || ["","","",""];
  while (s.subImgs.length < 4) s.subImgs.push("");
  const nameVal = isNew ? "" : key;

  $("drawer").innerHTML = `
    <div class="dh"><h2>${isNew ? "새 명소 추가" : "명소 편집"}</h2><button class="x" id="closeX">✕</button></div>
    <div class="db">
      <div class="up-main" id="mainUp">
        ${s.img ? `<img src="${s.img}"><span class="change">이미지 변경</span>` : `<div class="ph"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M4 18l5-5 3 3 4-4 4 4"/></svg><span>대표 이미지 업로드<br>(클릭)</span></div>`}
        <input type="file" id="mainFile" accept="image/*" style="display:none">
      </div>
      <div class="hintline">큰 이미지는 자동으로 줄여 저장됩니다. (권장: 가로 사진)</div>
      <div class="up-subs" id="subUps"></div>
      <div class="hintline" style="margin-bottom:18px">추가 이미지 4장 (선택) — 견적서 대표 명소의 작은 사진들</div>

      <label class="f"><span>명소 이름 (한글)</span>
        <input id="f_name" value="${esc(nameVal)}" placeholder="예) 차강소브라가" ${isNew ? "" : ""}></label>
      <div class="row2">
        <label class="f"><span>몽골어 지명</span><input id="f_mn" value="${esc(s.nameMn)}" placeholder="예) Цагаан суварга"></label>
        <label class="f"><span>카테고리 (지역/여행지)</span>
          <select id="f_region">${catOptions(catOf(s))}</select></label>
      </div>
      <label class="f"><span>한 줄 소개 (카드·지도에 표시)</span>
        <input id="f_short" value="${esc(s.short)}" placeholder="예) '하얀 탑' 침식지형"></label>
      <label class="f"><span>상세 설명 (견적서에 표시)</span>
        <textarea id="f_desc" placeholder="명소에 대한 설명을 적어주세요.">${esc(s.desc)}</textarea></label>
      <div class="geo-head">
        <span>위치 좌표 <span style="font-weight:500;color:var(--gray)">· 이동거리·지도 자동 계산에 사용</span></span>
        <button type="button" class="geo-btn" id="geoBtn">📍 이름으로 좌표 자동 찾기</button>
      </div>
      <div class="row2">
        <label class="f"><span>위도 (lat)</span><input id="f_lat" value="${esc(s.lat)}" placeholder="44.7086" inputmode="decimal"></label>
        <label class="f"><span>경도 (lng)</span><input id="f_lng" value="${esc(s.lng)}" placeholder="105.7469" inputmode="decimal"></label>
      </div>
      <div class="geo-msg" id="geoMsg"></div>
    </div>
    <div class="df">
      ${isNew ? "" : `<button class="del" id="delBtn">삭제</button>`}
      <button class="save" id="saveBtn">${isNew ? "추가하기" : "저장하기"}</button>
    </div>`;

  // 임시 이미지 상태
  const draft = { img: s.img, subImgs: [...s.subImgs] };
  renderSubs();
  function renderSubs() {
    $("subUps").innerHTML = draft.subImgs.map((im, i) => `
      <div class="up-sub" data-i="${i}">
        ${im ? `<img src="${im}"><span class="del" data-del="${i}">✕</span>` : "＋"}
        <input type="file" accept="image/*" style="display:none">
      </div>`).join("");
    $("subUps").querySelectorAll(".up-sub").forEach(el => {
      const i = +el.dataset.i;
      const delBtn = el.querySelector("[data-del]");
      el.onclick = e => { if (e.target.hasAttribute("data-del")) return; el.querySelector("input").click(); };
      el.querySelector("input").onchange = async e => {
        if (!e.target.files[0]) return;
        el.innerHTML = "…";
        try {
          draft.subImgs[i] = await fileToImage(e.target.files[0], 500, 0.72);
        } catch (err) { toast("⚠ " + err.message); }
        renderSubs();
      };
      if (delBtn) delBtn.onclick = ev => { ev.stopPropagation(); draft.subImgs[i] = ""; renderSubs(); };
    });
  }

  $("drawer").classList.add("on"); $("overlay").classList.add("on");
  $("closeX").onclick = closeDrawer;

  async function onMainFile(e) {
    if (!e.target.files[0]) return;
    $("mainUp").innerHTML = `<div class="ph"><span>업로드 중…</span></div>`;
    try {
      draft.img = await fileToImage(e.target.files[0], 1000, 0.82);
      $("mainUp").innerHTML = `<img src="${draft.img}"><span class="change">이미지 변경</span><input type="file" id="mainFile" accept="image/*" style="display:none">`;
    } catch (err) {
      toast("⚠ " + err.message);
      $("mainUp").innerHTML = `<div class="ph"><span>대표 이미지 업로드<br>(클릭)</span></div><input type="file" id="mainFile" accept="image/*" style="display:none">`;
    }
    $("mainFile").onchange = onMainFile;   // 새로 그린 input에 다시 연결
  }
  $("mainUp").onclick = () => $("mainFile").click();
  $("mainFile").onchange = onMainFile;

  // 좌표 자동 찾기: 명소 이름(한글) / 몽골어 지명으로 위도·경도 조회
  $("geoBtn").onclick = async () => {
    const nm = $("f_name").value.trim(), mn = $("f_mn").value.trim();
    if (!nm && !mn) { setGeoMsg("먼저 명소 이름을 입력하세요", "err"); return; }
    const btn = $("geoBtn"); btn.disabled = true; btn.textContent = "찾는 중…"; setGeoMsg("", "");
    const hit = await geocode(mn || nm, nm);
    btn.disabled = false; btn.textContent = "📍 이름으로 좌표 자동 찾기";
    if (!hit) { setGeoMsg("좌표를 찾지 못했어요. 이름(특히 몽골어 지명)을 확인하거나 직접 입력해 주세요.", "err"); return; }
    $("f_lat").value = hit.lat; $("f_lng").value = hit.lng;
    setGeoMsg(`✓ 찾았어요: ${hit.display?.split(",").slice(0,3).join(", ") || `${hit.lat}, ${hit.lng}`} — 위치가 맞는지 확인 후 저장하세요.`, "ok");
  };

  // 카테고리 선택: "＋ 새 카테고리 추가…" 를 고르면 즉시 이름을 입력받아 목록에 추가
  const catSel = $("f_region");
  let prevCat = catSel.value;
  catSel.onchange = () => {
    if (catSel.value !== "__new") { prevCat = catSel.value; return; }
    const name = (prompt("새 카테고리(지역/여행지) 이름을 입력하세요") || "").trim();
    if (!name || name === UNCAT) { catSel.value = prevCat; if (name === UNCAT) toast(`"${UNCAT}"은(는) 사용할 수 없는 이름입니다`); return; }
    if (!CATS.includes(name)) { CATS.push(name); saveSpotCats(CATS); renderTabs(); }
    catSel.innerHTML = catOptions(name);
    catSel.value = name; prevCat = name;
  };

  $("saveBtn").onclick = async () => {
    const name = $("f_name").value.trim();
    if (!name) { toast("명소 이름을 입력하세요"); return; }
    const rec = {
      nameMn: $("f_mn").value.trim(),
      region: catSel.value === "__new" ? "" : catSel.value,
      short: $("f_short").value.trim(),
      desc: $("f_desc").value.trim(),
      lat: parseFloat($("f_lat").value) || undefined,
      lng: parseFloat($("f_lng").value) || undefined,
      img: draft.img || "",
      subImgs: draft.subImgs,
    };
    // 이름(키)이 바뀌었으면 기존 키 삭제
    if (!isNew && key !== name) delete SPOTS[key];
    SPOTS[name] = rec;
    const btn = $("saveBtn"); btn.disabled = true; btn.textContent = "저장 중…";
    let res;
    try {
      res = await persist();
    } catch (err) {
      toast("⚠ 저장 공간이 부족합니다. 이미지 수를 줄여주세요.");
      btn.disabled = false; btn.textContent = isNew ? "추가하기" : "저장하기";
      return;
    }
    // 새 명소를 특정 카테고리에 넣었다면 그 탭이 보이도록 전환
    if (isNew && rec.region) activeCat = rec.region;
    renderTabs(); renderGrid(); closeDrawer();
    toast(saveMsg(res, isNew ? "명소가 추가되었습니다" : "저장되었습니다"));
  };

  const delEl = $("delBtn");
  if (delEl) delEl.onclick = async () => {
    if (!confirm(`"${key}" 명소를 삭제할까요?`)) return;
    delete SPOTS[key];
    const res = await persist();
    renderTabs(); renderGrid(); closeDrawer();
    toast(saveMsg(res, "삭제되었습니다"));
  };
}
function closeDrawer(){ $("drawer").classList.remove("on"); $("overlay").classList.remove("on"); editKey=null; }
$("overlay").onclick = closeDrawer;
$("addBtn").onclick = () => openEdit(null);

/* 좌표 없는 명소 일괄 채우기 (Nominatim 정책: 초당 1회로 순차 처리) */
$("geoAllBtn").onclick = async () => {
  const missing = Object.entries(SPOTS).filter(([, s]) => s.lat == null || s.lng == null);
  if (!missing.length) { toast("좌표가 빠진 명소가 없습니다 ✓"); return; }
  if (!confirm(`좌표가 없는 명소 ${missing.length}곳의 좌표를 이름으로 자동 조회할까요?\n(한 곳당 약 1초, 총 ${missing.length}초쯤 걸려요)`)) return;
  const btn = $("geoAllBtn"); btn.disabled = true;
  let done = 0, fail = 0;
  for (const [name, s] of missing) {
    btn.textContent = `조회 중… ${done + fail + 1}/${missing.length}`;
    const hit = await geocode(s.nameMn || name, name);
    if (hit) { s.lat = hit.lat; s.lng = hit.lng; done++; } else fail++;
    await new Promise(r => setTimeout(r, 1100));   // Nominatim 초당 1회 준수
  }
  btn.disabled = false; btn.textContent = "📍 좌표 일괄 채우기";
  if (done) { const res = await persist(); renderGrid(); toast(saveMsg(res, `${done}곳 좌표를 채웠어요${fail ? ` (${fail}곳은 못 찾음)` : ""}`)); }
  else toast(`좌표를 찾지 못했어요 (${fail}곳) — 몽골어 지명을 채우면 정확도가 올라갑니다`);
};

/* 저장 결과 메시지: 서버 저장 성공/로컬만/실패 구분 */
function saveMsg(res, okMsg) {
  if (res && res.ok) return "☁ 서버에 영구 저장됨 · " + okMsg;
  if (res && res.local) return okMsg + " (이 브라우저에만 저장 — 서버 저장하려면 관리자 로그인 필요)";
  return "⚠ 로컬에는 저장됨, 서버 저장 실패: " + ((res && res.error) || "알 수 없는 오류");
}

/* 저장 용량 표시 */
function updateStorage() {
  try {
    const bytes = new Blob([localStorage.getItem("leaders_spots") || ""]).size;
    const kb = Math.round(bytes / 1024);
    const where = ADMIN_TOKEN ? "서버(D1)에 영구 저장" : "이 브라우저에 저장 (서버 저장하려면 관리자 로그인)";
    $("storageTag").textContent = `명소 데이터 ${kb} KB · ${where}`;
  } catch (e) {}
}

let toastT;
function toast(m){ $("toast").textContent = m; $("toast").classList.add("on"); clearTimeout(toastT); toastT = setTimeout(()=>$("toast").classList.remove("on"), 2600); }

/* 서버(D1)에서 최신 명소를 받아온 뒤 렌더링 */
(window.cloudReady || Promise.resolve()).then(load);
</script>
<script src="admin-nav.js"></script>
