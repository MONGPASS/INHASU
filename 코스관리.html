<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>코스 관리 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="presets.js"></script>
<style>
  :root { --accent:#06c4a0; --deep:#06c4a0; --deep2:#06c4a0; --soft:#eaf7f3;
    --ink:#1b2b28; --sub:#6b7c78; --gray:#9aa5a2; --line:#eceef1; --bg:#f6f8f9; --red:#e2574c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  svg { display:block; }

  .shell { display:flex; min-height:100vh; }
  .side { width:232px; flex:0 0 232px; background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; }
  .side-brand { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .side-brand .logo { width:38px; height:38px; border-radius:11px; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .side-brand b { font-size:15px; font-weight:800; display:block; line-height:1.2; }
  .side-brand small { font-size:11.5px; color:var(--gray); font-weight:600; }
  .menu-label { font-size:11px; font-weight:800; color:#b3bdba; letter-spacing:.05em; padding:16px 10px 7px; }
  .mi { display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; color:var(--sub); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:2px; transition:.12s; }
  .mi svg { flex:0 0 auto; }
  .mi:hover { background:var(--soft); color:var(--deep); }
  .mi.on { background:var(--deep); color:#fff; }

  .content { flex:1; min-width:0; padding:26px 34px 60px; max-width:1100px; }
  .page-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .page-head h1 { font-size:20px; font-weight:800; }
  .page-head .add { margin-left:auto; background:var(--deep); color:#fff; border:none; border-radius:10px; padding:11px 18px; font-size:13.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .lead { font-size:13px; color:var(--sub); margin-bottom:20px; }
  .lead b { color:var(--deep); }
  .filters { display:grid; grid-template-columns:1.5fr repeat(4,1fr) auto; gap:10px; margin-bottom:8px; padding:14px; background:#fff; border:1px solid var(--line); border-radius:14px; }
  .filters input, .filters select { margin:0; }
  .filter-foot { display:flex; align-items:center; justify-content:space-between; margin:0 2px 16px; color:var(--gray); font-size:12px; }
  .filter-reset { border:0; background:none; color:var(--deep); font:700 12px inherit; cursor:pointer; padding:4px 2px; }

  .clist { display:flex; flex-direction:column; gap:12px; }
  .ccard { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 20px; cursor:pointer; display:flex; align-items:center; gap:16px; transition:.12s; }
  .ccard:hover { border-color:var(--accent); box-shadow:0 6px 20px rgba(20,50,45,.05); }
  .ccard .ic { width:44px; height:44px; border-radius:12px; background:var(--soft); color:var(--deep); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .ccard .body { flex:1; min-width:0; }
  .ccard h3 { font-size:16px; font-weight:800; }
  .ccard .meta { font-size:12.5px; color:var(--sub); margin-top:3px; }
  .ccard .meta .dot { color:var(--gray); margin:0 6px; }
  .ccard .days-badge { background:#eef2f1; color:var(--deep); border-radius:99px; padding:5px 12px; font-size:12px; font-weight:800; flex:0 0 auto; }
  .card-actions { display:flex; gap:6px; flex:0 0 auto; }
  .card-actions button { border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:9px; padding:7px 10px; font:700 12px inherit; cursor:pointer; }
  .card-actions button:hover { border-color:var(--accent); color:var(--deep); background:var(--soft); }
  .card-actions .share { background:var(--deep); border-color:var(--deep); color:#fff; }

  /* 드로어 */
  .overlay { position:fixed; inset:0; background:rgba(20,40,36,.4); z-index:40; opacity:0; pointer-events:none; transition:.2s; }
  .overlay.on { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; width:600px; max-width:96vw; height:100%; background:#fff; z-index:50; box-shadow:-10px 0 40px rgba(20,40,36,.15); transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.on { transform:translateX(0); }
  .dh { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; }
  .dh h2 { font-size:18px; font-weight:800; }
  .dh .x { margin-left:auto; border:none; background:#f2f5f4; width:32px; height:32px; border-radius:9px; font-size:18px; cursor:pointer; color:var(--sub); }
  .db { flex:1; overflow-y:auto; padding:22px 24px; }
  label.f { display:block; margin-bottom:14px; }
  label.f span { display:block; font-size:12.5px; font-weight:700; color:var(--sub); margin-bottom:6px; }
  input, textarea, select { width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; color:var(--ink); outline:none; background:#fff; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); }
  textarea { resize:vertical; line-height:1.6; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .sec-title { font-size:14px; font-weight:800; margin:22px 0 10px; display:flex; align-items:center; gap:8px; }
  /* 요금표 (1인 기준 · 인원별 잔금) */
  .price-head { display:grid; grid-template-columns:76px 1fr 1fr 32px; gap:8px; font-size:11px; font-weight:800; color:var(--gray); margin:10px 0 5px; }
  .price-row { display:grid; grid-template-columns:76px 1fr 1fr 32px; gap:8px; margin-bottom:6px; align-items:center; }
  .price-row button { border:none; background:#fff1f0; color:var(--red); border-radius:8px; padding:9px 0; cursor:pointer; font-weight:900; }
  .sec-title .n { width:20px; height:20px; border-radius:6px; background:var(--soft); color:var(--deep); font-size:11px; display:inline-flex; align-items:center; justify-content:center; font-weight:800; }

  /* 명소 체크 */
  .spot-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
  .spot-chk { display:flex; align-items:center; gap:8px; border:1.5px solid var(--line); border-radius:10px; padding:9px 11px; cursor:pointer; transition:.12s; }
  .spot-chk:hover { border-color:var(--accent); }
  .spot-chk.on { border-color:var(--accent); background:var(--soft); }
  .spot-chk .box { width:18px; height:18px; border-radius:5px; border:1.5px solid #c7d0cd; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; }
  .spot-chk.on .box { background:var(--accent); border-color:var(--accent); }
  .spot-chk b { font-size:12.5px; }
  .spot-order { margin-left:auto; font-size:10.5px; font-weight:800; color:var(--accent); }

  /* 일자 편집 */
  .day-edit { border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:10px; background:#fff; transition:box-shadow .12s, border-color .12s; }
  .day-edit.dragging { opacity:.45; }
  .day-edit.drag-over { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent) inset; }
  .day-edit .dh2 { display:flex; align-items:center; gap:9px; margin-bottom:9px; }
  .day-edit .dh2 .drag-handle { cursor:grab; color:#c2ccc9; font-size:17px; line-height:1; padding:0 2px; user-select:none; flex:0 0 auto; }
  .day-edit .dh2 .drag-handle:active { cursor:grabbing; }
  .day-edit .badge { background:var(--deep); color:#fff; border-radius:7px; padding:4px 10px; font-size:12px; font-weight:800; flex:0 0 auto; }
  .day-edit input.dest { flex:1; font-weight:700; }
  .day-edit input.move { max-width:170px; }
  .day-edit .day-del { border:none; background:#f6eeee; color:#c96a5e; width:28px; height:28px; border-radius:8px; font-size:14px; cursor:pointer; flex:0 0 auto; }
  .day-edit textarea.items { min-height:88px; font-size:13px; }
  .day-edit .lbl2 { font-size:11px; color:var(--gray); margin:8px 0 5px; }
  .day-edit .snip-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .day-edit .snip-sel { width:auto; min-width:180px; padding:8px 12px; border:1.5px solid var(--accent); border-radius:9px; background:var(--soft); color:var(--deep); font-weight:700; font-size:12.5px; cursor:pointer; font-family:inherit; }
  .day-edit .snip-hint { font-size:11px; color:var(--gray); }
  .day-add { width:100%; padding:12px; border:1.5px dashed var(--accent); background:#fff; color:var(--deep); border-radius:11px; font-size:13.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .day-add:hover { background:var(--soft); }

  .df { padding:16px 24px; border-top:1px solid var(--line); display:flex; gap:8px; }
  .df button { padding:13px 0; border-radius:11px; font-size:14px; font-weight:800; cursor:pointer; border:none; font-family:inherit; }
  .df .save { flex:1; background:var(--deep); color:#fff; }
  .df .del { background:#fbeceb; color:var(--red); padding:13px 18px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--deep2); color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:60; pointer-events:none; }
  .toast.on { opacity:1; }
  @media (max-width:1100px){ .filters{grid-template-columns:repeat(3,1fr)} }
  @media (max-width:820px){ .side{display:none} .content{padding:16px 12px} .filters{grid-template-columns:1fr 1fr;padding:11px;gap:8px}.filters #filterSpot{grid-column:1/-1}.ccard{padding:14px;flex-wrap:wrap}.ccard .body{min-width:180px}.card-actions{width:100%;justify-content:flex-end} }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="side-brand"><span class="logo">▲</span><div><b>몽골리아 은하수</b><small>몽골리아 관리자</small></div></div>
    <nav>
      <a class="mi" href="/admin"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>대시보드</a>
      <a class="mi" href="/admin"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>견적 문의</a>
      <a class="mi" href="예약목록.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 15l2 2 5-5"/></svg>예약 관리</a>
      <a class="mi" href="견적만들기.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>견적서 만들기</a>
      <a class="mi on" href="코스관리.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l11 0"/><path d="M9 12l11 0"/><path d="M9 18l11 0"/><circle cx="4" cy="6" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="4" cy="18" r="1.6"/></svg>코스 관리</a>
      <a class="mi" href="일정관리.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>일정 관리</a>
      <a class="mi" href="명소관리.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>명소 관리</a>
      <a class="mi" href="리소스관리.html"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>리소스 관리</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-head">
      <h1>코스 관리</h1>
      <button class="add" id="addBtn">＋ 새 코스 추가</button>
    </div>
    <div class="lead">여기서 만든 코스가 <b>견적서 만들기 → 코스 불러오기</b>에 나타납니다. 클릭 한 번으로 일정·명소·기본가가 자동으로 채워져요.</div>
    <div class="filters">
      <input id="filterSpot" placeholder="명소 또는 코스명 검색">
      <select id="filterDays"><option value="">전체 일정</option></select>
      <select id="filterDest"><option value="">전체 여행지</option></select>
      <select id="filterHighlight"><option value="">전체 명소</option></select>
      <select id="filterPrice"><option value="">전체 금액</option><option value="0-500000">50만원 이하</option><option value="500001-800000">50~80만원</option><option value="800001-1200000">80~120만원</option><option value="1200001-999999999">120만원 이상</option></select>
      <select id="filterIntensity"><option value="">전체 이동 강도</option><option value="1-2">여유로운 일정</option><option value="3">보통 일정</option><option value="4-5">활동적인 일정</option></select>
    </div>
    <div class="filter-foot"><span id="filterCount">전체 코스</span><button class="filter-reset" id="filterReset">필터 초기화</button></div>
    <div class="clist" id="clist"></div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const won = n => (Number(n)||0).toLocaleString("ko-KR") + "원";

let COURSES = {};

function load() { COURSES = JSON.parse(JSON.stringify(getCourses())); renderList(); }
function persist() { saveCourses(COURSES); }

function renderList() {
  const q = ($("filterSpot")?.value || "").trim().toLowerCase();
  const day = $("filterDays")?.value || "";
  const dest = $("filterDest")?.value || "";
  const highlight = $("filterHighlight")?.value || "";
  const price = $("filterPrice")?.value || "";
  const intensity = $("filterIntensity")?.value || "";
  const entries = Object.entries(COURSES).filter(([name,c]) => {
    const hay = [name,c.destination,c.nights,...(c.highlights||[])].join(" ").toLowerCase();
    const [pMin,pMax] = price ? price.split("-").map(Number) : [0,Infinity];
    const [iMin,iMax] = intensity ? intensity.split("-").map(Number) : [0,Infinity];
    const level = Number(c.intensity||3), amount = Number(c.base||0);
    return (!q || hay.includes(q)) && (!day || String((c.days||[]).length) === day) && (!dest || c.destination === dest)
      && (!highlight || (c.highlights||[]).includes(highlight)) && (!price || (amount>=pMin && amount<=pMax))
      && (!intensity || (level>=iMin && level<=(iMax||iMin)));
  });
  if ($("filterCount")) $("filterCount").textContent = `전체 ${Object.keys(COURSES).length}개 중 ${entries.length}개 코스`;
  $("clist").innerHTML = entries.length ? entries.map(([name, c]) => `
    <div class="ccard" data-k="${esc(name)}">
      <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l11 0M9 12l11 0M9 18l11 0"/><circle cx="4" cy="6" r="1.5"/><circle cx="4" cy="12" r="1.5"/><circle cx="4" cy="18" r="1.5"/></svg></div>
      <div class="body">
        <h3>${esc(name)}</h3>
        <div class="meta">${esc(c.destination||"")}<span class="dot">·</span>${esc(c.nights||"")}<span class="dot">·</span>기본 ${won(c.base)}<span class="dot">·</span>명소 ${(c.highlights||[]).length}곳</div>
      </div>
      <div class="days-badge">${(c.days||[]).length}일 일정</div>
      <div class="card-actions">
        <button class="duplicate" data-k="${esc(name)}">복제</button>
        <button class="share" data-k="${esc(name)}">공유 견적</button>
      </div>
    </div>`).join("")
    : `<div style="text-align:center;padding:60px;color:var(--gray)">${Object.keys(COURSES).length ? "선택한 조건에 맞는 코스가 없습니다.<br><b>필터 초기화</b> 후 다시 찾아보세요." : "등록된 코스가 없습니다. 우측 상단 <b>＋ 새 코스 추가</b>로 만들어보세요."}</div>`;
  $("clist").querySelectorAll(".ccard").forEach(el => el.onclick = () => openEdit(el.dataset.k));
  $("clist").querySelectorAll(".card-actions button").forEach(btn => btn.onclick = e => {
    e.stopPropagation();
    if (btn.classList.contains("duplicate")) duplicateCourse(btn.dataset.k);
    else shareCourse(btn.dataset.k);
  });
}

function populateFilters() {
  const days = [...new Set(Object.values(COURSES).map(c => (c.days||[]).length))].filter(Boolean).sort((a,b)=>a-b);
  const dests = [...new Set(Object.values(COURSES).map(c => c.destination).filter(Boolean))].sort();
  const highlights = [...new Set(Object.values(COURSES).flatMap(c => c.highlights||[]).filter(Boolean))].sort();
  $("filterDays").innerHTML = `<option value="">전체 일정</option>` + days.map(n=>`<option value="${n}">${n}일 일정 (${Math.max(0,n-1)}박${n}일)</option>`).join("");
  $("filterDest").innerHTML = `<option value="">전체 여행지</option>` + dests.map(v=>`<option>${esc(v)}</option>`).join("");
  $("filterHighlight").innerHTML = `<option value="">전체 명소</option>` + highlights.map(v=>`<option>${esc(v)}</option>`).join("");
}
function duplicateCourse(name) {
  const source = COURSES[name]; if (!source) return;
  let copyName = `${name} 복사본`, n = 2;
  while (COURSES[copyName]) copyName = `${name} 복사본 ${n++}`;
  COURSES[copyName] = JSON.parse(JSON.stringify(source));
  persist(); populateFilters(); renderList(); toast(`"${copyName}" 코스를 만들었습니다`);
}
function shareCourse(name) {
  sessionStorage.setItem("leaders_course_share", JSON.stringify({ course:name, anonymous:true }));
  location.href = "견적만들기.html?course=" + encodeURIComponent(name) + "&share=1";
}

/* ── 편집 드로어 ── */
let draftDays = [];

function blankDay(i) { return { d:i+1, dest:"", move:"", dist:"", items:[], stay:{name:"",tags:[]}, meals:["","",""] }; }

function openEdit(key) {
  const isNew = key === null;
  const c = isNew
    ? { destination:"", nights:"", intensity:3, base:0, vehicle:"", highlights:[], days:[blankDay(0)] }
    : JSON.parse(JSON.stringify(COURSES[key]));
  draftDays = (c.days && c.days.length) ? c.days : [blankDay(0)];
  let draftSpots = [...(c.highlights || [])];

  $("drawer").innerHTML = `
    <div class="dh"><h2>${isNew ? "새 코스 추가" : "코스 편집"}</h2><button class="x" id="closeX">✕</button></div>
    <div class="db">
      <label class="f"><span>코스 이름</span><input id="f_name" value="${esc(isNew?"":key)}" placeholder="예) 고비 4박5일"></label>
      <div class="row3">
        <label class="f"><span>여행지</span><input id="f_dest" value="${esc(c.destination)}" placeholder="고비"></label>
        <label class="f"><span>기간</span><input id="f_nights" value="${esc(c.nights)}" placeholder="4박5일"></label>
        <label class="f"><span>차량</span><input id="f_vehicle" value="${esc(c.vehicle)}" placeholder="하이에이스"></label>
      </div>
      <div class="row2">
        <label class="f"><span>이동강도 (1~5)</span>
          <select id="f_intensity">${[1,2,3,4,5].map(i=>`<option value="${i}" ${i===(c.intensity||3)?"selected":""}>${i}</option>`).join("")}</select></label>
      </div>

      <div class="sec-title"><span class="n">1</span>요금 (1인 기준) <span style="font-weight:500;color:var(--gray);font-size:12px">· 견적서 만들기에서 이 코스를 고르면 그대로 채워집니다</span></div>
      <div class="row3">
        <label class="f"><span>예약금 (1인)</span><input id="f_price_deposit" type="number" step="1000" value="${esc((c.price && c.price.deposit) || 50000)}" placeholder="예) 50000"></label>
      </div>
      <div id="priceRows"></div>
      <button class="day-add" id="priceAddBtn" type="button">＋ 인원별 잔금 추가</button>

      <div class="sec-title"><span class="n">2</span>대표 명소 <span style="font-weight:500;color:var(--gray);font-size:12px">· 견적서 명소 페이지에 나옴</span></div>
      <div class="spot-grid" id="spotGrid"></div>

      <div class="sec-title"><span class="n">3</span>일자별 일정</div>
      <div id="dayList"></div>
    </div>
    <div class="df">
      ${isNew ? "" : `<button class="del" id="delBtn">삭제</button>`}
      <button class="save" id="saveBtn">${isNew ? "추가하기" : "저장하기"}</button>
    </div>`;

  // 요금표 — 견적만들기의 balances({pax, economy, full})와 동일 구조
  let draftPrice = c.price ? JSON.parse(JSON.stringify(c.price)) : { deposit:50000, balances:[] };
  function renderPrice() {
    const rows = draftPrice.balances;
    $("priceRows").innerHTML = (rows.length
      ? `<div class="price-head"><span>인원</span><span>실속형 잔금 (1인)</span><span>풀패키지 잔금 (1인)</span><span></span></div>`
      : `<div style="font-size:12px;color:var(--gray);margin:6px 0;">인원별 잔금을 추가하세요.${Number(c.base) > 0 ? ` 비워두면 기존 1인 금액 ${won(c.base)}이 사용됩니다.` : ""}</div>`)
      + rows.map((b, i) => `<div class="price-row" data-i="${i}">
          <input type="number" class="pp" min="1" value="${esc(b.pax || "")}" placeholder="인원">
          <input type="number" class="pe" step="1000" value="${esc(b.economy != null ? b.economy : (b.amount || ""))}" placeholder="예) 570000">
          <input type="number" class="pf" step="1000" value="${esc(b.full != null ? b.full : (b.amount || ""))}" placeholder="예) 770000">
          <button type="button" title="삭제">✕</button>
        </div>`).join("");
    $("priceRows").querySelectorAll(".price-row").forEach(row => {
      const i = +row.dataset.i;
      row.querySelector(".pp").oninput = e => draftPrice.balances[i].pax = parseInt(e.target.value) || 0;
      row.querySelector(".pe").oninput = e => draftPrice.balances[i].economy = parseInt(e.target.value) || 0;
      row.querySelector(".pf").oninput = e => draftPrice.balances[i].full = parseInt(e.target.value) || 0;
      row.querySelector("button").onclick = () => { draftPrice.balances.splice(i, 1); renderPrice(); };
    });
  }
  renderPrice();
  $("priceAddBtn").onclick = () => {
    const maxPax = draftPrice.balances.reduce((m, b) => Math.max(m, Number(b.pax) || 0), 1);
    draftPrice.balances.push({ pax: maxPax + 1, economy: 0, full: 0 });
    renderPrice();
  };

  // 명소 그리드
  function renderSpots() {
    const lib = getSpots();
    $("spotGrid").innerHTML = Object.keys(lib).map(name => {
      const idx = draftSpots.indexOf(name), on = idx >= 0;
      return `<div class="spot-chk ${on?"on":""}" data-s="${esc(name)}">
        <div class="box">${on?"✓":""}</div><b>${esc(name)}</b>${on?`<span class="spot-order">${idx+1}</span>`:""}</div>`;
    }).join("") || `<div style="color:var(--gray);font-size:12px">명소 관리에서 먼저 명소를 등록하세요.</div>`;
    $("spotGrid").querySelectorAll(".spot-chk").forEach(el => el.onclick = () => {
      const n = el.dataset.s, i = draftSpots.indexOf(n);
      if (i>=0) draftSpots.splice(i,1); else draftSpots.push(n);
      renderSpots();
    });
  }
  renderSpots();

  // 일자 편집
  function renumber() { draftDays.forEach((d,i)=>d.d=i+1); }
  function renderDays() {
    let dragIdx = null;   // 드래그 중인 일자 인덱스
    // 일정관리에서 만든 스니펫을 카테고리(지역)별 optgroup으로
    const _snips = getSnippets();
    const _cats = (window.getSnippetCats ? getSnippetCats() : []);
    const _byCat = {};
    Object.entries(_snips).forEach(([name, s]) => { const c = (s && s.cat ? String(s.cat).trim() : "") || "기타"; (_byCat[c] = _byCat[c] || []).push(name); });
    const _ordered = [..._cats.filter(c => _byCat[c]), ...Object.keys(_byCat).filter(c => !_cats.includes(c) && c !== "기타")];
    if (_byCat["기타"]) _ordered.push("기타");
    const snipOptions = _ordered.map(c => `<optgroup label="${esc(c)}">${_byCat[c].map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join("")}</optgroup>`).join("");
    $("dayList").innerHTML = draftDays.map((d,i)=>`
      <div class="day-edit" data-i="${i}">
        <div class="dh2">
          <span class="drag-handle" title="드래그해서 순서 변경">⠿</span>
          <span class="badge">${d.d}일차</span>
          <input class="dest" value="${esc((d.dest||"").replace(/<br\s*\/?>/gi," / "))}" placeholder="목적지">
          <input class="move" value="${esc(d.move||"")} ${esc(d.dist||"")}" placeholder="이동 6시간 (300 km)">
          <button class="day-del" title="삭제">✕</button>
        </div>
        <div class="snip-row"><select class="snip-sel"><option value="">📋 일정 불러오기…</option>${snipOptions}</select><span class="snip-hint">클릭 한 번에 이 일자를 채웁니다.</span></div>
        <textarea class="items" placeholder="한 줄에 하나씩. *강조, (회색">${esc((d.items||[]).join("\n"))}</textarea>
        <div class="lbl2">숙소 / 숙소태그(쉼표) / 식사(조·중·석)</div>
        <div class="row3">
          <input class="stay" value="${esc((d.stay?.name||"").replace(/<br\s*\/?>/gi," "))}" placeholder="여행자 캠프">
          <input class="tags" value="${esc((d.stay?.tags||[]).join(", "))}" placeholder="전기 O, 샤워 O">
          <input class="meals" value="${esc((d.meals||[]).join(", "))}" placeholder="캠프식, 현지식당, 캠프식">
        </div>
      </div>`).join("") + `<button class="day-add" id="dayAddBtn">＋ 일자 추가</button>`;

    $("dayList").querySelectorAll(".day-edit").forEach(el => {
      const i = +el.dataset.i;
      el.querySelector(".dest").oninput = e => draftDays[i].dest = e.target.value.replace(/ \/ /g,"<br>");
      el.querySelector(".move").oninput = e => { const m = e.target.value.match(/^(.*?)(\(.*\))?\s*$/); draftDays[i].move=(m[1]||"").trim(); draftDays[i].dist=(m[2]||"").trim(); };
      el.querySelector(".items").oninput = e => draftDays[i].items = e.target.value.split("\n").filter(x=>x.trim());
      el.querySelector(".stay").oninput = e => draftDays[i].stay = { name:e.target.value, tags:draftDays[i].stay?.tags||[] };
      el.querySelector(".tags").oninput = e => draftDays[i].stay = { name:draftDays[i].stay?.name||"", tags:e.target.value.split(",").map(x=>x.trim()).filter(Boolean) };
      el.querySelector(".meals").oninput = e => draftDays[i].meals = e.target.value.split(",").map(x=>x.trim());
      el.querySelector(".day-del").onclick = () => { if (draftDays.length<=1){toast("최소 1일 필요");return;} draftDays.splice(i,1); renumber(); renderDays(); };
      el.querySelector(".snip-sel").onchange = e => {
        const s = getSnippets()[e.target.value];
        if (!s) return;
        const dNum = draftDays[i].d;
        draftDays[i] = { d:dNum, dest:s.dest||"", move:s.move||"", dist:s.dist||"", items:[...(s.items||[])], stay:{ name:s.stay?.name||"", tags:[...(s.stay?.tags||[])] }, meals:[...(s.meals||["","",""])] };
        renderDays();
        toast(`"${e.target.value}" 일정을 불러왔습니다`);
      };
      // ── 드래그앤드랍 순서 변경 (핸들로만 시작) ──
      const _h = el.querySelector(".drag-handle");
      _h.addEventListener("mousedown", () => { el.draggable = true; });
      _h.addEventListener("mouseup", () => { el.draggable = false; });
      el.addEventListener("dragstart", e => {
        dragIdx = i; el.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        try { e.dataTransfer.setData("text/plain", String(i)); } catch (_) {}
      });
      el.addEventListener("dragend", () => {
        el.draggable = false; el.classList.remove("dragging");
        $("dayList").querySelectorAll(".day-edit").forEach(x => x.classList.remove("drag-over"));
      });
      el.addEventListener("dragover", e => {
        e.preventDefault(); e.dataTransfer.dropEffect = "move";
        if (dragIdx !== null && dragIdx !== i) el.classList.add("drag-over");
      });
      el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
      el.addEventListener("drop", e => {
        e.preventDefault(); el.classList.remove("drag-over");
        if (dragIdx === null || dragIdx === i) return;
        const [moved] = draftDays.splice(dragIdx, 1);
        draftDays.splice(i, 0, moved);
        dragIdx = null; renumber(); renderDays();
      });
    });
    $("dayAddBtn").onclick = () => { draftDays.push(blankDay(draftDays.length)); renderDays(); const c=$("dayList").querySelectorAll(".day-edit"); c[c.length-1]?.scrollIntoView({behavior:"smooth",block:"center"}); };
  }
  renderDays();

  $("drawer").classList.add("on"); $("overlay").classList.add("on");
  $("closeX").onclick = closeDrawer;

  $("saveBtn").onclick = () => {
    const name = $("f_name").value.trim();
    if (!name) { toast("코스 이름을 입력하세요"); return; }
    const priceDeposit = parseInt($("f_price_deposit").value) || 0;
    const priceBalances = draftPrice.balances
      .map(b => ({ pax: Number(b.pax) || 0, economy: Number(b.economy) || 0, full: Number(b.full) || 0 }))
      .filter(b => b.pax > 0 && (b.economy > 0 || b.full > 0))
      .sort((a, b) => a.pax - b.pax);
    const rec = {
      destination: $("f_dest").value.trim(),
      nights: $("f_nights").value.trim(),
      intensity: parseInt($("f_intensity").value) || 3,
      // base = 대표 1인 총액(예약금+최소 인원 실속형 잔금) — 목록·필터 표시와 구버전 호환용
      base: priceBalances.length ? priceDeposit + (priceBalances[0].economy || priceBalances[0].full) : (Number(c.base) || 0),
      price: { deposit: priceDeposit, balances: priceBalances },
      vehicle: $("f_vehicle").value.trim(),
      highlights: draftSpots,
      days: draftDays.map((d,i) => ({ d:i+1, dest:d.dest||"", move:d.move||"", dist:d.dist||"", items:d.items||[], stay:{name:d.stay?.name||"", tags:d.stay?.tags||[]}, meals:d.meals||["","",""] })),
    };
    if (!isNew && key !== name) delete COURSES[key];
    COURSES[name] = rec;
    persist(); populateFilters(); renderList(); closeDrawer();
    toast(isNew ? "코스가 추가되었습니다" : "저장되었습니다");
  };
  const delEl = $("delBtn");
  if (delEl) delEl.onclick = () => { if (!confirm(`"${key}" 코스를 삭제할까요?`)) return; delete COURSES[key]; persist(); renderList(); closeDrawer(); toast("삭제되었습니다"); };
}
function closeDrawer(){ $("drawer").classList.remove("on"); $("overlay").classList.remove("on"); }
$("overlay").onclick = closeDrawer;
$("addBtn").onclick = () => openEdit(null);
$("filterSpot").oninput = renderList;
$("filterDays").onchange = renderList;
$("filterDest").onchange = renderList;
$("filterHighlight").onchange = renderList;
$("filterPrice").onchange = renderList;
$("filterIntensity").onchange = renderList;
$("filterReset").onclick = () => {
  ["filterSpot","filterDays","filterDest","filterHighlight","filterPrice","filterIntensity"].forEach(id => $(id).value = "");
  renderList();
};

let toastT;
function toast(m){ $("toast").textContent=m; $("toast").classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>$("toast").classList.remove("on"),1900); }

/* 서버(D1)에서 최신 코스·명소를 받아온 뒤 렌더링 */
(window.cloudReady || Promise.resolve()).then(() => { load(); populateFilters(); renderList(); });
</script>
</body>
</html>
