# Cloudflare Pages 설정 파일
# database_id 는 배포 설정 때 만들어서 채웁니다 (배포안내.txt 참고).

name = "milkway-mongolia"
compatibility_date = "2024-09-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"                     # 코드에서 env.DB 로 사용
database_name = "leaders-requests"
database_id = "07a07834-5bde-4980-972b-9742d72f0f82"

[[r2_buckets]]
binding = "FILES"                  # 코드에서 env.FILES 로 사용 (고객 첨부파일)
bucket_name = "leaders-files"
