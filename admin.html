<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>대시보드 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="presets.js"></script>
<script src="booking.js"></script>
<style>
  :root { --accent:#06c4a0; --deep:#06c4a0; --deep2:#037a64; --soft:#edf5f2;
    --ink:#0f2e27; --sub:#5a716b; --gray:#8aa39c; --line:#eaf0ee; --bg:#f6faf9;
    --new:#06c4a0; --prog:#e0913a; --book:#3d7ff0; --done:#8a95a0; --hold:#cf6a5e; --up:#06c4a0; --down:#d96a5e; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  svg { display:block; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:#c7efe6; border-radius:8px; }

  /* ── 로그인 ── */
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { background:#fff; border-radius:22px; box-shadow:0 12px 40px rgba(20,50,45,.09); padding:38px 34px; width:100%; max-width:370px; text-align:center; }
  .login-card .logo { width:50px; height:50px; border-radius:15px; background:var(--deep); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:21px; margin-bottom:16px; }
  .login-card h1 { font-size:19px; font-weight:800; }
  .login-card p { font-size:13px; color:var(--gray); margin:6px 0 22px; }
  .login-card input { width:100%; padding:13px 16px; border:1.5px solid var(--line); border-radius:11px; font-size:15px; font-family:inherit; outline:none; text-align:center; letter-spacing:.1em; }
  .login-card input:focus { border-color:var(--accent); }
  .login-card button { width:100%; margin-top:11px; padding:14px; border:none; border-radius:11px; background:var(--deep); color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .login-card .err { color:var(--hold); font-size:13px; margin-top:9px; min-height:16px; }

  /* ── 레이아웃 ── */
  .shell { display:flex; min-height:100vh; }

  /* 사이드바 (라벨 포함) */
  .side { width:232px; flex:0 0 232px; background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; }
  .side-brand { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .side-brand .logo { width:38px; height:38px; border-radius:11px; background:linear-gradient(150deg,#06c4a0,#037a64); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; box-shadow:0 6px 14px rgba(6,196,160,.3); }
  .side-brand b { font-size:15px; font-weight:800; display:block; line-height:1.2; }
  .side-brand small { font-size:11.5px; color:var(--gray); font-weight:600; }
  .menu-label { font-size:11px; font-weight:800; color:#b3bdba; letter-spacing:.05em; padding:16px 10px 7px; }
  .mi { display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; color:var(--sub); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:2px; border:none; background:none; width:100%; font-family:inherit; transition:.12s; }
  .mi svg { flex:0 0 auto; }
  .mi:hover { background:var(--soft); color:var(--deep); }
  .mi.on { background:var(--deep); color:#fff; box-shadow:0 6px 14px rgba(6,196,160,.24); }
  .mi .badge-n { margin-left:auto; background:var(--soft); color:var(--deep); border-radius:99px; font-size:11px; font-weight:800; padding:2px 8px; }
  .mi.on .badge-n { background:#fff; color:#04836b; }
  .side-foot { margin-top:auto; padding-top:12px; border-top:1px solid var(--line); }

  /* 본문 */
  .content { flex:1; min-width:0; padding:26px 32px 60px; max-width:1240px; }
  .welcome { display:flex; align-items:center; margin-bottom:26px; }
  .welcome h1 { font-size:26px; font-weight:800; letter-spacing:-.5px; }
  .welcome p { font-size:14px; color:#7c938c; margin-top:8px; }
  .welcome .who { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--sub); font-weight:600; }
  .welcome .who .av { width:34px; height:34px; border-radius:50%; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; }

  .sec-head { display:flex; align-items:center; margin-bottom:14px; }
  .sec-head h2 { font-size:18px; font-weight:800; }
  #listTitle { font-size:20px; }
  .sec-head .btns { margin-left:auto; display:flex; gap:8px; }
  .btn { border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:10px; padding:9px 15px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
  .btn:hover { background:var(--soft); }
  .btn.primary { background:var(--deep); color:#fff; border-color:var(--deep); }

  /* 통계 카드 */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; box-shadow:0 4px 14px rgba(15,46,39,.04); }
  .stat-top { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .stat-ic { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; }
  .stat-k { font-size:13.5px; color:var(--sub); font-weight:700; }
  .stat-row { display:flex; align-items:flex-end; justify-content:space-between; gap:10px; }
  .stat-v { font-size:32px; font-weight:800; line-height:1; }
  .stat-delta { font-size:12px; font-weight:800; padding:2px 8px; border-radius:99px; margin-left:8px; vertical-align:middle; }
  .stat-delta.up { background:#dcf4ee; color:#04836b; }
  .stat-delta.warn { background:#dcf4ee; color:#04836b; }
  .stat-delta.prog { background:#cdeee6; color:#036450; }
  .stat-delta.flat { background:#eef3f1; color:var(--gray); }
  .spark { flex:0 0 auto; }
  .action-center { margin:0 0 30px; background:#f1f9f7; border:1px solid #d9eee9; border-radius:16px; overflow:hidden; }
  .action-head { padding:16px 22px 12px; color:var(--ink); font-size:15px; font-weight:800; display:flex;justify-content:space-between; align-items:center; }
  .action-head span:last-child { color:#04836b; font-size:13px; font-weight:700; }
  .action-item { width:100%;display:flex;align-items:center;gap:12px;padding:15px 22px;border:0;border-top:1px solid #e7f1ee;background:transparent;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink); }
  .action-item:hover { background:#eaf5f1; }.action-item b{font-size:14px;font-weight:700;color:#213a34}.action-item small{display:block;color:#7c938c;margin-top:4px;font-size:13px}.action-item .go{margin-left:auto;color:#06c4a0;font-size:13px;font-weight:700;white-space:nowrap}
  .next-label { display:block;margin-top:5px;font-size:11.5px;font-weight:600;color:var(--gray);white-space:nowrap; }

  /* 툴바 */
  .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .search { flex:1; position:relative; max-width:420px; }
  .search input { width:100%; padding:12px 14px 12px 40px; border:1px solid #e2ebe8; border-radius:12px; font-size:14px; color:#4a615b; font-family:inherit; outline:none; background:#fff; }
  .search input:focus { border-color:var(--accent); }
  .search .si { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#9db2ac; }
  .chips { display:flex; gap:8px; margin-left:auto; }
  .chip { border:1px solid #e2ebe8; background:#fff; color:#4a615b; border-radius:999px; padding:9px 16px; font-size:13px; font-weight:500; cursor:pointer; }
  .chip.on { background:var(--deep); border-color:var(--deep); color:#fff; font-weight:700; }
  .chip .cnt { opacity:.6; margin-left:4px; font-weight:600; }
  .chip.on .cnt { opacity:.75; }

  /* 표 */
  .table-card { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 4px 14px rgba(15,46,39,.04); }
  table { width:100%; border-collapse:collapse; }
  thead th { background:#fff; text-align:left; font-size:13px; font-weight:600; color:var(--gray); padding:15px 20px; border-bottom:1px solid #eef3f1; white-space:nowrap; }
  thead th.r, tbody td.r { text-align:right; }
  tbody td { padding:15px 20px; border-bottom:1px solid #f1f6f4; vertical-align:middle; }
  tbody tr { cursor:pointer; transition:.08s; }
  tbody tr:hover { background:#f8fcfb; }
  tbody tr:last-child td { border-bottom:none; }
  .cust { display:flex; align-items:center; gap:11px; }
  .avatar { width:38px; height:38px; border-radius:11px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; }
  .cust b { font-size:14px; display:block; }
  .cust .ph { font-size:12px; color:var(--gray); margin-top:1px; }
  .desc { color:#556b65; font-size:13px; max-width:300px; }
  .desc b { color:var(--ink); font-weight:600; }
  .num { font-weight:700; font-size:13.5px; }
  .muted { color:var(--gray); font-size:12.5px; white-space:nowrap; }
  .badge { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:99px; font-size:12px; font-weight:700; white-space:nowrap; }
  .badge .dot { width:6px; height:6px; border-radius:50%; }
  .b-신규 { background:#dcf4ee; color:#037a64; } .b-신규 .dot { background:#06c4a0; }
  .b-진행중 { background:#edfbf7; color:#05a184; } .b-진행중 .dot { background:#7fddc9; }
  .b-예약확정 { background:#cdeee6; color:#036450; } .b-예약확정 .dot { background:#048068; }
  .b-완료 { background:#eef3f1; color:#8aa39c; } .b-완료 .dot { background:#8aa39c; }
  .b-보류 { background:#eef3f1; color:#5a716b; } .b-보류 .dot { background:#9db2ac; }
  .empty { text-align:center; padding:66px 20px; color:var(--gray); }
  .empty .big { font-size:38px; margin-bottom:10px; }

  /* 드로어 */
  .overlay { position:fixed; inset:0; background:rgba(20,40,36,.38); z-index:40; opacity:0; pointer-events:none; transition:.2s; }
  .overlay.on { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; width:432px; max-width:92vw; height:100%; background:#fff; z-index:50; box-shadow:-14px 0 44px rgba(15,46,39,.16); transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.on { transform:translateX(0); }
  .drawer .dh { padding:24px 24px 18px; border-bottom:1px solid #eef3f1; display:flex; align-items:flex-start; }
  .drawer .dh h2 { font-size:22px; font-weight:800; letter-spacing:-.4px; }
  .drawer .dh .sub { font-size:13px; color:var(--gray); margin-top:6px; }
  .drawer .dh .x { margin-left:auto; border:none; background:#eef3f1; width:34px; height:34px; border-radius:999px; font-size:15px; cursor:pointer; color:var(--sub); display:flex; align-items:center; justify-content:center; }
  .drawer .db { flex:1; overflow-y:auto; padding:20px 24px; }
  .status-row { display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
  .st-btn { flex:0 0 auto; padding:8px 16px; border:1px solid #e2ebe8; background:#fff; border-radius:999px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; color:#4a615b; }
  .st-btn.sel { color:#fff; border-color:var(--deep); background:var(--deep); font-weight:700; }
  /* 고객 진행 타임라인 */
  .tl { margin-bottom:20px; border:1px solid #e1ede9; border-radius:14px; padding:14px 16px 4px; background:#fbfdfc; }
  .tl-title { font-size:13px; font-weight:800; color:#0f2e27; margin-bottom:12px; }
  .tl-item { position:relative; padding:0 0 14px 24px; }
  .tl-item::before { content:""; position:absolute; left:6px; top:15px; bottom:-1px; width:2px; background:#e1ede9; }
  .tl-item:last-child::before { display:none; }
  .tl-dot { position:absolute; left:1px; top:3px; width:12px; height:12px; border-radius:50%; background:#d6e1dd; border:2px solid #fff; box-shadow:0 0 0 1.5px #d6e1dd; }
  .tl-item.cust .tl-dot { background:var(--deep); box-shadow:0 0 0 1.5px var(--deep); }
  .tl-item b { display:block; font-size:13px; color:#556b65; font-weight:600; line-height:1.45; }
  .tl-item.cust b { color:#213a34; font-weight:700; }
  .tl-item.latest b { color:#04836b; }
  .tl-item small { font-size:11.5px; color:#9db2ac; }
  .info-grid { display:grid; grid-template-columns:88px 1fr; gap:15px 12px; font-size:14px; }
  .info-grid .k { color:#9db2ac; font-weight:500; font-size:13px; }
  .info-grid .v { font-weight:600; color:#213a34; word-break:break-word; }
  .req-box { background:#f7faf9; border-radius:12px; padding:14px 16px; margin-top:16px; font-size:13.5px; line-height:1.7; white-space:pre-wrap; }
  .memo { width:100%; margin-top:18px; min-height:88px; padding:13px 14px; border:1px solid #e2ebe8; border-radius:12px; font-size:13px; color:#4a615b; font-family:inherit; outline:none; resize:vertical; }
  .memo:focus { border-color:var(--accent); }
  .drawer .df { padding:16px 24px; border-top:1px solid #eef3f1; display:flex; gap:10px; align-items:center; }
  .df button { flex:1; text-align:center; padding:12px 0; border-radius:11px; font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:inherit; }
  .df .primary { flex:1.2; background:var(--deep); color:#fff; box-shadow:0 6px 14px rgba(6,196,160,.3); }
  .df .copy { background:#edf5f2; color:#04836b; }
  .df .danger { background:#eef3f1; color:#7c938c; flex:0 0 auto; padding:12px 15px; }

  /* 발행된 견적 안내 박스 */
  .pub-box { margin-top:14px; background:#edfbf7; border:1px solid #d9eee9; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:13px; font-weight:700; color:#037a64; }
  .pub-box .acts { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }
  .pub-box .pb { border:1px solid #bfe9de; background:#fff; color:#04836b; border-radius:9px; padding:8px 13px; font-size:12px; font-weight:600; cursor:pointer; text-decoration:none; font-family:inherit; display:inline-block; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#123a33; color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:80; pointer-events:none; }
  .toast.on { opacity:1; }

  /* 목록: 정렬 헤더 · 출발 임박 표시 · 더보기 */
  th.sortable { cursor:pointer; user-select:none; }
  th.sortable:hover { color:var(--deep); }
  .dday { background:#037a64; color:#fff; font-weight:700; font-size:11px; border-radius:6px; padding:2px 7px; margin-left:6px; white-space:nowrap; }
  .more-row { text-align:center; padding:14px; border-top:1px solid var(--line); }
  .more-row button { border:1.5px solid var(--line); background:#fff; color:var(--sub); border-radius:10px; padding:10px 22px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .more-row button:hover { border-color:var(--accent); color:var(--deep); }

  .mode { position:fixed; left:246px; bottom:12px; font-size:11.5px; color:var(--gray); background:#fff; border:1px solid var(--line); border-radius:8px; padding:6px 11px; z-index:5; }
  @media (max-width:900px){ .stats{grid-template-columns:repeat(2,1fr)} }
  @media (max-width:760px){
    body{ font-size:13px; padding-bottom:env(safe-area-inset-bottom); }
    .shell{ flex-direction:column; }
    .side{ width:100%; height:auto; flex:none; position:sticky; top:0; z-index:20;
      flex-direction:column; align-items:stretch; gap:6px; padding:8px 10px 7px;
      border-right:none; border-bottom:1px solid var(--line); }
    .side-brand{ display:flex; padding:0 4px 5px; }
    .side-brand .logo{width:30px;height:30px;border-radius:9px;font-size:13px}
    .side-brand b{font-size:13px}.side-brand small{display:none}
    .side nav{ width:100%; min-width:0; display:flex; gap:5px; overflow-x:auto; scrollbar-width:none; padding-bottom:1px; }
    .side nav::-webkit-scrollbar{display:none}
    .side .mi{ width:auto; white-space:nowrap; margin-bottom:0; padding:8px 11px; flex:none; font-size:12px; border-radius:9px; gap:6px; }
    .side .mi svg{width:16px;height:16px}
    .side .mi .badge-n{padding:1px 6px;font-size:10px}
    .side-foot{ position:absolute; right:8px; top:7px; flex:none; margin:0; padding:0; border:none; display:flex; gap:2px; }
    .side-foot .mi{padding:7px;font-size:0}
    .content{padding:16px 12px 46px;width:100%;}
    .welcome{margin-bottom:16px;align-items:flex-start}.welcome h1{font-size:19px}.welcome p{font-size:12px}
    .welcome .who{display:none}
    .sec-head{align-items:flex-start;gap:8px}.sec-head h2{font-size:16px}
    .sec-head .btns{gap:5px}.sec-head .btn{padding:8px 10px;font-size:11.5px}.sec-head .btn svg{display:none}
    .stats{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-bottom:20px}
    .stat{padding:13px 14px;border-radius:13px}.stat-top{margin-bottom:9px;gap:7px}.stat-ic{width:30px;height:30px;border-radius:9px}.stat-ic svg{width:16px;height:16px}
    .stat-k{font-size:11.5px}.stat-v{font-size:25px}.stat-delta{font-size:10px;padding:2px 6px;margin-left:3px}.spark{display:none}
    .toolbar{display:block;margin-bottom:12px}.search{max-width:none;width:100%;margin-bottom:9px}.search input{font-size:13px;padding-top:12px;padding-bottom:12px}
    .chips{width:100%;overflow-x:auto;margin:0;gap:5px;scrollbar-width:none;padding-bottom:2px}.chips::-webkit-scrollbar{display:none}
    .chip{flex:none;padding:7px 12px;font-size:12px}
    .table-card{background:transparent;border:0;border-radius:0;overflow:visible}
    .table-card table,.table-card tbody{display:block;width:100%}.table-card thead{display:none}
    .table-card tr{display:grid;grid-template-columns:1fr auto;gap:9px 12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:9px;box-shadow:0 3px 12px rgba(20,50,45,.025)}
    .table-card tr.urgent{border-left:3px solid #037a64}.table-card tr.urgent td:first-child{box-shadow:none}
    .table-card td{display:block!important;padding:0!important;border:0!important;text-align:left!important;min-width:0}
    .table-card td:nth-child(1){grid-column:1}.table-card td:nth-child(3){grid-column:2;grid-row:1;align-self:start}
    .table-card td:nth-child(2){grid-column:1/-1;grid-row:2;font-size:12px;max-width:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .table-card td:nth-child(4){grid-column:1;grid-row:3}.table-card td:nth-child(4)::before{content:'인원 ';color:var(--gray);font-weight:500}
    .table-card td:nth-child(5){grid-column:2;grid-row:3;text-align:right!important}.table-card td:nth-child(6){grid-column:1;grid-row:4}.table-card td:nth-child(6)::before{content:'예산 ';color:var(--gray);font-weight:500}
    .table-card td:nth-child(7){grid-column:2;grid-row:4;text-align:right!important}
    .cust{gap:9px}.avatar{width:36px;height:36px}.cust b{font-size:14px}.badge{padding:5px 9px;font-size:11px}
    .more-row{background:#fff;border:1px solid var(--line);border-radius:12px;margin-top:8px}
    .drawer{top:auto;bottom:0;width:100%;max-width:none;height:min(88vh,760px);border-radius:20px 20px 0 0;transform:translateY(105%);box-shadow:0 -12px 40px rgba(20,40,36,.18)}
    .drawer.on{transform:translateY(0)}.drawer .dh{padding:17px 17px 14px}.drawer .dh h2{font-size:18px}.drawer .db{padding:16px 17px}.drawer .df{padding:12px 12px calc(12px + env(safe-area-inset-bottom));overflow-x:auto}.drawer .df button{min-width:90px}
    .status-row{overflow-x:auto;gap:6px;margin-bottom:16px}.st-btn{flex:0 0 auto;padding:9px 13px}.info-grid{grid-template-columns:72px 1fr;gap:10px 9px;font-size:13px}
    .pub-box{align-items:flex-start}.pub-box .acts{width:100%;margin-left:0}.pub-box .pb{flex:1;text-align:center}

</style>

<body>

            <button class="btn" id="restoreBtn" title="백업 JSON 파일로 복원">⬆ 복원</button>
            <button class="btn" id="reqBackupBtn" title="문의 전체(발행 견적 포함)를 JSON으로 내려받기">⬇ 문의 백업</button>
            <button class="btn" id="csvBtn" title="현재 필터·검색이 적용된 문의 목록을 엑셀용 CSV로 내려받기">⬇ CSV</button>
            <input type="file" id="restoreFile" accept="application/json,.json" style="display:none">

      <!-- 고객·예약 행동 알림 (대시보드·견적 문의 화면 공통) -->

      <!-- 견적 문의 리스트 -->

      <div class="toolbar">
        <div class="search">
          <span class="si"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input id="search" placeholder="이름·연락처·요청내용·메모로 검색">

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="mode" id="modeTag"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════ 설정 ═══════════════ */
const CFG = { brand:"몽골리아 은하수", apiBase:"/api/requests" };
const STATUSES = ["신규","진행중","예약확정","완료","보류"];
const AVA_COLORS = ["#06c4a0","#3aa0e0","#e0913a","#8a6fe0","#cf6a5e","#2f9e8a","#5aa469"];
let RECORDS = [], filterStatus = null, searchText = "", mode = "local";
let sortKey = "receivedAt", sortDir = -1, showLimit = 50;   // 목록 정렬·더보기 상태
let curView = "dash", dashSummary = "";                     // 현재 화면 · 대시보드 요약문
const $ = id => document.getElementById(id);

/* ═══════════════ 로그인 ═══════════════
   비밀번호는 페이지에 저장하지 않고, 서버(Cloudflare env ADMIN_TOKEN)로만 검증합니다.
   → 비밀번호 변경: Cloudflare 대시보드 > Pages > 설정 > 환경 변수 ADMIN_TOKEN 수정 */
let ADMIN_TOKEN = sessionStorage.getItem("leaders_admin_token") || "";

async function tryLogin() {
  const pw = $("pw").value;
  if (!pw) return;
  $("loginErr").textContent = "확인 중…";
  try {
    // 토큰은 URL에 남지 않도록 헤더로 전달
    const res = await fetch(CFG.apiBase, { headers: { "x-admin-token": pw } });
    let j = null; try { j = await res.json(); } catch (e) {}
    if (j && j.ok && Array.isArray(j.items)) {
      ADMIN_TOKEN = pw; sessionStorage.setItem("leaders_admin_token", pw);
      $("loginErr").textContent = ""; showDash(); return;
    }
    if (res.status === 401) { $("loginErr").textContent = "비밀번호가 올바르지 않습니다."; $("pw").value = ""; return; }
  } catch (e) {}
  // 서버 미연결(로컬 데모/배포 전) — 데모 비밀번호로만 진입
  if (pw === "demo") { ADMIN_TOKEN = "demo"; sessionStorage.setItem("leaders_admin_token", "demo"); $("loginErr").textContent = ""; showDash(); return; }
  $("loginErr").textContent = "비밀번호가 올바르지 않거나 서버에 연결할 수 없어요.";
}
$("loginBtn").onclick = tryLogin;
$("pw").onkeydown = e => { if (e.key === "Enter") tryLogin(); };
$("navLogout").onclick = () => { sessionStorage.removeItem("leaders_admin_token"); location.reload(); };
if (ADMIN_TOKEN) showDash();
function showDash() { $("login").style.display = "none"; $("dash").style.display = "block"; $("whoName").textContent = CFG.brand; setView("dash"); loadData(); }

/* 화면 전환: 대시보드(개요+목록) ↔ 견적 문의(목록만) */
function setView(v) {
  curView = v;
  $("overviewSection").style.display = (v === "dash") ? "" : "none";
  $("navDash").classList.toggle("on", v === "dash");
  $("navList").classList.toggle("on", v === "list");
  $("welcomeTitle").textContent = (v === "list") ? "견적 문의" : "안녕하세요 👋";
  $("welcomeSub").textContent = (v === "list") ? "고객·예약 행동 알림과 최근 견적 문의를 확인하세요." : dashSummary;
  $("listTitle").textContent = "최근 견적 문의";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
$("navDash").onclick = () => setView("dash");
$("navList").onclick = () => setView("list");
$("previewFormBtn").onclick = () => window.open("견적요청.html", "_blank");

/* ═══════════════ 데이터 ═══════════════ */
async function loadData() {
  try {
    const res = await fetch(CFG.apiBase, { headers: { "x-admin-token": ADMIN_TOKEN } });
    if (res.status === 401) {   // 저장된 토큰이 무효(비번 변경 등) → 재로그인 요구
      sessionStorage.removeItem("leaders_admin_token"); ADMIN_TOKEN = "";
      $("dash").style.display = "none"; $("login").style.display = "";
      $("loginErr").textContent = "세션이 만료되었거나 비밀번호가 변경되었어요. 새 비밀번호로 로그인해 주세요.";
      $("pw").value = ""; return;
    }
    if (res.ok) { const j = await res.json();
      if (j.ok && Array.isArray(j.items)) { RECORDS = j.items; mode = "server";
        $("modeTag").textContent = "● 서버 연결됨 (전체 기기 공유)"; checkNewArrivals(); render(); return; } }
  } catch (e) {}
  RECORDS = JSON.parse(localStorage.getItem("leaders_requests") || "[]");
  mode = "local"; $("modeTag").textContent = "○ 로컬 모드 (이 브라우저 · 배포 전)"; render();
}
$("navRefresh").onclick = loadData;

/* ═══ 자동 새로고침 · 새 문의/고객 행동 알림 ═══
   30초마다 목록을 갱신하고, 견적 수락·서명 등 새 행동을 토스트와 탭 제목으로 알립니다. */
const PAGE_TITLE = document.title;
let knownIds = null;
let knownActionKeys = null;
function checkNewArrivals() {
  const ids = new Set(RECORDS.map(r => String(r.id)));
  if (knownIds) {
    const fresh = RECORDS.filter(r => !knownIds.has(String(r.id)));
    if (fresh.length) {
      toast(`🔔 새 견적 문의 ${fresh.length}건 도착 — ${fresh[0].name || "이름 없음"}님${fresh.length > 1 ? " 외" : ""}`);
      document.title = `(${fresh.length}건 새 문의) ` + PAGE_TITLE;
    }
  }
  knownIds = ids;
  const actions = RECORDS.map(r => ({ r, action:nextAction(r) })).filter(x => x.action);
  const actionKeys = new Set(actions.map(x => `${x.r.id}:${x.action.label}`));
  if (knownActionKeys) {
    const freshActions = actions.filter(x => !knownActionKeys.has(`${x.r.id}:${x.action.label}`));
    if (freshActions.length) {
      const x = freshActions[0];
      toast(`🔔 ${x.r.name || "고객"}님 · ${x.action.label}`);
      document.title = `(고객 행동 ${freshActions.length}건) ` + PAGE_TITLE;
    }
  }
  knownActionKeys = actionKeys;
}
setInterval(() => { if (ADMIN_TOKEN && mode === "server") loadData(); }, 30000);
window.addEventListener("focus", () => { document.title = PAGE_TITLE; });
$("search").oninput = e => { searchText = e.target.value.trim().toLowerCase(); showLimit = 50; render(); };
$("copyLinkBtn").onclick = () => {
  const url = location.origin.startsWith("http") ? location.origin + "/견적요청.html" : "견적요청.html";
  navigator.clipboard.writeText(url).then(() => { $("copyLinkBtn").textContent = "✓ 복사됨"; setTimeout(()=>$("copyLinkBtn").textContent="🔗 요청 폼 링크 복사",1500); });
};

/* ═══ 콘텐츠 백업 · 복원 ═══
   명소·명소 카테고리·코스·일정·일정 카테고리를 JSON 한 파일로 내려받고,
   그 파일로 언제든 복원할 수 있습니다. (실수로 지웠을 때의 보험) */
$("backupBtn").onclick = () => {
  const data = {
    _type: "leaders-backup", exportedAt: new Date().toISOString(),
    spots: getSpots(), spot_cats: getSpotCats(),
    courses: getCourses(), snippets: getSnippets(), snippet_cats: getSnippetCats(),
  };
  downloadFile(`콘텐츠백업_${dateOnly(new Date().toISOString())}.json`, JSON.stringify(data, null, 2), "application/json");
  toast("콘텐츠 백업 파일을 내려받았어요 — 안전한 곳에 보관하세요");
};

/* 문의 백업: 전체 문의(발행된 견적 포함)를 JSON으로 내려받기 — 다운로드 전용(복원 없음) */
$("reqBackupBtn").onclick = () => {
  if (!RECORDS.length) { toast("내보낼 문의가 없어요"); return; }
  const data = { _type: "leaders-requests-backup", exportedAt: new Date().toISOString(), count: RECORDS.length, items: RECORDS };
  downloadFile(`문의백업_${dateOnly(new Date().toISOString())}.json`, JSON.stringify(data, null, 2), "application/json");
  toast(`문의 ${RECORDS.length}건을 내려받았어요 (발행 견적 포함)`);
};

/* CSV 내보내기: 현재 필터·검색·정렬이 적용된 목록을 엑셀 호환(UTF-8 BOM) CSV로 */
$("csvBtn").onclick = () => {
  const rows = visibleRows();
  if (!rows.length) { toast("내보낼 문의가 없어요"); return; }
  const cell = v => '"' + String(v ?? "").replace(/"/g, '""') + '"';
  const head = ["접수일","상태","이름","전화","이메일","성인","아동","유아","출발일","귀국일","박수","여행지","차량","항공IN","항공OUT","예산","견적발행","메모"];
  const lines = rows.map(r => [
    dateOnly(r.receivedAt), r.status || "신규", r.name, r.phone, r.email,
    r.adult || 0, r.child || 0, r.infant || 0,
    r.depart, r.return_, r.nights, r.destination, r.vehicle, r.flightIn || "", r.flightOut || "", r.budget,
    r.quote ? "O" : "", r.memo,
  ].map(cell).join(","));
  downloadFile(`문의목록_${dateOnly(new Date().toISOString())}.csv`,
    "\uFEFF" + [head.map(cell).join(","), ...lines].join("\r\n"),   // BOM: 엑셀 한글 깨짐 방지
    "text/csv;charset=utf-8");
  toast(`문의 ${rows.length}건을 CSV로 내려받았어요`);
};
$("restoreBtn").onclick = () => $("restoreFile").click();
$("restoreFile").onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  e.target.value = "";
  try {
    const data = JSON.parse(await f.text());
    if (!data || data._type !== "leaders-backup") throw new Error("이 사이트의 백업 파일이 아니에요");
    const when = (data.exportedAt || "").slice(0, 10) || "날짜 미상";
    if (!confirm(`${when} 백업으로 명소·코스·일정을 모두 교체할까요?\n지금 있는 내용을 덮어씁니다.`)) return;
    const jobs = [];
    if (data.spots) jobs.push(saveSpots(data.spots));
    if (data.spot_cats) jobs.push(saveSpotCats(data.spot_cats));
    if (data.courses) jobs.push(saveCourses(data.courses));
    if (data.snippets) jobs.push(saveSnippets(data.snippets));
    if (data.snippet_cats) jobs.push(saveSnippetCats(data.snippet_cats));
    if (!jobs.length) throw new Error("백업 파일에 복원할 내용이 없어요");
    const results = await Promise.all(jobs);
    if (results.every(r => r && r.ok)) toast("✓ 복원 완료 — 서버에 반영됐어요");
    else if (results.every(r => r && (r.ok || r.local))) toast("복원됨 (이 브라우저에만 — 서버 반영은 배포 환경에서)");
    else toast("⚠ 일부 항목이 서버에 저장되지 않았어요. 다시 시도해 주세요.");
  } catch (err) { toast("⚠ 복원 실패: " + err.message); }
};

/* ═══════════════ 유틸 ═══════════════ */
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const nightTxt = r => r.nights ? `${r.nights}박 ${r.nights+1}일` : "-";
const paxSum = r => (r.adult||0)+(r.child||0)+(r.infant||0);
const paxTxt = r => `성인 ${r.adult||0}·아동 ${r.child||0}·유아 ${r.infant||0}`;
const dateOnly = iso => { const d = new Date(iso); return isNaN(d) ? "-" : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const avaColor = name => AVA_COLORS[[...String(name)].reduce((a,c)=>a+c.charCodeAt(0),0) % AVA_COLORS.length];
// 출발까지 남은 일수 (출발일 없거나 잘못됐으면 null)
function dDay(r) {
  if (!r.depart) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(r.depart); if (isNaN(d)) return null; d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}

function downloadFile(name, text, type) {

}
// 현재 상태칩·검색·정렬이 적용된 목록 (표시 개수 제한 없음) — 목록 렌더와 CSV가 함께 사용
function visibleRows() {
  let rows = RECORDS.slice();
  if (filterStatus) rows = rows.filter(r => (r.status||"신규")===filterStatus);
  if (searchText) rows = rows.filter(r => [r.name,r.phone,r.destination,r.tripType,r.request,r.memo,r.email].some(v=>String(v||"").toLowerCase().includes(searchText)));
  rows.sort((a, b) => {
    const va = String(a[sortKey] ?? ""), vb = String(b[sortKey] ?? "");
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });
  return rows;
}

/* 최근 N일 일별 접수 시계열 */
function series(n, { cumulative=false, status=null } = {}) {
  const today = new Date(); today.setHours(0,0,0,0);
  const keys = [];
  for (let i=n-1;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); keys.push(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`); }
  const counts = keys.map(()=>0);
  let before = 0;
  RECORDS.forEach(r => {
    if (status && (r.status||"신규") !== status) return;
    const d = new Date(r.receivedAt); if (isNaN(d)) return; d.setHours(0,0,0,0);
    const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const idx = keys.indexOf(k);
    if (idx>=0) counts[idx]++; else if (d < today) before++;
  });
  if (cumulative) { let s = before; return counts.map(c => s += c); }
  return counts;
}
function sparkline(vals, w, h, color) {
  if (!vals.length) vals = [0,0];
  const max = Math.max(...vals), min = Math.min(...vals), rng = (max-min)||1;
  const step = w/(vals.length-1||1);
  const pts = vals.map((v,i)=>[i*step, (h-3) - ((v-min)/rng)*(h-6)]);
  const line = pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area = line + ` L ${w} ${h} L 0 ${h} Z`;
  const gid = "sg" + Math.abs([...color].reduce((a,c)=>a+c.charCodeAt(0),0)) + vals.length + Math.round(max);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".26"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
function nextAction(r) {
  const accepted = !!(r.decision && r.decision.status === "accepted");
  if (accepted && !r.booking) return { label:"예약 진행 요청", detail:"고객이 견적을 수락했습니다 · 예약관리를 시작하세요" };
  if (!r.booking) return null;
  const b = r.booking, ci = b.contractInfo || {}, paid = ci.depositStatus === "입금완료";
  const signed = !!(b.contract && b.contract.signedAt), confirmed = r.status === "예약확정";
  if (!paid && !(b.depositRequest && b.depositRequest.status === "requested")) return { label:"예약금 안내 필요", detail:"예약정보를 확인하고 예약금 안내를 보내세요" };
  if (!paid && b.depositReport && b.depositReport.status === "reported") return { label:"입금 신고 확인", detail:`고객이 입금 완료를 알렸습니다 (입금자명 ${b.depositReport.name || "-"}) · 예약관리에서 입금 확인을 누르면 계약서·여행자 정보 요청까지 자동 발송됩니다` };
  if (!paid) return { label:"예약금 입금 대기", detail:"고객이 입금하면 입금 신고 알림이 도착합니다" };
  if (!signed && !(b.contractRequest && b.contractRequest.status === "requested")) return { label:"계약서 요청 필요", detail:"예약금 확인 완료 · 고객에게 서명을 요청하세요" };
  if (!signed) return { label:"계약서 서명 대기", detail:"고객에게 서명 요청을 보냈습니다" };
  if (!confirmed) return { label:"예약 확정 필요", detail:"고객 서명 완료 · 내용을 확인하고 예약을 확정하세요" };
  if (b.publishStatus !== "published") return { label:"일정표 공개 준비", detail:"배정을 완료한 뒤 확정 일정표를 공개하세요" };
  return null;
}
/* ── 고객 진행 타임라인 — 레코드에 남은 기록으로 "누가 · 언제 · 무엇을" 재구성 ── */
function customerTimeline(r) {
  const ev = [];
  const b = r.booking || {};
  const acts = Array.isArray(r.activities) ? r.activities : [];
  if (r.receivedAt) ev.push({ at:r.receivedAt, who:"고객", label:"견적 문의 접수" });
  const quoteSent = r.quoteIssuedAt || (r.notify && r.notify.quoteSentAt);
  if (r.quote && quoteSent) ev.push({ at:quoteSent, who:"관리자", label:"견적서 발행 · 알림톡 발송" });
  if (r.decision && r.decision.status === "accepted" && r.decision.acceptedAt) {
    ev.push(r.decision.source === "customer"
      ? { at:r.decision.acceptedAt, who:"고객", label:"🔔 '이 견적으로 예약 진행하기' 클릭" }
      : { at:r.decision.acceptedAt, who:"관리자", label:"전화·카톡 수락 기록" });
  }
  if (b.depositRequest && b.depositRequest.status === "requested" && b.depositRequest.requestedAt)
    ev.push({ at:b.depositRequest.requestedAt, who:"자동", label:"예약금·입금 계좌 안내 표시" });
  if (b.depositReport && b.depositReport.status === "reported" && b.depositReport.reportedAt)
    ev.push({ at:b.depositReport.reportedAt, who:"고객", label:`💳 입금 완료 신고 (입금자명 ${b.depositReport.name || "-"})` });
  const paidAct = acts.filter(a => a && a.type === "payment_changed" && /예약금.*입금완료/.test(a.detail || "")).pop();
  if (paidAct) ev.push({ at:paidAct.at, who:"관리자", label:"예약금 입금 확인" });
  if (b.contractRequest && b.contractRequest.status === "requested" && b.contractRequest.requestedAt)
    ev.push({ at:b.contractRequest.requestedAt, who:"자동", label:"계약서 서명·여행자 정보 요청 발송" });
  if (b.contract && b.contract.signedAt) ev.push({ at:b.contract.signedAt, who:"고객", label:"✍ 계약서 서명 완료" });
  if (b.travelerSubmission && b.travelerSubmission.submittedAt)
    ev.push({ at:b.travelerSubmission.submittedAt, who:"고객", label:`👥 여행자 정보 제출 (${b.travelerSubmission.submittedCount || 0}명)` });
  (Array.isArray(r.changeRequests) ? r.changeRequests : []).forEach(x => {
    const at = x && (x.at || x.requestedAt);
    if (at) ev.push({ at, who:"고객", label:`일정 변경 요청 (${(x.categories || []).join(", ") || "내용 확인"})${x.status === "resolved" ? " · 처리됨" : ""}` });
  });
  if (b.confirmedAt) ev.push({ at:b.confirmedAt, who:"관리자", label:"✓ 예약 확정" });
  if (b.publishedAt) ev.push({ at:b.publishedAt, who:"관리자", label:"🎫 확정 일정표 공개" });
  return ev.filter(e => e.at && !isNaN(new Date(e.at))).sort((a, b2) => new Date(a.at) - new Date(b2.at));
}
function timelineHtml(r) {
  const ev = customerTimeline(r);
  if (!ev.length) return "";
  const fmt = t => {
    const d = new Date(t);
    const date = `${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
    const hasTime = String(t).length > 10;
    return hasTime ? `${date} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}` : date;
  };
  return `<div class="tl"><div class="tl-title">고객 진행 타임라인</div>${ev.map((e, i) => `
    <div class="tl-item ${e.who === "고객" ? "cust" : ""} ${i === ev.length - 1 ? "latest" : ""}">
      <span class="tl-dot"></span>
      <div><b>${esc(e.label)}</b><small>${fmt(e.at)} · ${e.who}</small></div>
    </div>`).join("")}</div>`;
}

function closeDrawer(){ $("drawer").classList.remove("on"); $("overlay").classList.remove("on"); }
$("overlay").onclick = closeDrawer;

/* ═══════════════ 토스트 ═══════════════ */
let toastT;
function toast(m){ $("toast").textContent = m; $("toast").classList.add("on"); clearTimeout(toastT); toastT = setTimeout(()=>$("toast").classList.remove("on"), 2400); }

/* ═══════════════ 상태·메모 저장 ═══════════════ */
async function persist(id, patch) {
  const r = RECORDS.find(x => String(x.id) === String(id));
  if (r) Object.assign(r, patch);
  if (mode === "local") { localStorage.setItem("leaders_requests", JSON.stringify(RECORDS)); return { ok: true, local: true }; }
  try {
    const res = await fetch(`${CFG.apiBase}/${encodeURIComponent(id)}`, { method:"PATCH", headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN}, body:JSON.stringify(patch) });
    if (res.status === 401) return { ok: false, error: "관리자 인증이 만료됐어요. 다시 로그인해 주세요." };
    const j = await res.json().catch(() => ({}));
    if (!res.ok || !j.ok) return { ok: false, error: j.error || "서버 오류 (" + res.status + ")" };
    if (r) {
      if (j.status) r.status = j.status;
      if (Array.isArray(j.activities)) r.activities = j.activities;
    }
    return { ok: true, ...j };
  } catch(e){ return { ok: false, error: "서버에 연결할 수 없어요" }; }
}
async function updateStatus(id,s){
  // 낙관적 업데이트: 화면 먼저 즉시 반영 → 서버 저장은 뒤에서. 실패하면 원래 상태로 되돌림.
  const r = RECORDS.find(x => String(x.id) === String(id));
  if (!r) return;
  const prev = r.status || "신규";

  const patch = { status: s };

  if (s === "예약확정") {
    if (!r.quote) { toast("⚠ 견적서를 먼저 발행해야 예약확정할 수 있어요"); return; }
    if (!(r.decision && r.decision.status === "accepted") && prev !== "예약확정") { toast("⚠ 고객 수락을 먼저 기록해 주세요"); return; }
    if (!r.booking) { toast("⚠ 예약관리를 시작하고 계약 정보를 저장해 주세요"); return; }
    if (!(r.booking.contract && r.booking.contract.signedAt)) { toast("⚠ 고객 계약서 서명이 필요합니다"); return; }
    if (!r.booking.contractInfo || r.booking.contractInfo.depositStatus !== "입금완료") { toast("⚠ 예약금 입금 확인이 필요합니다"); return; }
  }
  r.status = s;
  render(); openDrawer(id);
  const res = await persist(id, patch);
  if (res.ok) {
    toast(`상태가 "${s}"(으)로 저장됐어요`);
    // ※ 고객 확정 안내(확정일정표/알림톡) 자동 발송 훅은 여기에 연결 예정 (이번 범위 제외)
    return;
  }
  // 저장 실패 → 되돌리기
  r.status = prev;
  render(); openDrawer(id);
  toast("⚠ 상태 저장 실패: " + res.error);
}
const memoLast = {};   // 마지막 저장값 (변경 없으면 저장 안 함)
async function saveMemo(id, m) {
  if (memoLast[id] === undefined) {
    const r = RECORDS.find(x => String(x.id) === String(id));
    memoLast[id] = (r && r.memo) || "";
  }
  if (m === memoLast[id]) return;   // 변경 없음
  const res = await persist(id, { memo: m });
  if (res.ok) { memoLast[id] = m; toast("메모가 저장됐어요"); }
  else toast("⚠ 메모 저장 실패: " + res.error);
}

/* ═══════════════ 문의 삭제 ═══════════════ */
async function deleteRequest(r) {
  if (!confirm(`"${r.name || "-"}" 님의 문의를 삭제할까요?\n발행된 견적서 링크도 함께 사라지며, 되돌릴 수 없습니다.`)) return;
  if (mode === "local") {
    RECORDS = RECORDS.filter(x => String(x.id) !== String(r.id));
    localStorage.setItem("leaders_requests", JSON.stringify(RECORDS));
    closeDrawer(); render(); toast("삭제되었습니다"); return;
  }
  try {
    const res = await fetch(`${CFG.apiBase}/${encodeURIComponent(r.id)}`, { method: "DELETE", headers: { "x-admin-token": ADMIN_TOKEN } });
    const j = await res.json().catch(() => ({}));
    if (res.status === 401) { toast("⚠ 관리자 인증이 만료됐어요. 다시 로그인해 주세요."); return; }
    if (!j.ok) { toast("⚠ 삭제 실패: " + (j.error || "서버 오류")); return; }
    RECORDS = RECORDS.filter(x => String(x.id) !== String(r.id));
    closeDrawer(); render(); toast("삭제되었습니다");
  } catch (e) { toast("⚠ 삭제 실패 — 서버 연결을 확인하세요"); }
}
