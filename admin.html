<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>대시보드 · 몽골리아 은하수</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2306c4a0'/%3E%3Cpath d='M20 42 30 24l7 12 5-7 8 13z' fill='white'/%3E%3C/svg%3E">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="presets.js"></script>
<script src="booking.js"></script>
<style>
  :root { --accent:#06c4a0; --deep:#06c4a0; --deep2:#06c4a0; --soft:#eaf7f3;
    --ink:#1b2b28; --sub:#6b7c78; --gray:#9aa5a2; --line:#eceef1; --bg:#f6f8f9;
    --new:#06c4a0; --prog:#e0913a; --book:#3d7ff0; --done:#8a95a0; --hold:#cf6a5e; --up:#06c4a0; --down:#d96a5e; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:Pretendard, system-ui, "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
  svg { display:block; }

  /* ── 로그인 ── */
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { background:#fff; border-radius:22px; box-shadow:0 12px 40px rgba(20,50,45,.09); padding:38px 34px; width:100%; max-width:370px; text-align:center; }
  .login-card .logo { width:50px; height:50px; border-radius:15px; background:var(--deep); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:21px; margin-bottom:16px; }
  .login-card h1 { font-size:19px; font-weight:800; }
  .login-card p { font-size:13px; color:var(--gray); margin:6px 0 22px; }
  .login-card input { width:100%; padding:13px 16px; border:1.5px solid var(--line); border-radius:11px; font-size:15px; font-family:inherit; outline:none; text-align:center; letter-spacing:.1em; }
  .login-card input:focus { border-color:var(--accent); }
  .login-card button { width:100%; margin-top:11px; padding:14px; border:none; border-radius:11px; background:var(--deep); color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .login-card .err { color:var(--hold); font-size:13px; margin-top:9px; min-height:16px; }

  /* ── 레이아웃 ── */
  .shell { display:flex; min-height:100vh; }

  /* 사이드바 (라벨 포함) */
  .side { width:232px; flex:0 0 232px; background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; }
  .side-brand { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .side-brand .logo { width:38px; height:38px; border-radius:11px; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .side-brand b { font-size:15px; font-weight:800; display:block; line-height:1.2; }
  .side-brand small { font-size:11.5px; color:var(--gray); font-weight:600; }
  .menu-label { font-size:11px; font-weight:800; color:#b3bdba; letter-spacing:.05em; padding:16px 10px 7px; }
  .mi { display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; color:var(--sub); font-size:14px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:2px; border:none; background:none; width:100%; font-family:inherit; transition:.12s; }
  .mi svg { flex:0 0 auto; }
  .mi:hover { background:var(--soft); color:var(--deep); }
  .mi.on { background:var(--deep); color:#fff; }
  .mi .badge-n { margin-left:auto; background:var(--soft); color:var(--deep); border-radius:99px; font-size:11px; font-weight:800; padding:2px 8px; }
  .mi.on .badge-n { background:rgba(255,255,255,.22); color:#fff; }
  .side-foot { margin-top:auto; padding-top:12px; border-top:1px solid var(--line); }

  /* 본문 */
  .content { flex:1; min-width:0; padding:26px 32px 60px; max-width:1240px; }
  .welcome { display:flex; align-items:center; margin-bottom:22px; }
  .welcome h1 { font-size:21px; font-weight:800; }
  .welcome p { font-size:13px; color:var(--sub); margin-top:3px; }
  .welcome .who { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--sub); font-weight:600; }
  .welcome .who .av { width:34px; height:34px; border-radius:50%; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; }

  .sec-head { display:flex; align-items:center; margin-bottom:14px; }
  .sec-head h2 { font-size:17px; font-weight:800; }
  .sec-head .btns { margin-left:auto; display:flex; gap:8px; }
  .btn { border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:10px; padding:9px 15px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
  .btn:hover { background:var(--soft); }
  .btn.primary { background:var(--deep); color:#fff; border-color:var(--deep); }

  /* 통계 카드 */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; }
  .stat-top { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .stat-ic { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; }
  .stat-k { font-size:13.5px; color:var(--sub); font-weight:700; }
  .stat-row { display:flex; align-items:flex-end; justify-content:space-between; gap:10px; }
  .stat-v { font-size:32px; font-weight:800; line-height:1; }
  .stat-delta { font-size:12px; font-weight:800; padding:2px 8px; border-radius:99px; margin-left:8px; vertical-align:middle; }
  .stat-delta.up { background:#e6f5ef; color:var(--up); }
  .stat-delta.warn { background:#fdf2e3; color:var(--prog); }
  .stat-delta.flat { background:#eef0f2; color:var(--gray); }
  .spark { flex:0 0 auto; }

  /* 툴바 */
  .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .search { flex:1; position:relative; max-width:360px; }
  .search input { width:100%; padding:11px 14px 11px 38px; border:1px solid var(--line); border-radius:11px; font-size:14px; font-family:inherit; outline:none; background:#fff; }
  .search input:focus { border-color:var(--accent); }
  .search .si { position:absolute; left:13px; top:11px; color:var(--gray); }
  .chips { display:flex; gap:6px; margin-left:auto; }
  .chip { border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:99px; padding:8px 15px; font-size:13px; font-weight:700; cursor:pointer; }
  .chip.on { background:var(--deep); border-color:var(--deep); color:#fff; }
  .chip .cnt { opacity:.6; margin-left:4px; font-weight:600; }
  .chip.on .cnt { opacity:.75; }

  /* 표 */
  .table-card { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead th { background:#fafbfc; text-align:left; font-size:12.5px; font-weight:700; color:var(--sub); padding:13px 16px; border-bottom:1px solid var(--line); white-space:nowrap; }
  thead th.r, tbody td.r { text-align:right; }
  tbody td { padding:13px 16px; border-bottom:1px solid #f3f5f6; vertical-align:middle; }
  tbody tr { cursor:pointer; transition:.08s; }
  tbody tr:hover { background:#fafcfb; }
  tbody tr:last-child td { border-bottom:none; }
  .cust { display:flex; align-items:center; gap:11px; }
  .avatar { width:38px; height:38px; border-radius:11px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; }
  .cust b { font-size:14px; display:block; }
  .cust .ph { font-size:12px; color:var(--gray); margin-top:1px; }
  .desc { color:var(--sub); font-size:13px; max-width:300px; }
  .desc b { color:var(--ink); font-weight:600; }
  .num { font-weight:700; font-size:13.5px; }
  .muted { color:var(--gray); font-size:12.5px; white-space:nowrap; }
  .badge { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:99px; font-size:12px; font-weight:700; white-space:nowrap; }
  .badge .dot { width:6px; height:6px; border-radius:50%; }
  .b-신규 { background:#e6f5f1; color:#1f8f7c; } .b-신규 .dot { background:var(--new); }
  .b-진행중 { background:#fdf2e3; color:#b7801f; } .b-진행중 .dot { background:var(--prog); }
  .b-예약확정 { background:#e8effc; color:#2b5cc4; } .b-예약확정 .dot { background:var(--book); }
  .b-완료 { background:#eef0f2; color:#6b7480; } .b-완료 .dot { background:var(--done); }
  .b-보류 { background:#fbeceb; color:#b5504a; } .b-보류 .dot { background:var(--hold); }
  .empty { text-align:center; padding:66px 20px; color:var(--gray); }
  .empty .big { font-size:38px; margin-bottom:10px; }

  /* 드로어 */
  .overlay { position:fixed; inset:0; background:rgba(20,40,36,.38); z-index:40; opacity:0; pointer-events:none; transition:.2s; }
  .overlay.on { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; width:440px; max-width:92vw; height:100%; background:#fff; z-index:50; box-shadow:-10px 0 40px rgba(20,40,36,.15); transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.on { transform:translateX(0); }
  .drawer .dh { padding:22px 24px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; }
  .drawer .dh h2 { font-size:20px; font-weight:800; }
  .drawer .dh .sub { font-size:13px; color:var(--gray); margin-top:3px; }
  .drawer .dh .x { margin-left:auto; border:none; background:#f2f5f4; width:32px; height:32px; border-radius:9px; font-size:18px; cursor:pointer; color:var(--sub); }
  .drawer .db { flex:1; overflow-y:auto; padding:20px 24px; }
  .status-row { display:flex; gap:8px; margin-bottom:20px; }
  .st-btn { flex:1; padding:10px 0; border:1.5px solid var(--line); background:#fff; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--sub); }
  .st-btn.sel { color:#fff; border-color:transparent; }
  .st-btn.sel[data-s="신규"]{background:var(--new)} .st-btn.sel[data-s="진행중"]{background:var(--prog)}
  .st-btn.sel[data-s="완료"]{background:var(--done)} .st-btn.sel[data-s="보류"]{background:var(--hold)}
  .st-btn.sel[data-s="예약확정"]{background:var(--book)}
  .info-grid { display:grid; grid-template-columns:84px 1fr; gap:12px 14px; font-size:14px; }
  .info-grid .k { color:var(--gray); font-weight:600; }
  .info-grid .v { font-weight:600; word-break:break-word; }
  .req-box { background:#f7faf9; border-radius:12px; padding:14px 16px; margin-top:16px; font-size:13.5px; line-height:1.7; white-space:pre-wrap; }
  .memo { width:100%; margin-top:16px; min-height:70px; padding:12px 14px; border:1.5px solid var(--line); border-radius:11px; font-size:13.5px; font-family:inherit; outline:none; resize:vertical; }
  .memo:focus { border-color:var(--accent); }
  .drawer .df { padding:16px 24px; border-top:1px solid var(--line); display:flex; gap:8px; }
  .df button { flex:1; text-align:center; padding:13px 0; border-radius:11px; font-size:14px; font-weight:700; cursor:pointer; border:none; font-family:inherit; }
  .df .primary { background:var(--deep); color:#fff; }
  .df .copy { background:var(--soft); color:var(--deep); }
  .df .danger { background:#fbeceb; color:#e2574c; flex:0 0 auto; padding:13px 16px; }

  /* 발행된 견적 안내 박스 */
  .pub-box { margin-top:16px; background:#e9f8f3; border:1px solid #c5ecdf; border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:13px; font-weight:800; color:#0a6a5e; }
  .pub-box .acts { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }
  .pub-box .pb { border:1px solid #c5ecdf; background:#fff; color:var(--deep); border-radius:8px; padding:7px 11px; font-size:12px; font-weight:700; cursor:pointer; text-decoration:none; font-family:inherit; display:inline-block; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#123a33; color:#fff; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:80; pointer-events:none; }
  .toast.on { opacity:1; }

  /* 목록: 정렬 헤더 · 출발 임박 표시 · 더보기 */
  th.sortable { cursor:pointer; user-select:none; }
  th.sortable:hover { color:var(--deep); }
  tr.urgent td:first-child { box-shadow:inset 3px 0 0 #e2574c; }
  .dday { background:#fbeceb; color:#e2574c; font-weight:800; font-size:11px; border-radius:6px; padding:2px 7px; margin-left:6px; white-space:nowrap; }
  .more-row { text-align:center; padding:14px; border-top:1px solid var(--line); }
  .more-row button { border:1.5px solid var(--line); background:#fff; color:var(--sub); border-radius:10px; padding:10px 22px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .more-row button:hover { border-color:var(--accent); color:var(--deep); }

  .mode { position:fixed; left:246px; bottom:12px; font-size:11.5px; color:var(--gray); background:#fff; border:1px solid var(--line); border-radius:8px; padding:6px 11px; z-index:5; }
  @media (max-width:900px){ .stats{grid-template-columns:repeat(2,1fr)} }
  @media (max-width:760px){
    .shell{ flex-direction:column; }
    .side{ width:100%; height:auto; flex:none; position:sticky; top:0; z-index:20;
      flex-direction:row; align-items:center; gap:6px; padding:8px 10px;
      border-right:none; border-bottom:1px solid var(--line); }
    .side-brand{ display:none; }
    .side nav{ flex:1 1 auto; min-width:0; display:flex; gap:5px; overflow-x:auto; }
    .side .mi{ width:auto; white-space:nowrap; margin-bottom:0; padding:9px 13px; flex:none; }
    .side-foot{ flex:none; margin:0; padding:0 0 0 6px; border:none; border-left:1px solid var(--line); display:flex; gap:4px; }
    .content{padding:18px} .mode{left:12px} thead .hide,tbody .hide{display:none}
  }
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <div class="logo">▲</div>
    <h1>관리자 로그인</h1>
    <p>몽골리아 은하수 · 통합 대시보드</p>
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button id="loginBtn">들어가기</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dash" style="display:none">
  <div class="shell">
    <!-- 사이드바 -->
    <aside class="side">
      <div class="side-brand">
        <span class="logo">▲</span>
        <div><b>몽골리아 은하수</b><small>몽골리아 관리자</small></div>
      </div>
      <nav>
        <button class="mi on" id="navDash">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
          대시보드
        </button>
        <button class="mi" id="navList">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          견적 문의 <span class="badge-n" id="menuCount">0</span>
        </button>
        <a class="mi" href="예약목록.html">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 15l2 2 5-5"/></svg>
          예약 관리
        </a>
        <a class="mi" href="견적만들기.html">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          견적서 만들기
        </a>
        <a class="mi" href="코스관리.html">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l11 0M9 12l11 0M9 18l11 0"/><circle cx="4" cy="6" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="4" cy="18" r="1.6"/></svg>
          코스 관리
        </a>
        <a class="mi" href="일정관리.html">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          일정 관리
        </a>
        <a class="mi" href="명소관리.html">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          명소 관리
        </a>
        <a class="mi" href="리소스관리.html">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          리소스 관리
        </a>
      </nav>
      <div class="side-foot">
        <button class="mi" id="navRefresh">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          새로고침
        </button>
        <button class="mi" id="navLogout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          로그아웃
        </button>
      </div>
    </aside>

    <!-- 본문 -->
    <main class="content">
      <div class="welcome">
        <div>
          <h1>안녕하세요 👋</h1>
          <p id="welcomeSub"></p>
        </div>
        <div class="who"><span id="whoName">관리자</span><span class="av">리</span></div>
      </div>

      <!-- 개요 (대시보드 화면에서만 표시) -->
      <div id="overviewSection">
        <div class="sec-head">
          <h2>개요</h2>
          <div class="btns">
            <button class="btn" id="previewFormBtn">👁 요청 폼 미리보기</button>
            <button class="btn" id="copyLinkBtn">🔗 링크 복사</button>
            <button class="btn" id="backupBtn" title="명소·코스·일정을 JSON 파일로 내려받기">⬇ 콘텐츠 백업</button>
            <button class="btn" id="restoreBtn" title="백업 JSON 파일로 복원">⬆ 복원</button>
            <button class="btn" id="reqBackupBtn" title="문의 전체(발행 견적 포함)를 JSON으로 내려받기">⬇ 문의 백업</button>
            <button class="btn" id="csvBtn" title="현재 필터·검색이 적용된 문의 목록을 엑셀용 CSV로 내려받기">⬇ CSV</button>
            <input type="file" id="restoreFile" accept="application/json,.json" style="display:none">
            <a class="btn primary" href="견적만들기.html">＋ 견적서 만들기</a>
          </div>
        </div>
        <div class="stats" id="stats"></div>
      </div>

      <!-- 견적 문의 리스트 -->
      <div class="sec-head" id="listAnchor">
        <h2 id="listTitle">견적 문의</h2>
      </div>
      <div class="toolbar">
        <div class="search">
          <span class="si"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input id="search" placeholder="이름·연락처·요청내용·메모로 검색">
        </div>
        <div class="chips" id="chips"></div>
      </div>
      <div class="table-card" id="list"></div>
    </main>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="mode" id="modeTag"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════ 설정 ═══════════════ */
const CFG = { brand:"몽골리아 은하수", apiBase:"/api/requests" };
const STATUSES = ["신규","진행중","예약확정","완료","보류"];
const AVA_COLORS = ["#06c4a0","#3aa0e0","#e0913a","#8a6fe0","#cf6a5e","#2f9e8a","#5aa469"];
let RECORDS = [], filterStatus = null, searchText = "", mode = "local";
let sortKey = "receivedAt", sortDir = -1, showLimit = 50;   // 목록 정렬·더보기 상태
const $ = id => document.getElementById(id);

/* ═══════════════ 로그인 ═══════════════
   비밀번호는 페이지에 저장하지 않고, 서버(Cloudflare env ADMIN_TOKEN)로만 검증합니다.
   → 비밀번호 변경: Cloudflare 대시보드 > Pages > 설정 > 환경 변수 ADMIN_TOKEN 수정 */
let ADMIN_TOKEN = sessionStorage.getItem("leaders_admin_token") || "";

async function tryLogin() {
  const pw = $("pw").value;
  if (!pw) return;
  $("loginErr").textContent = "확인 중…";
  try {
    // 토큰은 URL에 남지 않도록 헤더로 전달
    const res = await fetch(CFG.apiBase, { headers: { "x-admin-token": pw } });
    let j = null; try { j = await res.json(); } catch (e) {}
    if (j && j.ok && Array.isArray(j.items)) {
      ADMIN_TOKEN = pw; sessionStorage.setItem("leaders_admin_token", pw);
      $("loginErr").textContent = ""; showDash(); return;
    }
    if (res.status === 401) { $("loginErr").textContent = "비밀번호가 올바르지 않습니다."; $("pw").value = ""; return; }
  } catch (e) {}
  // 서버 미연결(로컬 데모/배포 전) — 데모 비밀번호로만 진입
  if (pw === "demo") { ADMIN_TOKEN = "demo"; sessionStorage.setItem("leaders_admin_token", "demo"); $("loginErr").textContent = ""; showDash(); return; }
  $("loginErr").textContent = "비밀번호가 올바르지 않거나 서버에 연결할 수 없어요.";
}
$("loginBtn").onclick = tryLogin;
$("pw").onkeydown = e => { if (e.key === "Enter") tryLogin(); };
$("navLogout").onclick = () => { sessionStorage.removeItem("leaders_admin_token"); location.reload(); };
if (ADMIN_TOKEN) showDash();
function showDash() { $("login").style.display = "none"; $("dash").style.display = "block"; $("whoName").textContent = CFG.brand; setView("dash"); loadData(); }

/* 화면 전환: 대시보드(개요+목록) ↔ 견적 문의(목록만) */
function setView(v) {
  $("overviewSection").style.display = (v === "dash") ? "" : "none";
  $("navDash").classList.toggle("on", v === "dash");
  $("navList").classList.toggle("on", v === "list");
  $("listTitle").textContent = (v === "list") ? "견적 문의 전체" : "최근 견적 문의";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
$("navDash").onclick = () => setView("dash");
$("navList").onclick = () => setView("list");
$("previewFormBtn").onclick = () => window.open("견적요청.html", "_blank");

/* ═══════════════ 데이터 ═══════════════ */
async function loadData() {
  try {
    const res = await fetch(CFG.apiBase, { headers: { "x-admin-token": ADMIN_TOKEN } });
    if (res.status === 401) {   // 저장된 토큰이 무효(비번 변경 등) → 재로그인 요구
      sessionStorage.removeItem("leaders_admin_token"); ADMIN_TOKEN = "";
      $("dash").style.display = "none"; $("login").style.display = "";
      $("loginErr").textContent = "세션이 만료되었거나 비밀번호가 변경되었어요. 새 비밀번호로 로그인해 주세요.";
      $("pw").value = ""; return;
    }
    if (res.ok) { const j = await res.json();
      if (j.ok && Array.isArray(j.items)) { RECORDS = j.items; mode = "server";
        $("modeTag").textContent = "● 서버 연결됨 (전체 기기 공유)"; checkNewArrivals(); render(); return; } }
  } catch (e) {}
  RECORDS = JSON.parse(localStorage.getItem("leaders_requests") || "[]");
  mode = "local"; $("modeTag").textContent = "○ 로컬 모드 (이 브라우저 · 배포 전)"; render();
}
$("navRefresh").onclick = loadData;

/* ═══ 자동 새로고침 · 새 문의 알림 ═══
   60초마다 목록을 갱신하고, 새 문의가 도착하면 토스트와 탭 제목으로 알립니다. */
const PAGE_TITLE = document.title;
let knownIds = null;
function checkNewArrivals() {
  const ids = new Set(RECORDS.map(r => String(r.id)));
  if (knownIds) {
    const fresh = RECORDS.filter(r => !knownIds.has(String(r.id)));
    if (fresh.length) {
      toast(`🔔 새 견적 문의 ${fresh.length}건 도착 — ${fresh[0].name || "이름 없음"}님${fresh.length > 1 ? " 외" : ""}`);
      document.title = `(${fresh.length}건 새 문의) ` + PAGE_TITLE;
    }
  }
  knownIds = ids;
}
setInterval(() => { if (ADMIN_TOKEN && mode === "server") loadData(); }, 60000);
window.addEventListener("focus", () => { document.title = PAGE_TITLE; });
$("search").oninput = e => { searchText = e.target.value.trim().toLowerCase(); showLimit = 50; render(); };
$("copyLinkBtn").onclick = () => {
  const url = location.origin.startsWith("http") ? location.origin + "/견적요청.html" : "견적요청.html";
  navigator.clipboard.writeText(url).then(() => { $("copyLinkBtn").textContent = "✓ 복사됨"; setTimeout(()=>$("copyLinkBtn").textContent="🔗 요청 폼 링크 복사",1500); });
};

/* ═══ 콘텐츠 백업 · 복원 ═══
   명소·명소 카테고리·코스·일정·일정 카테고리를 JSON 한 파일로 내려받고,
   그 파일로 언제든 복원할 수 있습니다. (실수로 지웠을 때의 보험) */
$("backupBtn").onclick = () => {
  const data = {
    _type: "leaders-backup", exportedAt: new Date().toISOString(),
    spots: getSpots(), spot_cats: getSpotCats(),
    courses: getCourses(), snippets: getSnippets(), snippet_cats: getSnippetCats(),
  };
  downloadFile(`콘텐츠백업_${dateOnly(new Date().toISOString())}.json`, JSON.stringify(data, null, 2), "application/json");
  toast("콘텐츠 백업 파일을 내려받았어요 — 안전한 곳에 보관하세요");
};

/* 문의 백업: 전체 문의(발행된 견적 포함)를 JSON으로 내려받기 — 다운로드 전용(복원 없음) */
$("reqBackupBtn").onclick = () => {
  if (!RECORDS.length) { toast("내보낼 문의가 없어요"); return; }
  const data = { _type: "leaders-requests-backup", exportedAt: new Date().toISOString(), count: RECORDS.length, items: RECORDS };
  downloadFile(`문의백업_${dateOnly(new Date().toISOString())}.json`, JSON.stringify(data, null, 2), "application/json");
  toast(`문의 ${RECORDS.length}건을 내려받았어요 (발행 견적 포함)`);
};

/* CSV 내보내기: 현재 필터·검색·정렬이 적용된 목록을 엑셀 호환(UTF-8 BOM) CSV로 */
$("csvBtn").onclick = () => {
  const rows = visibleRows();
  if (!rows.length) { toast("내보낼 문의가 없어요"); return; }
  const cell = v => '"' + String(v ?? "").replace(/"/g, '""') + '"';
  const head = ["접수일","상태","이름","전화","이메일","성인","아동","유아","출발일","귀국일","박수","여행지","차량","항공IN","항공OUT","예산","견적발행","메모"];
  const lines = rows.map(r => [
    dateOnly(r.receivedAt), r.status || "신규", r.name, r.phone, r.email,
    r.adult || 0, r.child || 0, r.infant || 0,
    r.depart, r.return_, r.nights, r.destination, r.vehicle, r.flightIn || "", r.flightOut || "", r.budget,
    r.quote ? "O" : "", r.memo,
  ].map(cell).join(","));
  downloadFile(`문의목록_${dateOnly(new Date().toISOString())}.csv`,
    "\uFEFF" + [head.map(cell).join(","), ...lines].join("\r\n"),   // BOM: 엑셀 한글 깨짐 방지
    "text/csv;charset=utf-8");
  toast(`문의 ${rows.length}건을 CSV로 내려받았어요`);
};
$("restoreBtn").onclick = () => $("restoreFile").click();
$("restoreFile").onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  e.target.value = "";
  try {
    const data = JSON.parse(await f.text());
    if (!data || data._type !== "leaders-backup") throw new Error("이 사이트의 백업 파일이 아니에요");
    const when = (data.exportedAt || "").slice(0, 10) || "날짜 미상";
    if (!confirm(`${when} 백업으로 명소·코스·일정을 모두 교체할까요?\n지금 있는 내용을 덮어씁니다.`)) return;
    const jobs = [];
    if (data.spots) jobs.push(saveSpots(data.spots));
    if (data.spot_cats) jobs.push(saveSpotCats(data.spot_cats));
    if (data.courses) jobs.push(saveCourses(data.courses));
    if (data.snippets) jobs.push(saveSnippets(data.snippets));
    if (data.snippet_cats) jobs.push(saveSnippetCats(data.snippet_cats));
    if (!jobs.length) throw new Error("백업 파일에 복원할 내용이 없어요");
    const results = await Promise.all(jobs);
    if (results.every(r => r && r.ok)) toast("✓ 복원 완료 — 서버에 반영됐어요");
    else if (results.every(r => r && (r.ok || r.local))) toast("복원됨 (이 브라우저에만 — 서버 반영은 배포 환경에서)");
    else toast("⚠ 일부 항목이 서버에 저장되지 않았어요. 다시 시도해 주세요.");
  } catch (err) { toast("⚠ 복원 실패: " + err.message); }
};

/* ═══════════════ 유틸 ═══════════════ */
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const nightTxt = r => r.nights ? `${r.nights}박 ${r.nights+1}일` : "-";
const paxSum = r => (r.adult||0)+(r.child||0)+(r.infant||0);
const paxTxt = r => `성인 ${r.adult||0}·아동 ${r.child||0}·유아 ${r.infant||0}`;
const dateOnly = iso => { const d = new Date(iso); return isNaN(d) ? "-" : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const avaColor = name => AVA_COLORS[[...String(name)].reduce((a,c)=>a+c.charCodeAt(0),0) % AVA_COLORS.length];
// 출발까지 남은 일수 (출발일 없거나 잘못됐으면 null)
function dDay(r) {
  if (!r.depart) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(r.depart); if (isNaN(d)) return null; d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
// 텍스트를 파일로 내려받기
function downloadFile(name, text, type) {
  const blob = new Blob([text], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click(); URL.revokeObjectURL(a.href);
}
// 현재 상태칩·검색·정렬이 적용된 목록 (표시 개수 제한 없음) — 목록 렌더와 CSV가 함께 사용
function visibleRows() {
  let rows = RECORDS.slice();
  if (filterStatus) rows = rows.filter(r => (r.status||"신규")===filterStatus);
  if (searchText) rows = rows.filter(r => [r.name,r.phone,r.destination,r.tripType,r.request,r.memo,r.email].some(v=>String(v||"").toLowerCase().includes(searchText)));
  rows.sort((a, b) => {
    const va = String(a[sortKey] ?? ""), vb = String(b[sortKey] ?? "");
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });
  return rows;
}

/* 최근 N일 일별 접수 시계열 */
function series(n, { cumulative=false, status=null } = {}) {
  const today = new Date(); today.setHours(0,0,0,0);
  const keys = [];
  for (let i=n-1;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); keys.push(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`); }
  const counts = keys.map(()=>0);
  let before = 0;
  RECORDS.forEach(r => {
    if (status && (r.status||"신규") !== status) return;
    const d = new Date(r.receivedAt); if (isNaN(d)) return; d.setHours(0,0,0,0);
    const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const idx = keys.indexOf(k);
    if (idx>=0) counts[idx]++; else if (d < today) before++;
  });
  if (cumulative) { let s = before; return counts.map(c => s += c); }
  return counts;
}
function sparkline(vals, w, h, color) {
  if (!vals.length) vals = [0,0];
  const max = Math.max(...vals), min = Math.min(...vals), rng = (max-min)||1;
  const step = w/(vals.length-1||1);
  const pts = vals.map((v,i)=>[i*step, (h-3) - ((v-min)/rng)*(h-6)]);
  const line = pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area = line + ` L ${w} ${h} L 0 ${h} Z`;
  const gid = "sg" + Math.abs([...color].reduce((a,c)=>a+c.charCodeAt(0),0)) + vals.length + Math.round(max);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".26"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
const ICON = {
  total: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#06c4a0" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  new: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e0913a" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>`,
  prog: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c98b2e" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  done: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b8f88" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
};

/* ═══════════════ 렌더 ═══════════════ */
function render() {
  const total = RECORDS.length;
  const cnt = {}; STATUSES.forEach(s => cnt[s] = RECORDS.filter(r => (r.status||"신규")===s).length);
  const todayStr = dateOnly(new Date().toISOString());
  const todayCnt = RECORDS.filter(r => dateOnly(r.receivedAt) === todayStr).length;
  const waiting = cnt["신규"] + cnt["진행중"];
  const thisMonth = todayStr.slice(0, 7);   // YYYY-MM
  const doneMonth = RECORDS.filter(r => (r.status||"신규")==="완료" && dateOnly(r.receivedAt).slice(0,7) === thisMonth).length;

  $("menuCount").textContent = total;
  $("welcomeSub").textContent = `처리 대기 ${waiting}건 · 오늘 접수 ${todayCnt}건 · 전체 ${total}건`;

  // 통계 카드 (미니 그래프)
  const cards = [
    { k:"전체 문의", v:total, ic:ICON.total, icbg:"#e6f5ef", delta:`오늘 +${todayCnt}`, dc:"up", spark:sparkline(series(14,{cumulative:true}),96,40,"#06c4a0") },
    { k:"신규 (확인 필요)", v:cnt["신규"], ic:ICON.new, icbg:"#fdf2e3", delta:cnt["신규"]?"확인 필요":"없음", dc:cnt["신규"]?"warn":"flat", spark:sparkline(series(14,{status:"신규"}),96,40,"#06c4a0") },
    { k:"진행중 (상담 중)", v:cnt["진행중"], ic:ICON.prog, icbg:"#fdf2e3", delta:"상담 중", dc:"warn", spark:sparkline(series(14,{status:"진행중"}),96,40,"#e0913a") },
    { k:"완료", v:cnt["완료"], ic:ICON.done, icbg:"#eef2f1", delta:`이번달 ${doneMonth}`, dc:"flat", spark:sparkline(series(14,{status:"완료"}),96,40,"#8a95a0") },
  ];
  $("stats").innerHTML = cards.map(c => `
    <div class="stat">
      <div class="stat-top"><span class="stat-ic" style="background:${c.icbg}">${c.ic}</span><span class="stat-k">${c.k}</span></div>
      <div class="stat-row">
        <div><span class="stat-v">${c.v}</span><span class="stat-delta ${c.dc}">${c.delta}</span></div>
        ${c.spark}
      </div>
    </div>`).join("");

  // 상태 칩
  const chipDefs = [["전체", total], ...STATUSES.map(s => [s, cnt[s]])];
  $("chips").innerHTML = chipDefs.map(([k,v]) =>
    `<div class="chip ${filterStatus===k||(k==="전체"&&!filterStatus)?"on":""}" data-f="${k}">${k}<span class="cnt">${v}</span></div>`).join("");
  $("chips").querySelectorAll(".chip").forEach(el => el.onclick = () => { filterStatus = el.dataset.f==="전체"?null:el.dataset.f; showLimit = 50; render(); });

  // 필터 + 정렬
  const rows = visibleRows();

  if (!rows.length) {
    $("list").innerHTML = `<div class="empty"><div class="big">📭</div>
      ${total ? "조건에 맞는 문의가 없습니다." : "아직 접수된 문의가 없습니다.<br><span style='font-size:13px'>견적 요청 폼에서 테스트로 제출해 보세요.</span>"}</div>`;
    return;
  }
  const arrow = k => sortKey === k ? (sortDir > 0 ? " ▲" : " ▼") : "";
  const shown = rows.slice(0, showLimit);
  $("list").innerHTML = `
    <table>
      <thead><tr>

  const moreBtn = $("moreBtn");
  if (moreBtn) moreBtn.onclick = () => { showLimit += 50; render(); };

/* ═══════════════ 토스트 ═══════════════ */
let toastT;
function toast(m){ $("toast").textContent = m; $("toast").classList.add("on"); clearTimeout(toastT); toastT = setTimeout(()=>$("toast").classList.remove("on"), 2400); }

/* ═══════════════ 상태·메모 저장 ═══════════════ */
async function persist(id, patch) {
  const r = RECORDS.find(x => String(x.id) === String(id));
  if (r) Object.assign(r, patch);
  if (mode === "local") { localStorage.setItem("leaders_requests", JSON.stringify(RECORDS)); return { ok: true, local: true }; }
  try {
    const res = await fetch(`${CFG.apiBase}/${encodeURIComponent(id)}`, { method:"PATCH", headers:{"Content-Type":"application/json","x-admin-token":ADMIN_TOKEN}, body:JSON.stringify(patch) });
    if (res.status === 401) return { ok: false, error: "관리자 인증이 만료됐어요. 다시 로그인해 주세요." };
    if (!res.ok) return { ok: false, error: "서버 오류 (" + res.status + ")" };
    return { ok: true };
  } catch(e){ return { ok: false, error: "서버에 연결할 수 없어요" }; }
}
async function updateStatus(id,s){
  // 낙관적 업데이트: 화면 먼저 즉시 반영 → 서버 저장은 뒤에서. 실패하면 원래 상태로 되돌림.
  const r = RECORDS.find(x => String(x.id) === String(id));
  if (!r) return;
  const prev = r.status || "신규";

  // ── 예약확정 트리거: 발행된 견적이 있어야 하고, 확정 순간 견적 일정을 booking으로 승계 ──
  // (booking.js의 seedBookingFromQuote — 예약관리와 동일본. 이미 booking이 있으면 손대지 않음/멱등)
  let seeded = false;
  const patch = { status: s };
  if (s === "예약확정") {
    if (!r.quote) { toast("⚠ 견적서를 먼저 발행해야 예약확정할 수 있어요"); return; }
    if (!r.booking) { r.booking = seedBookingFromQuote(r); seeded = true; patch.booking = r.booking; }
  }

  r.status = s;
  render(); openDrawer(id);
  const res = await persist(id, patch);
  if (res.ok) {
    toast(seeded ? "예약확정 — 견적 일정을 예약으로 옮겼어요" : `상태가 "${s}"(으)로 저장됐어요`);
    // ※ 고객 확정 안내(확정일정표/알림톡) 자동 발송 훅은 여기에 연결 예정 (이번 범위 제외)
    return;
  }
  r.status = prev;               // 저장 실패 → 되돌리기
  if (seeded) delete r.booking;  // 이번에 만든 booking도 함께 롤백
  render(); openDrawer(id);
  toast("⚠ 상태 저장 실패: " + res.error);
}
const memoLast = {};   // 마지막 저장값 (변경 없으면 저장 안 함)
async function saveMemo(id, m) {
  if (memoLast[id] === undefined) {
    const r = RECORDS.find(x => String(x.id) === String(id));
    memoLast[id] = (r && r.memo) || "";
  }
  if (m === memoLast[id]) return;   // 변경 없음
  const res = await persist(id, { memo: m });
  if (res.ok) { memoLast[id] = m; toast("메모가 저장됐어요"); }
  else toast("⚠ 메모 저장 실패: " + res.error);
}

/* ═══════════════ 문의 삭제 ═══════════════ */
async function deleteRequest(r) {
  if (!confirm(`"${r.name || "-"}" 님의 문의를 삭제할까요?\n발행된 견적서 링크도 함께 사라지며, 되돌릴 수 없습니다.`)) return;
  if (mode === "local") {
    RECORDS = RECORDS.filter(x => String(x.id) !== String(r.id));
    localStorage.setItem("leaders_requests", JSON.stringify(RECORDS));
    closeDrawer(); render(); toast("삭제되었습니다"); return;
  }
  try {
    const res = await fetch(`${CFG.apiBase}/${encodeURIComponent(r.id)}`, { method: "DELETE", headers: { "x-admin-token": ADMIN_TOKEN } });
    const j = await res.json().catch(() => ({}));
    if (res.status === 401) { toast("⚠ 관리자 인증이 만료됐어요. 다시 로그인해 주세요."); return; }
    if (!j.ok) { toast("⚠ 삭제 실패: " + (j.error || "서버 오류")); return; }
    RECORDS = RECORDS.filter(x => String(x.id) !== String(r.id));
    closeDrawer(); render(); toast("삭제되었습니다");
  } catch (e) { toast("⚠ 삭제 실패 — 서버 연결을 확인하세요"); }
}
